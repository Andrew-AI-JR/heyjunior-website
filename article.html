<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - Junior</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script defer src="js/analytics.js"></script>
    <script src="js/api-config.js"></script>
    <style>
        .article-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .article-header {
            margin-bottom: 40px;
        }
        .article-title {
            font-size: 2.5rem;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        .article-meta {
            color: #64748b;
            font-size: 1rem;
        }
        .article-featured-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 32px;
        }
        .article-content {
            font-size: 1.125rem;
            line-height: 1.8;
            color: #334155;
        }
        .article-content h2 {
            margin-top: 2em;
            margin-bottom: 1em;
            color: #0f172a;
        }
        .article-content p {
            margin-bottom: 1.5em;
        }
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .article-loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body data-page="article" class="i18n-ready">
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="./images/junior-logo.png" alt="Junior Logo" class="logo-img"></a>
            </div>
            <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <div class="nav-group">
                    <li><a href="index.html#use-cases">Use Cases</a></li>
                    <li><a href="index.html#features">Features</a></li>
                    <li><a href="why-commenting-works.html">Why Commenting Works</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="try-it.html">Try It</a></li>
                
                    <li><a href="blog.html">Blog</a></li></div>
                <div class="nav-actions">
                    <li><a href="register.html?src=article-nav" class="cta-button">Start Free</a></li>
                    <li><a href="portal.html" class="nav-login-link">Login</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <main class="article-container" style="padding-top: 120px;">
        <a href="blog.html" class="back-link">← Back to Blog</a>
        
        <div id="article-content">
            <div class="article-loading">Loading article...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Junior. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            const apiBaseUrl = window.getApiBaseUrl();
            
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                container.innerHTML = '<p>Article not found.</p>';
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/api/blog/${encodeURIComponent(slug)}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Article not found.');
                    }
                    throw new Error('Failed to load article.');
                }
                
                const post = await response.json();
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${post.content || ''}
                    </div>
                `;
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
