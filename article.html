        .article-content {

            line-height: 1.3;
            letter-spacing: -0.005em;

        .article-content h4 {

            margin-bottom: 0.55em;
            line-height: 1.35;
            color: #334155;
        }
        .article-content p {
            margin: 0 0 1.3em;
        }
        .article-content ul,
        .article-content ol {
            margin: 0 0 1.3em 1.35em;
            padding: 0;
        }
        .article-content li {
            margin-bottom: 0.45em;
        }
        .article-content strong {
            color: #0f172a;
        }
        .article-content a {
            color: #1d4ed8;
            text-decoration-thickness: 0.08em;
            text-underline-offset: 0.16em;
        }
        .article-content blockquote {
            margin: 0 0 1.5em;
            padding: 0.9em 1.1em;
            border-left: 4px solid #94a3b8;
            color: #334155;
            background: #f8fafc;
            border-radius: 8px;
        }
        .article-content pre {
            overflow-x: auto;
            padding: 14px;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            margin-bottom: 1.5em;
            font-size: 0.93em;
            line-height: 1.6;

        .article-content code {
            font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
            font-size: 0.95em;
            background: #f1f5f9;
            padding: 0.12em 0.35em;
            border-radius: 4px;
        }
        .article-content pre code {
            background: transparent;
            padding: 0;
        }
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5em;
            display: block;
            overflow-x: auto;
        }
        .article-content th,
        .article-content td {
            border: 1px solid #cbd5e1;
            padding: 10px 12px;
            text-align: left;
            vertical-align: top;
        }
        .article-content th {
            background: #f8fafc;
            color: #0f172a;
        }
        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 0.6em 0 1.3em;

        .article-content hr {
            border: none;
            border-top: 1px solid #e2e8f0;

        .article-content figure {

        .article-content figcaption {

        .article-loading {

            padding: 40px;

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {

        }
        @media (max-width: 768px) {

            }

            }

    <main class="article-container" style="padding-top: 120px;">
        <a href="blog.html" class="back-link">← Back to Blog</a>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            const apiBaseUrl = window.getApiBaseUrl();
            
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                container.innerHTML = '<p>Article not found.</p>';
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/api/blog/${encodeURIComponent(slug)}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Article not found.');
                    }
                    throw new Error('Failed to load article.');
                }
                
                const post = await response.json();
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
