    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 21, "slug": "lead-generation-linkedin-sales-navigator", "title": "7 Steps for Lead Generation on LinkedIn Sales Navigator", "excerpt": "Learn how to transform LinkedIn Sales Navigator into a predictable revenue engine. Discover 7 actionable steps for advanced filtering, Boolean search, and AI-driven engagement.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57btnjszeqxq5982tkp8n2d71876jpt/7-steps-for-lead-generation-on-linkedin-sales-navi-1781011182542-2sl68m.png", "published_at": "2026-06-12T13:05:00+00:00", "content": "# 7 Steps for Lead Generation on LinkedIn Sales Navigator\n\nMost professionals upgrade to LinkedIn Sales Navigator, stare at the search bar, type in \"CEO,\" and are immediately paralyzed by 8.5 million results. They pick a few dozen at random, send connection requests with a generic pitch, and wonder why they're paying $99 a month for zero pipeline.\n\nTreating Sales Navigator like a glorified phone book is the fastest way to waste your subscription. It isn't just a database; it is an intelligent, trigger-based engine for pipeline generation. When configured correctly, it tells you exactly who to talk to, when they are most receptive, and what you should say to them.\n\nWhether you are a founder hunting for your first ten enterprise clients, a lead gen agency scaling campaigns, or a sales development rep (SDR) trying to hit quota, you need a system. \n\nIn this guide, we will walk through a comprehensive, seven-step playbook for using LinkedIn Sales Navigator to build highly targeted lists, identify buying intent, and start authentic conversations that actually convert.\n\n## What is LinkedIn Sales Navigator?\n\nBefore diving into the strategy, it's critical to understand what makes this tool different from standard LinkedIn Premium. According to [LinkedIn's official overview](https://business.linkedin.com/sell/sales-navigator), Sales Navigator is a dedicated sales intelligence platform that runs parallel to your normal LinkedIn feed. \n\nWhile standard LinkedIn is built for networking and content consumption, Sales Navigator is built for **account mapping, advanced filtering, and lead tracking**.\n\nKey features that separate it from standard LinkedIn include:\n*   **Advanced Lead and Account Filters:** Over 30 specialized search criteria, including headcount growth, technologies used, and recent leadership changes.\n*   **Saved Leads and Accounts:** The ability to bookmark prospects outside of your network without sending a connection request.\n*   **Custom Alerts:** A dedicated feed that only shows updates from your saved leads and target accounts (ignoring the noise of your standard feed).\n*   **InMail Credits:** The ability to message people outside your network directly, bypassing the connection request limit.\n*   **CRM Integration:** Seamless syncing with platforms like Salesforce and HubSpot.\n\n![Diagram comparing Standard LinkedIn search to Sales Navigator's account mapping structure](https://assets.bevisible.app/inline-images/j57btnjszeqxq5982tkp8n2d71876jpt/inline-1-1781011095919-e2gwih.png)\nIf you're serious about [lead generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin), Sales Navigator isn't optional\u2014it's foundational.\n\n## Step 1: Define Your Target Accounts (Account-First Strategy)\n\nA common mistake novices make is searching for *people* before they search for *companies*. In B2B sales, your strategy should always be **Account-First, Lead-Second**. \n\nWhy? Because targeting a decision-maker at a company that fundamentally doesn't need your product (or can't afford it) is a waste of time. You need to qualify the organization before you qualify the individual.\n\n### Building Your Ideal Customer Profile (ICP)\n\nInstead of starting with the \"Lead Search\" tab, start with the \"Account Search\" tab. You need to narrow down the universe of businesses to those most likely to buy.\n\nUse these high-value Account Filters to build a highly targeted list:\n\n1.  **Headcount Growth:** Are they hiring? A company growing its engineering team by 20% over the last 6 months has budget and momentum. A company shrinking its headcount is likely freezing vendor spend.\n2.  **Department Headcount:** If you sell a marketing tool, you don't just want companies with 500 employees. You want companies with at least 15 people in the marketing department.\n3.  **Technologies Used:** If your software integrates exclusively with Shopify, you can filter for companies currently using Shopify.\n4.  **Recent Leadership Changes:** A newly hired VP of Operations is eager to make an impact and highly receptive to new tools in their first 90 days.\n\n### The Mini-Story of Contextual Targeting\n\nConsider an agency selling specialized cybersecurity audits. They used to search Lead Filters for \"CISO\" (Chief Information Security Officer) and blast out generic messages. Their reply rate was less than 1%.\n\nThey shifted to an Account-First approach. They used Account Search to find companies in the finance sector that had *grown their IT department by 15% in the last year* but *had not hired a CISO yet*. They then searched for the VP of Engineering at those specific companies. \n\nThe outreach shifted from generic spam to: *\"Noticed your engineering team is scaling rapidly but you haven't brought on a dedicated security lead yet. How are you handling compliance audits as you scale?\"* Their meeting book rate spiked to 12%.\n\n**Action Item:** Create an Account Search with 4-5 strict criteria. Save the top 50 companies into an Account List named `Q3 Target Accounts - High Intent`.\n\n## Step 2: Master Advanced Search and Boolean Logic\n\nOnce you have your target accounts, it's time to find the exact human beings who control the budget. \n\nSales Navigator's keyword search bar is incredibly powerful, provided you know how to speak its language. This language is called **Boolean Search**. Mastering Boolean is arguably the most critical skill for [building a LinkedIn lead generation funnel that converts](https://heyjunior.ai/blog/linkedin-lead-generation-funnel).\n\n### The 5 Essential Boolean Operators\n\nTo keep your lead lists hyper-relevant and free of false positives, use these operators in the Title or Keyword search boxes:\n\n| Operator | Function | Example | Result |\n| :--- | :--- | :--- | :--- |\n| **\"\" (Quotes)** | Exact phrase match. | `\"VP of Sales\"` | Only returns profiles with that exact phrase, eliminating \"Sales Associate to the VP.\" |\n| **AND** | Combines two criteria. | `Director AND Marketing` | Profile must include both words. |\n| **OR** | Broadens the search. | `(Founder OR CEO)` | Profile can include either title. Excellent for catching varied nomenclature. |\n| **NOT** | Excludes terms. | `NOT (Intern OR Assistant)` | Cleans up the list by removing junior staff. |\n| **() (Parentheses)**| Groups complex logic together. | `(VP OR Director) AND Sales NOT Inside` | Complex targeting combining multiple operators. |\n\n### Practical Boolean Examples by Industry\n\n**For a SaaS targeting HR Leaders:**\n`(\"Chief Human Resources Officer\" OR CHRO OR \"VP of HR\" OR \"Head of Talent\") AND (Retention OR Recruitment) NOT (Assistant OR Coordinator OR Consultant)`\n\n**For a Lead Gen Agency targeting Marketing Execs:**\n`(\"Chief Marketing Officer\" OR CMO OR \"VP of Marketing\" OR \"Demand Generation\") NOT (Freelance OR Fractional OR Intern)`\n\n**For a Consultant targeting Founders of early-stage startups:**\n`(Founder OR Co-founder OR \"Co-Founder\" OR CEO) AND \"Seed\" NOT (\"Angel Investor\" OR VC)`\n\n![Whiteboard sketch explaining Boolean search logic with AND, OR, and NOT operators](https://assets.bevisible.app/inline-images/j57btnjszeqxq5982tkp8n2d71876jpt/inline-2-1781011094904-krc1p9.png)\nTake your time refining these strings. If your search returns 10,000 results, your criteria are too broad. Aim for highly specific lists of 200 to 500 decision-makers per campaign. According to outbound experts discussing strategies on platforms like [Reddit's LeadGeneration community](https://www.reddit.com/r/LeadGeneration/comments/1k3an0l/how_i_use_linkedin_sales_navigator_for_lead/), smaller, deeply segmented lists consistently outperform massive, generic lists.\n\n## Step 3: Build and Organize Saved Searches and Lists\n\nThe true power of Sales Navigator lies in its list-building and automated tracking capabilities. You shouldn't have to manually execute your complex Boolean searches every day.\n\n### Saved Leads vs. Saved Searches\n\n*   **Saved Leads:** These are specific individuals you have bookmarked. They are added to a static list (e.g., `Q3 Priority Leads`). You can add notes, tag them, and Sales Navigator will prioritize their activity in your specialized feed.\n*   **Saved Searches:** This is the automated engine. When you save a complex search query, Sales Navigator will dynamically monitor the platform. If a new person joins the platform or updates their profile to match your criteria, LinkedIn will automatically alert you. \n\n### The Monday Morning Routine\n\nA highly effective [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) involves setting up 3-5 hyper-specific Saved Searches. \n\nEvery Monday morning, you log in to Sales Navigator and check the \"New Results\" tab on your Saved Searches. These are people who *just* got promoted into your target role or *just* joined your target company. Reaching out to someone in their first two weeks of a new role dramatically increases response rates, as they are actively evaluating the existing tech stack and processes.\n\n## Step 4: Leverage \"Spotlight\" Triggers for Warm Outreach\n\nCold outreach is hard. \"Warm\" outreach\u2014where you have a contextual reason to reach out\u2014is significantly easier. \n\nSales Navigator provides \"Spotlight\" filters at the top of your search results. These filters highlight individuals in your search who have exhibited recent behavioral triggers. This is the difference between spamming and consulting.\n\nThe most valuable Spotlight filters include:\n\n### 1. \"Posted on LinkedIn in the last 30 days\"\n\nThis is arguably the most valuable filter in the entire platform. If you want to use [LinkedIn AI job search](https://heyjunior.ai/blog/linkedin-ai-job-search) tactics or sell B2B software, you need active users. Reaching out to someone who hasn't logged into LinkedIn since 2021 is a waste of an InMail credit or connection request.\n\nFurthermore, this filter sets up a \"Conversation-First\" strategy. Instead of pitching them in the DMs, you can go to their recent post, read it, and leave a thoughtful, insightful comment. Tools like **Junior** are built precisely for this workflow. By running locally on your machine, Junior identifies these active posts from your lists and drafts highly personalized, human-sounding comments that match your unique voice. You engage publicly, establish authority, and warm up the lead before you ever send a direct message.\n\n### 2. \"Changed jobs in the last 90 days\"\n\nAs mentioned earlier, new executives are prime targets. They have a mandate to improve processes, they usually have an initial budget, and they haven't settled into legacy vendor loyalty yet. A simple message like: *\"Congrats on the new role at [Company]. Usually, when leaders step into the VP role there, their first priority is [X]. Are you looking at evaluating your [Y] processes this quarter?\"* works wonders.\n\n### 3. \"Following your company\"\n\nIf someone matches your ICP, fits your Boolean search, and already follows your company page on LinkedIn, they are essentially a warm inbound lead. Prioritize these individuals immediately.\n\n![Flowchart detailing outreach actions based on LinkedIn Sales Navigator spotlight triggers](https://assets.bevisible.app/inline-images/j57btnjszeqxq5982tkp8n2d71876jpt/inline-3-1781011083065-2d0oq9.png)\n## Step 5: Map Buying Committees (Multi-Threading)\n\nIn modern B2B sales, a single decision-maker rarely signs a contract in isolation. According to most outbound data, an average B2B purchasing decision involves 6 to 10 stakeholders. \n\nIf you only message the CEO, and the CEO ignores you, the account is dead. \n\nInstead, you must \"multi-thread\" your outreach using Sales Navigator\u2019s Account Map and Relationship Explorer features.\n\n### How to Multi-Thread Effectively\n\n1.  **The Executive Sponsor:** The VP or C-level executive who holds the budget. Your messaging here should focus on ROI, risk mitigation, and high-level strategy.\n2.  **The Champion/Director:** The mid-level manager who feels the pain daily. Your messaging here should focus on efficiency, making their team look good, and solving specific bottlenecks.\n3.  **The End User:** The individual contributor. You don't pitch them; you ask them questions. *\"Hey Sarah, I'm doing some research on how teams at [Company] handle data routing. Do you guys still use legacy spreadsheets, or have you moved to a CRM integration?\"*\n\nBy engaging with 3-4 people at the same company simultaneously, you manufacture internal conversations. When the VP finally asks the Director, \"Have you heard of this company?\" the Director says, \"Yes, they actually reached out to my team last week. We should look into it.\"\n\n## Step 6: Integrate with Your CRM and Tech Stack\n\nSales Navigator is a brilliant intelligence tool, but it is a terrible place to actually run a structured, long-term sales pipeline. You need to get your leads out of LinkedIn and into your system of record.\n\n### The Export Dilemma\n\nLinkedIn inherently limits the ability to bulk export data because they want to protect user privacy and keep you on their platform. However, to [generate sales leads effectively](https://business.linkedin.com/sell/resources/sales-terms/sales-lead-generation), you must connect your data. \n\nIf you have the \"Advanced\" or \"Advanced Plus\" tiers of Sales Navigator, you get native integrations with CRMs like Salesforce, HubSpot, and Microsoft Dynamics. This allows you to log InMails directly to the CRM contact record and see CRM data overlaid on LinkedIn profiles.\n\nFor smaller teams using the standard \"Core\" plan, you will need to rely on third-party integrations or workflow tools. For example, as detailed on the [Zapier blog](https://zapier.com/blog/generate-leads-with-linkedin-sales-navigator/), you can set up automations to capture lead data and push it to your CRM, though this often requires manual trigger steps or intermediary scraping tools.\n\n### Choosing Safe Automation\n\nWhen scaling your pipeline, you will naturally look into [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation). Proceed with extreme caution. \n\nMany cloud-based automation tools log into your account from random server IP addresses and blast hundreds of identical messages. LinkedIn's algorithm actively hunts and bans these accounts.\n\nIf you are going to automate, prioritize security and authenticity. This is why comparing tools like [Meet Alfred vs Junior](https://heyjunior.ai/blog/meet-alfred) is critical. Junior runs directly on your local machine, using your actual browser session. It mirrors human interaction patterns with variable timing, meaning your account stays secure while you scale your engagement.\n\n![Pipeline diagram showing data flow from Sales Navigator to CRM to Local AI engagement tool](https://assets.bevisible.app/inline-images/j57btnjszeqxq5982tkp8n2d71876jpt/inline-4-1781011083944-07j4ky.png)\n## Step 7: Execute a Conversation-First Outreach Strategy\n\nYou've built the ICP. You've mastered Boolean search. You've filtered for active users. Now, what do you actually *say*?\n\nThe biggest mistake you can make at the 1-yard line is sending a five-paragraph pitch in an InMail. The era of the \"Pitch-Slap\" is dead. Decision-makers receive dozens of automated pitches daily; they have developed total blindness to them.\n\n### The \"Comment-First\" Approach\n\nInstead of immediately demanding their time in a direct message, build a [LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate) that fosters familiarity.\n\n1.  **Day 1: Engage Publicly.** Find a recent post from your prospect (using the Spotlight filter). Leave a thoughtful comment that adds value to their perspective. Do not pitch. \n2.  **Day 3: Engage Again.** If they post again, comment again. Or, like a comment they left on someone else's post.\n3.  **Day 5: The Connection Request.** Send a connection request with a personalized note referencing the public interaction. *\"Hey John, loved your take on the shift in B2B attribution models earlier this week. I'd love to follow your content. Cheers.\"*\n4.  **Day 8: The Soft Ask.** Once connected, send a low-friction question. *\"John, since you're scaling the demand gen team right now, curious if you've run into [Specific Pain Point] yet? We've seen a lot of VPs struggling with that this quarter.\"*\n\nThis is where an AI-driven platform like Junior becomes your unfair advantage. Scaling this level of personalization manually takes hours every day. Junior automates the discovery of these posts and generates high-quality, contextual comments based on your specific bio and networking goals. It does the heavy lifting of warming up the prospect, allowing you to step in when the conversation turns into a genuine business opportunity.\n\n### InMail Best Practices\n\nWhen you do need to use your Sales Navigator InMail credits (for prospects who aren't active posters), adhere to these rules:\n\n*   **Keep it under 75 words:** Mobile optimization is crucial.\n*   **Focus on the prospect, not yourself:** Use the word \"You\" three times as often as \"I\" or \"We.\"\n*   **Use a soft Call to Action (CTA):** Don't ask for a 30-minute demo. Ask for interest. *\"Is this a priority for your team right now?\"* or *\"Worth a brief chat?\"*\n\n## Bonus: LinkedIn Lead Gen Ads vs. AI Outreach\n\nMany companies wonder if they should skip the manual/Sales Nav route entirely and just pay LinkedIn for Lead Gen Ads. \n\nWhile ads have their place for top-of-funnel brand awareness, they are exceptionally expensive. B2B clicks on LinkedIn can easily exceed $15 to $20 *per click*, with no guarantee of a conversion. \n\nComparing [LinkedIn Lead Gen Ads vs. AI Comments](https://heyjunior.ai/blog/linkedin-lead-generation-ads) reveals a stark difference in ROI. Ads interrupt the user experience. A well-executed outbound strategy using Sales Navigator and authentic, AI-assisted engagement (like Junior) integrates seamlessly into the user's natural networking habits. The conversion rates on warm, conversation-first outbound consistently outperform cold ad traffic for high-ticket B2B sales.\n\n## Common Mistakes to Avoid\n\nTo ensure your [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) and internal efforts don't go to waste, avoid these pitfalls:\n\n*   **Ignoring the \"View Similar\" Button:** When you find a perfect prospect, click the three dots on their profile and select \"View Similar.\" Sales Navigator's algorithm will instantly generate a list of lookalike profiles. It's a goldmine that is rarely used.\n*   **Failing to Clean Lists:** If a lead hasn't responded after a month of multi-touch outreach, remove them from your active list. Cluttered lists lead to disorganized follow-ups.\n*   **Over-Automating Connection Requests:** Trying to send 100 connection requests a day will get you restricted. Rely on targeted engagement, [scale LinkedIn lead generation with AI safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai), and keep volume low while keeping personalization high.\n\n## FAQs on Sales Navigator Lead Gen\n\n### Is LinkedIn Sales Navigator worth the cost?\nYes, if you use the advanced filters and saved searches. If you are generating even one B2B meeting a month that turns into a closed-won deal, the $99/month easily pays for itself. If you only use it to bypass search limits and still send generic spam, it is a waste of money.\n\n### How many connection requests can I safely send?\nLinkedIn restricts accounts that show bot-like behavior. A safe benchmark is 20-30 highly targeted connection requests per day. Your acceptance rate matters more than your volume. If you send 20 requests and 15 accept, LinkedIn's algorithm favors you. If you send 100 and only 5 accept, you flag the system.\n\n### Can I automate Sales Navigator?\nYou cannot natively automate messaging within Sales Navigator without third-party tools. However, you must choose tools that operate securely. Avoid cloud-based scrapers. Use local-machine tools like Junior to automate the engagement and commenting process securely.\n\n## Ready to Build Your Pipeline?\n\nLinkedIn Sales Navigator is the most robust B2B database on the planet, but data alone doesn't close deals\u2014conversations do. \n\nBy defining your ICP, mastering Boolean logic, leveraging trigger-based alerts, and shifting to a conversation-first engagement model, you can transform Sales Navigator from an expensive search bar into a predictable revenue engine. Stop pitching, start engaging, and let the pipeline follow.", "created_at": "2026-06-12T13:19:24.914452+00:00", "updated_at": "2026-06-12T13:19:24.914467+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
