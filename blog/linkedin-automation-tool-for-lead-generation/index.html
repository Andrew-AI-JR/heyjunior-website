    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 4, "slug": "linkedin-automation-tool-for-lead-generation", "title": "7 LinkedIn Automation Tools for Lead Generation (2026)", "excerpt": "Discover the 7 best LinkedIn automation tools for lead generation in 2026. Compare local vs cloud software, pricing, and how to scale outreach safely.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5770kfqnwm5k8zdepdfxdc78s87798a/7-linkedin-automation-tools-for-lead-generation-20-1779460726433-36ey0a.png", "published_at": "2026-05-24T12:16:00+00:00", "content": "# 7 LinkedIn Automation Tools for Lead Generation (2026)\n\nIf you ask most sales professionals how their LinkedIn outreach is performing today, you will hear a familiar complaint: the platform is saturated, reply rates have tanked, and prospects are aggressively ignoring anything that smells like an automated pitch. \n\nThe reality of lead generation on LinkedIn in 2026 is that traditional \"connect and pitch\" sequences are dead. Buyers have developed an acute filter for template-based spam, and LinkedIn\u2019s security algorithms are faster than ever at detecting and banning accounts using reckless cloud automation.\n\nYet, top-performing founders, agencies, and sales teams are pulling more revenue from LinkedIn than ever before. Their secret? They have stopped automating the *pitch* and started automating the *engagement*. \n\nBy prioritizing a conversation-first strategy\u2014using tools that warm up outbound leads through authentic interaction rather than cold DMs\u2014you can build real authority and fill your pipeline without risking your account.\n\nIn this guide, we will break down the seven best LinkedIn automation tools for lead generation available right now, how they work, and how to choose the right software to scale your pipeline safely.\n\n## What Is LinkedIn Lead Generation Software?\n\nLinkedIn lead generation software refers to applications designed to automate repetitive prospecting, engagement, and outreach tasks on the platform. \n\nHistorically, these tools focused primarily on scraping profiles and firing off hundreds of connection requests and direct messages. As the platform evolved, so did the software. Today, [lead automation on LinkedIn](https://business.linkedin.com/advertise/partners/resources/lead-automation-on-linkedin) encompasses a broader ecosystem of capabilities:\n\n*   **Profile Scraping & Enrichment:** Extracting email addresses, job titles, and company data.\n*   **Automated Engagement:** Liking, commenting, and interacting with target prospects' posts to build familiarity.\n*   **Campaign Sequencing:** Building multi-step outreach flows that trigger based on prospect behavior.\n*   **CRM Syncing:** Pushing LinkedIn activity directly into Salesforce, HubSpot, or custom databases.\n\nThe most critical shift in 2026 is the divide between *outreach tools* (sending messages) and *engagement boosters* (interacting natively). Modern social selling relies heavily on the latter to warm up leads before a single message is sent.\n\n## How Do LinkedIn Automation Tools Work? (The Architecture Matters)\n\nBefore diving into specific tools, you must understand how they operate under the hood. The architecture of a tool dictates not just its features, but its safety. If a tool triggers LinkedIn's commercial use limits or bot detection, you risk a permanent shadowban or account deletion.\n\n![Diagram comparing Local Machine, Cloud-based, and Browser Extension automation architectures for LinkedIn.](https://assets.bevisible.app/inline-images/j5770kfqnwm5k8zdepdfxdc78s87798a/inline-1-1779460691036-idztir.png)\nThere are three primary ways these tools interface with LinkedIn:\n\n### 1. Cloud-Based Automation\nCloud tools run on external servers. You provide your account credentials or session cookies, and a virtual machine executes actions on your behalf 24/7. \n*   **Pros:** They run even when your computer is off. Excellent for scaling multiple accounts.\n*   **Cons:** Because the IP address often differs from where you normally log in, LinkedIn's security flags cloud activity easily. Many cloud platforms try to mask this with dedicated proxies, but the risk remains high.\n\n### 2. Browser Extensions\nThese tools install directly into Chrome or Edge. They sit on top of your active LinkedIn tab and automate clicks and typing while you watch.\n*   **Pros:** Easy to install, usually cheaper, and they run from your actual IP address.\n*   **Cons:** You cannot use your browser for other tasks while the automation is running. If LinkedIn updates its user interface, extensions often break immediately because they rely on clicking specific HTML elements.\n\n### 3. Local Machine Automation\nThese applications are installed directly on your desktop or laptop. They leverage your existing hardware and network to perform actions, often running in the background without hijacking your screen.\n*   **Pros:** Maximum security. By running locally, the traffic appears completely organic to LinkedIn\u2019s security algorithms. No weird IP jumps, no cloud proxies.\n*   **Cons:** They only run when your machine is turned on and connected to the internet.\n\nFor most individual professionals, founders, and careful sales teams, local automation is the gold standard for balancing safety with scale.\n\n## 7 Best Lead Generation Software Tools for LinkedIn Outreach\n\nWith dozens of tools flooding the market, narrowing down the right software can be overwhelming. We have evaluated the top contenders based on their safety, methodology, feature set, and pricing. \n\nHere are the top seven tools for generating LinkedIn leads in 2026.\n\n### 1. Junior (Best for Conversation-First Engagement & Safety)\n\n[Junior](https://heyjunior.ai) fundamentally flips the traditional LinkedIn automation model. Instead of treating LinkedIn as a cold email platform, Junior treats it like a networking event. \n\nBuilt specifically for founders, sales teams, and job seekers looking to build authority without the stigma of cold DM spam, Junior automates the process of finding relevant posts from your target audience and generating high-quality, personalized comments that mirror your natural voice. \n\nBy engaging thoughtfully in the feed, Junior drives warm inbound profile views and makes outbound DMs significantly more effective because the prospect already recognizes your name.\n\n**Key Features:**\n*   **Human-First AI Generation:** Uses your specific bio, tone, and networking goals to craft comments that sound distinctly like you\u2014never robotic.\n*   **Smart Post Prioritization:** Identifies high-leverage posts from key decision-makers or viral industry leaders so your engagement gets maximum visibility.\n*   **Local Machine Architecture:** Runs natively on your local hardware with variable timing and natural interaction patterns, keeping your account completely safe from cloud-bot detection flags.\n*   **Performance Analytics:** Tracks your comment response trends and profile view spikes to measure true engagement ROI.\n\n**Pros:**\n*   Eliminates the \"spam\" reputation associated with traditional automation.\n*   Zero risk of IP-mismatch bans since it runs locally.\n*   Warms up leads effectively; a prospect who replies to your comment is 10x more likely to accept a connection request.\n\n**Cons:**\n*   Not designed for bulk cold messaging (which is a feature, not a bug, but may not suit spray-and-pray volume shops).\n\n### 2. Expandi (Best for Omnichannel Cold Outreach)\n\n[Expandi](https://expandi.io/) is one of the most robust cloud-based automation platforms on the market. It is heavily utilized by B2B lead generation agencies that need to orchestrate complex, multi-touch campaigns across both LinkedIn and email.\n\n**Key Features:**\n*   **Smart Sequences:** Create conditional logic paths (e.g., if a prospect does not accept a connection request, scrape their email and send an email instead).\n*   **Image & GIF Personalization:** Embed dynamic elements into your outreach messages to boost reply rates.\n*   **Dedicated IP Addresses:** Attempts to mitigate the risks of cloud automation by assigning a static, local proxy to your account.\n\n**Pros:**\n*   Highly sophisticated campaign builder.\n*   Excellent integration with major CRM platforms via webhooks.\n\n**Cons:**\n*   Premium pricing tier makes it expensive for solo founders or small teams.\n*   Despite dedicated IPs, cloud-based messaging still carries inherent risks if LinkedIn updates its security protocols.\n\n### 3. Dux-Soup (Best for Budget-Conscious Beginners)\n\nDux-Soup is the classic browser extension for LinkedIn automation. It has been around for years and remains a staple for professionals taking their first steps into automated prospecting. \n\n**Key Features:**\n*   **Auto-Visit & Auto-Endorse:** Generates mild engagement by viewing profiles and endorsing skills, prompting a \"someone viewed your profile\" notification for the prospect.\n*   **Simple Drip Campaigns:** Send automated connection requests followed by a sequence of scheduled messages.\n*   **CSV Exports:** Easily download the data of profiles you have visited to import into a CRM.\n\n**Pros:**\n*   Very affordable entry-level pricing.\n*   Easy to install and intuitive for beginners.\n\n**Cons:**\n*   Operates inside the browser, meaning your computer and browser must remain open and active.\n*   Prone to breaking when LinkedIn pushes UI updates.\n\n### 4. PhantomBuster (Best for Data Extraction & Scraping)\n\nPhantomBuster isn\u2019t a traditional sequence tool; it is an automation extraction engine. If your lead generation strategy relies on pulling massive amounts of data from LinkedIn to feed into external outreach tools, this is the platform for you.\n\n**Key Features:**\n*   **Pre-Built Phantoms:** Over 100 specific automation modules (e.g., \"Scrape a LinkedIn Event Attendee List\" or \"Export Sales Navigator Search Results\").\n*   **Data Enrichment:** Integrates with email discovery tools to find professional contact information for scraped profiles.\n*   **Cross-Platform Automation:** Connects LinkedIn workflows with Twitter, GitHub, and Instagram data.\n\n**Pros:**\n*   Unmatched flexibility for data-heavy operations.\n*   Does not force you into a specific messaging tool; you own the data.\n\n**Cons:**\n*   High learning curve for non-technical users.\n*   Relying too heavily on data scraping can quickly violate LinkedIn's terms of service if API limits are breached.\n\n### 5. Taplio (Best for Content-Led Prospecting)\n\nTaplio blurs the line between a content scheduling tool and a lead generation platform. It is designed for founders and creators who want to use inbound marketing to drive sales. By analyzing what content performs well, Taplio helps you build an audience and seamlessly DM the people who interact with your posts.\n\n**Key Features:**\n*   **AI Content Creation:** Generates post ideas and formats based on high-performing viral content in your niche.\n*   **Auto-DM Commenters:** Automatically sends a direct message to anyone who comments on your post (e.g., \"Comment 'Lead' to get my free guide\").\n*   **Advanced Analytics:** Tracks follower growth, post impressions, and engagement metrics in one clean dashboard.\n\n**Pros:**\n*   Incredible for inbound, content-driven lead generation.\n*   Simplifies the process of turning viral posts into booked meetings.\n\n**Cons:**\n*   Not suited for outbound targeting (reaching out to people who haven't interacted with you).\n*   AI content generation can feel generic if not heavily edited by the user.\n\n### 6. Waalaxy (Best for Simple Multi-Channel Sequences)\n\nWaalaxy (formerly ProspectIn) combines a sleek user interface with simple, effective multi-channel workflows. It is built as a Chrome extension but offloads its heavy lifting so it doesn't entirely freeze your browser.\n\n**Key Features:**\n*   **Bypass LinkedIn Limits:** Waalaxy has historically used email-invite workarounds to send connection requests beyond LinkedIn's weekly limits (though this feature\u2019s effectiveness fluctuates with LinkedIn updates).\n*   **Email Finder:** Automatically searches for professional emails if the prospect doesn't accept your LinkedIn invite.\n*   **Freemium Model:** Offers a genuinely useful free tier for users who only need to send a low volume of daily requests.\n\n**Pros:**\n*   Beautiful, beginner-friendly interface.\n*   Great for small businesses testing multi-channel (LinkedIn + Email) workflows.\n\n**Cons:**\n*   Workarounds for LinkedIn limits can suddenly stop working and expose accounts to risk.\n*   Customer support can be slow during high-volume periods.\n\n### 7. HeyReach (Best for Agencies Managing Multiple Accounts)\n\nAs highlighted in recent industry deep-dives on the [best LinkedIn automation tools](https://www.heyreach.io/blog/best-linkedin-automation-tools), HeyReach is engineered specifically for lead generation agencies. It focuses on pooling the capacity of multiple LinkedIn accounts (your sales team or dummy accounts) to execute massive outreach campaigns from a single dashboard.\n\n**Key Features:**\n*   **Unified Agency Dashboard:** Manage dozens of client accounts and campaigns from one interface without constantly logging in and out.\n*   **Volume Pooling:** If you need to send 1,000 connection requests a week, HeyReach safely distributes that volume across 10 different connected profiles.\n*   **Team Collaboration:** Granular permissions and shared inboxes for SDRs to handle replies.\n\n**Pros:**\n*   Unrivaled scalability for agencies.\n*   Keeps individual account volumes safely within LinkedIn's limits by spreading the load.\n\n**Cons:**\n*   Overkill for individual founders or single-account users.\n*   Requires maintaining multiple aged LinkedIn profiles, which is a logistical hurdle.\n\n## How to Choose the Best Lead Generation Tools for LinkedIn\n\nSelecting the right tool isn't about finding the one with the most features; it's about finding the tool that matches your risk tolerance, technical expertise, and overall sales strategy. Discussions among practitioners, such as those found on [r/sales](https://www.reddit.com/r/sales/comments/1i6m67o/what_linkedin_automation_tool_are_you_using/), consistently highlight that misalignment between a tool's capabilities and a company's actual strategy leads to wasted budget and banned accounts.\n\n![A decision matrix for choosing LinkedIn automation software based on risk level and outreach type.](https://assets.bevisible.app/inline-images/j5770kfqnwm5k8zdepdfxdc78s87798a/inline-2-1779460688195-9ex023.png)\nWhen evaluating your options, consider these failure modes and decision criteria:\n\n### 1. What is your primary growth strategy?\nIf you have a massive total addressable market (TAM) and sell a highly commoditized product, high-volume multi-channel tools like **Expandi** or **Waalaxy** might make sense. However, if you are selling high-ticket B2B services, consulting, or software, spray-and-pray will destroy your brand reputation. For high-ticket sales, a conversation-first engagement tool like **Junior** is far more effective at warming up targeted accounts.\n\n### 2. What is your risk tolerance?\nLinkedIn strictly prohibits automated botting in its Terms of Service. \n*   **High Risk:** Cloud-based mass-messaging tools that log in from foreign IP addresses.\n*   **Medium Risk:** Browser extensions that run erratic, high-speed scripts.\n*   **Low Risk:** Local machine applications like Junior that mimic human clicking patterns, introduce random delays, and restrict daily limits to natural human thresholds.\n\n### 3. Do you have a content engine?\nIf your team is already posting on LinkedIn 3-4 times a week, a tool like **Taplio** will multiply those efforts. If you rarely post and rely entirely on outbound, content-focused tools will be a waste of money.\n\n## Tips for Effective Lead Generation on LinkedIn\n\nEven the best lead generation software will fail if your underlying strategy is flawed. Automation scales whatever you feed it\u2014if you feed it garbage, you will scale garbage at the speed of light.\n\n### Leverage Sales Navigator Features\nDo not use automation tools on standard LinkedIn search results. Standard search limits your filters and caps your views. Invest in LinkedIn Sales Navigator. You can build hyper-specific lists based on recent company funding, headcount growth, or job changes. Scrape these clean, high-intent lists to feed your automation tools.\n\n### Personalize Beyond the \"First Name\"\nIn 2026, opening a message with *\"Hi {{firstName}}, I see you work in {{industry}}\"* is an immediate red flag for buyers. True personalization requires contextual relevance. \nThis is why AI commenting has become so powerful. By using an AI tool to read a prospect's post and drop a meaningful, contextual comment, you are personalizing your approach based on their actual thoughts, not just their job title.\n\n### Use Automation Wisely (Combine Channels)\nNever rely entirely on LinkedIn. The most successful lead generation sequences combine multiple touchpoints. For example:\n1.  **Day 1:** Junior automatically leaves a thoughtful comment on their recent post.\n2.  **Day 3:** You send a manual connection request referencing the conversation in the comments.\n3.  **Day 5:** If accepted, send a brief, non-salesy introductory voice note.\n4.  **Day 8:** If no reply, trigger a cold email referencing the LinkedIn connection.\n\n## Frequently Asked Questions\n\n### Is LinkedIn automation safe in 2026?\nAutomation is safe only if you respect the platform's limits and use the right architecture. Over the past few years, LinkedIn has aggressively cracked down on cloud-based bots sending hundreds of requests a day. Staying safe means limiting actions to humanly possible numbers (e.g., 20-30 connection requests per day, 40-50 comments), using natural delays, and preferring local machine automation over proxy servers.\n\n### What's the difference between LinkedIn outreach tools and LinkedIn prospecting tools?\nProspecting tools (like Sales Navigator or Apollo) are designed to *find* your ideal buyers and gather their contact information. Outreach tools (like Expandi or Dux-Soup) are designed to *contact* those buyers automatically. Modern strategies require both: pinpoint accurate prospecting followed by highly tailored engagement or outreach.\n\n### Can ChatGPT do lead generation?\nChatGPT cannot scrape LinkedIn or send messages natively. However, AI language models are the engine behind modern automation personalization. Tools like Junior use advanced LLMs behind the scenes to analyze a prospect's content and generate human-like comments and replies. You cannot use raw ChatGPT to automate the workflow, but AI is now non-negotiable for scaling personalized interactions.\n\n### Which tool is best for lead generation?\nThere is no single \"best\" tool; it depends entirely on your strategy. For mass-volume agency outreach, **HeyReach** is top-tier. For omnichannel sequences, **Expandi** is excellent. But for modern, relationship-driven B2B sales that prioritize account safety and authentic engagement, **Junior** is the most effective tool for generating high-quality conversations.", "created_at": "2026-05-24T12:19:26.403672+00:00", "updated_at": "2026-05-24T12:19:26.403733+00:00"};
    </script>

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
