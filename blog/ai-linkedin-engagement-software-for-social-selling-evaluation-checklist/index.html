    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 47, "slug": "ai-linkedin-engagement-software-for-social-selling-evaluation-checklist", "title": "AI Linkedin Engagement Software for Social Selling Evaluation Checklist", "excerpt": "Evaluate AI LinkedIn engagement software for social selling safely. Use this comprehensive checklist covering context, local architecture, and lead generation.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57efkg60pr31h7d85rxg8ham98ak8bm/ai-linkedin-engagement-software-for-social-selling-1784470719454-zt3o3p.png", "published_at": "2026-07-19T14:00:00+00:00", "content": "# AI Linkedin Engagement Software for Social Selling Evaluation Checklist\n\nThe average B2B buyer ignores 90% of cold LinkedIn direct messages, but they still read the comments on their own posts. \n\nFor years, social selling on LinkedIn meant loading a list of 1,000 prospects into a cloud-based tool, writing a generic three-step sequence, and letting it run until the connection request limits hit. That playbook is dead. LinkedIn\u2019s algorithms have severely restricted automated connection volume, and buyers have developed a deep filter for \"Connect and Pitch\" automation.\n\nThe shift has moved from the inbox to the feed. Strategic commenting, contextual reactions, and public relationship-building are now the primary drivers of inbound pipeline. But doing this manually for 50 prospects a day is a fast track to burnout. \n\nThis is where AI linkedin engagement software for social selling enters the picture. These tools are designed to surface relevant conversations and draft context-aware responses that sound like you. However, the market is currently flooded with tools that range from highly sophisticated local assistants to dangerous cloud-based scrapers that risk your account.\n\nThis evaluation checklist provides a comprehensive, citable framework to assess AI engagement platforms. Before you hand over your LinkedIn cookie to a third-party application, you need to understand the underlying architecture, the AI\u2019s contextual boundaries, and the workflow implications for your sales team.\n\n## The Shift: Why Traditional Automation Fails Modern Social Sellers\n\nTo evaluate new tools properly, you first have to understand why the old ones broke. \n\nLegacy automation tools were built for a different era of LinkedIn\u2014one where the platform tolerated high-volume API scraping and mass messaging. Tools like Dripify or Phantombuster operated on a \"volume over quality\" mandate. If you want to understand the strategic pivot required today, reading up on [Junior vs Dripify: finding consulting clients without automated messaging](https://www.heyjunior.ai/blog/junior-vs-dripify-finding-consulting-clients-without-automated-messaging) highlights why avoiding automated messaging is often more profitable.\n\n### The Three Core Failures of Legacy Tools\n\n1.  **The Commercial Limit Penalty:** LinkedIn now actively restricts accounts that send too many connection requests, especially if those requests have a low acceptance rate. Cloud-based connection tools often push accounts right to the edge of these limits, triggering shadowbans or temporary restrictions.\n2.  **Context-Blind Messaging:** Traditional sequences cannot read the room. If a prospect just posted about laying off 20% of their staff, a legacy automation tool will still fire off a message saying, \"Looks like you guys are crushing it, let's chat!\" \n3.  **Account Infrastructure Red Flags:** Most legacy tools are cloud-based. They log into your LinkedIn account from an IP address in a data center (often halfway across the world from where you are currently browsing on your phone). LinkedIn\u2019s security systems easily flag this impossible travel and non-residential IP behavior.\n\nModern AI engagement software flips this model. Instead of pushing outbound messages, it focuses on public visibility. It finds posts from your target accounts and uses Large Language Models (LLMs) to analyze the post, referencing your unique background, to draft a meaningful comment. \n\n![Diagram comparing traditional cold DM automation to modern social selling through commenting.](https://assets.bevisible.app/inline-images/j57efkg60pr31h7d85rxg8ham98ak8bm/inline-1-1784470656451-647kl6.png)\n## The C.A.R.E.S. Evaluation Framework\n\nWhen evaluating AI linkedin engagement software for social selling, rely on the C.A.R.E.S. framework: Context, Architecture, Relevance, Efficiency, and Safety. \n\nThis structured approach removes the marketing fluff from software vendors and forces you to look at the mechanics of how the tool actually operates.\n\n### 1. Context: The AI Generation Engine\n\nThe biggest complaint about early AI commenting tools was that they generated \"AI slop.\" Comments like, \"Great post, John! I completely agree that B2B sales is changing. Thanks for sharing!\" are worse than no comment at all. They signal to the buyer that you are using a bot, instantly destroying trust.\n\nWhen evaluating a tool's context engine, check for the following:\n\n*   **System Prompt Customization:** Does the tool allow you to define your personal brand voice? It needs to know if you speak formally, if you use emojis, or if you prefer a contrarian tone. \n*   **Bio Integration:** The AI must understand *who* is commenting. If you are a fractional CFO, the tool should draft comments from a financial perspective. If you are a designer, it should index on user experience. \n*   **Negative Prompting:** Can you tell the AI what *not* to do? (e.g., \"Never use the words 'game-changer' or 'unlock',\" or \"Never start a comment with 'Great post'.\")\n*   **Thread Awareness:** Does the AI read only the original post, or does it analyze existing comments to ensure it isn't repeating what someone else just said? \n\nIf you are comparing legacy text-spinners with modern context engines, review the [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) for deeper technical criteria.\n\n### 2. Architecture: Cloud vs. Local Processing\n\nThis is arguably the most critical operational decision you will make. How does the software physically interact with LinkedIn's servers?\n\n**Cloud-Based Architecture**\nCloud tools require you to provide your LinkedIn session cookie. The tool's servers (usually hosted on AWS or Google Cloud) then use this cookie to send requests to LinkedIn on your behalf. \n*   *The Problem:* LinkedIn can see that the requests are coming from data center IPs. They can also see browser fingerprints that don't match your actual laptop. This is why cloud-based tools frequently result in account warnings.\n\n**Local (Client-Side) Architecture**\nLocal tools run on your own machine, typically as a desktop app or a secure browser extension. \n*   *The Advantage:* When a local tool engages on LinkedIn, the web request comes from your actual IP address, your actual WiFi network, and your actual browser fingerprint. To LinkedIn's security algorithms, it looks exactly as if you are clicking the buttons yourself. \n\nFor a secure social selling motion, local architecture is non-negotiable. \n\n### 3. Relevance: Lead Identification and Sourcing\n\nHaving a great AI writer is useless if it's writing comments on irrelevant posts. Your software needs a robust mechanism for finding the right conversations. \n\nLook for tools that offer granular sourcing capabilities:\n\n*   **Sales Navigator Integration:** Can it monitor specific lead lists or account lists you've built in Sales Navigator?\n*   **Creator Monitoring:** Can you input a list of industry influencers and have the tool alert you the moment they post, allowing you to be one of the first commenters?\n*   **Keyword Sourcing:** Can it scan the global feed for specific phrases (e.g., \"looking for a new CRM\" or \"struggling with outbound\")?\n*   **Exclusion Lists:** Can you prevent the tool from suggesting posts from your competitors or current clients?\n\nIf sourcing is your primary bottleneck, exploring the [Best Tools to Find Relevant Linkedin Posts to Comment On Tools Beyond Taplio](https://www.heyjunior.ai/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio) will clarify what a sophisticated sourcing engine looks like.\n\n![The C.A.R.E.S. Evaluation Framework checklist for AI LinkedIn engagement software.](https://assets.bevisible.app/inline-images/j57efkg60pr31h7d85rxg8ham98ak8bm/inline-2-1784470653107-l84hcr.png)\n### 4. Efficiency: The Human-in-the-Loop Workflow\n\nFully autonomous AI commenting (where the tool writes and posts without you looking at it) is a massive liability. If the AI misinterprets a tragic personal post as a business triumph, it can cause irreversible brand damage.\n\nTherefore, the software must optimize the *Human-in-the-Loop* (HITL) workflow. The goal is not to remove the human, but to remove the blank page. \n\nEvaluate the UI for these workflow features:\n*   **Rapid Editing:** How easy is it to tweak a drafted comment before hitting post?\n*   **Variant Generation:** If you don't like the first draft, can you hit a single button to generate a different angle (e.g., \"Make it funnier\" or \"Disagree with the premise\")?\n*   **Inbox/Feed Consolidation:** Does the tool pull all relevant posts into a single dashboard, so you don't have to endlessly scroll LinkedIn's noisy native feed?\n\n### 5. Safety: Emulating Human Behavior\n\nBeyond just running locally, the software must act like a human. Humans don't comment on 50 posts in 50 seconds. \n\n*   **Pacing and Randomization:** Does the tool insert random delays between actions? \n*   **Scroll Emulation:** Does it simulate natural scrolling and reading time before pulling the post data?\n*   **Hard Limits:** Does the software prevent you from exceeding safe daily thresholds, even if you try to push past them?\n\nFor a complete breakdown of compliance and limits, consult the [Automate Linkedin Comments Safely Evaluation Checklist](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist).\n\n## The Engagement Software Categories\n\nNot all AI linkedin engagement software for social selling is built the same. The market generally breaks down into three distinct categories. Understanding these categories helps you avoid buying a tool that solves the wrong problem.\n\n### 1. Legacy Mass-Outreach Platforms\nThese tools originally focused on email and added LinkedIn as an afterthought. They treat LinkedIn as just another inbox to blast.\n*   **Examples:** Apollo, Outreach, traditional CRM plugins.\n*   **Strengths:** Deep integration with your central CRM; multi-channel attribution.\n*   **Weaknesses:** They rely heavily on automated direct messaging. Their commenting features are usually basic, and their cloud-based nature increases ban risk for social touches.\n\n### 2. General Audience Growth Tools\nThese tools are built for content creators who want to grow massive follower counts, rather than sales professionals looking to book targeted meetings.\n*   **Examples:** Taplio, Supergrow.\n*   **Strengths:** Excellent for post scheduling, analytics, and writing your own content.\n*   **Weaknesses:** Their engagement features often prioritize broad, generic commenting to boost visibility, rather than highly tailored account-based commenting. If you are comparing platforms for specific growth tactics, reviewing [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) or looking at [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow) can reveal these distinct product philosophies.\n\n### 3. Purpose-Built Social Selling & Engagement Tools\nThis emerging category focuses strictly on relationship building, bypassing the crowded inbox entirely to turn public visibility into pipeline.\n*   **Examples:** Junior.\n*   **Strengths:** Hyper-personalized context, local architecture for maximum safety, and workflows designed specifically for sales and lead generation.\n*   **Weaknesses:** They don't typically offer cold email sequencing, meaning they must be used alongside an email tool if you run multi-channel campaigns.\n\n## Step-by-Step: Implementing AI Engagement in Your Sales Motion\n\nPurchasing the software is only 10% of the battle. The implementation determines whether you book meetings or just waste time playing with AI.\n\nHere is a practical, 4-week rollout plan for integrating AI engagement software into a social selling routine.\n\n### Week 1: Foundation and Sourcing\nDo not turn on any AI drafting yet. Spend the first week curating the inputs.\n1.  **Clean Your Lists:** Build a list of 100 high-priority prospects in Sales Navigator. Ensure these individuals have posted on LinkedIn in the last 30 days. \n2.  **Define Your Persona:** Write a clear, 300-word biography for the AI. Detail your value proposition, your tone of voice, and the specific jargon your buyers use. \n3.  **Monitor the Feed:** Connect your prospect list to your engagement software and let it start pulling in posts. \n\n### Week 2: Supervised Commenting (The 15-Minute Daily Drill)\nBegin the engagement routine. \n1.  **The Morning Sweep:** Log into your engagement dashboard. Review the posts pulled from your target list.\n2.  **Draft and Edit:** Allow the AI to draft comments. *Do not post them as-is.* Spend 10 seconds editing each one. Add a personal anecdote, or slightly tweak the phrasing so it sounds exactly like you.\n3.  **Aim for 10-15 quality comments per day.** Quality drastically outperforms volume in social selling.\n\n### Week 3: Expanding to Industry Conversations\nOnce you are comfortable engaging directly with prospects, start engaging with industry influencers who command the attention of your prospects.\n1.  **Identify Tier 1 Creators:** Find 5-10 voices in your niche who get high engagement.\n2.  **Turn on Alerts:** Use your software to notify you when they post.\n3.  **The \"Top Comment\" Strategy:** Use the AI to help you draft a highly insightful, slightly contrarian, or value-add comment within the first 30 minutes of their post going live. This positions your profile in front of hundreds of their followers (your potential buyers).\n\n### Week 4: Pipeline Conversion\nYou will start noticing prospects viewing your profile and accepting your connection requests at a much higher rate. \n1.  **The Soft Inbound:** When a prospect likes your comment or replies to it, send a connection request. *Do not pitch in the request.* Reference the conversation: \"Enjoyed trading thoughts on your post about Q3 forecasting, John. Would love to follow your updates.\"\n2.  **The Transition:** Once connected, wait for them to post again, comment again, and then move to the DM with a highly contextual observation. \n\nFor an expanded view on safely executing this long-term, read up on [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n\n![Architecture comparison showing the security difference between cloud-based and local LinkedIn automation.](https://assets.bevisible.app/inline-images/j57efkg60pr31h7d85rxg8ham98ak8bm/inline-3-1784470654053-8lnfof.png)\n## Red Flags When Evaluating AI LinkedIn Tools\n\nDuring your software evaluation process, keep an eye out for these critical red flags. If a vendor exhibits these traits, walk away.\n\n**Red Flag 1: \"We guarantee X connections per day\"**\nNo software can guarantee connection acceptance rates, and promising high volumes of outbound connections usually means the tool relies on brute-force automation. This is the fastest way to get your account restricted. For safer methods, look into [Best Automate Linkedin Comments Safely Tools Beyond Phantombuster](https://www.heyjunior.ai/blog/best-automate-linkedin-comments-safely-tools-beyond-phantombuster).\n\n**Red Flag 2: Cloud-based Cookie Login**\nAs discussed in the architecture section, if a tool asks you to paste your LinkedIn session cookie into a web dashboard so it can operate while your computer is asleep, you are taking a massive security risk. \n\n**Red Flag 3: Lack of Negative Prompting**\nIf the tool doesn't allow you to give the AI strict rules on what *not* to say, you will constantly fight the AI's tendency to use cheesy, overly enthusiastic language. \n\n**Red Flag 4: Bypassing LinkedIn Limits**\nSome legacy tools boast about \"proprietary methods to bypass LinkedIn's weekly limits.\" This is a cat-and-mouse game you will eventually lose. Tools like Phantombuster used to pride themselves on this, which is why many users seek [Phantombuster Alternatives for Automate Linkedin Comments Safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely). \n\n## How Junior Approaches Social Selling\n\nJunior was built specifically to address the failures of cloud-based connection tools and generic AI scrapers. As an AI-powered LinkedIn automation tool designed for authentic conversations, it focuses entirely on strategic post commenting rather than generic spam.\n\nServing job seekers, sales teams, lead gen agencies, founders, and consultants, Junior replaces cold DMs by finding relevant discussions for you. It drafts context-aware, human-sounding replies based strictly on your unique bio and goals. \n\nCritically, unlike cloud-based connection tools, Junior runs locally on your machine. This protects your account safety and utilizes natural human interaction patterns. It is designed to help professionals bypass crowded inboxes and turn public visibility into direct interviews, pipeline, and client conversations. To see how it fits into the broader landscape this year, you can review the [Best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026).\n\n## Frequently Asked Questions\n\n### Is AI commenting considered spam by LinkedIn?\nLinkedIn's algorithm does not penalize the *source* of the text (whether typed by you or generated by an LLM). It penalizes the *behavior*. If you post 100 identical comments in five minutes, you will be flagged for spam. If you post 15 thoughtful, contextual comments over two hours using a local tool that emulates human pacing, it is viewed as organic engagement.\n\n### Can AI engagement software replace my CRM?\nNo. AI engagement software is a top-of-funnel and mid-funnel interaction tool. While some tools have basic pipeline tracking, you should always integrate your engagement data back into a formal CRM (like HubSpot or Salesforce) to track closed-won revenue and long-term deal cycles.\n\n### How much time should I spend on social selling daily?\nWith a properly configured AI engagement tool, social selling should take no more than 15 to 20 minutes a day. The software handles the heavy lifting of sourcing the posts and writing the first draft; your time is spent exclusively on editorial review and final approval. \n\n### Will my prospects know I am using AI?\nIf you use a tool with poor contextual boundaries and don't review the drafts, yes. Prospects can easily spot \"AI slop.\" However, if you train the system prompt with your actual persona, feed it your specific bio, and use the Human-in-the-Loop workflow to make minor 10-second edits, the engagement will read as highly authentic and indistinguishable from fully manual typing.\n```", "created_at": "2026-07-19T14:19:22.284888+00:00", "updated_at": "2026-07-19T14:19:22.284894+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
