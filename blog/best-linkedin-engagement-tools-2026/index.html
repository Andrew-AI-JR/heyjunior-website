    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 32, "slug": "best-linkedin-engagement-tools-2026", "title": "Best LinkedIn engagement tools 2026", "excerpt": "Is it safe to use AI for LinkedIn engagement in 2026? Discover the difference between risky cloud bots and safe, local-machine AI commenting tools.", "featured_image_url": "https://assets.bevisible.app/featured-images/j575gq6xapzf7psqac66kqwh0d89dae1/best-linkedin-engagement-tools-2026-1782571777746-gzhn9w.png", "published_at": "2026-06-27T14:20:00+00:00", "content": "# Best LinkedIn engagement tools 2026\n\nIf you logged into LinkedIn anytime in mid-2026, you likely noticed a massive shift in the feed. The era of the automated \"Great post, thanks for sharing!\" comment and the 12-step cold DM sequence is effectively dead. \n\nIn May 2026, [LinkedIn announced a major crackdown on AI-generated \"slop\"](https://www.techradar.com/pro/linkedin-is-finally-set-to-crack-down-on-ai-slop-and-my-sanity-might-be-saved?utm_source=chatgpt.com), actively demoting content and comments that rely on generic phrasing, robotic engagement bait, and uninspired \"thought leadership.\" \n\nThis shift has forced founders, sales teams, and job seekers to ask a critical question: **Is it safe to use AI for LinkedIn engagement?**\n\nThe short answer is yes\u2014but the architecture of the tools you use matters more than ever. The line between \"assistive AI\" and \"bannable bot\" is no longer blurry. LinkedIn is perfectly fine with you using AI to refine your ideas, but they are increasingly hostile toward cloud-based automation that hijacks your account to perform actions while you sleep.\n\nIn this guide, we will break down the mechanics of safe LinkedIn automation, review the best LinkedIn engagement tools for 2026, and explain why shifting from cold DMs to strategic, AI-assisted commenting is the highest-ROI play for your pipeline.\n\n---\n\n## Is It Safe to Use AI for LinkedIn Engagement? (The 2026 Reality)\n\nTo understand what is safe, we have to look at how LinkedIn categorizes third-party software. \n\nAccording to [LinkedIn's official guidelines on prohibited software](https://www.linkedin.com/help/linkedin/answer/a1341387/prohibited-software-and-extensions%3Flang%3Den?utm_source=chatgpt.com), the platform explicitly bans tools that \"use bots or other automated methods to create, comment, like, share, or message.\" \n\nHowever, [as automation experts point out](https://connectsafely.ai/articles/is-linkedin-automation-safe-tos-scraping-guide-2026?utm_source=chatgpt.com), this doesn't mean *all* AI is dangerous. It means you need to understand the difference between **creation assistance** and **autonomous execution**.\n\n### The Safe Zone: Assistive AI\nLinkedIn itself integrates AI writing tools into its platform. Using AI is not the crime; *faking human behavior at scale* is. The following practices are entirely safe and within the Terms of Service:\n\n*   **Drafting and Ideation:** Using LLMs to structure your thoughts, improve grammar, or generate hooks.\n*   **Contextual Analysis:** Using AI to read a prospect's post and suggest relevant talking points based on your unique bio and goals.\n*   **Manual Posting:** Copying an AI-refined draft and manually pasting it into a comment box or message thread.\n*   **Local-Machine Automation:** Tools that run locally on your own computer, utilizing your active, authenticated browser session rather than routing through a server halfway across the world.\n\n### The Danger Zone: Autonomous Cloud Bots\nThis is where accounts get restricted, shadow-limited, or permanently banned. You cross into the danger zone when your tools exhibit non-human behavioral patterns:\n\n*   **Headless Browsers:** Cloud-based tools that spin up virtual browsers on remote servers to scrape data or send messages. LinkedIn detects the IP mismatch and flags the account.\n*   **Unrealistic Volume:** Sending 100 connection requests or dropping 50 comments in three minutes.\n*   **DOM Injection & Scraping:** Extensions that heavily manipulate LinkedIn's underlying code to force actions. [Experts warn that cloud automation cannot be made completely safe](https://connectsafely.ai/articles/what-is-safe-linkedin-automation-guide-2026?utm_source=chatgpt.com) because it inherently violates the core ToS regarding automated messaging and scraping.\n*   **Engagement Pods:** Coordinated networks of accounts that auto-like each other's content to game the algorithm.\n\n![Diagram showing the spectrum of safe versus dangerous LinkedIn automation tools](https://assets.bevisible.app/inline-images/j575gq6xapzf7psqac66kqwh0d89dae1/inline-1-1782571667624-av8a8s.png)\nTo summarize: AI that helps you think and write is an asset. AI that takes autonomous action in the cloud is a liability.\n\n---\n\n## The Architecture of Safe LinkedIn Tools\n\nIf you are evaluating tools for your 2026 tech stack, you need to look under the hood. The marketing pages of most lead-gen platforms claim to be \"100% safe\" or \"undetectable,\" but their underlying architecture tells a different story. \n\nHere are the three primary architectures of LinkedIn tools, ranked from most dangerous to safest.\n\n### 1. Cloud-Based Automation (High Risk)\nCloud tools ask for your LinkedIn credentials (or a session cookie) and log into your account from a remote server. To avoid immediate bans, they route their connection through residential proxies to make it look like they are in your city. \n\n**The Problem:** LinkedIn's behavioral biometrics have evolved. They track mouse jitter, time-to-click, scrolling velocity, and canvas fingerprinting. A server running a script simply cannot perfectly emulate the micro-hesitations of a human using a laptop. When the pattern breaks, you receive a warning or a ban.\n\n### 2. Chrome Extensions (Medium Risk)\nExtensions live in your browser and operate on top of your active LinkedIn session. This solves the IP mismatch problem because the actions are coming from your actual computer. \n\n**The Problem:** Many legacy extensions are poorly coded. They inject obvious, messy code directly into the LinkedIn DOM (Document Object Model). When LinkedIn updates its interface\u2014which it does constantly\u2014the extension breaks, or worse, leaves a digital footprint that LinkedIn's anti-spam scripts easily detect.\n\n### 3. Local Machine Execution (Safest)\nThis is the modern standard for safety-first engagement. Local tools (like Junior) do not run in the cloud. They run directly on your machine, leveraging your actual hardware, your actual IP address, and natural interaction patterns. \n\nBecause they operate locally, they don't need to spoof residential IPs or run headless browsers. They function as a localized assistant, bridging the gap between AI processing and manual, safe execution. If you're building a tech stack this year, we highly recommend running through a comprehensive [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) to verify a tool's architecture before connecting your account.\n\n---\n\n## Best LinkedIn Engagement Tools for 2026\n\nWith safety frameworks established, let's review the top platforms designed to build pipeline and visibility without putting your profile at risk.\n\n### 1. Junior: Best for Strategic, Context-Aware Commenting\nAs cold DMs become increasingly saturated, public visibility has become the most reliable way to generate pipeline. **Junior** is an AI-powered LinkedIn automation tool engineered specifically for this shift. \n\nInstead of spamming inboxes with generic connection requests, Junior helps you start authentic conversations through strategic post commenting. \n\n**Why it stands out for safety and ROI:**\n*   **Local Execution:** Junior runs entirely on your local machine. It uses your native session, meaning there are no suspicious cloud logins or IP location jumps that trigger LinkedIn's security algorithms.\n*   **Context-Aware AI:** Generic comments (\"Love this!\" or \"Great insights!\") are actively penalized by LinkedIn's 2026 algorithmic updates. Junior prevents this by drafting context-aware, human-sounding replies based on the specific nuances of the post, cross-referenced with your unique bio and personal goals.\n*   **Bypasses the Inbox:** Decision-makers ignore cold DMs. But they read the comments on their own posts, and they read high-value comments on industry-leading content. Junior turns public visibility into direct interviews, pipeline, and client conversations by ensuring you show up intelligently in the right threads.\n*   **Anti-Slop:** It doesn't rely on the tired, AI-generated phrasing that LinkedIn is currently purging.\n\nFor a deeper comparison of how this approach beats legacy software, check out our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n### 2. Shield: Best for Safe Profile Analytics\nEngagement requires measurement. Shield remains the premier analytics tool for LinkedIn creators and teams. \n\n**Why it's safe:**\nShield is fundamentally a data-reading tool, not an action-taking tool. It doesn't send messages, post comments, or auto-like content. It aggregates your performance metrics (impressions, engagement rates, audience demographics) into clean, actionable dashboards. Because it doesn't automate outbound actions, it operates safely within the ecosystem.\n\n### 3. AuthoredUp: Best for Content Formatting and Drafting\nIf you are writing original posts, the native LinkedIn editor can be frustrating. AuthoredUp is a content creation layer that sits on top of LinkedIn.\n\n**Why it's safe:**\nIt acts strictly as an assistive formatting and drafting tool. It allows you to preview how your posts will look on mobile, format text (bold, italics), and manage multiple drafts. It does not automate the posting process autonomously, keeping you safely in control of the \"Publish\" button.\n\n### 4. Lempire / Expandi: Best for High-Volume Outreach (Use with Caution)\nFor teams that absolutely require traditional, volume-based cold outreach (connection requests and DMs), platforms like Expandi remain popular.\n\n**The Tradeoffs:**\nThese are cloud-based tools. While they have built sophisticated proxy networks and random-delay algorithms to mimic human behavior, [automation inherently violates LinkedIn's ToS](https://linkedintools.site/is-linkedin-automation-illegal/?utm_source=chatgpt.com). They offer high potential reward for mass outreach, but carry a permanent underlying risk of account restriction. If you use these, you must strictly limit your daily volume and constantly monitor your account health.\n\n![Comparison matrix of top LinkedIn engagement tools by risk and execution type](https://assets.bevisible.app/inline-images/j575gq6xapzf7psqac66kqwh0d89dae1/inline-2-1782571665280-vqlvd7.png)\n---\n\n## The Shift: Why Commenting is the New Cold DM\n\nIf you take one insight away from the 2026 LinkedIn landscape, it should be this: **The inbox is a fortress; the feed is a public square.**\n\nFor years, the standard B2B playbook was to scrape a list of targets using Sales Navigator, load them into a cloud sequencer, and blast 100 connection requests a day with a pitch attached. \n\nToday, that strategy suffers from diminishing returns for three reasons:\n\n1.  **Inbox Fatigue:** Executives and founders are bombarded by automated pitches. They have developed \"banner blindness\" to DMs that start with \"I noticed we are both in the SaaS space...\"\n2.  **Platform Restrictions:** LinkedIn has severely capped the number of weekly connection requests you can send (often hovering around 100 per week for most users). You can no longer rely on sheer volume to compensate for low conversion rates.\n3.  **The \"Connect and Pitch\" Penalty:** Users are quicker than ever to hit \"I don't know this person,\" which damages your account's trust score.\n\n### The ROI of Strategic Commenting\nWhen you leave a thoughtful, highly contextual comment on a target account's post, several things happen simultaneously:\n\n*   **Immediate Notification:** The author receives a notification. Unlike a DM, a comment triggers a dopamine response. You are adding value to their content, not asking for their time.\n*   **Algorithmic Ride-Along:** If you comment early and insightfully on a viral post by an industry leader, your comment gets upvoted. You borrow their audience. A single great comment can generate hundreds of inbound profile views.\n*   **Frictionless Networking:** When you eventually do send a connection request, it is no longer cold. You are \"that person who left the great insight on my post on Tuesday.\"\n\nUsing a local tool like Junior allows you to execute this strategy at scale without sacrificing personalization or risking your account.\n\n---\n\n## The Anatomy of a High-Converting AI Comment\n\nIf you decide to use AI to scale your commenting strategy, you must avoid the \"AI Slop\" trap. LinkedIn's engineering teams are actively demoting comments that use recycled, robotic phrasing.\n\nHere is a framework for crafting safe, high-converting comments using AI assistance.\n\n### 1. The \"Anti-Slop\" Rulebook\nNever let your AI use these phrases:\n*   *\"In today's fast-paced digital landscape...\"*\n*   *\"It's not X, it's Y.\"*\n*   *\"This is a game-changer.\"*\n*   *\"I couldn't agree more with your profound insights!\"*\n\nThese phrases act as algorithmic tripwires. They signal low effort and result in your comment being collapsed or hidden at the bottom of the thread.\n\n### 2. The 3-Part Comment Structure\nA strong, context-aware comment should follow this structure:\n\n1.  **The Anchor:** Acknowledge a specific, niche point from the original post. Don't summarize the whole post; pick one sentence and anchor your thought to it.\n2.  **The \"Yes, and...\" (or the \"Yes, but...\"):** Add a unique perspective based on your own bio and experience. This is where tools like Junior shine, as they cross-reference the post with your personal background.\n3.  **The Open Loop:** End with a soft, relevant question that invites the original author (or other commenters) to reply.\n\n### Example Scenario\n**Original Post (from a SaaS Founder):** *\"We just cut our marketing budget by 40% and doubled down on customer success. Retention is the new acquisition.\"* \n\n**Bad AI Comment (Slop):** *\"Great post! Retention is definitely the new acquisition in today's digital landscape. Thanks for sharing these crucial insights.\"*\n\n**Good AI-Assisted Comment (Context-Aware):** *\"The shift from acquisition to CS makes complete sense, especially with CAC rising across SaaS. Out of curiosity, did you reallocate that 40% directly into CS headcount, or into retention tooling? We made a similar pivot last quarter and found the tooling adoption was the hardest part.\"*\n\nNotice the difference? The second comment sounds like a practitioner. It adds value, asks a specific question, and draws on personal experience.\n\n![Flowchart showing the step-by-step process of turning LinkedIn comments into inbound pipeline](https://assets.bevisible.app/inline-images/j575gq6xapzf7psqac66kqwh0d89dae1/inline-3-1782571687843-q0cubc.png)\n---\n\n## How to Implement a Safe Engagement Workflow\n\nTransitioning to a safety-first engagement strategy requires discipline. Here is a step-by-step workflow you can implement today to build pipeline safely.\n\n### Step 1: Define Your Core Pillars and Bio\nIf you are using an AI assistant to draft comments, it needs to know who you are. Before you automate anything, clearly define your tone of voice, your target audience, and your core value propositions. \n\n*   What are your contrarian industry takes?\n*   What specific metrics or results have you achieved?\n*   What tone do you use? (e.g., direct and data-driven, or conversational and anecdotal?)\n\nFeed this context into your local AI tool. The more unique context the AI has, the less robotic it will sound.\n\n### Step 2: Build a High-Signal Target List\nDon't waste engagement on random feeds. Build dedicated lists of high-value targets.\n\n*   **The Dream 50:** 50 ideal clients or decision-makers you want to work with.\n*   **The Megaphones:** 10-20 industry influencers who consistently post viral content. Your goal here is not to sell to them, but to hijack their reach by leaving top-tier comments for their audience to see.\n*   **The Warm Leads:** Prospects currently in your pipeline who need subtle nurturing.\n\n### Step 3: Execute the Daily \"Local Loop\"\nInstead of setting up a cloud sequence and walking away for a month, execute a daily \"Local Loop\" using a tool like Junior.\n\n1.  Open your local application and authenticate securely via your own browser.\n2.  Pull up the recent posts from your High-Signal Target List.\n3.  Use your AI assistant to draft 10-15 highly contextual comments based on your predefined bio.\n4.  Manually review, lightly edit, and post each one.\n\nThis process takes 15 minutes a day. It results in zero ToS violations, zero cloud-based IP risks, and significantly higher inbound traffic than 100 cold DMs.\n\n### Step 4: Harvest the Inbound\nWhen your comments start generating profile views and inbound connection requests, transition the conversation to the DMs safely.\n\n*   **The Inbound DM:** *\"Hey [Name], saw you checked out my profile after that thread on [Topic] yesterday. Glad to connect!\"*\n\nThis is no longer cold outreach. It is warm, contextual, and deeply human.\n\n---\n\n## Legal and ToS Considerations (2026 Update)\n\nMany users confuse \"illegal\" with \"against the rules.\" \n\n[Is LinkedIn automation illegal?](https://linkedintools.site/is-linkedin-automation-illegal/?utm_source=chatgpt.com) In most jurisdictions, using a bot to like a post is not a crime. You will not go to jail for using a cloud sequencer. However, it is a direct violation of a private company's Terms of Service.\n\nLinkedIn has the legal right to protect its platform from abuse. In recent years, they have ramped up their technological defenses and have occasionally sent Cease and Desist letters to commercial scrapers. \n\nFor the end-user (you), the risk is not legal prosecution; the risk is the permanent loss of your professional network. If your LinkedIn account is the lifeblood of your agency or career, risking it on a cheap cloud extension to save 10 minutes a day is an incredibly poor business decision. This is why the migration toward local, assistive AI tools has accelerated so rapidly in 2026.\n\n---\n\n## Frequently Asked Questions\n\n### Will I get shadowbanned for using ChatGPT to write LinkedIn posts?\nNo. LinkedIn cannot definitively prove you used ChatGPT to write a post, and more importantly, they offer native AI writing tools themselves. What causes shadow-limiting is **slop**\u2014posting generic, zero-value content that fails to engage readers. If your AI-generated post lacks a unique perspective, it won't get impressions, not because of a shadowban, but because the algorithm demands authenticity.\n\n### Are Chrome extensions safe for LinkedIn automation?\nGenerally, no. While they are safer than remote cloud servers (because they use your local IP), extensions interact directly with the DOM and can leave detectable footprints. If you must use an extension, ensure it uses natural human delays and avoids aggressive scraping.\n\n### What is a safe daily limit for commenting?\nIf you are manually reviewing and posting comments via a local tool, you can safely leave 30-50 high-quality comments a day. However, if you are attempting to automate 500 comments a day, LinkedIn's velocity limiters will flag your account, regardless of the tool you use. Quality always supersedes volume.\n\n### How does LinkedIn detect automation?\nLinkedIn uses a combination of techniques:\n1.  **IP monitoring:** Detecting logins from data centers rather than residential ISPs.\n2.  **Velocity tracking:** Actions performed faster than a human could physically click.\n3.  **Behavioral biometrics:** Lack of natural mouse movements, scrolling, or hesitations.\n4.  **Canvas fingerprinting:** Identifying headless browsers that render web pages differently than standard Chrome or Safari.\n\nLocal-machine execution bypasses these detection methods by relying entirely on your native, human-operated environment.\n\n---\n\n## Conclusion\n\nThe Wild West of LinkedIn automation is over. As LinkedIn tightens its grip on AI slop and cloud-based bots, the winners in 2026 will be those who adapt to the new rules of engagement.\n\nUsing AI for LinkedIn is incredibly powerful\u2014and perfectly safe\u2014when deployed as an *assistant* rather than an autonomous spam machine. By ditching the risky cloud sequencers and moving toward local, context-aware commenting tools, you protect your digital real estate while generating warmer, more profitable conversations.\n\nStop fighting for attention in crowded inboxes. Use tools that help you show up intelligently in the feed, add genuine value to public conversations, and turn your visibility into your strongest acquisition channel.", "created_at": "2026-06-27T15:19:24.104819+00:00", "updated_at": "2026-06-27T15:19:24.104826+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
