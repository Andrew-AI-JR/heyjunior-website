    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 33, "slug": "junior-vs-taplio-for-linkedin-growth", "title": "Junior vs Taplio for LinkedIn growth", "excerpt": "Is it safe to use AI for LinkedIn engagement? Compare Junior vs Taplio to learn why local execution beats cloud automation for secure, high-growth networking.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5799a2f17rwz4vcqca1tq65x589c3px/junior-vs-taplio-for-linkedin-growth-1782571787468-uzu2ve.png", "published_at": "2026-06-27T14:30:00+00:00", "content": "# Junior vs Taplio for LinkedIn growth\n\nIf you are trying to scale your presence on LinkedIn in 2026, you are likely wrestling with a fundamental tension: you need automation to save time, but you cannot afford to have your account restricted or permanently banned. \n\nAs the platform grows more crowded, the core question for founders, job seekers, and sales teams is no longer whether you *can* automate your outreach, but rather: **Is it safe to use AI for LinkedIn engagement?**\n\nThe short answer is that using AI is safe when it acts as an assistant, but highly risky when it operates as an autonomous, cloud-based bot. LinkedIn has drawn a hard line in the sand regarding automated actions that bypass the native user interface. This technical distinction is exactly what separates the two major approaches to LinkedIn growth today, perfectly illustrated by comparing two leading tools: Junior and Taplio.\n\nTaplio has built a massive following as a cloud-based, all-in-one content creation and scheduling hub. Junior, on the other hand, was built from the ground up to solve the engagement safety problem by running locally on your machine, focusing entirely on high-converting, context-aware post commenting rather than generic DM automation.\n\nIn this breakdown, we will examine the safety of AI on LinkedIn, how the platform detects automation, and how Junior and Taplio stack up when you prioritize account security alongside pipeline growth.\n\n## Is It Safe to Use AI for LinkedIn Engagement?\n\nThe confusion around AI safety on LinkedIn stems from a misunderstanding of what the platform actually penalizes. People often conflate \"AI generation\" with \"bot automation.\" They are entirely different things in the eyes of LinkedIn's security algorithms.\n\n### What is Considered Safe (Assistive AI)\nLinkedIn is generally supportive of *assistive* AI. Using ChatGPT or similar tools to draft your posts, refine your tone, generate content ideas, or fix grammar is perfectly safe. In fact, LinkedIn has integrated its own AI writing features into the platform.\n\nWhen it comes to third-party tools, safety is determined by **how the action is executed**, not just how the content is generated. Safe tools typically involve:\n*   Drafting content that you manually review and publish.\n*   Generating ideas and content calendars.\n*   Light scheduling that uses approved API endpoints for posting (though engagement is a different story).\n*   AI that runs locally in your browser, mimicking your actual human click patterns and session data.\n\n### What is Considered Risky (Autonomous Automation)\nThe danger zone\u2014where accounts get shadowbanned or permanently restricted\u2014is when AI crosses into autonomous action-taking, particularly through cloud servers. \n\nRisky behaviors include:\n*   Auto-liking or auto-commenting on hundreds of posts via cloud bots.\n*   Mass auto-sending connection requests or generic cold DMs.\n*   Scraping profile data at scale using headless browsers.\n*   Participating in \"engagement pods\" (coordinated networks of bots that automatically like each other's content).\n\nAccording to LinkedIn's official policies, the platform explicitly prohibits tools that \"use bots or other automated methods to create, comment, like, share, or message\" ([LinkedIn](https://www.linkedin.com/help/linkedin/answer/a1341387/prohibited-software-and-extensions%3Flang%3Den?utm_source=chatgpt.com)). The consequences of violating these rules range from a temporary warning (a \"restricted\" account requiring identity verification) to a permanent, unappealable ban.\n\n![A 2x2 matrix illustrating safe versus risky AI activities on LinkedIn based on autonomy and safety.](https://assets.bevisible.app/inline-images/j5799a2f17rwz4vcqca1tq65x589c3px/inline-1-1782571662044-3f0bu0.png)\n## The LinkedIn Crackdown on \"AI Slop\" and Bot Activity\n\nBeyond just the technical execution of automation, LinkedIn has heavily scrutinized the *quality* of AI-generated content. \n\nIn mid-2026, LinkedIn announced a major algorithmic initiative to demote low-effort, generic AI posts\u2014often referred to as \"AI slop.\" According to Laura Lorenzetti, LinkedIn's VP of Product, the platform's engineers are actively training systems to identify generic AI phrasing (like the overused \"it's not X, it's Y\" framework) and deprioritize content that lacks an authentic, human voice ([TechRadar](https://www.techradar.com/pro/linkedin-is-finally-set-to-crack-down-on-ai-slop-and-my-sanity-might-be-saved?utm_source=chatgpt.com)).\n\nThis editorial crackdown compounds the technical risks of automation. If you use a tool that blasts generic, AI-generated comments like *\"Great post! Thanks for sharing this insightful perspective\"* at high velocity, you are hitting two tripwires simultaneously:\n1.  **The Technical Tripwire:** You are using automated software to execute actions.\n2.  **The Quality Tripwire:** You are generating low-value \"AI slop\" that the algorithm actively suppresses.\n\nThis dual threat is why the architecture and philosophy of your LinkedIn growth tool matter more than ever.\n\n## Taplio: The Cloud-Based Content Hub\n\nTaplio is widely recognized as one of the most comprehensive LinkedIn content tools on the market. It is designed primarily for creators, founders, and ghostwriters who need to manage multiple accounts, generate content ideas at scale, and track detailed analytics.\n\n### How Taplio Works\nTaplio operates entirely in the cloud. You connect your LinkedIn account to their web application, and their servers interface with LinkedIn to schedule posts, pull analytics, and execute engagement features. It includes a robust AI writing assistant that can generate posts based on viral templates, news articles, or your own prompts.\n\n### Taplio's Strengths\n*   **Content Ideation:** Taplio has a massive database of viral LinkedIn posts, making it easy to find inspiration in any niche.\n*   **Analytics:** The dashboard provides granular insights into post performance, follower growth, and profile views over time.\n*   **Scheduling:** You can build out a month of content in an afternoon and let the cloud scheduler handle the rest.\n*   **Lead Generation (CRM):** It includes features to import people who interact with your posts into a lightweight CRM for follow-up.\n\n### The Safety Risks of Cloud Architecture\nWhile Taplio is exceptional for content *creation*, its automated *engagement* features carry inherent risks due to its cloud-based architecture.\n\nWhen a cloud tool executes an action on your behalf (like auto-sending a DM or scraping a list of leads), the request comes from a datacenter IP address (e.g., an AWS server in Virginia), not your local residential or office IP address. Furthermore, the \"browser fingerprint\" (the unique combination of your operating system, screen resolution, fonts, and hardware) does not match the environment where you normally log into LinkedIn.\n\nLinkedIn's security systems are highly adept at spotting these discrepancies. As noted by industry analysts evaluating scraping rules, while LinkedIn automation isn't strictly \"illegal\" in a criminal sense, it is a direct violation of the Terms of Service, and cloud-based tools present the highest risk of detection ([linkedintools.site](https://linkedintools.site/is-linkedin-automation-illegal/?utm_source=chatgpt.com)). If LinkedIn detects that your account is simultaneously logged in from your laptop in London and a cloud server in Ohio sending automated messages, your account will likely be restricted.\n\n## Junior: The Local, Context-Aware Commenting Engine\n\nJunior takes a radically different approach to LinkedIn growth. Instead of trying to be an all-in-one content scheduler and CRM in the cloud, Junior is laser-focused on one highly effective, low-risk strategy: **strategic post commenting executed locally.**\n\nJunior is built for professionals\u2014job seekers, lead gen agencies, sales teams, and consultants\u2014who realize that cold DMs are increasingly ignored, and the real pipeline is generated by appearing intelligently in the comment sections of industry leaders and ideal prospects.\n\n### How Junior Works\nUnlike Taplio, Junior runs locally on your machine. It does not hand your session cookies over to a random cloud server. When Junior interacts with LinkedIn to find relevant posts and draft replies, it uses your native browser environment. \n\nThe AI in Junior is highly contextualized. You feed it your unique bio, goals, and expertise. When Junior finds a target post, it doesn't generate a generic \"Great post!\" Instead, it analyzes the specific argument of the post and drafts a human-sounding, context-aware reply that adds value based on *your* specific background.\n\n### Junior's Strengths\n*   **Maximum Safety (Local Execution):** Because Junior runs on your local machine, your IP address, browser fingerprint, and session tokens remain perfectly consistent. To LinkedIn's security algorithms, Junior's actions look exactly like your normal, human browsing behavior. \n*   **Bypassing the Cluttered Inbox:** Cold DMs have a notoriously low conversion rate. By automating the discovery of relevant posts and drafting high-quality comments, Junior helps you turn public visibility into inbound profile views and natural DM conversations.\n*   **Context-Aware AI:** Junior aligns perfectly with LinkedIn's push for genuine engagement. By using your bio to craft specific, nuanced comments, it avoids the \"AI slop\" penalty that plagues generic automation tools.\n*   **Authenticity Control:** Junior drafts the comment, but you review it. This ensures you maintain total control over your voice before anything is published.\n\n![Technical diagram comparing the high-risk architecture of cloud automation against the safety of local execution.](https://assets.bevisible.app/inline-images/j5799a2f17rwz4vcqca1tq65x589c3px/inline-2-1782571661527-zefb6w.png)\n## Head-to-Head Feature Comparison: Junior vs Taplio\n\nTo make an informed decision, it helps to look at how these tools compare across core dimensions of LinkedIn growth.\n\n| Feature/Capability | Taplio | Junior |\n| :--- | :--- | :--- |\n| **Primary Focus** | Content generation & scheduling | Strategic commenting & inbound visibility |\n| **Architecture** | Cloud-based (SaaS) | Local machine execution |\n| **Account Safety Risk** | Moderate to High (if using automation/DM features) | Very Low (Native browser mimicking) |\n| **Content Scheduling** | Comprehensive (carousels, text, video) | N/A (Focuses on engagement, not posting) |\n| **Engagement Strategy** | Auto-DMs, bulk CRM actions | Highly personalized, bio-driven comment drafting |\n| **AI Output Quality** | Prone to standard AI formatting without heavy prompting | Deeply contextual, tailored to your specific expertise |\n| **Best For** | High-volume creators & ghostwriters | Job seekers, sales teams, agencies, consultants |\n\nIf you are evaluating tools specifically for engagement, you might want to review our [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) to understand the exact technical criteria that separate safe tools from dangerous ones.\n\n## The Technical Reality: Why Cloud Automation Gets Caught\n\nTo truly understand the \"Junior vs Taplio\" safety debate, you have to look under the hood at how LinkedIn catches automation. \n\nMany users assume LinkedIn relies solely on volume limits (e.g., \"If I send fewer than 50 DMs a day, I'm safe\"). While volume velocity is a factor, modern bot detection relies heavily on **environment mapping** and **behavioral heuristics**.\n\n### 1. The Browser Fingerprint\nEvery time you visit a website, your browser hands over a massive amount of metadata: your screen resolution, graphics card drivers, installed fonts, time zone, language settings, and battery API status. This creates a unique \"fingerprint.\" \n\nWhen you use a cloud-based tool to execute LinkedIn actions, the cloud server has to simulate a browser. It is incredibly difficult for a server farm to perfectly fake a residential Mac or Windows machine. When LinkedIn sees an action coming from an environment that looks like a headless Chrome instance running on an AWS Linux server, it immediately flags the account.\n\n### 2. IP Hopping\nIf you live in New York, your daily LinkedIn logins come from a New York IP address. If you connect a cloud automation tool, those automated actions might execute from a server in Frankfurt. If LinkedIn sees you liking a post from New York at 10:00 AM, and sending a DM from Frankfurt at 10:02 AM, the physical impossibility triggers a security lockdown.\n\n### 3. DOM Interaction Speed\nHuman beings do not load a page, instantly locate a text box, paste 500 characters, and click \"Submit\" in 0.4 seconds. We scroll, pause, move the mouse non-linearly, and type with variable delays. Cloud APIs often inject data directly into LinkedIn's backend, bypassing the Document Object Model (DOM) entirely. \n\n**This is why Junior's architecture is fundamentally safer.** Because it runs locally, it inherently possesses your actual browser fingerprint and your actual IP address. It interacts with the platform using natural timings and patterns, adhering to the guidelines of what constitutes safe usage in 2026 ([connectsafely.ai](https://connectsafely.ai/articles/what-is-safe-linkedin-automation-guide-2026?utm_source=chatgpt.com)).\n\n## Why Strategic Commenting Beats Cold DMs in 2026\n\nBeyond safety, there is a strategic reason why Junior focuses on commenting rather than the DM automation offered by Taplio and other cloud tools. \n\nThe effectiveness of cold LinkedIn DMs has plummeted. Automation tools made it too easy to send thousands of messages, resulting in crowded, spam-filled inboxes. Decision-makers, recruiters, and founders actively ignore unsolicited pitches. \n\nPublic commenting flips this dynamic.\n\nWhen you leave a highly insightful, contextual comment on a popular post within your industry:\n1.  **You bypass the inbox:** Your insight is displayed publicly, unblockable by privacy settings.\n2.  **You borrow their audience:** A good comment on a post with 50,000 views acts as a billboard for your own profile.\n3.  **You prove competence, not desperation:** Instead of saying \"I can help you\" in a DM, a great comment *demonstrates* your expertise in real-time.\n\n![A funnel diagram comparing the low conversion of cold DMs to the high visibility of strategic public commenting.](https://assets.bevisible.app/inline-images/j5799a2f17rwz4vcqca1tq65x589c3px/inline-3-1782571678746-4iz2kr.png)\nDrafting these comments manually takes hours of hunting for the right posts and writing thoughtful replies. This is exactly the friction Junior removes. By finding the conversations that matter to your niche and drafting replies based on your unique bio, it scales your public visibility without triggering spam filters. \n\nFor a deeper look into this strategy, check out our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow), which explores the mechanics of high-converting comment workflows.\n\n## Anatomy of a Safe, AI-Assisted Comment\n\nHow do you ensure your AI-assisted comments don't get flagged as \"AI slop\" by LinkedIn's new quality algorithms? \n\nLet's look at the difference between a risky, cloud-generated comment and a safe, locally-generated, context-aware comment (the Junior approach).\n\n**The Original Post:** \n*\"We just shifted our entire engineering team from Scrum to Kanban. The initial chaos was terrifying, but cycle times are down 40%. The biggest hurdle was convincing product managers to stop asking for two-week roadmaps.\"*\n\n**The \"AI Slop\" Comment (High Risk):**\n*\"Great post! It's crucial to adapt to modern digital landscapes. Kanban is a game-changer for efficiency. Thanks for sharing this vital insight!\"*\n*   **Why it's bad:** It uses classic AI buzzwords (crucial, game-changer, vital). It adds no net-new value. It looks like it was generated by a bot that only read the keywords \"Kanban\" and \"efficiency.\" LinkedIn's algorithm will demote this.\n\n**The Junior Context-Aware Comment (Safe & Effective):**\n*\"The friction with product managers is always the hardest part of this transition. When I led the agile transformation at [User's Past Company], we found that giving PMs a real-time 'cycle predictability' dashboard gave them the comfort they lost when we killed the two-week sprints. Have you found a reporting middle-ground that keeps them happy?\"*\n*   **Why it works:** It references a specific pain point from the post (PM friction). It injects the user's actual background (led agile transformation). It ends with a genuine, conversational question. It passes the \"human test\" easily.\n\n## 5 Rules for Safe LinkedIn Growth Using AI\n\nRegardless of which tools you ultimately deploy in your tech stack, adhering to these five rules will keep your account safe and your growth trajectory upward.\n\n### 1. Never Hand Over Your Session Cookies to Unverified Cloud Tools\nIf a tool asks for your raw LinkedIn session cookie to operate on a cloud server, you are playing with fire. This is the fastest route to an IP-mismatch flag. Stick to tools that use official APIs (for posting) or local execution (for engagement).\n\n### 2. Restrict Your Daily Actions\nEven if a tool executes locally and perfectly mimics human behavior, human beings still have physical limits. You cannot manually leave 400 thoughtful comments in 30 minutes. Keep your AI-assisted engagement to realistic numbers. 20-30 high-quality, targeted comments a day will yield massive results without triggering velocity limits.\n\n### 3. Personalize the AI's Context\nDo not use raw, unprompted ChatGPT models for your engagement. You must provide the AI with your specific tone of voice, your work history, your contrarian opinions, and your industry jargon. The more specific the context, the less your output will look like \"AI slop.\"\n\n### 4. Always Keep a Human in the Loop\nNever use a tool that auto-publishes comments or auto-sends DMs while you sleep. The risk of the AI misinterpreting the tone of a post (e.g., leaving a cheerful comment on a post about a company layoff) is too high. AI should draft; you should review and click publish.\n\n### 5. Focus on Inbound vs. Outbound\nShift your strategy from trying to aggressively extract attention (mass DMs) to magnetically attracting it. High-quality content and strategic commenting build a moat around your brand that algorithms cannot easily disrupt.\n\n## Decision Framework: Which Tool Should You Choose?\n\nChoosing between Junior and Taplio depends entirely on where the bottleneck is in your current LinkedIn workflow.\n\n### Choose Taplio If:\n*   **You are a high-volume content creator:** You need to schedule 15 posts a week across multiple formats (text, images, carousels).\n*   **You manage multiple accounts:** You run an agency that ghosts-writes for several founders and you need a centralized dashboard to track impressions.\n*   **You prioritize ideation over engagement:** Your main struggle is coming up with things to say, and you want to lean on a massive database of viral templates.\n*   *(Caveat: You must be extremely careful if you choose to activate Taplio's automated DM or CRM engagement features, due to the cloud risks mentioned above).*\n\n### Choose Junior If:\n*   **Account safety is your absolute priority:** You cannot afford to have your LinkedIn account restricted, and you want the peace of mind that comes with local execution.\n*   **You are a job seeker or consultant:** You don't necessarily need to post every day, but you *do* need to get on the radar of specific hiring managers, founders, or prospects.\n*   **You hate cold DMs:** You want to generate pipeline through authentic, public conversations rather than spamming inboxes.\n*   **You want your AI to sound like you:** You prefer a tool that studies your specific bio and expertise to craft nuanced, context-aware replies that build your authority.\n\n## Final Thoughts on LinkedIn Automation Safety\n\nThe era of growth hacking LinkedIn with brute-force, cloud-based automation is rapidly closing. As LinkedIn deploys more sophisticated bot-detection and actively suppresses generic AI content, the professionals who win will be those who use AI to enhance their authenticity, not replace it.\n\nIs it safe to use AI for LinkedIn engagement? Yes, but the definition of \"safe\" has evolved. \n\nSafety in 2026 means respecting the technical boundaries of the platform through local execution, and respecting the editorial standards of the platform by providing genuine, context-rich value. While tools like Taplio offer incredible power for content scheduling, Junior provides the essential, secure infrastructure for professionals who want to turn public visibility into real-world pipeline without risking the account they've worked so hard to build.", "created_at": "2026-06-27T15:19:24.341664+00:00", "updated_at": "2026-06-27T15:19:24.341670+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
