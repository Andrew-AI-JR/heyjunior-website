    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 43, "slug": "junior-vs-taplio-authentic-linkedin-engagement-for-consultants", "title": "Junior vs Taplio: Authentic LinkedIn engagement for consultants", "excerpt": "Discover how consultants can find clients on LinkedIn without cold DMs. Compare Junior vs Taplio for authentic, safe AI engagement and pipeline growth.", "featured_image_url": "https://assets.bevisible.app/featured-images/j575rxgcx3zs176t5eewmhff158ajwhr/junior-vs-taplio-authentic-linkedin-engagement-for-1784130610616-becjpy.png", "published_at": "2026-07-15T14:00:00+00:00", "content": "# Junior vs Taplio: Authentic LinkedIn engagement for consultants\n\nConsultants thrive on trust. When you sell strategic advice, deep expertise, and high-stakes problem-solving, your first impression dictates your closing rate. Yet, when trying to build a pipeline on LinkedIn, many consultants default to the same tired playbook: mass cold outreach via direct messages (DMs). It is an approach that instantly commoditizes your expertise and damages your credibility before you even pitch.\n\nFor transactional software sales, cold outreach is a numbers game. For consultants, it is a trust game. Pitch-slapping a Chief Operating Officer with a generic connection request doesn't position you as an expert; it positions you as a vendor desperately seeking attention. \n\nThe alternative? Inbound lead generation fueled by high-value, public engagement. By focusing on strategic positioning and leaving insightful comments on relevant industry posts, consultants can attract high-value clients without sending a single cold pitch. As noted in discussions on [Effective Client Acquisition Strategies for Technology Consultants (battle-tested)](https://www.linkedin.com/pulse/effective-client-acquisition-strategies-technology-consultants-ball-tu3ke), if you are constantly chasing leads, something is off with your positioning. The most successful consultants are seen as go-to authorities who attract clients naturally.\n\nTo scale this \"comment-first\" approach, consultants often turn to automation tools. Two names frequently dominate this space: Taplio and Junior. But their underlying philosophies\u2014and the underlying architectures they use\u2014are radically different. Taplio focuses heavily on broad content generation and cloud-based growth, while Junior is engineered specifically to start authentic conversations through strategic post commenting, running safely and locally on your machine.\n\nIn this comprehensive guide, we will break down exactly how consultants can find clients on LinkedIn without cold DMs, and compare [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) to help you choose the right engine for your inbound pipeline.\n\n## The Fallacy of Cold DMs for Consulting Services\n\nBefore exploring the tools, it is critical to understand why the traditional cold DM strategy fails for high-ticket consulting.\n\n1. **The Reputation Tax:** Every generic cold pitch you send slightly degrades your brand in the eyes of your market. When a prospect reads a templated DM, they subconsciously associate your consulting practice with low-tier, volume-based businesses.\n2. **Low Conversion Rates:** Executives and decision-makers guard their inboxes fiercely. You are competing against dozens of automated pitches daily. Standing out in a crowded inbox is nearly impossible without prior context.\n3. **The Inversion of Authority:** The core dynamic of consulting requires the client to trust the consultant's authority. When you chase a prospect via cold DMs, you invert that dynamic, placing yourself in a subservient position from the very first interaction.\n\nInstead of sending hundreds of cold messages, modern consultants can [Streamline Warm Introductions Using Sales Tools](https://www.linkedin.com/top-content/sales/sales-productivity-tools/streamline-warm-introductions-using-sales-tools/) by making their expertise visible in public forums where their target buyers already spend time.\n\n## The Comment-First Strategy: Attracting Clients Without Pitching\n\nIf you are not sending cold DMs, how do you get meetings? The answer is strategic engagement. \n\nBy leaving high-value comments on posts from ideal prospects or industry thought leaders, you effectively \"borrow\" their audience. You demonstrate your expertise in real-time, inviting warm profile views rather than forcing your way into an inbox.\n\n![Diagram illustrating the comment-first LinkedIn acquisition funnel for consultants.](https://assets.bevisible.app/inline-images/j575rxgcx3zs176t5eewmhff158ajwhr/inline-1-1784130499361-w1m39h.png)\n### Step 1: Optimize Your Profile to Convert Profile Views\n\nBefore you leave a single comment, your profile must be ready to capture attention and convert it. If a brilliant comment drives a prospect to your profile, but your profile looks like a static resume, the opportunity is lost.\n\n* **Client-Focused Headline:** Change your headline from \"Consultant at X\" to the specific problem you solve and the audience you serve. For example, instead of \"Operations Consultant,\" use \"Helping Series B SaaS Companies Reduce Churn by 20% Through Operational Excellence.\" This ensures your profile speaks directly to your ideal client's pain points [How to Find Clients on LinkedIn (Without Networking)](https://www.womenconquerbiz.com/linkedin-find-clients-hate-networking/).\n* **Showcase Results in the Featured Section:** The Featured section is your portfolio. Use it to highlight case studies, white papers, and client testimonials rather than just linking to your company website. As highlighted in guides on [How accountants can use LinkedIn to attract more clients? - Think Little Big](https://thinklittlebig.com/blog/how-accountants-can-use-linkedin-to-attract-more-clients/) and [How to Use LinkedIn for Account-Based Marketing](https://www.cleverly.co/blog/linkedin-account-based-marketing), adding relevant case studies specifically targeted at your ideal accounts builds immediate trust.\n* **Strategic 'About' Section:** Write a summary that reads like a landing page. Start with the core problem in the market, introduce your methodology, and end with a clear, low-friction call to action (e.g., \"Send me a DM to discuss your current operational bottlenecks\").\n\n### Step 2: The 3-C Framework for High-Value Commenting\n\nLeaving a comment that says \"Great post!\" or \"Thanks for sharing!\" is a waste of digital breath. It adds zero value and positions you as a generic participant. To drive pipeline, you need a structured approach. Enter the **3-C Framework for Consultative Commenting**:\n\n1. **Context:** Anchor your comment to the specific point the original author made. Show that you actually read and comprehended their core thesis.\n2. **Contrarian (mildly):** Add a new angle, a nuance, or a respectful counterpoint based on your consulting experience in the trenches. This is where you prove your expertise.\n3. **Call-to-thought:** End the comment with an open-ended, thought-provoking question directed back to the author. This invites a reply, boosting the algorithm and solidifying the relationship.\n\n**Example of a bad comment:**\n> \"Totally agree with this! Great insights on supply chain issues.\"\n\n**Example of a 3-C comment:**\n> \"You hit the nail on the head regarding supplier redundancy, John (Context). In my work with mid-market manufacturers, I've actually found that having *too many* backup suppliers often dilutes quality control faster than having just two highly vetted partners (Contrarian). Have you seen this dilution effect in your recent audits? (Call-to-thought).\"\n\nWhen a prospect reads the second comment, they immediately recognize a peer and an expert.\n\n![Handwritten notes showing the 3-C framework: Context, Contrarian, and Call-to-thought.](https://assets.bevisible.app/inline-images/j575rxgcx3zs176t5eewmhff158ajwhr/inline-2-1784130502854-euvf3l.png)\n## The Role of AI in Scaling Authentic Engagement\n\nThe 3-C framework works perfectly, but there is a bottleneck: time. Manually finding relevant posts from target accounts, reading them deeply, and crafting 20 nuanced comments a day can easily consume three hours. \n\nConsultants need automation to scale this visibility, but they face a paradox. If they use a basic AI tool that generates generic, bot-like comments, they destroy the very trust they are trying to build. This dilemma is why establishing an [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) is vital for anyone protecting a premium brand.\n\nThis brings us to the two dominant philosophies in LinkedIn automation: the cloud-based, content-heavy approach of Taplio, and the local-based, conversation-heavy approach of Junior.\n\n## Deep Dive: Taplio for Consultants\n\nTaplio built its reputation as an all-in-one LinkedIn growth tool designed for creators, founders, and ghostwriters who want to post consistently and build massive follower counts.\n\n### Where Taplio Shines\nTaplio is fundamentally a \"broadcasting\" tool. It excels at:\n* Generating post ideas based on viral trends.\n* Scheduling months of content in advance.\n* Providing deep analytics on post performance and follower growth.\n* Managing multiple client accounts from a single web dashboard.\n\n### Where Taplio Struggles for Consulting Pipeline\nWhile Taplio does have a commenting feature, it is secondary to its content scheduling engine. For consultants looking to replace cold DMs, Taplio presents two major friction points:\n\n1. **Generic AI Responses:** Because Taplio is built for scale across thousands of creators, its AI commenting models often default to safe, generic summaries of the post. It struggles to inject the specific, nuanced expertise required to execute the 3-C framework effectively. A generic AI comment from a high-ticket consultant is worse than no comment at all.\n2. **Cloud-Based Risk:** Taplio operates entirely in the cloud. When you comment via Taplio, the action originates from a data center IP address rather than your local machine. LinkedIn's security algorithms are increasingly aggressive toward cloud-based automation, frequently flagging these actions and resulting in account restrictions.\n\nIf your primary goal is to become a high-volume content creator, Taplio is a solid choice. But if you want to bypass crowded inboxes and turn public visibility into direct pipeline via nuanced conversations, its engagement tools often fall short.\n\n## Deep Dive: Junior for Consultants\n\nJunior is built with a singular, contrarian focus: it is an AI-powered LinkedIn automation tool designed specifically to start authentic conversations through strategic post commenting, rather than generating generic spam.\n\n### Context-Aware AI That Sounds Human\nJunior doesn't just read the post; it reads *you*. By ingesting your specific consulting bio, the unique problems you solve, and your tone of voice, Junior drafts comments that sound remarkably human and highly contextual. \n\nIf a prospect posts about operational bottlenecks, Junior won't say \"Great point about operations!\" Instead, it will draft a comment referencing the specific lean methodologies you mentioned in your bio. It acts as an extension of your own expertise, giving you a massive head start on the 3-C framework. You simply review, tweak a word or two, and post. This nuanced approach is why practitioners consider it among the [best AI tools for Linkedin commenting tools beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n### Local Execution for Ultimate Account Safety\nUnlike cloud-based tools that risk your account with every action, Junior runs locally on your own machine. \n\nThis means that when Junior executes a comment, it uses your home or office IP address and mimics natural, human browser interactions (like scrolling and natural clicking speeds). To LinkedIn's servers, the action is indistinguishable from you sitting at your desk typing the comment yourself. This architecture makes Junior the premier choice for [safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n\n## Feature Comparison Matrix: Junior vs Taplio\n\nWhen evaluating these tools for a consulting practice, the differences in architecture and intent become clear.\n\n| Feature | Taplio | Junior |\n| :--- | :--- | :--- |\n| **Core Philosophy** | Content broadcasting & scheduling | Authentic conversational engagement |\n| **Target User** | High-volume content creators, ghostwriters | Consultants, sales teams, founders |\n| **AI Comment Quality** | Often generic, summary-based | Highly contextual, tied to user's bio & goals |\n| **Execution Architecture**| Cloud-based (Server IP addresses) | Local execution (User's own IP address) |\n| **Account Safety Risk** | Moderate to High (due to cloud APIs) | Extremely Low (mimics natural human browsing) |\n| **Finding Relevant Posts**| Basic search, influencer tracking | High-intent targeting for pipeline generation |\n\nFor those specifically looking to find where their prospects are talking, Junior's ability to filter and surface high-intent discussions makes it one of the [best tools to find relevant Linkedin posts to comment on tools beyond Taplio](https://www.heyjunior.ai/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio).\n\n![Comparison table contrasting cloud-based tools like Taplio with local execution tools like Junior.](https://assets.bevisible.app/inline-images/j575rxgcx3zs176t5eewmhff158ajwhr/inline-3-1784130503433-7nlde1.png)\n## The Safe Engagement Imperative: Why Local Execution Matters\n\nLinkedIn is in a constant battle against spam bots. Over the past three years, they have drastically lowered the limits on connection requests (often capping them at 100 per week) and improved their detection of cloud-based API calls.\n\nIf you use a cloud-based tool to automate your outreach or commenting, LinkedIn's algorithms will eventually notice that actions on your account are originating from an AWS server in Virginia while your phone app logs in from London. This discrepancy triggers account restrictions, shadowbans, or permanent bans.\n\nConsultants cannot afford to lose their LinkedIn profiles. It is their digital storefront. This is why there is a massive migration away from traditional, cloud-based outreach tools. If you are comparing [Phantombuster alternatives for automate Linkedin comments safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely), local execution is the non-negotiable feature you must demand. Before connecting any tool to your account, run it through an [automate Linkedin comments safely evaluation checklist](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist) to verify its infrastructure.\n\n## A Proven Daily Workflow for Finding Clients with Junior\n\nTo effectively replace your cold DM strategy, you need a repeatable daily system. Here is the exact workflow consultants use to turn Junior into a pipeline generation engine.\n\n### 1. Define Target Archetypes\nStop searching for broad industries. Identify the exact titles of your ideal clients who hold the budget for your services (e.g., \"VP of Sales,\" \"Series B SaaS Founders,\" \"Logistics Directors\").\n\n### 2. Configure Your \"Digital Brain\"\nInput your specific consulting bio, the core problems you solve, and your unique contrarian viewpoints into Junior. Tell the AI how you want to sound\u2014authoritative but accessible, academic, or highly tactical. This context is what separates a Junior draft from a generic ChatGPT response.\n\n### 3. Source High-Intent Conversations\nInstead of endlessly scrolling the feed hoping to stumble upon a good post, use Junior to surface posts from your target archetypes. Look for posts where prospects are asking questions, sharing frustrations about their current processes, or discussing industry trends.\n\n![UI mockup of Junior generating a highly contextual comment based on user bio.](https://assets.bevisible.app/inline-images/j575rxgcx3zs176t5eewmhff158ajwhr/inline-4-1784130518136-opvpcn.png)\n### 4. Review, Tweak, and Post\nJunior will draft a context-aware reply based on your bio. Read it, ensure it hits the 3-C framework, tweak a sentence to add personal flair, and approve it. Because Junior runs locally, it posts the comment exactly as a human would.\n\n### 5. Convert Profile Views to Pipeline\nWhen the prospect\u2014and their network\u2014reads your insightful comment, they will click through to your optimized profile. Because you have strategically aligned your headline and Featured section, they are primed to send an inbound connection request or book a discovery call. This inbound dynamic is the defining advantage when settling the [Junior vs Dripify: finding consulting clients without automated messaging](https://www.heyjunior.ai/blog/junior-vs-dripify-finding-consulting-clients-without-automated-messaging) debate.\n\n## Common Pitfalls to Avoid When Transitioning from DMs to Comments\n\nIf you are historically reliant on cold outreach, transitioning to an engagement-first strategy requires a mindset shift. Avoid these common failure modes:\n\n* **Pitching in the Comments:** The absolute fastest way to ruin your credibility is to treat the comment section like a DM. Never say, \"Great post, I actually help companies with this, let's chat!\" Add value in public; sell in private.\n* **Ignoring the Author's Emotional Intent:** Read the room. If a founder is sharing a vulnerable story about a failed product launch, do not swoop in with a rigid consulting framework explaining why they failed. Empathize first. AI tools can miss emotional nuance, which is why human review is always required.\n* **The \"Me Too\" Echo Chamber:** If 40 people have already agreed with the post, adding your agreement does nothing. Find the contrarian angle or ask a clarifying question to stand out.\n* **Over-Automation:** Just because you *can* leave 100 comments a day doesn't mean you should. Focus on 15-20 high-leverage comments on posts from ideal buyers. For those exploring the market, assessing the [best automate Linkedin comments safely tools beyond Phantombuster](https://www.heyjunior.ai/blog/best-automate-linkedin-comments-safely-tools-beyond-phantombuster) will reinforce that quality always beats quantity in consulting.\n\n## Frequently Asked Questions\n\n**Can you get consulting clients on LinkedIn without posting your own content daily?**\nYes. While posting original content is incredibly valuable for long-term brand building, it can take months to gain traction and build an audience. Commenting on other people's posts allows you to instantly step in front of an established audience. You are effectively \"borrowing\" reach from larger creators and target accounts to drive immediate profile views.\n\n**Are AI commenting tools safe for my LinkedIn account?**\nIt depends entirely on the architecture of the tool. Cloud-based tools that rely on unofficial APIs and data center IP addresses are highly risky and frequently lead to account restrictions. Local-execution tools that run on your own machine and mimic human browsing speeds (like Junior) are vastly safer because they operate within normal user behavior patterns.\n\n**What is the difference between a commenting tool and a connection automation tool?**\nConnection tools (like Dripify or PhantomBuster) automate the process of sending connection requests and follow-up direct messages. They are outbound, interruptive, and volume-based. Commenting tools focus on public engagement, leaving thoughtful replies on posts to build visibility and trigger inbound interest.\n\n## Final Verdict: Which Engine Should Power Your Pipeline?\n\nWhen evaluating the [best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026), the choice between Junior and Taplio ultimately comes down to your primary business strategy.\n\nIf you are a ghostwriter, a high-volume content creator, or an agency managing dozens of personal brands where scheduling consistency and broad reach are the goals, Taplio provides a robust, all-in-one broadcasting platform.\n\nHowever, if you are a consultant whose primary goal is to find high-value clients on LinkedIn without relying on generic cold DMs, **Junior is the superior engine.** \n\nBy replacing generic spam with context-aware, human-sounding replies based on your unique bio, Junior helps you bypass crowded, defensive inboxes. Most importantly, its local execution architecture ensures your premium account stays safe, allowing you to seamlessly turn public visibility into direct interviews, warm pipeline, and closed consulting revenue.", "created_at": "2026-07-15T16:19:22.382158+00:00", "updated_at": "2026-07-15T16:19:22.382164+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
