    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 8, "slug": "lead-generation-on-linkedin", "title": "9 Proven Ways for Lead Generation on LinkedIn", "excerpt": "Stop spamming and start converting. Discover 9 proven strategies for lead generation on LinkedIn, from native Lead Gen Forms to AI-driven comment outreach.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57e847ety98pybgws4ebfg4vh8764qd/9-proven-ways-for-lead-generation-on-linkedin-1779889790571-yjm35f.png", "published_at": "2026-05-30T13:38:00+00:00", "content": "# 9 Proven Ways for Lead Generation on LinkedIn\n\nThe era of \"connect and pitch\" on LinkedIn is officially dead. If your current lead generation strategy relies on scraping thousands of profiles and bombarding them with identical, multi-paragraph direct messages, you are likely burning your total addressable market and risking your account.\n\nBuyers have built an impenetrable filter against automated spam. They ignore connection requests from strangers with \"synergy\" in their headlines, and they instantly delete InMails that smell like a template. \n\nHowever, [using LinkedIn for lead generation](https://training.marketing.linkedin.com/using-linkedin-for-lead-generation) remains one of the most lucrative channels for B2B sales teams, founders, and consultants\u2014if you adapt to the new rules of engagement. The shift has moved away from volume-based interruption toward signal-based, conversation-first relationship building.\n\nTo generate actual pipeline today, you need a nuanced approach that combines optimized inbound presence, strategic paid acquisition, and hyper-personalized outbound engagement. Here are nine proven ways to transform your LinkedIn presence into a predictable lead generation engine.\n\n## 1. Optimize Your Profile for Inbound Conversion\n\nBefore you spend a single dollar on ads or send a single outbound message, you must fix your foundation. Your LinkedIn profile is no longer an interactive resume; it is a high-converting landing page designed for a specific buyer persona.\n\nWhen you engage with a prospect\u2014whether by commenting on their post or sending a connection request\u2014the very first thing they do is click your name. If your profile reads like a plea for a job rather than a solution to their problem, the interaction ends there.\n\n### The Anatomy of a High-Converting Profile\n\n*   **The Banner Image (The Billboard):** Do not use the default grey background or a generic cityscape. Your banner should clearly state your value proposition, showcase social proof (logos of companies you work with), and provide a clear call to action (CTA).\n*   **The Headline (The Hook):** Ditch the \"Title at Company\" format. Use the \"Helping X achieve Y by doing Z\" framework. Make it immediately obvious who you help and the outcome you deliver.\n*   **The Featured Section (The Lead Magnet):** This is your prime real estate for lead capture. Do not just feature your most-liked posts. Feature a link to a high-value resource: an ungated case study, a link to your newsletter, a free audit booking page, or an industry report.\n*   **The About Section (The Sales Letter):** Write this in the first person. Start with the core problem your target audience faces, explain your methodology for solving it, and end with a clear directive on how to contact you.\n\n![Diagram showing the flow of traffic through an optimized LinkedIn profile funnel.](https://assets.bevisible.app/inline-images/j57e847ety98pybgws4ebfg4vh8764qd/inline-1-1779889694035-t95x1j.png)\n### Common Profile Failure Modes\n*   **The Keyword Stuffer:** Trying to rank for every possible variation of \"Sales / Marketing / Growth Hacker\" making the headline unreadable.\n*   **The Mystery Box:** Using vague, abstract language like \"Catalyst for Digital Transformation\" without explaining what you actually sell.\n*   **The Ghost Town:** Having a fully optimized profile but zero recent activity, making prospects wonder if you still work there.\n\n## 2. Leverage LinkedIn Lead Gen Forms (Ads)\n\nWhen it comes to paid acquisition, frictionless conversion is the holy grail. Sending LinkedIn ad traffic to an external landing page on your website often results in steep drop-off rates. Mobile users, in particular, rarely want to wait for a site to load and manually type out their work email on a smartphone keyboard.\n\n[LinkedIn Lead Gen Forms](https://business.linkedin.com/advertise/ads/sponsored-content/lead-gen-ads) solve this by keeping the user inside the LinkedIn ecosystem. When a prospect clicks your ad, a native form pops up, pre-populated with their accurate LinkedIn profile data (name, email, company size, job title). \n\n### Why Native Forms Outperform External Landing Pages\n\n| Feature | LinkedIn Lead Gen Forms | Website Landing Pages | \n| :--- | :--- | :--- |\n| **Conversion Rate** | Typically 10-15% | Typically 2-5% |\n| **Data Accuracy** | High (Pulled from live profile) | Variable (Users often use personal emails) |\n| **User Friction** | Zero (Two-tap submission) | High (Requires manual typing and page loads) |\n| **Cost Per Lead** | Generally lower due to higher conversion | Often higher due to drop-off rates |\n| **Tracking** | Built-in native analytics | Requires pixel implementation and cookie consent |\n\n### Best Practices for Lead Gen Campaigns\nTo maximize the ROI of these campaigns, align your offer with the friction level. Do not ask for a phone number if you are only offering a top-of-funnel checklist. Reserve high-friction fields for bottom-of-funnel offers like personalized audits or demo requests.\n\nAlways integrate your Lead Gen Forms directly with your CRM using webhooks or native integrations. Leads cool off rapidly; if your sales team is manually downloading CSVs from LinkedIn Campaign Manager once a week, you are wasting your ad spend.\n\n## 3. The \"Comment-First\" Outreach Strategy (The Anti-Cold DM)\n\nThe most effective outbound strategy in 2026 does not start with a direct message; it starts in the feed. When you jump straight into a prospect's inbox, you are a stranger making demands on their time. When you consistently leave thoughtful, additive comments on their public posts, you become a familiar face contributing to their audience.\n\nThis is the conversation-first approach, and it relies heavily on the psychological principle of reciprocity. People pay attention to those who validate their ideas publicly.\n\n### Executing the Comment-First Playbook\n\n1.  **Identify Target Accounts:** Build a specific list of decision-makers who are actively posting on LinkedIn. \n2.  **Monitor Consistently:** Track their activity daily.\n3.  **Add Value, Don't Just Validate:** Avoid lazy comments like \"Great post!\" or \"Thanks for sharing.\" Instead, highlight a specific sentence they wrote, add an opposing view, share a brief anecdote that supports their claim, or ask a high-level follow-up question.\n4.  **Transition to the Inbox:** After 3-4 meaningful interactions in the comments over a few weeks, send a connection request. Your acceptance rate will skyrocket because they already recognize your name and face.\n\n![Timeline illustrating the comment-first outreach strategy on LinkedIn.](https://assets.bevisible.app/inline-images/j57e847ety98pybgws4ebfg4vh8764qd/inline-2-1779889690038-uxf564.png)\n### Scaling Authentic Engagement\n\nManually tracking hundreds of prospects and thinking of insightful things to say takes hours. This is where modern AI tooling shines. Platforms like Junior are designed specifically for this workflow. By running locally on your machine to ensure account security, Junior automates the discovery of relevant posts from your target list and generates high-quality, personalized comments based on your specific bio and natural voice.\n\nInstead of blasting generic DMs, you use AI to warm up the relationship in public. This establishes your authority and initiates the conversations that seamlessly transition into sales pipeline.\n\n## 4. Build a Persona-Driven Content Engine\n\nOutbound lead generation is manual labor; inbound lead generation is building an asset. To sustainably generate leads, you need to create content that resonates deeply with your target buying committee. \n\n[Lead generation strategies](https://www.linkedin.com/business/marketing/blog/content-marketing/what-is-lead-generation) on LinkedIn fail when content is created for peer validation rather than prospect education. If you sell enterprise cybersecurity software, your posts shouldn't be aimed at getting likes from other cybersecurity vendors; they should be written to educate Chief Information Security Officers (CISOs) on emerging threat vectors.\n\n### The 3-Tier Content Framework\n\n*   **Tier 1: Industry Authority (Top of Funnel):** Broad insights, contrarian takes on industry trends, and analysis of recent news. Goal: Maximize reach and attract your total addressable market to your profile.\n*   **Tier 2: Tactical Frameworks (Middle of Funnel):** Step-by-step guides, tear-downs, \"how-to\" posts, and actionable templates. Goal: Prove competence. Show the buyer exactly how you solve problems.\n*   **Tier 3: Hand-Raisers (Bottom of Funnel):** Case studies, client results, and direct offers. (e.g., \"We just helped Company X reduce churn by 12%. I put together a breakdown of the exact process. Comment 'Churn' and I'll send it over.\")\n\nTo build a robust [5 Steps to a LinkedIn Lead Generation Strategy (2026)](https://heyjunior.ai/blog/linkedin-lead-generation-strategy), you must balance these three tiers. A common mistake is posting only Tier 1 content (which gets likes but no leads) or only Tier 3 content (which alienates your audience by being too salesy).\n\n## 5. Mine LinkedIn Events and Webinars for Warm Intent\n\nLinkedIn Events are a goldmine for high-intent lead generation, yet they remain vastly underutilized. When a user registers for an industry-specific event, they are actively raising their hand and declaring an interest in that specific topic.\n\n### The Stealth Event Strategy\n\n1.  **Find Relevant Events:** Search LinkedIn for upcoming webinars or live audio events hosted by non-competing companies targeting the exact same audience as you.\n2.  **Attend and Register:** Once you register, LinkedIn allows you to access the attendee list.\n3.  **Filter the Attendees:** Sift through the list to identify your ideal customer profile (ICP).\n4.  **The Outreach Angle:** Reach out to them with hyper-relevant context. \n\n**Example Framework:** \n> *\"Hey [Name], saw we're both attending the [Event Name] next week on AI implementation. I'm really curious to hear their take on data privacy. Is that something you're currently navigating at [Company]?\"*\n\nThis approach works because it replaces cold outreach with peer-to-peer networking based on shared, current interests. \n\n## 6. Use Sales Navigator to Track Job Changes and Buying Signals\n\nStandard LinkedIn search is insufficient for serious B2B [sales lead generation](https://business.linkedin.com/sell/resources/sales-terms/sales-lead-generation). To execute a targeted strategy, Sales Navigator is non-negotiable. However, merely building static lists is not enough; you need to track dynamic buying signals.\n\nTiming is often more important than the message itself. Reaching out when a company is experiencing a catalyst event dramatically increases your chances of booking a meeting.\n\n### Key Triggers to Track in Sales Navigator\n\n*   **New Executive Hires:** When a new VP or C-level executive joins a company, they usually have a mandate to enact change and a budget to spend within their first 90 days. Reach out on day 30, once they've settled in but before they've finalized their vendor choices.\n*   **Company Funding Rounds:** Capital injections mean the company is entering a growth phase and will be looking for tools, agencies, and consultants to help them scale.\n*   **Post Engagement:** Save your target leads in a specific list and check the \"Posted on LinkedIn in past 30 days\" filter. Prioritize outreach to the active users first.\n\n![Decision tree mapping out automated buying signals in LinkedIn Sales Navigator.](https://assets.bevisible.app/inline-images/j57e847ety98pybgws4ebfg4vh8764qd/inline-3-1779889683891-16mbpp.png)\nBy building automated alerts for these specific triggers, your outreach stops feeling like a cold pitch and starts feeling like serendipitous timing.\n\n## 7. Run Targeted Outbound with Safe Automation Tools\n\nAutomation is not inherently evil, but *lazy* automation will destroy your brand reputation and get your account restricted. The market is flooded with cheap, cloud-based Chrome extensions that scrape data and send 100 connection requests a day. LinkedIn's algorithms actively hunt these tools.\n\nIf you want to read more on selecting the right infrastructure, check our guide on [7 LinkedIn Automation Tools for Lead Generation (2026)](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation). \n\n### The Cloud vs. Local Safety Divide\n\nMost legacy automation tools run in the cloud. This means LinkedIn sees your account logging in from an IP address in Virginia at 2:00 AM while your actual phone is pinging from London. This mismatch triggers immediate security flags.\n\nModern tools prioritize account safety above all else by running locally on your own machine. When automation runs through your actual browser profile, matching your localized IP and mimicking human interaction patterns (like variable typing speeds and random pauses), it remains undetectable. \n\nFurthermore, shift your automation focus from *sending volume* to *assisting research*. Use automation to pull lists, summarize recent company news, and draft initial engagement touchpoints, but keep a human in the loop before clicking send on high-value accounts.\n\n## 8. Participate Actively in Niche LinkedIn Groups (and Cross-Pollinate)\n\nWhile broad LinkedIn groups often devolve into link-dumping grounds, highly specific, niche, and heavily moderated groups remain excellent hubs for lead generation. \n\nMany founders and technical buyers use platforms outside of LinkedIn to discuss real problems\u2014as seen in [threads about lead gen on startup communities](https://www.reddit.com/r/ycombinator/comments/1im5rtw/how_i_use_linkedin_for_lead_generation/)\u2014and then bring those synthesized insights back to private LinkedIn groups.\n\n### Group Strategy Checklist\n\n1.  **Audit the Group Quality:** Join a group and observe for one week. If the feed is 90% promotional links with zero comments, leave immediately. Look for text-only posts asking for advice.\n2.  **Become the Helpful Expert:** Do not post your links. Spend 15 minutes a day answering questions thoughtfully in the comments. \n3.  **Take the Conversation 1-on-1:** When you provide a comprehensive answer to someone's problem, follow up with a connection request: *\"Hey [Name], expanded on my comment regarding your CRM issue. Happy to connect if you want to brainstorm further.\"*\n\nThis positions you as a trusted advisor rather than a vendor, drastically shortening the trust-building phase of the sales cycle.\n\n## 9. Scale Responsibly with AI\n\nArtificial Intelligence is the biggest lever available for modern lead generation, but it is currently being wildly misused. Using ChatGPT to generate a five-paragraph cold pitch that starts with \"I hope this message finds you well\" is a guaranteed way to be ignored.\n\nThe goal of AI is not to remove the human from the process, but to remove the *drudgery* from the process, allowing the human to scale their authentic interactions. For deeper insights on this balance, read [How to Scale LinkedIn Lead Generation with AI (Safely)](https://heyjunior.ai/blog/linkedin-lead-generation-ai).\n\n### How to Deploy AI Effectively\n\n*   **Profile Summarization:** Use AI to ingest a prospect's recent posts, company website, and \"About\" section to extract their core priorities in seconds.\n*   **Engagement Drafting:** Instead of staring at a blank screen wondering what to comment on a prospect's post, use localized AI (like Junior) to suggest a contextual, intelligent response based on your established brand voice.\n*   **Pattern Recognition:** Analyze your historical outreach data. Use AI to find correlations between specific trigger events (e.g., funding rounds) and your highest reply rates.\n\n![Comparison between unsafe cloud automation and secure local AI automation for LinkedIn.](https://assets.bevisible.app/inline-images/j57e847ety98pybgws4ebfg4vh8764qd/inline-4-1779889697095-7ndgyx.png)\nBy leveraging AI as a hyper-competent research assistant and draft writer rather than an autonomous spam cannon, you maintain the authenticity required to win deals while operating at 10x the speed of your competitors.\n\n## How to Measure Your LinkedIn Lead Generation Success\n\n[General B2B lead generation](https://business.linkedin.com/advertise/resources/lead-generation) requires strict adherence to data. A strategy without measurement is just expensive guesswork. On LinkedIn, it is dangerously easy to get distracted by vanity metrics like post impressions and follower counts. While these indicate reach, they do not pay payroll.\n\nTrack these core metrics to evaluate your system's health:\n\n*   **Connection Acceptance Rate:** Aim for >30%. If it is lower, your targeting is wrong, or your connection note is too salesy.\n*   **Comment-to-Conversation Rate:** How many of your public comments lead to an inbound DM or an accepted connection request?\n*   **Reply Rate (Positive/Neutral):** Track the percentage of prospects who actually respond to your direct messages. Filter out the \"Unsubscribe\" replies.\n*   **Meetings Booked:** The ultimate top-of-funnel KPI. How many qualified calls were scheduled this week from LinkedIn activity?\n*   **Pipeline Generated:** The ultimate bottom-of-funnel KPI. Track the dollar value of opportunities sourced from LinkedIn to prove ROI on your time and tool stack.\n\nCreate a weekly dashboard to review these numbers. If your acceptance rate is high but meetings booked are low, you have a transition problem\u2014you are making friends but not moving them to the pipeline. If your acceptance rate is low, you have a targeting or profile problem.\n\n## Frequently Asked Questions (FAQ)\n\n### Is outbound LinkedIn lead generation still effective in 2026?\nYes, but the methodology has changed. High-volume, untargeted spam is dead. Signal-based outreach, driven by personalized engagement (like the comment-first strategy) and well-timed triggers, is currently yielding higher conversion rates than traditional cold email.\n\n### How many connection requests can I safely send per week?\nLinkedIn imposes dynamic limits based on your account's historical behavior and acceptance rates, but a general safe baseline is 100-150 requests per week. If your acceptance rate drops or users flag your requests as \"I don't know this person,\" LinkedIn will lower your limit. Focus on quality and warming up leads through comments rather than maxing out daily limits.\n\n### Do I need Sales Navigator for lead generation?\nIf you are serious about outbound sales, yes. The free version of LinkedIn is designed for job seekers and casual networking; its search limits and filters are too restrictive for building targeted account lists. Sales Navigator provides the necessary intent signals, account mapping, and unlimited search functionality required for professional lead generation.\n\n### Can I just buy a list of LinkedIn leads and email them?\nWhile you can use tools to enrich LinkedIn profiles to find business emails, entirely bypassing the platform to send cold emails ignores the primary benefit of LinkedIn: contextual trust. Engaging them on the platform first warms up the lead, making your eventual email much more likely to be opened and answered.", "created_at": "2026-05-30T13:49:23.329536+00:00", "updated_at": "2026-05-30T13:49:23.329541+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
