    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 41, "slug": "junior-vs-aware-for-linkedin", "title": "Junior vs Aware for LinkedIn", "excerpt": "Compare Junior and Aware for LinkedIn engagement. Discover which AI tool helps B2B sales teams turn public visibility into pipeline and bypass crowded inboxes.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57arw15r1t83xnspyzbcz2eph89g5dm/junior-vs-aware-for-linkedin-1783176566583-pnyjij.png", "published_at": "2026-07-04T14:40:00+00:00", "content": "# Junior vs Aware for LinkedIn\n\nThe B2B sales playbook has fundamentally shifted. For the past decade, predictable revenue was built on a simple equation: buy a list, load it into a sequence, send thousands of cold emails and LinkedIn direct messages, and wait for the 1% response rate to yield a meeting. \n\nThat equation is broken. \n\nInboxes are heavily fortified by advanced spam filters. Buyers are fatigued by generic, AI-generated pitches flooding their LinkedIn DMs. When a prospect sees a connection request followed immediately by a multi-paragraph pitch, they don't just ignore it\u2014they block the sender. \n\nForward-thinking sales teams, founders, and lead generation agencies have realized that the new inbox is the public feed. By leaving thoughtful, contextual comments on relevant posts, sales professionals can capture attention, build authority, and initiate authentic conversations that naturally transition into direct messages. \n\nHowever, manually finding the right posts and crafting unique, insightful comments takes hours. This bottleneck has given rise to a new category of software: AI engagement tools for B2B sales teams. \n\nTwo of the most prominent names in this space are Junior and Aware. While both aim to improve your LinkedIn presence, their architecture, core philosophies, and target users are radically different. Aware focuses heavily on feed curation and creator analytics, while Junior is engineered specifically as a local, context-aware engine designed to turn public visibility into direct sales pipeline.\n\nHere is a comprehensive breakdown of Junior vs Aware for LinkedIn, and how to choose the right AI engagement tool for your sales team.\n\n## The Shift in B2B Sales: From Cold Pitching to Strategic Engagement\n\nBefore comparing the software, we have to understand the behavioral shift driving their adoption. \n\nBuyers do not want to be sold to in the dark. They want to buy from peers, industry experts, and recognizable names. Strategic commenting solves the three major problems of modern outbound sales:\n\n1. **It bypasses the inbox entirely.** A well-crafted comment sits in plain sight. Not only does the original poster see it, but their entire audience sees it. You are effectively advertising your expertise on someone else's digital real estate.\n2. **It leverages the rule of reciprocity.** When you engage meaningfully with a prospect's content, they feel a psychological obligation to view your profile and, often, engage back. \n3. **It creates warm DM entries.** Instead of a cold pitch, your eventual DM becomes a continuation of a public conversation: *\"Loved our back-and-forth on your post about Q3 retention strategies. I actually have a template we use for that\u2014mind if I send it over?\"*\n\n![Flowchart showing the shift from cold DMs to strategic LinkedIn commenting](https://assets.bevisible.app/inline-images/j57arw15r1t83xnspyzbcz2eph89g5dm/inline-1-1783176465326-34x69n.png)\nTo execute this at scale, you need tools that help you find the right posts and draft comments that sound like you. Let's look at how Aware and Junior approach this challenge.\n\n## Aware for LinkedIn: Overview & Best Use Cases\n\nAware (often known in the ecosystem as UseAware) is a cloud-based LinkedIn engagement platform built primarily around the concept of feed curation, relationship management, and analytics.\n\nIt is designed for content creators, personal brand builders, and marketers who want to organize their chaotic LinkedIn feeds and ensure they never miss a post from a key connection.\n\n### Core Strengths of Aware\n\n**1. Feed Curation and Organization**\nLinkedIn's native algorithm is notoriously fickle. You might connect with a high-value prospect but never see their posts in your feed because LinkedIn decides to show you viral content from a third-degree connection instead. Aware solves this by allowing users to create custom feeds. You can group connections into \"Clients,\" \"Prospects,\" or \"Industry Leaders,\" ensuring you only see the content you actually want to engage with.\n\n**2. Relationship Tracking**\nAware acts like a lightweight CRM specifically for LinkedIn engagement. It tracks who you have engaged with recently, who has engaged with you, and helps you maintain a balanced cadence of interaction with your network.\n\n**3. Comprehensive Analytics**\nFor creators focused on follower growth and engagement rates, Aware provides deep analytics dashboards. You can track comment velocity, post performance, and overall network growth over time.\n\n### Limitations for B2B Sales Teams\n\nWhile excellent for creators, Aware presents a few distinct challenges for hardcore B2B sales teams:\n\n* **Cloud-Based Architecture:** Aware operates in the cloud. When you connect your LinkedIn account to a cloud-based automation or engagement tool, you are constantly passing data between a third-party server and LinkedIn. In 2026, LinkedIn's security algorithms are hyper-sensitive to cloud-based bot activity. For sales teams managing dozens of reps, risking account restrictions is a non-starter.\n* **Generic AI Implementation:** While Aware includes AI drafting features, they often rely on generic LLM prompts that summarize the post rather than injecting the user's specific expertise. Sales reps end up with comments that read like obvious AI summaries (*\"Great insights on B2B sales! I totally agree that the inbox is crowded...\"*).\n* **Focus on Vanity Metrics over Pipeline:** Aware is built to maximize engagement metrics (likes, replies) rather than steering the conversation toward a quantifiable sales outcome.\n\n## Junior for LinkedIn: Overview & Best Use Cases\n\nJunior takes a radically different approach. It is not a broad analytics platform for creators; it is an AI-powered pipeline generation tool designed specifically for job seekers, sales teams, agencies, and founders.\n\nInstead of acting as a cloud-based feed reader, Junior focuses entirely on safely starting authentic conversations through strategic post commenting. It eliminates the cold DM by finding relevant discussions and drafting context-aware, human-sounding replies based on the user's unique bio and goals.\n\n### Core Strengths of Junior\n\n**1. Local-First Architecture for Maximum Safety**\nUnlike cloud-based connection tools, Junior runs locally on the user's machine. This is a massive architectural advantage for sales teams. By running locally, Junior utilizes the user's existing browser session. To LinkedIn's security algorithms, the activity looks exactly like a human sitting at their computer, scrolling, and typing. It mimics natural interaction patterns, keeping the account completely safe from the automated IP bans associated with cloud servers. For a deeper look at keeping your account secure, review the guide on [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n\n**2. Context-Aware, Goal-Driven Drafting**\nGeneric AI comments hurt your brand more than they help. Junior solves this through its proprietary context engine. When you set up Junior, you feed it your specific bio, your company's value proposition, and your specific goal (e.g., \"Book meetings for our SDR agency\" or \"Find consulting clients in the fintech space\"). \n\nWhen Junior drafts a comment, it doesn't just read the prospect's post; it reads the post *through the lens of your bio and goals*. It crafts replies that challenge the premise, add a specific anecdote from your industry, or ask a targeted follow-up question. This results in human-sounding interactions that actually drive curiosity.\n\n**3. Bypassing the Inbox**\nJunior is built on the philosophy that public visibility leads to private conversations. By consistently generating high-quality comments on target accounts' posts, Junior helps professionals build a recognizable presence that naturally leads to inbound direct messages and pipeline.\n\n![Architecture diagram comparing cloud-based vs local LinkedIn automation safety](https://assets.bevisible.app/inline-images/j57arw15r1t83xnspyzbcz2eph89g5dm/inline-2-1783176472627-dvl9fz.png)\n### Limitations for General Creators\n\nJunior is highly specialized. If you are a casual LinkedIn user looking for a dashboard with pie charts showing your month-over-month follower growth, Junior is not the right fit. It does not try to be an analytics suite; it tries to be the best conversation starter on the market.\n\n## Feature-by-Feature Comparison for B2B Sales Teams\n\nTo make an informed decision for your sales organization, let's break down how Junior vs Aware perform across the specific dimensions that matter to revenue teams.\n\n### 1. Account Safety and Compliance\n\nNothing stops a sales quarter in its tracks faster than your top reps getting locked out of their LinkedIn accounts. \n\n* **Aware:** Uses a cloud-based infrastructure. While they take precautions, any tool that pings LinkedIn from a centralized server outside of your normal IP address carries inherent risk. LinkedIn has spent millions cracking down on cloud-based Chrome extensions and API wrappers.\n* **Junior:** Runs strictly locally on the user's machine. It uses the rep's actual browser session. It adds natural delays, mimics human typing speeds, and never triggers simultaneous login warnings. For enterprise sales teams, this local-first approach is the only sustainable way to scale automation safely. \n\nIf you are evaluating tools based on compliance, you should consult an [Automate Linkedin Comments Safely Evaluation Checklist](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist).\n\n### 2. AI Personalization and Tone\n\nThe entire premise of AI engagement relies on the prospect believing a human wrote the comment. \n\n* **Aware:** The AI is largely transactional. It reads the text of the post and suggests a polite, relevant response. It requires heavy manual editing by the sales rep to make it sound authentic or to steer the conversation toward a business outcome.\n* **Junior:** Junior utilizes a \"Persona Engine.\" It ingests your exact role, your unique perspective, and your strategic goals. If an IT director posts about cybersecurity threats, a generic AI (like Aware's default) might say: *\"Great point about ransomware! It's a huge issue.\"* Junior, knowing you are a cybersecurity consultant whose goal is booking audits, will draft something like: *\"Spot on. We saw this exact pattern with a fintech client last quarter. The perimeter defense held, but the internal lateral movement is what caught them. Are you seeing clients shift toward zero-trust architecture to combat this?\"* \n\nThis level of nuance is the difference between a simple \"Like\" and a booked meeting.\n\n### 3. Workflow and Pipeline Generation\n\n* **Aware:** Excels at organization. The rep logs in, opens their custom \"Target Accounts\" feed, and scrolls through to see who posted. They then manually engage or use the AI assist. It is a structured manual workflow.\n* **Junior:** Excels at execution. It actively finds the relevant discussions based on your parameters and serves up ready-to-publish, context-aware drafts. It drastically reduces the \"time-to-first-comment,\" allowing a rep to engage thoughtfully with 30 target accounts in the time it would normally take to engage with 5.\n\n### Comparison Matrix\n\n| Feature/Capability | Aware | Junior |\n| :--- | :--- | :--- |\n| **Primary Use Case** | Feed curation, creator analytics | Pipeline generation, authentic conversation starting |\n| **Target Audience** | Content creators, personal brands | Sales teams, founders, agencies, job seekers |\n| **Architecture** | Cloud-based | Local machine (Browser session) |\n| **Account Safety Risk** | Moderate (Cloud detection risk) | Extremely Low (Mimics human interaction locally) |\n| **AI Context Depth** | Post-level summary | Deep persona, bio, and goal integration |\n| **Analytics Focus** | Deep follower and engagement stats | Focused on outbound activity and inbound conversions |\n| **CRM Feed Grouping**| Yes | N/A (Focuses on finding relevant discussions dynamically) |\n\n![Decision matrix comparing Junior and Aware across analytics and pipeline generation](https://assets.bevisible.app/inline-images/j57arw15r1t83xnspyzbcz2eph89g5dm/inline-3-1783176479107-1usj4l.png)\n## Which Tool Should Your Sales Team Choose?\n\nThe choice between Junior and Aware comes down to your primary objective on the platform.\n\n**Choose Aware if:**\n* You are an independent content creator or influencer.\n* Your main goal is tracking your own post performance and follower demographics.\n* You want to manually curate lists of favorite creators and read their content without LinkedIn's algorithm getting in the way.\n* You don't mind the inherent risks of cloud-based engagement tools.\n\n**Choose Junior if:**\n* You are a B2B sales rep, founder, or agency owner whose goal is to generate revenue, not just likes.\n* You need to protect your (or your team's) LinkedIn accounts with local-first, safe automation.\n* You want AI that actually sounds like you, understands your business goals, and drafts comments that provoke meaningful business discussions.\n* You want to bypass crowded inboxes and replace cold DMs with warm, high-visibility interactions.\n\nFor a broader look at the landscape of tools available this year, you can explore the [Best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026) to see where both platforms sit among the wider market.\n\n## Building a LinkedIn Engagement Routine That Generates Leads\n\nIf you decide to equip your team with an AI engagement tool like Junior, you cannot simply turn it on and walk away. Technology amplifies your strategy; it does not replace it. \n\nTo turn public visibility into direct interviews, pipeline, and client conversations, you need a disciplined routine. \n\n### Phase 1: Profile Optimization (The Foundation)\nBefore you leave a single comment, your profile must be ready to receive traffic. When you leave a brilliant comment on a prospect's post, the first thing they will do is hover over your name and look at your headline. If your headline reads *\"Account Executive at XYZ Corp - We're Hiring!\"*, they will immediately categorize you as a seller and move on. \n\nYour profile must read like a resource. \n* **Headline:** Focus on the problem you solve. *\"Helping B2B SaaS companies scale outbound safely | Sales Strategist\"*\n* **Featured Section:** Link directly to a lead magnet, a calendar booking link, or a high-value case study.\n* **About Section:** Write a story about why you care about your industry, not a resume of your quota achievements.\n\n### Phase 2: Defining the Target Ecosystem\nYou don't just want to comment on your direct prospects' posts. Often, C-suite executives rarely post. Instead, you want to comment on the posts of the *influencers* your prospects follow. \n\nIf you sell marketing software to CMOs, find the top 10 marketing thought leaders on LinkedIn. When they post, hundreds of CMOs will read and comment. By using an AI tool to consistently leave the top, most insightful comment on those thought leaders' posts, you are putting your brand directly in front of your target buyers.\n\n### Phase 3: The \"Value-Add\" Engagement Strategy\nWhen using an AI tool for Linkedin commenting, you must calibrate the AI to follow the \"Value-Add\" framework. A good comment does one of three things:\n1. **Validates and Expands:** Agrees with the author and provides a real-world example supporting their claim.\n2. **Respectfully Challenges:** Offers a contrarian viewpoint with data to back it up (this generates the most profile views).\n3. **Asks a Calibrated Question:** Asks a highly specific follow-up question that allows the author to show off more of their expertise.\n\nBecause Junior ingests your specific bio, it can automatically generate drafts that fit these three categories seamlessly. \n\n### Phase 4: The Transition to Direct Message\nThe ultimate goal of B2B sales engagement is the private conversation. But you must wait for the right trigger. \n\nDo not pitch immediately after they reply to your comment. Instead, wait for one of these three signals:\n1. They view your profile.\n2. They send you a connection request.\n3. They reply to your comment with a specific question about your methodology.\n\nWhen one of these triggers occurs, you send the DM: \n*\"Hey [Name], really enjoyed our back-and-forth on the timeline post today. Saw you checked out my profile\u2014I actually put together a short workflow on how we solve that specific bottleneck. Happy to send it over if you're open to it, no worries if not.\"*\n\nThis approach yields response rates exponentially higher than traditional cold outreach. If you want to audit your current team's workflow against best practices, run through this [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) to ensure you aren't leaving money on the table.\n\n## Avoiding the \"Spam\" Trap: The Danger of Bad AI\n\nThe influx of AI on LinkedIn has created a massive divide. On one side are the generic automators. They use poorly prompted LLMs to blast \"Great insights, thanks for sharing!\" on 500 posts a day. \n\nLinkedIn's algorithm actively punishes this behavior. More importantly, human users despise it. It damages your personal brand irreparably. When a prospect sees a generic AI comment, they associate your company with low effort and spam.\n\nOn the other side are strategic engagers. They use tools like Junior to handle the heavy lifting\u2014finding the posts, reading the context, and generating a strong first draft\u2014but they retain final editorial control. They ensure the comment adds legitimate value to the ecosystem. \n\nThe goal of AI in B2B sales is not to remove the human from the equation. The goal is to give the human the leverage to have 50 meaningful, highly contextual conversations a day instead of 5.\n\nFor a deeper dive into the alternatives in this specific methodology, you can read our comparison of [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n## Frequently Asked Questions (FAQs)\n\n### Are AI engagement tools safe for my LinkedIn account?\nIt depends entirely on the architecture of the tool. Cloud-based tools (which log into your account from an external server) are highly risky and frequently result in account bans or restrictions. Local-first tools (like Junior) that run on your machine and use your existing browser session are significantly safer because they mimic human interaction and do not trigger cloud-bot detection protocols.\n\n### Can an AI really sound like me in a comment?\nYes, but only if it has the right context. If you use a tool that only reads the target post, it will sound like a generic robot. If you use a tool that ingests your personal bio, your company's unique value proposition, and your specific campaign goals, it can draft highly nuanced, personalized comments that accurately reflect your tone and expertise.\n\n### What is the difference between a connection automation tool and a commenting tool?\nConnection tools (like Dripify or Phantombuster) automate sending connection requests and direct messages. They push your pitch into the prospect's inbox. Commenting tools focus on the public feed. They help you engage with content, build authority, and generate inbound interest, completely bypassing the crowded inbox. \n\n### Do I still need to read the comments before posting?\nAbsolutely. AI is a drafting assistant, not a replacement for your judgment. You should always review the drafted comment to ensure it aligns perfectly with your brand voice and the specific nuance of the conversation. The AI saves you the 5 minutes of thinking and typing; you spend 10 seconds reviewing and approving.\n\n## Final Thoughts on B2B Sales Engagement\n\nThe era of the brute-force cold DM is coming to an end. Buyers are protecting their time and their inboxes more fiercely than ever before. To win in modern B2B sales, you have to meet the buyer where they are actually spending their time: in the feed.\n\nBoth Junior and Aware offer powerful ways to interact with the LinkedIn feed. If your primary goal is curating content and tracking your own creator analytics, Aware is a fantastic organizational tool. \n\nHowever, if your mandate is to generate pipeline, bypass crowded inboxes, and safely scale your team's outbound efforts without risking account bans, Junior's local-first, context-aware engine is the clear choice for modern sales organizations.", "created_at": "2026-07-04T15:19:23.181613+00:00", "updated_at": "2026-07-04T15:19:23.181620+00:00"};
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
