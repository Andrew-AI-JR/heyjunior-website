    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 25, "slug": "white-label-linkedin-lead-generation", "title": "Scale with White Label LinkedIn Lead Generation (9 Tips)", "excerpt": "Learn how to scale your agency with white label LinkedIn lead generation. Discover 9 actionable tips, top tools, pricing models, and safety best practices.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5704efzvesesg3psz7b77vxjh8772sm/scale-with-white-label-linkedin-lead-generation-9-1781354961407-s37038.png", "published_at": "2026-06-16T12:29:00+00:00", "content": "# Scale with White Label LinkedIn Lead Generation (9 Tips)\n\nGrowing a B2B lead generation agency usually hits a predictable bottleneck around client number ten. Managing a handful of LinkedIn profiles manually is tedious but possible. But when you suddenly need to orchestrate outbound campaigns for 30, 50, or 100 client accounts, the logistics completely break down. You find yourself juggling dozens of logins, navigating two-factor authentication roadblocks, and praying you don't trigger LinkedIn\u2019s spam filters.\n\nThis operational ceiling is exactly why successful agencies turn to [white label LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services). By purchasing a master license or reseller rights to an existing platform\u2014and slapping your own agency's branding on it\u2014you can deliver high-volume outbound campaigns without having to build the underlying software infrastructure yourself. \n\nHowever, simply buying software and marking up the price is a fast track to client churn. The agencies that scale sustainably treat white labeling as a foundational infrastructure, pairing it with strong strategy, careful account safety protocols, and a modern conversation-first approach to outreach.\n\nHere is how to structure, price, and scale your agency operations using white label LinkedIn automation.\n\n## What is White Label LinkedIn Lead Generation?\n\nWhite label LinkedIn lead generation refers to the practice of purchasing unbranded (or custom-branded) software, infrastructure, or managed services from a third-party provider and reselling it to your clients as your own proprietary solution.\n\nInstead of logging into \"Vendor X's\" portal, your clients log into a dashboard hosted on a custom subdomain (e.g., `app.youragency.com`). They see your logo, your brand colors, and your support email. Behind the scenes, the third-party vendor handles the server maintenance, API connections, and software updates.\n\nBroadly, this market is divided into two distinct categories:\n\n1.  **White Label SaaS Platforms**: You pay for software seats. You are responsible for writing the copy, defining the target audience, setting up the campaigns, and monitoring the inbox. \n2.  **White Label Managed Services**: You outsource the entire operation. The vendor writes the scripts, builds the lists, runs the campaigns, and sometimes even manages the inbox. You effectively act as an account manager between the vendor and the end client.\n\n## Why Agencies and Sales Teams Choose to White Label\n\nBuilding native LinkedIn automation software is incredibly difficult. LinkedIn frequently updates its interface, changes its connection limits, and updates its bot-detection algorithms. Maintaining a tool requires a dedicated engineering team.\n\nChoosing to white label provides several distinct operational advantages:\n\n*   **You save time and engineering resources:** You bypass the years of development required to build a stable platform, allowing you to go to market immediately.\n*   **You expand your service offerings:** If you run an SEO or Facebook Ads agency, adding LinkedIn lead gen to your stack creates a new recurring revenue stream from your existing client base.\n*   **You scale without growing pains:** Adding a new client takes five minutes to provision a new software seat, rather than hours of manual workflow setup.\n*   **You take the pressure off execution:** White label tools centralize all client inboxes into a single master dashboard, meaning your team doesn't have to constantly switch browser profiles to monitor replies.\n\nHowever, the strategy you wrap around the tool is what dictates your success. Let\u2019s dive into nine actionable ways to scale effectively.\n\n## 9 Tips to Scale Your Agency with White Label LinkedIn Lead Gen\n\n### 1. Choose Between a White Label Tool vs. Managed Service\n\nThe first structural decision you must make is whether you want to control the execution (SaaS) or outsource the fulfillment entirely (Managed Service). \n\nIf your agency\u2019s core competency is copywriting, sales strategy, and [build a LinkedIn lead generation funnel that converts](https://heyjunior.ai/blog/linkedin-lead-generation-funnel), you should white label a SaaS platform. You retain control over the messaging and quality. If your agency focuses primarily on other channels (like inbound marketing) and you just want to offer an upsell to clients, a managed service is less risky.\n\n![Inline visual 1](https://assets.bevisible.app/inline-images/j5704efzvesesg3psz7b77vxjh8772sm/inline-1-1781354880468-ou1x7k.png)\n| Feature | White Label SaaS | White Label Managed Service |\n| :--- | :--- | :--- |\n| **Cost per client** | Low ($30 - $100/mo) | High ($300 - $800+/mo) |\n| **Control over copy** | Total control | Vendor handles, you approve |\n| **Time requirement** | High (you run the campaigns) | Low (vendor runs campaigns) |\n| **Profit margins** | High (if priced on value) | Moderate (fixed markup) |\n| **Best for** | Dedicated lead gen agencies | Full-service marketing agencies |\n\n### 2. Prioritize Client Account Security Above All Else\n\nThe fastest way to lose a client\u2014and damage your agency's reputation\u2014is to get their LinkedIn account restricted. \n\nMost traditional white label automation platforms operate via the cloud. They log into your client's LinkedIn account using a proxy server from a remote data center. While many vendors claim these proxies are \"undetectable,\" LinkedIn's security algorithms have become incredibly sophisticated at identifying non-human behavioral patterns and inconsistent IP jumps.\n\nWhen evaluating a white label partner, scrutinize their safety protocols. \n\n*   Do they offer dedicated, country-specific IP addresses?\n*   Do they implement randomized delays between actions?\n*   Do they respect LinkedIn's strict connection limits?\n\nIf you want to read deeper into the safety protocols of popular platforms, checking out comparisons like [Meet Alfred vs Junior: Which LinkedIn Tool is Safer?](https://heyjunior.ai/blog/meet-alfred) provides a clear breakdown of cloud-based risks versus local execution.\n\n### 3. Price for Value, Not Just Software Markup\n\nA fatal mistake new agencies make is transparent pricing based on the software cost. If a white label SaaS seat costs you $50 a month, marking it up to $150 a month is a race to the bottom. Your client will eventually realize they are just paying for a software tool and will try to find it cheaper themselves.\n\nInstead, you must bundle the software with your strategic expertise. You are not selling a tool; you are selling qualified sales appointments.\n\nA typical high-ticket pricing model for a fully managed LinkedIn outreach service looks like this:\n*   **Setup Fee:** $500 - $1,500 (Covers profile optimization, deep ICP research, and initial campaign copywriting).\n*   **Monthly Retainer:** $1,000 - $3,000/month (Covers the software seat, list building, daily inbox management, and A/B testing).\n\nWhen you price based on the value of the pipeline you generate, the cost of the underlying white label software becomes a negligible line item.\n\n### 4. Standardize Your Client Onboarding\n\nScaling breaks down when every client is treated as a custom, bespoke project. To handle volume, your agency needs a rigid, standardized onboarding checklist.\n\nEvery time a new client signs up, they should flow through the exact same 5-step protocol before any automation is turned on. You can mirror the [5 Steps to a LinkedIn Lead Generation Strategy (2026)](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) to build your internal SOP:\n\n1.  **The Intake Questionnaire:** Capture their exact buyer persona, past successful clients, and common sales objections.\n2.  **Profile Makeover:** Rewrite their LinkedIn headline, About section, and Featured section to read like a high-converting landing page, not a resume.\n3.  **Sales Navigator Setup:** Ensure they have an active Sales Navigator license, and build the initial boolean search queries to verify the audience size.\n4.  **Campaign Asset Approval:** Draft the connection requests, follow-ups, and engagement strategies, requiring their explicit written approval.\n5.  **Technical Provisioning:** Connect their account to your white label dashboard, set up webhooks to their CRM, and define the daily sending limits.\n\n### 5. Move Beyond Cold DMs to Authentic Engagement\n\nTraditional white label automation relies heavily on volume: send 100 connection requests, get 20 acceptances, send 20 pitched messages, hope for 1 meeting. This \"spray and pray\" approach is dying. Buyers are fatigued by template-based spam in their inboxes.\n\nTo stand out and actually deliver results for your clients, your agency needs to pivot to a conversation-first strategy. Before ever sending a pitch, you should engage with the prospect's public content. \n\nLeaving insightful, natural-sounding comments on a target prospect's posts dramatically increases the likelihood that they will accept a connection request later. Doing this manually for dozens of clients is impossible, but AI tools designed specifically for authentic engagement solve this. By using AI to generate high-quality, personalized comments that mirror the user's natural voice based on their specific bio, you warm up the lead without the stigma of cold spam. \n\nImplementing a robust engagement sequence is one of the most reliable [7 Ways to Triple Your LinkedIn Engagement Rate Fast](https://heyjunior.ai/blog/linkedin-engagement-rate).\n\n### 6. Structure a Multi-Touch Outbound Funnel\n\nDon't rely on LinkedIn as a siloed channel. The best agencies use their white label software to trigger multi-touch, multi-channel funnels.\n\n![Inline visual 2](https://assets.bevisible.app/inline-images/j5704efzvesesg3psz7b77vxjh8772sm/inline-2-1781354867906-ybe096.png)\nA modern outbound sequence orchestrates several touchpoints across days and channels to build familiarity before the ask:\n\n*   **Day 1:** Software views the prospect\u2019s LinkedIn profile.\n*   **Day 2:** Software likes a recent post.\n*   **Day 3:** Meaningful, AI-assisted comment left on their content.\n*   **Day 5:** Connection request sent (blank, or referencing the recent comment).\n*   **Day 6:** Welcome message acknowledging the connection, asking a soft discovery question (no pitch).\n*   **Day 8:** If no reply, the system scrapes their corporate email and sends a highly personalized cold email referencing the LinkedIn connection.\n\nThis workflow requires a white label platform capable of complex if/then branching and native email integrations. \n\n### 7. Set Realistic Client Expectations Early\n\nClients often expect to sign an agency contract on Friday and have a calendar full of booked meetings by Monday. If you allow this expectation to persist, you will face high churn by month two.\n\nYou must educate your clients on the \"ramp-up\" phase of LinkedIn lead generation. A cold, inactive LinkedIn account cannot suddenly send 50 connection requests a day. It will trigger a restriction.\n\nSet a 90-day roadmap:\n*   **Month 1:** Profile optimization, audience building, and account warming (sending 5-10 targeted requests a day). Success metric: Connection acceptance rate.\n*   **Month 2:** Scaling volume to 20-30 daily requests, initiating conversations, gathering data on which messaging angles work. Success metric: Reply rate.\n*   **Month 3:** Fully scaled campaigns, consistent pipeline generation. Success metric: Booked discovery calls.\n\n### 8. Monitor Account Health and Imposed Limits\n\nLinkedIn enforces strict, evolving limits on user activity to combat spam. Currently, most accounts are capped at around 100 to 200 connection requests per week, depending on the account's historical activity and acceptance rate.\n\nYour agency needs a dedicated operations manager whose sole job is monitoring the \"Account Health\" dashboard across all your white-labeled instances. \n\n![Inline visual 3](https://assets.bevisible.app/inline-images/j5704efzvesesg3psz7b77vxjh8772sm/inline-3-1781354884361-utb48d.png)\nKey metrics to track daily:\n*   **Pending Connection Requests:** If a client has more than 500-800 pending, unanswered connection requests, LinkedIn may shadowban them. Your software must automatically withdraw old requests after 14-30 days.\n*   **Acceptance Rate:** If campaigns dip below a 20% acceptance rate, pause them. This signals to LinkedIn that the user is spamming irrelevant people.\n*   **Response Rate:** Low response rates often mean the initial message is too aggressive. Pivot to a softer, conversational ask.\n\n### 9. Diversify with White Label LinkedIn Ads\n\nWhile organic outbound automation is powerful, combining it with paid media creates an inescapable presence for your clients. Many agencies expand their offerings by utilizing [white label LinkedIn ads](https://www.clickx.io/white-label-linkedin-ads) through specialized fulfillment partners.\n\nRunning LinkedIn Ads allows you to retarget the exact prospects your automation tool is messaging. If a prospect receives a connection request from your client, and then sees a sponsored content ad from your client's company in their feed later that afternoon, the perceived authority skyrockets.\n\nTo understand how to allocate budget between paid and organic efforts, review the breakdown in [LinkedIn Lead Gen Ads vs. AI Comments (What Works Best?)](https://heyjunior.ai/blog/linkedin-lead-generation-ads).\n\n## Top White Label LinkedIn Lead Generation Tools in 2026\n\nIf you are ready to select a foundational platform for your agency, the market offers several robust options. Evaluating the [best white label LinkedIn lead gen services](https://www.salesrobot.co/blogs/best-whitelabel-linkedin-lead-generation-services) requires looking past the marketing fluff and testing the actual user experience.\n\nHere are some of the dominant players in the space:\n\n### SalesRobot\nSalesRobot is widely recognized for its robust agency features and heavy emphasis on avoiding LinkedIn's spam detection. They offer a comprehensive [white label LinkedIn lead generation](https://www.salesrobot.co/blogs/best-whitelabel-linkedin-lead-generation-services) tier that allows agencies to set up a custom domain, rebrand the interface entirely, and manage unlimited client accounts from a single unified inbox. Their standout feature is their dynamic campaign sequences that auto-adjust daily limits based on the specific health of the client\u2019s LinkedIn account, significantly reducing restriction risks.\n\n### Skylead\nSkylead is a heavy hitter for agencies running complex, multi-channel outreach. According to their breakdown of [white label LinkedIn lead generation tools](https://skylead.io/blog/white-label-linkedin-lead-generation/), they specialize in combining LinkedIn automation with unlimited email outreach in the same sequence. Skylead's visual campaign builder is highly intuitive, making it easy to show clients exactly how their funnel is structured during reporting calls. Their agency pricing is usually a flat fee per seat, giving you predictable margins.\n\n### Meet Alfred\nMeet Alfred has been a long-standing tool in the automation space and offers a [fully customizable white label solution](https://meetalfred.com/features/white-label). It\u2019s designed for simplicity and ease of use, making it a great option if you intend to give your clients direct login access to the dashboard. Meet Alfred excels at scheduling standard LinkedIn posts alongside outbound campaigns, allowing agencies to offer a hybrid content-plus-outbound service. \n\n*Note: If you are looking for an expanded list of tools, check out our roundup of [7 LinkedIn Automation Tools for Lead Generation (2026)](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation).*\n\n### Cleverly (Managed Service Example)\nIf you prefer not to touch the software at all, companies like Cleverly offer white label managed services. They write the copy, build the target lists in Sales Navigator, and run the campaigns using their proprietary infrastructure. You pay them a wholesale rate per client, charge your client a retail rate, and simply pass the generated leads along. \n\n## The Limitations of Traditional White Label Automation (And How to Fix It)\n\nWhile white labeling existing SaaS tools is an excellent way to scale an agency quickly, the industry is currently facing a massive hurdle: **Buyer fatigue.**\n\nMost cloud-based automation tools operate on a rigid template system. They scrape a profile for a first name and a company, resulting in messages like:\n\n> *\"Hi [First Name], I see you work in [Industry] at [Company]. We help [Industry] companies achieve [Result]. Do you have 15 minutes to chat?\"*\n\nDecision-makers on LinkedIn receive dozens of these exact templates every single day. Even if you use a high-end white label tool, if your underlying strategy relies on these outdated templates, your clients will see diminishing returns.\n\nFurthermore, the reliance on remote cloud proxies by many white-label platforms introduces persistent security risks. A client logging into their LinkedIn app from their phone in New York, while your cloud automation tool simultaneously performs actions from an IP address in AWS Virginia, creates a geolocation mismatch that frequently triggers account lockouts.\n\n### The Conversation-First Solution\n\nTo future-proof your agency's lead generation efforts, you must transition away from generic cold DMs and towards a strategy rooted in authentic interaction.\n\nPlatforms designed to run locally\u2014directly on the user\u2019s machine\u2014eliminate the geolocation mismatch that plagues cloud tools. More importantly, tools that leverage human-first AI to generate high-quality, contextual comments on target prospects' posts create genuine professional relationships. \n\nBy helping your clients warm up outbound leads through meaningful conversation rather than spamming inboxes, you protect their professional reputation. They become seen as industry authorities actively participating in their niche, which naturally drives inbound profile views, connection requests, and sales pipeline.\n\nFor a deep dive into safely implementing AI for these types of authentic workflows, explore [How to Scale LinkedIn Lead Generation with AI (Safely)](https://heyjunior.ai/blog/linkedin-lead-generation-ai).\n\n## Frequently Asked Questions (FAQs)\n\n### Should you choose a white label LinkedIn lead generation service or a product?\nIt depends entirely on your agency's internal resources. If you have skilled copywriters, SDRs (Sales Development Representatives), and strategists on payroll, choosing a product (SaaS) allows you to maintain quality control and achieve much higher profit margins. If you are a solo founder or run an agency focused entirely on other channels (like SEO or web design) and just want an upsell to offer clients, a managed service is safer as it requires no internal operational lift.\n\n### What are the risks or limitations of using white label solutions?\nThe primary risk is account security. If the underlying software vendor experiences a security vulnerability or their proxy network gets flagged by LinkedIn, all of your client accounts could be restricted simultaneously. The second limitation is feature dependency. If your clients request a specific integration or feature, you are entirely at the mercy of the third-party vendor\u2019s product roadmap. You cannot push custom updates.\n\n### How much margin should I make on a white label client?\nIndustry standard for high-ticket lead generation agencies is a 70% to 80% gross margin on the service. If the software seat costs you $80 a month, and you spend $200 a month on internal labor (inbox management, list building), your cost of goods sold is $280. You should be charging the client a minimum of $1,000 to $1,500 per month for the fully managed service. \n\n### Are there any industry-specific recommendations for white label LinkedIn solutions?\nAgencies targeting highly technical or regulated industries (like healthcare, legal, or enterprise software) should prioritize white-label vendors that offer highly granular campaign limits and mandatory manual-approval workflows. In these niches, sending a poorly automated message can cause significant reputational damage. In contrast, agencies targeting broad B2B services (like digital marketing or SaaS) can leverage higher-volume tools more safely. To explore proven tactics across different verticals, read [9 Proven Ways for Lead Generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin).\n\n***\n\nScaling an agency requires detaching your revenue from your direct labor. White label LinkedIn lead generation tools provide the necessary leverage to handle dozens of clients without breaking your operational systems. By selecting a vendor that prioritizes safety, building standardized onboarding protocols, and transitioning from spammy templates to conversation-first engagement, you can build a highly profitable, sustainable lead generation machine.", "created_at": "2026-06-16T12:49:24.805328+00:00", "updated_at": "2026-06-16T12:49:24.805334+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
