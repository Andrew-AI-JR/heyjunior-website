    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 29, "slug": "best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow", "title": "Best AI Tools for Linkedin Commenting Tools Beyond Supergrow", "excerpt": "Discover the best AI tools for LinkedIn commenting. Compare alternatives to Supergrow, including local automation options to safely scale authentic conversations.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57dvvb20c6j1zhqgmjcz06yf18998qz/best-ai-tools-for-linkedin-commenting-tools-beyond-1782395361970-4n9epr.png", "published_at": "2026-06-25T13:00:00+00:00", "content": "# Best AI Tools for Linkedin Commenting Tools Beyond Supergrow\n\nScroll through any popular LinkedIn post today, and you will immediately spot the automation casualties. They sit in the comment section, glaringly obvious: \"Great insights! Thanks for sharing this valuable perspective.\" Or worse, the out-of-context rocket ship emoji attached to a post about a company layoff.\n\nThe initial wave of AI commenting tools treated LinkedIn like a volume game. The logic was simple: comment on 100 posts a day, trigger 100 notifications, and wait for the inbound profile views. But as algorithms have evolved and user fatigue has set in, generic engagement no longer converts. B2B buyers, founders, and recruiters simply tune it out.\n\nToday, the most successful sales teams, agencies, and job seekers have realized that commenting is not a megaphone\u2014it is a scalpel. When done correctly, a highly contextual, thoughtful comment bypasses crowded InMails and turns public visibility into direct interviews, pipeline, and client conversations. \n\nWhile platforms like [Supergrow](https://www.supergrow.ai/blog/ai-tools-for-linkedin) have popularized AI content generation and baseline commenting, a new generation of sophisticated alternatives has emerged. These tools focus on behavioral safety, profound contextual awareness, and seamless workflow integration. Here is a comprehensive evaluation of the best AI tools for LinkedIn commenting beyond the standard options, and how to use them to drive actual revenue instead of empty impressions.\n\n## The ROI of Strategic Commenting in 2026\n\nBefore evaluating the software, we need to establish why commenting has superseded posting as the primary growth lever for many LinkedIn professionals.\n\nCreating original content requires significant effort, and organic reach is constantly shifting based on algorithm updates. However, participating in the comments of industry leaders\u2014often referred to as \"newsjacking\" or \"audience borrowing\"\u2014allows you to place your expertise directly in front of thousands of highly targeted readers without having to build that audience from scratch.\n\nWhen an AI tool helps you execute this strategy effectively, the conversion funnel looks like this:\n\n1.  **The Trigger**: A target prospect or industry influencer publishes a post.\n2.  **The Action**: Your tool analyzes the post context, references your unique bio, and drafts a human-sounding addition to the conversation.\n3.  **The Visibility**: The post author and their followers read your comment. Because it adds real value (e.g., a contrarian viewpoint or a specific data point), it gets upvoted to the top of the thread.\n4.  **The Conversion**: Readers click your profile, read your headline, and send an inbound connection request or direct message.\n\n![Diagram showing the conversion funnel from a strategic LinkedIn comment to a booked meeting](https://assets.bevisible.app/inline-images/j57dvvb20c6j1zhqgmjcz06yf18998qz/inline-1-1782395265058-ta6csa.png)\nTo achieve this, the AI cannot simply summarize the original post. It must understand nuance, tone, and your specific professional background. It also must execute these actions safely, without triggering LinkedIn's stringent automation flags.\n\n## Evaluating the Top AI Commenting Tools for LinkedIn\n\nThe market is currently split into two distinct philosophies: cloud-based volume tools and localized context tools. We evaluate these platforms across four critical criteria:\n\n*   **Contextual Quality**: Does the AI sound like a human practitioner, or does it sound like a language model regurgitating bullet points?\n*   **Account Safety**: Does the tool run in the cloud (high risk) or locally on your machine (low risk)?\n*   **Workflow Integration**: How easily does it fit into a daily sales or job-hunting routine?\n*   **Audience Targeting**: Can the tool actively find the right posts to comment on, or do you have to feed it manually?\n\nHere are the top alternatives to the standard all-in-one suites.\n\n### 1. Junior: The Local, Authentic Approach\n\nJunior represents a significant departure from traditional cloud-based LinkedIn automation. Designed specifically to start authentic conversations rather than blast generic spam, Junior operates on a philosophy of deep personalization and account security.\n\nUnlike traditional cloud-based connection tools that log into your account from a remote server\u2014a major red flag for LinkedIn's security systems\u2014Junior runs locally on the user's machine. It uses natural interaction patterns, effectively mirroring how a real human browses the platform. \n\n**Key Strengths:**\n*   **Bio-Driven Context**: Junior drafts context-aware replies based on the user's unique goals, bio, and specific value proposition. If you are a SaaS founder targeting marketing agencies, the AI frames its responses through that specific lens.\n*   **Local Execution**: Because it runs natively on your machine, it avoids the IP mismatches and headless browser footprints that frequently lead to account restrictions.\n*   **Targeted Discovery**: Instead of just providing a text box for generation, Junior actively finds relevant discussions in your niche, acting as a pipeline generator for sales teams, consultants, and job seekers.\n\n**Best For**: Professionals who value their LinkedIn account safety above all else and need their comments to sound indistinguishable from manual, thoughtful replies.\n\n### 2. Engage AI: The Browser Extension Powerhouse\n\nFor users who prefer to navigate the feed manually but want assistance when it is time to write, [Engage AI](https://new.engage-ai.co/) is a prominent player. It operates primarily as a Chrome extension, integrating directly into the LinkedIn user interface.\n\n**Key Strengths:**\n*   **In-Feed Generation**: You do not have to leave LinkedIn to use it. The tool overlays onto the standard comment box, allowing you to select different tones (e.g., friendly, funny, contrarian) before generating text.\n*   **Prospect Monitoring**: Engage AI includes a dashboard to monitor specific prospects, aggregating their latest posts into a single view so you can be the first to comment.\n*   **Speed**: It significantly reduces the time it takes to leave 20-30 meaningful comments per day.\n\n**Limitations**: Because it relies on the user to manually trigger the extension post-by-post, it is less automated than full-platform solutions. The tone selections can sometimes veer into slightly exaggerated personas if not edited carefully.\n\n**Best For**: Sales Development Reps (SDRs) who have a strict list of 50 named accounts and want to engage with those specific decision-makers daily.\n\n### 3. PowerIn: The Social Scaling Tool\n\n[PowerIn](https://www.powerin.io/) takes a more aggressive approach to social scaling, offering automated commenting across both LinkedIn and X (formerly Twitter). It is built for users who want to maximize their impression share and stay constantly visible in their network's feeds.\n\n**Key Strengths:**\n*   **Multi-Platform**: The ability to synchronize engagement strategies across LinkedIn and X is highly valuable for personal branding.\n*   **Auto-Commenting**: PowerIn allows for a higher degree of automation, letting users set parameters for auto-commenting on specific types of posts or targeted creator accounts.\n*   **Scale**: It is designed to handle high-volume engagement campaigns.\n\n**Limitations**: Fully automated, zero-touch commenting carries inherent risks. If the AI misinterprets the sentiment of a deeply personal or tragic post, an auto-comment can cause significant brand damage.\n\n**Best For**: High-growth founders and marketers who are prioritizing maximum visibility and are willing to manage the risks of high-volume automation.\n\n### 4. Simular: The Behavioral Automator\n\n[Simular](https://www.simular.ai/use-cases/linkedin-auto-comment) approaches the space with a focus on mimicking human behavior to avoid detection. They position themselves as a safer alternative to aggressive scraping tools.\n\n**Key Strengths:**\n*   **Anti-Flagging Mechanisms**: Simular heavily emphasizes its ability to automate comments without triggering LinkedIn's spam filters, utilizing careful pacing and behavioral mimicry.\n*   **Workflow Customization**: It provides robust settings for exactly how and when comments should be deployed, preventing the \"burst\" behavior that often catches the algorithm's attention.\n\n**Limitations**: The setup curve can be steeper than simple browser extensions, requiring a deeper understanding of automation rules.\n\n**Best For**: Operations managers and lead gen agencies running multiple accounts who need granular control over pacing.\n\n### 5. Commenter AI: The Niche Generator\n\nFocused strictly on the text generation aspect, [Commenter AI](https://blog.commenter.ai/5-best-ai-commenting-tools-for-linkedin/) acts as an intelligent drafting assistant. \n\n**Key Strengths:**\n*   **Prompt Quality**: It uses well-tuned underlying prompts to ensure comments add value rather than just summarizing the post.\n*   **Simplicity**: A straightforward, uncluttered interface dedicated entirely to one task.\n\n**Limitations**: Lacks the broader discovery and pipeline management features found in more comprehensive tools. It is a utility rather than an end-to-end system.\n\n**Best For**: Occasional users, job seekers, or consultants who just want to overcome writer's block when engaging with industry news.\n\n### 6. The Baseline: Supergrow\n\nWe must acknowledge Supergrow as the benchmark many users start with. As an all-in-one platform for content scheduling, carousel creation, and basic CRM features, it includes a commenting module.\n\n**Why Users Outgrow It**: Supergrow is excellent for scheduling posts, but its commenting features are often a secondary function. Professionals who rely heavily on outbound engagement usually find they need deeper personalization, local execution safety, or more sophisticated prospect monitoring than a generalized all-in-one tool provides. When your primary lead generation motion is engagement rather than inbound content, specialized tools like Junior or Engage AI perform better.\n\n![Comparison matrix of the best AI commenting tools evaluating safety, context, and use cases](https://assets.bevisible.app/inline-images/j57dvvb20c6j1zhqgmjcz06yf18998qz/inline-2-1782395268418-ovre05.png)\n## The Technical Divide: Cloud vs. Local Automation\n\nWhen selecting an AI commenting tool, the most critical decision is not the quality of the AI model\u2014most tools utilize variations of GPT-4 or Claude 3. The true differentiator is the execution architecture. Understanding the difference between cloud-based and local automation is the key to protecting your LinkedIn account.\n\n### The Danger of Cloud-Based Automation\n\nCloud-based tools require you to hand over your LinkedIn session cookies or login credentials. The software then logs into your account from an external server\u2014often an AWS data center in a completely different geographic location from where you normally browse.\n\nLinkedIn's security systems easily detect this. If you check your feed from a residential IP in Chicago at 9:00 AM, and a cloud-based tool leaves a comment from an AWS server in Virginia at 9:02 AM, the platform recognizes the physical impossibility. \n\nFurthermore, cloud tools often use headless browsers (browsers running without a graphical user interface) or unofficial API endpoints to act quickly. LinkedIn's advanced bot detection flags these non-human interaction patterns, leading to:\n\n*   **Shadowbans**: Your comments are published but hidden from the wider network.\n*   **Verification Loops**: Constant demands to solve CAPTCHAs or verify your identity with government ID.\n*   **Permanent Bans**: Total loss of the account.\n\n### The Safety of Local Execution\n\nLocal tools, such as Junior, operate natively on your own machine. They do not log in from remote servers; they utilize your existing, active Chrome session. \n\nFrom LinkedIn's perspective, the activity is coming from your exact IP address, your specific device fingerprint, and your standard browser. The tool moves the cursor, clicks the comment box, and types with human-like delays. \n\n![Architectural diagram showing why local LinkedIn automation is safer than cloud-based tools](https://assets.bevisible.app/inline-images/j57dvvb20c6j1zhqgmjcz06yf18998qz/inline-3-1782395272317-a9aw1u.png)\nThis architectural difference cannot be overstated. If you are a founder or a sales leader, your LinkedIn account is a primary business asset. Risking it on cloud-based mass-commenting is mathematically unsound when local, safe alternatives exist.\n\n## A Framework for Strategic Commenting: The 4-T Method\n\nHaving the right tool is only half the equation. You must also configure the tool to execute a winning strategy. Relying on default settings often results in a bland, \"corporate-speak\" tone.\n\nTo train your AI commenting tool\u2014and yourself\u2014to generate leads, implement the 4-T Method:\n\n### 1. Target (Who are you commenting on?)\nYour engagement efforts should be split into three distinct tiers:\n*   **Tier 1: Industry Whales (20%)**. Thought leaders with 50k+ followers. You comment here for maximum visibility. You are not trying to sell to the author; you are advertising your expertise to their audience.\n*   **Tier 2: Ideal Customer Profiles (ICPs) (60%)**. The actual decision-makers you want to book meetings with. VPs of Sales, CTOs, or HR Directors. Commenting here builds familiarity before you send a DM.\n*   **Tier 3: Peers and Partners (20%)**. People at your level in adjacent industries. This builds a referral network and signals community involvement.\n\n### 2. Timing (When do you strike?)\nThe algorithm heavily weights early engagement. A brilliant comment left 24 hours after a post goes live is essentially invisible. A good tool will monitor your Tier 1 and Tier 2 targets and alert you the moment they post. Aim to be within the first 10 comments on high-traffic posts.\n\n### 3. Tone (How do you sound?)\nConfigure your AI tool with strict custom instructions. A strong prompt structure for your AI configuration should look like this:\n\n> *\"You are a highly experienced [Your Role] with a background in [Your Industry]. Your tone is direct, professional, and slightly conversational. Never use emojis. Never use the words 'game-changer', 'delve', or 'crucial'. When drafting a comment, either provide a specific, real-world example supporting the author's point, or politely disagree by offering an edge-case scenario where their advice might not apply. Keep it under 3 sentences.\"*\n\n### 4. Transition (How do you move to pipeline?)\nThe goal of commenting is to transition the conversation privately. \n\n**The Workflow:**\n1. You leave a highly contextual AI-assisted comment on a prospect's post.\n2. The prospect replies to your comment.\n3. You immediately send a connection request. *Do not pitch in the request.* Use a simple note: *\"Loved your point on [Topic] in the comments today. Wanted to follow your content more closely.\"*\n4. Once accepted, wait 48 hours, then transition to a soft ask based on the exact topic you discussed publicly.\n\n## Handling Edge Cases and Automation Fails\n\nEven with the best local execution and the smartest AI models, fully zero-touch automation on a social platform is dangerous. LinkedIn is fundamentally a human network, and humans frequently post about sensitive topics.\n\nIf you automate the final publication step without a human review, you risk catastrophic brand damage. Consider these common failure modes:\n\n*   **The Layoff Post**: A prospect posts about letting go of 20% of their staff. An unmonitored AI reads the high engagement metrics and posts: *\"Fascinating insights into operational efficiency! Looking forward to seeing how you scale next.\"*\n*   **The Personal Tragedy**: An influencer posts about a health struggle or losing a family member. The AI, optimized for B2B banter, replies with standard corporate encouragement that reads as deeply offensive.\n*   **The Polarizing Debate**: A post takes a controversial political or social stance. Your AI jumps in, inadvertently aligning your personal brand with a highly polarizing issue.\n\n**The Solution: Human-in-the-Loop Generation**\n\nThe most effective workflow is heavily assisted, not entirely automated. Use your tools to scrape the targets, analyze the context, and draft the responses. But always require a physical button click to approve and post. It takes less than two seconds to read an AI-generated comment and hit \"approve,\" but that two-second friction prevents 100% of automation disasters.\n\n## Frequently Asked Questions (FAQ)\n\n### Can LinkedIn detect AI-generated comments?\nLinkedIn cannot definitively detect the text generated by high-end models like GPT-4, especially if it is constrained by good prompting to avoid generic AI vocabulary. What LinkedIn *can* detect is the method of delivery. If the comment is posted via an unauthorized API or a remote server, they will flag the account. If the text is generated, copied, and pasted via a local tool mimicking human typing speed, it is functionally invisible to detection systems.\n\n### How many comments should I leave per day for lead generation?\nVolume should not exceed natural human limits. Aiming for 20 to 30 highly contextual comments per day across your ICP and industry leaders is the sweet spot. Anything beyond 50 comments per day begins to look like bot activity, regardless of how good the text is.\n\n### Does commenting actually drive more profile views than posting?\nFor users with fewer than 5,000 followers, yes. Leveraging the audience of established creators through top-tier comments almost always yields higher immediate profile traffic than publishing original posts to a small, quiet network.\n\n## The Shift to Contextual Engagement\n\nThe era of growth-hacking LinkedIn with thoughtless, automated \"Great post!\" replies is permanently over. Buyers are too smart, and the algorithms are too strict.\n\nTransitioning to sophisticated AI commenting tools is no longer about finding ways to spam faster; it is about finding ways to be relevant at scale. Whether you choose a browser extension like Engage AI to manually assist your SDR team, or a deeply integrated local solution like Junior to safely automate your conversational pipeline, the priority must be authenticity and account safety.\n\nStop trying to out-shout your competitors in the feed. Instead, let your AI help you become the most insightful person in the comment section. That is where the actual business is being won.```", "created_at": "2026-06-25T13:49:24.073432+00:00", "updated_at": "2026-06-25T13:49:24.073439+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
