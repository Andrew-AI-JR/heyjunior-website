    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 27, "slug": "how-to-use-ai-for-job-search", "title": "How to Use AI for Job Search (And Get Hired Faster)", "excerpt": "Learn how to use AI for your job search to land interviews faster. Discover proven prompts for resumes, interview prep, and LinkedIn networking strategies.", "featured_image_url": "https://assets.bevisible.app/featured-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/how-to-use-ai-for-job-search-and-get-hired-faster-1781529597835-g41bfs.png", "published_at": "2026-06-18T13:03:00+00:00", "content": "# How to Use AI for Job Search (And Get Hired Faster)\n\nThe modern job search is broken, and ironically, AI broke it. When thousands of candidates use automation to blindly fire off 500 generic applications a day, applicant tracking systems (ATS) become clogged. Recruiters, overwhelmed by the noise, deploy their own AI filters to screen out the AI-generated spam. It becomes a bot-versus-bot arms race, and the human candidate is caught in the crossfire.\n\nIf your strategy for using AI in your job search consists of clicking an \"auto-apply\" button or copying and pasting unedited ChatGPT cover letters, you are competing in a lottery with terrible odds.\n\nBut there is another way. When you shift your perspective from using AI for *volume* to using AI for *value*\u2014research, precision targeting, interview preparation, and relationship building\u2014you bypass the clogged application pipelines entirely. In fact, many candidates who [actually get hired using AI in their job search](https://www.reddit.com/r/jobsearchhacks/comments/1l8ygsk/anyone_actually_get_hired_using_ai_in_their_job/) are doing so by leveraging it to build real human connections and prepare meticulously, not by automating the click of a submit button.\n\nThis guide breaks down exactly how to use AI strategically across every phase of your job hunt, from exploring new career paths to negotiating your final offer, so you can land your next role faster and with less frustration.\n\n## The Trap of the AI Auto-Apply (And What to Do Instead)\n\nLet\u2019s address the elephant in the room. Tools that offer to \"apply to 1,000 jobs for you while you sleep\" sound incredibly appealing when you are exhausted from job hunting. \n\nHowever, [how to actually use AI in your job search without hurting your chances](https://www.linkedin.com/pulse/how-actually-use-ai-your-job-search-without-hurting-chances-seaman-jl7ie) comes down to understanding recruiter behavior. When a recruiter receives a massive influx of generic applications, they don't read them. They rely heavily on referrals, direct outreach, and candidates who have engaged with them organically.\n\nInstead of automating the submission of a mediocre resume to a thousand companies, use AI to:\n\n1.  **Identify 20 high-fit companies** that align perfectly with your skills.\n2.  **Tailor your resume** to speak directly to the specific problems those companies are trying to solve.\n3.  **Engage authentically** with decision-makers at those companies on LinkedIn.\n4.  **Prepare ruthlessly** for the specific interview rounds you will face.\n\n![Inline visual 1](https://assets.bevisible.app/inline-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/inline-1-1781529502797-iqvg96.png)\n## Step 1: Career Exploration and Target Lists\n\nBefore you write a single bullet point on your resume, you need a target. AI is exceptionally good at pattern matching, making it the perfect tool to analyze your fragmented background and suggest cohesive career paths or specific target companies.\n\n### Mapping Your Skills to Roles\n\nIf you are pivoting careers or unsure of your next step, large language models (LLMs) like ChatGPT or Claude can act as an objective career counselor. \n\n**The \"Skill Translation\" Prompt:**\nDo not ask the AI, \"What jobs can I do?\" The output will be generic. Instead, provide your raw experience and ask it to translate that into market-ready roles.\n\n> **Prompt:** *\"I am looking to pivot my career. My past experience includes [managing cross-functional projects, resolving escalated client disputes, and building training onboarding flows in Notion]. I do not have a technical degree. Act as an expert career strategist. Analyze these skills and suggest 5 specific, modern job titles where this background is a competitive advantage. For each title, explain exactly which of my skills translates to the core responsibilities of that role.\"*\n\n### Building a High-Signal Target List\n\nOnce you have your target titles, you need a list of target companies. Relying solely on job boards is a reactive strategy. A proactive strategy involves building a list of companies that match your values, growth requirements, and industry interests, and then targeting them whether they have a public job posting or not.\n\n**The \"Market Landscape\" Prompt:**\n> **Prompt:** *\"I am targeting roles as a [Customer Success Manager] in the [B2B SaaS / EdTech] space. Generate a list of 15 mid-sized companies (100-500 employees) in this space that have shown signs of growth (e.g., recent product launches, funding, or market expansion). Format the output as a table including Company Name, Core Product, Likely Competitors, and Why they might need a Customer Success Manager right now.\"*\n\nIf you want to complement this with a dedicated AI tool, platforms like [Jobright](https://jobright.ai/) serve as an AI job search copilot, helping you discover roles that match your highly specific criteria rather than forcing you to rely on traditional Boolean searches on job boards.\n\n## Step 2: Optimizing Resumes and Cover Letters for Humans (Not Just ATS)\n\nA common myth is that Applicant Tracking Systems (ATS) automatically reject resumes that lack specific keywords. In reality, most ATS platforms simply parse your document into a readable format for a human recruiter. \n\nThe goal of AI resume optimization isn't to trick a machine; it's to make the human recruiter's job as easy as possible. The [Office of Career Strategy at Yale](https://ocs.yale.edu/channels/using-ai-job-search/) emphasizes that while AI tools are excellent for brainstorming and formatting, your final documents must accurately reflect your genuine voice and capabilities.\n\n### The \"Resume Diagnostic\" Framework\n\nNever ask an AI to \"write my resume from scratch.\" It will invent metrics, use flowery language like \"spearheaded dynamic synergies,\" and strip away your unique professional identity.\n\nInstead, feed the AI the specific job description and your current resume, and ask for a gap analysis.\n\n**The Gap Analysis Prompt:**\n> **Prompt:** *\"You are a strict, senior technical recruiter. I am providing a job description for a [Senior Product Marketing Manager] role, followed by my current resume.\n> \n> Task 1: Identify the top 3 core competencies required by the job description.\n> Task 2: Point out exactly where my resume fails to demonstrate those competencies clearly.\n> Task 3: Suggest 4 specific rewrites for my existing bullet points to better align with the job's needs, using the STAR method (Situation, Task, Action, Result). Do not invent any metrics or experience; only use what is already in my resume.\"*\n\n### Drafting the \"Anti-Cover Letter\"\n\nMost cover letters are ignored because they are boring summaries of the attached resume. A good cover letter is a targeted business proposal. It states: \"I see your company is struggling with X. I have solved X before using Y method. Here is how I would approach it for you.\"\n\nUse AI to analyze a company's recent news, blog posts, or public earnings transcripts to identify their current challenges, then draft a cover letter that addresses those challenges directly.\n\n![Inline visual 2](https://assets.bevisible.app/inline-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/inline-2-1781529499292-ytuqgl.png)\n## Step 3: Leveraging LinkedIn Engagement to Skip the Line\n\nThis is where the most successful candidates differentiate themselves. If applying on a company website is the \"front door\" (where the line is around the block), networking on LinkedIn is the \"side door.\"\n\nJob hunting is fundamentally B2B sales, where you are the product and your labor is the service. Because of this, you should adopt a [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) to build your pipeline of interviews.\n\n### The Problem with Cold DMs\n\nSending connection requests with notes like, *\"Hi [Name], I saw your company is hiring and I'd love to pick your brain for 15 minutes\"* rarely works anymore. Hiring managers are inundated with these messages. It feels like spam.\n\nInstead of demanding time and attention in a direct message, you need to earn it in the public feed. This is the core of a conversation-first strategy.\n\n### The Engagement-First Networking Funnel\n\nThe goal is to become a familiar, respected name to the hiring manager before you ever ask for a favor. You do this through intelligent, consistent commenting on their LinkedIn posts. \n\n1.  **Identify Decision Makers:** Find the VP, Director, or Team Lead of the department you want to join at your target companies.\n2.  **Monitor Their Content:** Watch for when they post about industry trends, company milestones, or professional challenges.\n3.  **Leave High-Value Comments:** Do not comment \"Great post!\" Leave a comment that adds a new perspective, asks a smart follow-up question, or shares a relevant micro-case study from your own experience.\n\n### Using AI for Authentic LinkedIn Engagement\n\nConsistently monitoring target accounts and drafting thoughtful comments takes hours\u2014which is why most job seekers give up and go back to blindly applying. This is exactly where AI can shoulder the heavy lifting, provided it is used correctly.\n\nTools like **Junior** are built specifically to handle this workflow safely and authentically. Unlike generic [linkedin automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) that spam cloud-based connection requests and risk getting your account restricted, Junior operates locally on your machine.\n\nMore importantly, Junior utilizes a human-first approach to AI generation. You input your specific background, networking goals, and unique voice. The AI then monitors the posts of your target hiring managers and drafts highly personalized, contextual comments. It doesn't sound like a bot; it sounds like you, on your smartest day, reacting to industry news.\n\nBy systematically leaving these thoughtful comments, you [triple your LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate) and build familiarity with decision-makers. \n\nWhen you finally send that connection request\u2014or when you inevitably apply for the open role\u2014you aren't a stranger. You are the insightful professional who has been adding value to their discussions for the past three weeks. This is one of the most effective [LinkedIn AI job search hacks for more interviews](https://heyjunior.ai/blog/linkedin-ai-job-search) available today.\n\n![Inline visual 3](https://assets.bevisible.app/inline-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/inline-3-1781529494115-233vpb.png)\n### Transitioning to the Informational Interview\n\nOnce a hiring manager has replied to a few of your comments and accepted your connection request, you have earned the right to reach out.\n\nKeep the transition low-friction. \n\n> *\"Hi Sarah, really enjoyed our back-and-forth on your post about product-led growth last week. I'm currently exploring new opportunities in the PLG space and have admired [Company]'s recent feature rollout. Are you open to a brief 15-minute chat next Tuesday? I'd love to ask two specific questions about your team's approach to user onboarding.\"*\n\nThis approach builds a [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) for your career. You are warming up outbound leads (hiring managers) without the stigma of cold DM spam.\n\n## Step 4: AI for Interview Preparation\n\nIf you land the interview, AI becomes your ultimate sparring partner. Traditional interview prep involves staring at a list of \"Top 50 Behavioral Questions\" and practicing in the mirror. AI allows for dynamic, context-specific simulation.\n\n### Generating the Question Bank\n\nEvery interview is essentially a test of how well you can solve the specific problems outlined in the job description. \n\n**The Reverse-Engineering Prompt:**\n> **Prompt:** *\"I am interviewing for the [Director of Operations] role at [Company Name]. Here is the job description: [Insert JD]. Based on these requirements, generate the 10 most difficult interview questions I am likely to face. Mix technical operations questions, behavioral questions using the STAR method, and strategic questions related to scaling a mid-size team. For each question, tell me what underlying trait or skill the interviewer is actually trying to uncover.\"*\n\n### Live Mock Interviews with Voice AI\n\nIf you are using the ChatGPT mobile app (or similar tools with advanced voice mode), you can conduct real-time mock interviews. This is significantly more effective than typing, as it forces you to think on your feet, manage your pacing, and refine your verbal delivery.\n\n**The Voice Simulator Prompt:**\n> **Prompt:** *\"We are going to conduct a mock interview. You are the VP of Engineering at a fast-growing fintech startup. I am interviewing for the Senior Developer role. Ask me one question at a time. Wait for my response. After I answer, do not break character. Ask a natural follow-up question based on what I just said. We will do this for 5 questions total. After the 5th question, drop character and give me highly critical feedback on my clarity, conciseness, and the structural quality of my answers.\"*\n\nInitiate voice mode, read the prompt aloud, and begin the simulation. \n\nInstitutions are increasingly recognizing the value of these simulations. For instance, [Accelerating Your Job Search with AI](https://grow.google/job-search-with-ai/) by Grow with Google highlights how leveraging AI for continuous learning and preparation can drastically shorten the time it takes to secure a new role.\n\n![Inline visual 4](https://assets.bevisible.app/inline-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/inline-4-1781529495840-oof7sf.png)\n## Step 5: Negotiating Your Offer with AI\n\nCongratulations, you received an offer. But the job search isn't over until the contract is signed, and many candidates leave thousands of dollars on the table because they are too nervous to negotiate.\n\nAI can remove the emotion from the negotiation process, providing you with objective data analysis and scripts tailored to your specific situation.\n\n### Analyzing the Offer\n\nFirst, understand the total compensation package. Base salary is only one lever. You can negotiate sign-on bonuses, equity, remote work days, professional development stipends, and severance terms.\n\nIf you are evaluating equity options, you can use AI to model potential outcomes:\n*\"I have been offered 10,000 options at a strike price of $2.00. The company's current valuation is $50M with 10M shares outstanding. If the company exits at $200M in four years, explain how much my equity would roughly be worth, accounting for standard dilution.\"*\n\n### Drafting the Negotiation Script\n\nNever accept an offer on the first call. Express gratitude, ask for the offer in writing, and establish a timeline to respond. Then, use AI to help draft your counter-offer.\n\n**The Counter-Offer Prompt:**\n> **Prompt:** *\"I received a job offer for [Title]. The base salary is $110,000. My market research indicates the range for this role in [City] is $120,000 to $135,000. I want to counter at $125,000 and ask for an extra week of PTO, but I want to ensure my tone is collaborative, appreciative, and firm, not demanding. Write a short email to the recruiter proposing this counter-offer, emphasizing the unique [specific skill] I bring to the team to justify the request.\"*\n\n## The Best AI Tools for Job Seekers in 2026\n\nThe landscape of AI tools is vast, but you only need a few core platforms in your tech stack to execute this strategy effectively.\n\n1.  **The Foundational LLMs (ChatGPT / Claude):** These are your daily drivers for career mapping, resume analysis, and interview simulations. Claude is often preferred for writing and analyzing long documents (like parsing through heavy job descriptions), while ChatGPT's voice mode is unrivaled for mock interviews.\n2.  **Junior:** Essential for the hidden job market. Junior automates the discovery of relevant LinkedIn posts and generates authentic, human-sounding comments based on your specific background. It helps you execute [lead generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin) safely, building the necessary relationships that lead to referrals and fast-tracked interviews. \n3.  **Jobright / AIApply:** If you do need to manage a higher volume of applications or want AI to assist in surfacing niche roles across the web, tools like Jobright act as solid search copilots. However, always prioritize tailoring your approach over blind mass-applying.\n\n## Important Considerations When Using AI Tools\n\nAs you integrate these systems into your workflow, the Minnesota Department of Employment and Economic Development advises candidates to [consider using AI as part of your job search](https://careerforce.mn.gov/careerforce-blog/consider-using-ai-part-your-job-search) but warns of several critical pitfalls.\n\n### 1. The Hallucination Risk\nAI will confidently lie to you. If you ask it to generate a resume bullet point, it might invent a statistic (e.g., \"Increased sales by 45%\"). If you leave this in your resume and are asked about it in an interview, your credibility will be destroyed instantly. Always verify and edit AI outputs. \n\n### 2. The \"AI Voice\" Detection\nRecruiters read hundreds of cover letters a week. They can easily spot the specific cadence, vocabulary, and structure of unedited ChatGPT text. Words like *delve, testament, dynamic, tapestry,* and *spearheaded* are massive red flags. The AI should write the *first* draft; you must write the *final* draft.\n\n### 3. Account Security and Safety\nWhen automating parts of your workflow, especially on platforms like LinkedIn, security is paramount. Many cloud-based automation tools log into your account from different IP addresses, triggering LinkedIn's security algorithms and risking permanent bans. \n\nWhen comparing tools\u2014for instance, [Meet Alfred vs Junior](https://heyjunior.ai/blog/meet-alfred)\u2014it's crucial to look at architecture. Junior runs securely on your local machine, utilizing natural interaction patterns and variable timing to mimic human behavior, ensuring your account remains safe while you build your network.\n\n![Inline visual 5](https://assets.bevisible.app/inline-images/j579rtjnp3etg6pm6bw1xq5nj98772zd/inline-5-1781529489461-ethwkp.png)\n## Frequently Asked Questions\n\n### Can recruiters tell if I use AI for my resume?\nIf you copy and paste directly from an LLM without editing, yes. Modern ATS platforms and recruiters do not penalize you for *using* AI to structure your thoughts, but they will reject you if the document reads like a generic template devoid of your actual human experience. Use AI for drafting and formatting, but ensure the final words are your own.\n\n### Are AI auto-apply bots safe to use?\nThey are generally \"safe\" in that they won't hack your computer, but they are highly ineffective as a standalone strategy. Mass-applying via bots often results in generic applications sent to poorly matched jobs. Furthermore, platforms are increasingly filtering out rapid-fire, bot-submitted applications. You are much better off using [how to scale LinkedIn lead generation with AI safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai) to network directly with hiring managers.\n\n### How do I use AI for LinkedIn outreach without getting flagged?\nThe key is avoiding high-volume, low-effort spam. Do not use AI to scrape emails and send 500 identical direct messages. Instead, use localized, secure tools like Junior to automate the *discovery* of relevant conversations and assist in drafting highly personalized *comments*. Engaging in public discussions organically is the safest and most effective way to build visibility.\n\n### Is paying for a premium AI tool worth it for a job search?\nIf you are actively searching, yes. Upgrading to the premium version of ChatGPT or Claude gives you access to better reasoning capabilities and larger context windows (meaning you can upload multiple resumes and job descriptions at once). Investing in a specialized tool for networking is also highly recommended, as it acts essentially as [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) for your personal career pipeline.\n\n## The Future of Job Searching is Human-First\n\nThe irony of AI in the job search is that the more automated the application process becomes, the more valuable genuine human connection is to the people hiring.\n\nIf you use AI to do exactly what everyone else is doing\u2014blasting generic resumes into the void\u2014you will blend into the noise. But if you use AI to research deeply, prepare thoroughly, and build authentic relationships on platforms like LinkedIn, you turn a frustrating numbers game into a highly targeted, highly successful campaign.\n\nTreat your job hunt like a strategic outbound campaign. Use the technology to elevate your insights, not to mask your absence. By prioritizing the conversation over the transaction, you'll not only secure more interviews\u2014you'll get hired faster.", "created_at": "2026-06-18T13:19:22.669549+00:00", "updated_at": "2026-06-18T13:19:22.669555+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
