    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 17, "slug": "linkedin-automation-tools-for-lead-generation", "title": "11 LinkedIn Automation Tools for Lead Generation", "excerpt": "Discover the 11 best LinkedIn automation tools for lead generation in 2026. Compare safety, pricing, and features for cold outreach and AI-driven engagement.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57fk4gjq7f5d4fn7k2qnpgnks877eq2/11-linkedin-automation-tools-for-lead-generation-1780667370256-148a6p.png", "published_at": "2026-06-08T13:37:00+00:00", "content": "# 11 LinkedIn Automation Tools for Lead Generation\n\nIf you have checked your LinkedIn inbox recently, you already know the problem: the \"connect-and-pitch\" strategy is dead. Buyers are exhausted by templated cold outreach, and LinkedIn's aggressive spam filters are restricting accounts faster than ever. \n\nFor years, lead generation on LinkedIn relied on a simple numbers game. You loaded up a list of prospects from Sales Navigator, pasted a generic template into a cloud automation tool, and blasted out 100 connection requests a day. Today, that approach yields abysmal acceptance rates, damages your professional reputation, and puts your account at severe risk of a permanent ban.\n\nThe highest-performing sales teams, lead generation agencies, and founders are shifting their strategies. Instead of relying purely on outbound direct messages, they are leveraging advanced software to automate *engagement*, warm up prospects through thoughtful interactions, and run highly targeted, multichannel sequences that mimic human behavior.\n\nChoosing the right [software for LinkedIn outreach](https://business.linkedin.com/advertise/partners/resources/lead-automation-on-linkedin) means navigating a minefield of cloud platforms, Chrome extensions, and local desktop applications. In this guide, we break down the 11 best LinkedIn automation tools for lead generation in 2026, categorized by their safety profiles, strategic focus, and ideal use cases.\n\n## Why Traditional LinkedIn Automation is Failing in 2026\n\nBefore diving into the tools, it is critical to understand why the landscape has shifted. \n\n1.  **Stricter Weekly Limits:** LinkedIn enforces strict limits on connection requests (often capping around 100-200 per week, depending on account warmth and Premium status). If an automation tool blindly maxes out this limit, your account is flagged.\n2.  **Advanced Bot Detection:** LinkedIn easily detects predictable patterns. If a tool sends a message exactly every 3.5 minutes, the algorithm knows it isn't human.\n3.  **The Rise of \"Inbound\" Social Selling:** Prospects respond to authority. Engaging with a prospect's content in their feed before sending a connection request drastically increases acceptance rates. Old-school tools ignore the feed and go straight to the inbox.\n\nTo survive, modern automation must be behaviorally unpredictable, run safely from a recognized IP address, and integrate seamlessly into a broader [linkedin lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy).\n\n## The 11 Best LinkedIn Automation Tools for Lead Generation\n\nHere is a detailed breakdown of the top tools available, categorized by how they operate and who they serve best.\n\n### 1. Junior\n\n**Best for:** AI-driven engagement, warming up outbound leads, and maintaining total account safety.\n\nWhile most tools focus on cramming as many automated DMs into your outbox as possible, Junior takes a completely different approach. Junior is an AI-driven platform designed to transform LinkedIn engagement into tangible business opportunities by automating the most time-consuming part of social selling: writing meaningful comments.\n\nInstead of spamming inboxes, Junior automates the process of finding highly relevant LinkedIn posts from your target prospects and generating high-quality, personalized comments that mirror your natural voice. By utilizing your specific bio and networking goals, the AI avoids template-based spam.\n\nCrucially, Junior runs directly on your local machine rather than in the cloud. This means LinkedIn sees your activity coming from your actual IP address and device, making it virtually immune to the account flagging associated with cloud-based server farms.\n\n**Key Features:**\n*   **Human-First AI Generation:** Crafts comments based on context, not generic \"Great post!\" templates.\n*   **Local Execution:** Runs natively on your machine to bypass cloud-detection algorithms.\n*   **Smart Post Prioritization:** Identifies the highest-leverage posts from decision-makers in your network.\n*   **Variable Timing Engine:** Interacts with natural, randomized timing patterns so behavior never looks robotic.\n*   **Performance Analytics:** Tracks response trends to see which engagement types yield the most profile views and inbound requests.\n\n**Pros:**\n*   Eliminates the stigma of cold DM spam.\n*   The safest operational model available (local execution).\n*   Perfect for founders and consultants building industry authority.\n*   Helps [triple your LinkedIn engagement rate fast](https://heyjunior.ai/blog/linkedin-engagement-rate) by staying highly active in the feed.\n\n**Cons:**\n*   Not designed for volume-based cold email scraping.\n*   Requires your computer to be on during operation.\n\n### 2. Expandi\n\n**Best for:** Advanced cloud sequences and multichannel outreach.\n\n[Expandi](https://expandi.io/) is widely recognized as one of the safest cloud-based platforms for LinkedIn outreach. It pioneered the use of dedicated, localized IP addresses for each user, meaning your automated actions appear to come from your home country rather than an Amazon Web Services data center.\n\nExpandi is built for complex, multi-touch campaigns. You can create sequences that combine LinkedIn connection requests, InMails, and emails based on \"if/then\" logic. \n\n**Key Features:**\n*   **Smart Sequences:** Create branching campaigns based on whether a prospect accepts a request, replies, or opens an email.\n*   **Dedicated IP:** Every account gets a unique country-based IP address.\n*   **Image & GIF Personalization:** Automatically embed the prospect's profile picture or name into outreach images.\n*   **Webhooks & Native Integrations:** Connects seamlessly to Hubspot, Pipedrive, and other CRMs.\n\n**Pros:**\n*   Highly reliable cloud infrastructure.\n*   Excellent A/B testing capabilities for campaign optimization.\n*   Strong agency features for managing multiple client accounts.\n\n**Cons:**\n*   Pricing is premium, starting around $99/month per seat.\n*   Can be overwhelming for beginners who just need simple lead generation.\n\n![Comparison matrix of LinkedIn automation tools by safety and strategy](https://assets.bevisible.app/inline-images/j57fk4gjq7f5d4fn7k2qnpgnks877eq2/inline-1-1780667279477-2if1p7.png)\n### 3. Linked Helper\n\n**Best for:** Deep, highly customized local workflow automation.\n\n[Linked Helper](https://www.linkedhelper.com/) is one of the oldest and most powerful tools in the space. Unlike cloud tools, it is a standalone desktop application that essentially acts as a specialized web browser. It clicks, scrolls, and types exactly like a human user, physically executing tasks on your local machine.\n\nThis makes it incredibly safe, but it also means it is highly complex. You can build sprawling, multi-stage workflows that scrape profiles, endorse skills, invite people to groups, and send sequential messages.\n\n**Key Features:**\n*   **Browser Simulation:** Physically mimics human mouse movements and keystrokes.\n*   **Deep Scraper:** Pulls extensive data from LinkedIn profiles into a built-in CRM.\n*   **Complex Workflows:** String together dozens of different actions (e.g., View Profile -> Endorse -> Wait 2 days -> Connect -> Message).\n*   **License Management:** Easy to transfer licenses between different employees or accounts.\n\n**Pros:**\n*   Extremely safe due to local, simulated human behavior.\n*   Incredibly feature-rich for power users.\n*   Very cost-effective compared to cloud alternatives.\n\n**Cons:**\n*   Steep learning curve; the interface feels outdated.\n*   Cannot run campaigns while your computer is asleep or turned off.\n\n### 4. HeyReach\n\n**Best for:** Agencies scaling outreach across dozens of accounts.\n\nAccording to recent [industry breakdowns of automation tools](https://www.heyreach.io/blog/best-linkedin-automation-tools), HeyReach has positioned itself as the go-to solution for lead generation agencies. When an agency runs campaigns for 20, 50, or 100 different clients, managing individual logins, IPs, and campaigns becomes a logistical nightmare.\n\nHeyReach solves this by offering a unified dashboard built specifically for scale. It safely rotates through multiple LinkedIn accounts to execute massive outreach volumes without triggering LinkedIn's limits on any single profile.\n\n**Key Features:**\n*   **Account Rotation:** Distribute a 1,000-person contact list across 10 different sender accounts automatically.\n*   **Unified Inbox:** Manage replies from dozens of profiles in one centralized chat interface.\n*   **Agency Analytics:** Generate white-label reports for clients instantly.\n*   **Cloud-Based:** Runs 24/7 on dedicated servers.\n\n**Pros:**\n*   The best multi-tenant architecture on the market.\n*   Saves hours of logging in and out of client accounts.\n*   Transparent flat-rate pricing for agencies.\n\n**Cons:**\n*   Overkill for single users or small startup teams.\n*   Requires a deep understanding of proxy management for total safety.\n\n### 5. Waalaxy\n\n**Best for:** Multichannel beginners looking for a user-friendly interface.\n\nWaalaxy (formerly ProspectIn) is a Chrome extension-based tool that prides itself on being idiot-proof. If you have never run a lead generation campaign before, Waalaxy's pre-built templates and incredibly clean UI make it the perfect starting point.\n\nIt focuses heavily on multichannel sequences, allowing you to easily bounce prospects between LinkedIn messages and cold email. If a user doesn't respond on LinkedIn, Waalaxy will automatically try to find their professional email address and follow up there.\n\n**Key Features:**\n*   **Pre-built Sequence Templates:** Choose from dozens of proven outreach workflows.\n*   **Email Finder:** Built-in credit system to discover prospect email addresses.\n*   **Cloud Synchronization:** Despite being an extension, it runs tasks in the cloud to bypass local constraints.\n*   **Auto-Accept Features:** Automatically accept inbound connections and trigger a welcome message.\n\n**Pros:**\n*   Beautiful, intuitive user interface.\n*   Great freemium plan for those just starting out.\n*   Seamless blending of LinkedIn and cold email.\n\n**Cons:**\n*   Less customizable than tools like Expandi or Linked Helper.\n*   Chrome extension model can sometimes be more vulnerable to LinkedIn updates.\n\n### 6. Dux-Soup\n\n**Best for:** Direct native CRM integration.\n\nDux-Soup is a classic Chrome extension that operates by viewing profiles on your behalf. Because it runs directly inside your active browser session, it leverages your current LinkedIn login state. \n\nWhere Dux-Soup really shines is its ability to act as a bridge between LinkedIn and your CRM. It integrates natively with Hubspot, Pipedrive, and Sharpspring, allowing you to update CRM records simply by viewing a profile on LinkedIn.\n\n**Key Features:**\n*   **Auto-tagging:** Tag profiles as you view them and filter them later.\n*   **Profile Downloading:** Easily export lists of viewed profiles to CSV.\n*   **Direct CRM Sync:** Automatically create contacts in your CRM when a connection is accepted.\n*   **Drip Campaigns:** Run simple, effective sequential messaging.\n\n**Pros:**\n*   Very affordable entry-level pricing.\n*   Excellent for SDRs who need to keep Salesforce or Hubspot updated.\n*   Large, helpful community of users.\n\n**Cons:**\n*   The interface operates as a browser overlay, which can feel clunky.\n*   Requires your browser to be open and active to run.\n\n### 7. Meet Alfred\n\n**Best for:** Broad omni-channel campaigns (LinkedIn, Email, Twitter).\n\nMeet Alfred is a robust, cloud-based platform that attempts to be an all-in-one suite for social selling. It goes beyond LinkedIn and email, allowing you to incorporate Twitter (X) interactions into your sequences. \n\nFor example, you can build a workflow that views a prospect's LinkedIn profile, likes their recent tweet, sends a LinkedIn connection request, and follows up via email. If you are comparing [Meet Alfred vs Junior](https://heyjunior.ai/blog/meet-alfred), the main difference is architectural: Alfred is a heavy, cloud-based outbound engine, whereas Junior is a local, engagement-first AI tool.\n\n**Key Features:**\n*   **Omni-channel Sequences:** Combine LinkedIn, Email, and Twitter.\n*   **Built-in CRM:** Manage leads directly within Alfred if you don't use external software.\n*   **Post Scheduling:** Schedule your own LinkedIn content alongside your outreach.\n*   **Team Management:** Good hierarchy controls for sales managers.\n\n**Pros:**\n*   Great for covering multiple touchpoints.\n*   Includes a social media scheduler, eliminating the need for tools like Buffer or Hootsuite.\n\n**Cons:**\n*   Can be buggy due to trying to do too many things at once.\n*   Cloud-based automation carries standard IP risks if not configured carefully.\n\n### 8. Taplio\n\n**Best for:** Content creators who also want light outreach.\n\nTaplio is primarily known as a LinkedIn content creation and scheduling tool. It uses AI to help you write posts, format carousels, and analyze your content's performance. However, it also includes a growing suite of lead generation features.\n\nTaplio allows you to automate direct messages to people who engage with your posts. For example, if you offer a free \"Lead Gen Playbook\" in a post, you can use Taplio to automatically DM the PDF to anyone who comments.\n\n**Key Features:**\n*   **AI Content Generation:** Generate post ideas and drafts based on industry trends.\n*   **Auto-DM on Comment:** Perfect for \"comment for a link\" lead magnet strategies.\n*   **CRM & Outreach:** Simple sequencing for inbound leads.\n*   **Analytics:** Deep insights into post reach and profile views.\n\n**Pros:**\n*   Combines inbound content marketing with outbound lead gen.\n*   Excellent for founders building a personal brand.\n\n**Cons:**\n*   The outreach features are secondary and lack the depth of dedicated tools like Expandi.\n*   High price point for just lead generation.\n\n### 9. Dripify\n\n**Best for:** Sales teams needing deep analytics and role management.\n\nDripify is a polished, cloud-based automation platform created by the team behind Linked Nation. It is designed heavily around \"Drip\" campaigns\u2014visual, drag-and-drop sequences that are incredibly easy to map out.\n\nDripify is particularly strong for remote sales teams. It allows managers to set limits, view analytics, and intervene in conversations across their entire team from a single control panel.\n\n**Key Features:**\n*   **Visual Campaign Builder:** Drag and drop elements to build complex funnels.\n*   **Team Analytics:** Compare the acceptance and reply rates of different SDRs.\n*   **Smart Inbox:** Filter conversations by tag, campaign, or lead status.\n*   **Safety Algorithm:** Automatically adjusts sending volumes based on account health.\n\n**Pros:**\n*   One of the best user interfaces on the market.\n*   Excellent team oversight tools.\n*   Reliable cloud execution.\n\n**Cons:**\n*   Pricing gets expensive quickly as you add team members.\n*   Customer support can sometimes be slow during major updates.\n\n### 10. Botdog\n\n**Best for:** Streamlined, modern email and LinkedIn outreach.\n\n[Botdog](https://botdog.co/blog-posts/best-lead-generation-software-tools) has emerged as a strong contender for those who want a modern, no-nonsense tool that handles both LinkedIn and email gracefully. It focuses heavily on bypassing limits safely by combining email outreach with LinkedIn touchpoints.\n\nBotdog is designed to be highly intuitive, cutting out the bloat that plagues older tools. It is particularly good at finding verified B2B emails to supplement LinkedIn sequences.\n\n**Key Features:**\n*   **B2B Email Enrichment:** High match rates for finding prospect emails.\n*   **Smart Sequencing:** Alternate between email and LinkedIn based on prospect behavior.\n*   **Clean Inbox:** Manage all multichannel replies in one unified dashboard.\n\n**Pros:**\n*   Fast, modern interface.\n*   Excellent email enrichment built-in.\n*   Competitive pricing for multichannel capabilities.\n\n**Cons:**\n*   Newer to the market, so fewer native integrations than older platforms.\n\n### 11. folk CRM\n\n**Best for:** An all-in-one relationship manager with light automation.\n\nFolk is not a traditional automation tool; it is a lightweight, highly customizable CRM built for the modern era. However, it includes a powerful Chrome extension called \"folkX\" that allows you to scrape LinkedIn profiles, add them to specific lists, and trigger bulk email or message campaigns directly from the CRM.\n\nIf you are tired of syncing a dedicated automation tool to a clunky CRM like Salesforce, folk combines both into a single, Notion-like interface.\n\n**Key Features:**\n*   **folkX Extension:** One-click import of LinkedIn profiles or entire search pages.\n*   **Mail Merge:** Send personalized emails to lists created from LinkedIn.\n*   **Custom Views:** Organize leads in Kanban boards, tables, or pipelines.\n*   **AI Personalization:** Help draft messages based on imported profile data.\n\n**Pros:**\n*   Replaces both your CRM and your basic scraping tools.\n*   Beautiful, collaborative interface.\n*   Very safe, as the outreach is manual-light rather than heavy automation.\n\n**Cons:**\n*   Lacks complex, multi-step automated sequences on LinkedIn itself.\n*   Requires more manual intervention than dedicated automation platforms.\n\n## Cloud vs. Local vs. Extension: Choosing the Right Safety Model\n\nWhen evaluating a [linkedin lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy), your biggest decision is the architectural model of the software. Using the wrong type of tool can result in your account being restricted.\n\n![Diagram showing a modern, engagement-first LinkedIn outreach funnel](https://assets.bevisible.app/inline-images/j57fk4gjq7f5d4fn7k2qnpgnks877eq2/inline-2-1780667290414-g5vn5f.png)\nHere is how the three main models stack up:\n\n### 1. Cloud-Based Platforms (e.g., Expandi, Dripify, Meet Alfred)\n**How they work:** The software logs into your account from a remote server (often via a dedicated proxy IP). Campaigns run 24/7, even when your computer is off.\n*   **Pros:** Ultimate convenience, great for teams, high volume.\n*   **Cons:** LinkedIn actively hunts for cloud server IPs. If the proxy fails, LinkedIn sees you log in from New York and immediately log in from an AWS server in Germany, triggering a ban.\n\n### 2. Local Desktop Apps (e.g., Junior, Linked Helper)\n**How they work:** The software runs as an application directly on your Mac or PC. It uses your actual IP address and your actual machine hardware ID.\n*   **Pros:** The gold standard for safety. To LinkedIn, the traffic looks exactly like normal human browsing. Tools like Junior are virtually undetectable.\n*   **Cons:** Requires your computer to be powered on and connected to the internet to run tasks.\n\n### 3. Chrome Extensions (e.g., Dux-Soup, Waalaxy)\n**How they work:** The tool injects code into your active browser tab to perform clicks and scrapes.\n*   **Pros:** Very easy to install, natively uses your active login session.\n*   **Cons:** LinkedIn can easily scan browser code for injected extension scripts. Extensions are the most frequently caught by algorithm updates.\n\nIf you value the longevity of your account, you must either use a local application (like Junior) or a premium cloud tool with strict proxy management (like Expandi).\n\n## How to Build a Safe LinkedIn Lead Generation Funnel\n\nBuying software is only 10% of the battle. If you load terrible copy into a great tool, you will just automate failure faster. To [scale LinkedIn lead generation safely with AI](https://heyjunior.ai/blog/linkedin-lead-generation-ai), you need to build a logical funnel.\n\n### Step 1: Optimize the Profile\nYour profile is your landing page. Before turning on any software, ensure your headline states exactly who you help and how. Your \"About\" section should read like a sales letter, not a resume.\n\n### Step 2: Warm Up Through Engagement (The \"Junior\" Method)\nCold connecting is low-converting. Instead, build a list of 100 high-value targets. Use an engagement tool to automatically like their posts and drop thoughtful, AI-assisted comments over the course of two weeks. You want them to see your face in their notifications repeatedly *before* you pitch.\n\n### Step 3: The Soft Connection\nOnce you have engaged with their content, send a connection request. \n*   *Bad:* \"Hi [Name], we help companies like [Company] scale. Let's chat.\"\n*   *Good:* \"Hey [Name], loved your recent post about Q3 pipeline challenges. Would love to connect and follow your content.\"\n\n![The 4 Ls of Lead Generation framework written on sticky notes](https://assets.bevisible.app/inline-images/j57fk4gjq7f5d4fn7k2qnpgnks877eq2/inline-3-1780667286937-dqfw2j.png)\n### Step 4: The Value-Driven Message Sequence\nIf you are using a tool like Expandi or Botdog, set a delay of 3-5 days after they accept. Do not pitch immediately. Send a high-value asset (a framework, a checklist, or a relevant case study). \n\n### Step 5: Transition to Multichannel\nIf they do not reply on LinkedIn, let your automation tool seamlessly transition to cold email. \"Hey [Name], we recently connected on LinkedIn but I know inboxes there get messy. Just wanted to share...\"\n\nIf you are struggling to build this out yourself, there are many reputable [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) that manage both the software and the strategy for you.\n\n## Frequently Asked Questions\n\n### Which tool is used for lead generation on LinkedIn safely?\nFor maximum safety, local-execution tools are best. **Junior** is highly recommended for engagement-first lead generation, as it mimics natural human behavior locally. If you prefer a cloud-based approach for high-volume outreach, **Expandi** is considered the safest due to its dedicated IP architecture and randomized delay settings.\n\n### Can ChatGPT do lead generation?\nChatGPT cannot scrape LinkedIn or send messages on its own. However, the *API* behind ChatGPT is actively used by top lead generation tools (like Junior and Taplio) to analyze prospect bios, read their recent posts, and generate highly personalized comments and direct messages at scale. \n\n### What are the 4 L's of lead generation?\nWhile frameworks vary, the foundational 4 L's usually refer to:\n1.  **Lead Capture:** The mechanism to collect info (e.g., an inbound LinkedIn message or a web form).\n2.  **Lead Magnets:** The value offered in exchange for attention (e.g., a free PDF sent via automated DM).\n3.  **Landing Page:** Where traffic is directed (on LinkedIn, your Profile is your landing page).\n4.  **Lead Scoring:** Determining which leads are ready to buy based on engagement levels.\n\n### What is the highest-paid lead generation?\nB2B (Business-to-Business) lead generation commands the highest payouts, particularly in enterprise SaaS, high-ticket consulting, and commercial real estate. Because a single closed deal can be worth tens of thousands of dollars, companies are willing to pay a premium to agencies or internal SDRs who can successfully automate LinkedIn to book qualified meetings.\n\n### Should I use LinkedIn Automation or Lead Gen Ads?\nIt depends on your budget and timeline. If you are comparing [LinkedIn Lead Gen Ads vs. AI Comments](https://heyjunior.ai/blog/linkedin-lead-generation-ads), ads guarantee immediate visibility but cost an average of $8-$15 per click. AI comment automation takes longer to build momentum but establishes lasting organic authority and operates at a fraction of the cost.\n\n## Final Thoughts on LinkedIn Automation\n\nImplementing a [lead generation funnel that converts](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) requires moving away from the spray-and-pray tactics of 2020. \n\nThe best tool for you depends entirely on your strategy. If you run an agency pushing massive volume across dozens of clients, **HeyReach** or **Expandi** are your best bets. If you are a founder, consultant, or sales rep who needs to build authority, warm up high-ticket prospects, and keep your account 100% safe, an engagement-first, local tool like **Junior** will deliver the highest quality conversations.\n\nStop trying to trick people into jumping on a sales call. Use automation to start real conversations, and the pipeline will take care of itself.", "created_at": "2026-06-09T06:19:49.335867+00:00", "updated_at": "2026-06-09T06:19:49.335873+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
