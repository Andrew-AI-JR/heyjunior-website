    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 15, "slug": "free-linkedin-automation-tools", "title": "5 Free LinkedIn Automation Tools (And Why They Fail)", "excerpt": "Looking for free LinkedIn automation tools? Discover the top 5 freemium options, their hidden risks, and how to safely scale outreach without getting banned.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57crxmsk3kdv0y65tp670c35h8773gs/5-free-linkedin-automation-tools-and-why-they-fail-1780408169543-fxpogv.png", "published_at": "2026-06-05T13:42:00+00:00", "content": "# 5 Free LinkedIn Automation Tools (And Why They Fail)\n\nIf you spend enough time looking for growth hacks, you will eventually find yourself scrolling through a thread like [this one asking about free LinkedIn automation tools](https://www.reddit.com/r/LinkedInTips/comments/1oewxbx/any_linkedin_automation_tools_which_are_free/). The appeal is obvious. You want to scale your outbound lead generation, build an audience, and book more meetings, but you do not want to spend $150 a month on software just to test the waters.\n\nSo, you look for a free tool. You download a Chrome extension or sign up for a freemium cloud service. You load up a list of 500 prospects, write a clever intro template, hit \"Start,\" and walk away feeling like a productivity genius.\n\nThree days later, your response rate is hovering near zero. Two weeks later, LinkedIn flags your account for suspicious activity, forcing you into a frustrating identity verification loop. Worst of all, the few people who did reply only did so to ask you to stop spamming them.\n\nThis is the reality of trying to automate LinkedIn on a budget in 2026. The platform's spam filters are ruthless, and buyers are entirely blind to generic outreach. \n\nBefore you connect another third-party app to your profile, you need to understand what you are actually getting with free automation, how these tools operate under the hood, and why the traditional \"connect-and-pitch\" model is failing. \n\n## How LinkedIn Automation Tools Actually Work (And The Risks)\n\nTo understand why free tools fail, you first have to understand how automation interacts with LinkedIn's infrastructure. Broadly speaking, automation tools fall into three architectural categories. Choosing the wrong one is the fastest way to get your account restricted.\n\n### 1. Cloud-Based Automation\nThese tools run on remote servers. You hand over your LinkedIn session cookies (or login credentials), and the tool's server logs into your account to perform actions. \n\n**The Risk:** LinkedIn tracks IP addresses and login locations. If you log in from your laptop in Chicago at 9:00 AM, and a cloud server logs into your account from an AWS data center in Virginia at 9:05 AM, LinkedIn immediately flags the discrepancy. While premium cloud tools try to mask this with dedicated proxy IPs, free tiers rarely offer this level of protection. \n\n### 2. Browser Extensions (DOM Manipulation)\nMany legacy free tools operate as Chrome extensions. They sit in your browser and inject code directly into the LinkedIn webpage, literally clicking buttons and scraping text on your behalf.\n\n**The Risk:** LinkedIn's engineers are fully aware of this method. They regularly update the platform's HTML structure (the DOM) to break these extensions. Furthermore, LinkedIn can detect when software is clicking buttons at superhuman speeds or injecting code that a normal user session wouldn't produce.\n\n### 3. Local Machine Execution\nThis is the modern, secure approach to automation. Instead of running on a remote server or hacking the browser DOM, the software runs directly on your local computer, using your actual IP address and mimicking human mouse movements and variable timing.\n\n**The Risk:** Very few free tools offer this because it is technically complex to build. This is the architecture used by advanced platforms like Junior, ensuring that to LinkedIn's security algorithms, the automated actions look completely indistinguishable from your normal daily activity.\n\n![Diagram comparing cloud, browser extension, and local machine LinkedIn automation architectures.](https://assets.bevisible.app/inline-images/j57crxmsk3kdv0y65tp670c35h8773gs/inline-1-1780408087523-x4scv3.png)\n## The 5 \"Free\" LinkedIn Automation Tools Available in 2026\n\nIf you are determined to test the waters without opening your wallet, you will likely end up looking at these five tools. While some offer genuinely useful features for specific tasks, relying on them for end-to-end lead generation usually results in diminished brand reputation.\n\n### 1. Dux-Soup (Free Tier)\n\nDux-Soup is one of the oldest browser-based automation tools on the market. Their free tier (the \"Starter\" plan) is incredibly basic but functional for one specific use case: profile visits.\n\n*   **What it does:** You can filter a list of prospects on LinkedIn, and the free version of Dux-Soup will automatically visit their profiles one by one. This triggers a \"John Doe viewed your profile\" notification for the prospect, which can sometimes result in them viewing you back.\n*   **Why it fails:** Profile views alone do not generate pipeline. To actually send connection requests or automated messages, you have to upgrade. Because it is a browser extension, it is also highly susceptible to LinkedIn's detection algorithms if you push the volume too high. It operates purely on volume, offering zero personalization.\n\n### 2. PhantomBuster (Free Trial / Limited Tier)\n\nPhantomBuster is a powerful data extraction tool rather than a traditional outreach platform. They offer a highly restricted free tier (often limited to just a few minutes of cloud execution time per day).\n\n*   **What it does:** You use \"Phantoms\" (pre-built scripts) to scrape data. For example, you can extract the profile URLs of everyone who liked a specific post, or scrape a list of company employees into a spreadsheet.\n*   **Why it fails:** PhantomBuster is brilliant for data, but terrible for actual engagement. If you want to use it for outreach, you have to chain it together with other tools, creating a fragile, complex workflow. Furthermore, because it relies on cloud scraping, aggressive use will quickly trigger LinkedIn's rate limits and log you out of your session.\n\n### 3. LinkedRadar\n\nMarketed aggressively as a freemium solution, [LinkedRadar](https://linkedradar.com/) positions itself as an AI-driven outreach tool for budget-conscious users.\n\n*   **What it does:** It offers basic campaign management, allowing you to queue up connection requests and follow-up messages based on simple templates. \n*   **Why it fails:** The \"AI\" features in free tools like this often boil down to simple variable insertion (`Hi {first_name}`) rather than genuine contextual understanding. Your prospects receive messages that look exactly like the thousands of other automated pitches they get every week. It treats LinkedIn like an email inbox, completely ignoring the social, conversational aspect of the platform.\n\n### 4. Waalaxy (Freemium Tier)\n\nWaalaxy is known for having a very clean, user-friendly interface. They offer a freemium tier that lets you test their basic functionality.\n\n*   **What it does:** You can build simple outreach sequences (e.g., visit profile -> send connection request -> send one follow-up message) and manage your leads in a built-in mini-CRM.\n*   **Why it fails:** The free tier is intentionally crippled. You are heavily restricted on the number of actions you can take per week, making it impossible to achieve meaningful scale. More importantly, it still relies on the outdated \"Cold DM\" playbook. Sending automated templates to strangers in 2026 yields incredibly low conversion rates, regardless of how nice the software's UI looks.\n\n### 5. Text Expanders (e.g., Magical)\n\nWhile not a true automation tool in the sense of running campaigns while you sleep, text expanders like Magical are completely free and widely used by sales development reps (SDRs) on LinkedIn.\n\n*   **What it does:** You save text snippets, and when you type a shortcut (like `//intro`), it expands into a full paragraph. Advanced expanders can also scrape basic data (like name and company) from the page to fill in the blanks.\n*   **Why it fails:** It requires manual execution for every single message. You still have to click the button, type the shortcut, and hit send. While it saves keystrokes, it does not save you from the mental fatigue of prospecting, nor does it help you discover leads or prioritize your time.\n\nIf you want to understand how paid solutions compare, we previously covered the broader landscape in our guide to [7 LinkedIn Automation Tools for Lead Generation (2026)](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation).\n\n![Notebook matrix detailing the severe limitations and risks of free LinkedIn automation software.](https://assets.bevisible.app/inline-images/j57crxmsk3kdv0y65tp670c35h8773gs/inline-2-1780408080290-ig6h2j.png)\n## The 4 Fatal Flaws of Free LinkedIn Automation\n\nThe problem with free tools isn't just that they lack premium features; it is that they fundamentally encourage a strategy that actively harms your professional reputation. \n\nWhen you use free software, you are constrained by its limitations. Here is why those limitations destroy your pipeline.\n\n### 1. The \"Template-Based Spam\" Problem\n\nFree tools rely on static templates. You write one message, insert a `{first_name}` and `{company}` tag, and blast it to 500 people. \n\nConsider this standard automated message:\n> *\"Hi Sarah, I see you're working at TechCorp. I help companies like TechCorp scale their revenue. Do you have 15 minutes next Tuesday?\"*\n\nSarah receives twenty of these exact messages every day. Her brain is trained to instantly identify the syntax of an automated template. The moment she spots the generic structure, she archives the message without finishing the sentence. Free tools force you into this template trap because they do not have the processing power or AI integration to generate truly personalized, contextual messages based on a prospect's recent activity or specific bio.\n\n### 2. The Cold DM Fallacy\n\nMost legacy automation tools\u2014including premium ones highlighted in lists like [36 Best LinkedIn Automation Tools of 2026](https://www.heyreach.io/blog/best-linkedin-automation-tools)\u2014are built entirely around the Cold Direct Message. \n\nBut the landscape has shifted. Direct messages have become a guarded space. Buyers do not want to be pitched in their DMs by someone they have never interacted with. \n\nThe modern strategy is \"Conversation-First.\" Instead of immediately asking for a meeting in a private message, you should be engaging publicly. Leaving insightful, high-quality comments on a prospect's posts builds familiarity and authority. When you eventually do send a DM, you are no longer a stranger; you are \"that smart person who added value to my post last week.\" Free tools cannot automate public commenting intelligently; they only know how to spam the inbox.\n\n### 3. Ignoring Interaction Patterns and Variable Timing\n\nHuman beings do not act like metronomes. If you manually send messages, you might send three in a row quickly, take a five-minute break to read an article, send one more, and then close the tab. \n\nFree automation tools often execute actions on a rigid loop (e.g., send one connection request exactly every 45 seconds). LinkedIn's security algorithms easily detect this robotic pacing. Advanced tools introduce \"variable timing\" and natural interaction patterns\u2014scrolling, pausing, and randomizing the delay between actions\u2014to avoid detection. If your tool lacks this, your account will eventually end up in LinkedIn jail.\n\n### 4. Volume Over Value\n\nBecause free tools yield such low conversion rates (often less than 1%), the user's natural reaction is to crank up the volume. If 100 messages didn't work, maybe 500 will.\n\nThis is a dangerous game. LinkedIn heavily penalizes accounts that send high volumes of unaccepted connection requests. If your pending connection requests pile up, or if too many people click \"I don't know this person,\" your account will be restricted. \n\nFor a safer approach to scaling, read our breakdown on [How to Scale LinkedIn Lead Generation with AI (Safely)](https://heyjunior.ai/blog/linkedin-lead-generation-ai).\n\n## A Better Approach: Conversation-First Engagement\n\nIf blasting cold DMs with free extensions is a fast track to getting banned, what is the alternative?\n\nThe answer is shifting your focus from *interruption* to *interaction*. You need to establish authority within your industry without the stigma of cold DM spam. This requires moving away from the inbox and into the feed.\n\n### The Power of Automated Commenting\n\nThink about how you feel when someone leaves a thoughtful, highly relevant comment on a post you wrote. You notice them. You appreciate the engagement. You might even click on their profile to see what they do. \n\nThis is the core philosophy behind Junior. \n\nJunior is an AI-driven platform specifically designed to transform LinkedIn engagement into tangible business opportunities through a human-first approach to AI generation. \n\nInstead of spamming inboxes, Junior automates the process of finding highly relevant LinkedIn posts from your target prospects and generating high-quality, personalized comments that mirror your natural voice.\n\n![Visual comparison between a generic automated Cold DM and a highly personalized, human-first comment.](https://assets.bevisible.app/inline-images/j57crxmsk3kdv0y65tp670c35h8773gs/inline-3-1780408076805-r69ccw.png)\n### Why Junior Succeeds Where Free Tools Fail\n\nIf you are a sales team, a lead gen agency, a founder, or a job seeker trying to warm up outbound leads, Junior solves the exact problems created by legacy automation:\n\n*   **True Security (Local Execution):** Unlike cloud-based automation tools that trigger IP warnings, Junior runs directly on your local machine. It uses your actual IP address and browser session, employing natural interaction patterns with variable timing to maintain complete security and avoid account flagging.\n*   **Human-First AI Generation:** Junior avoids template-based spam entirely. It utilizes your specific bio, your company's value proposition, and your networking goals to craft comments that sound like *you* wrote them. It reads the context of the prospect's post and adds genuine value to the conversation.\n*   **Smart Post Prioritization:** You don't have to spend hours scrolling the feed looking for the right people to engage with. Junior finds the posts that matter, saving you time while maximizing your visibility.\n*   **Warming Up Leads:** By the time you eventually send a connection request or an email, the prospect already recognizes your name and face. You have shifted from cold outreach to warm engagement.\n\nIf you want to understand how to build a comprehensive workflow around this philosophy, check out our guide on how to [Build a LinkedIn Lead Generation Funnel That Converts](https://heyjunior.ai/blog/linkedin-lead-generation-funnel).\n\n### Comparing the Outcomes\n\nLet's look at a realistic comparison of spending 30 days running a free automation tool versus 30 days running a conversation-first strategy.\n\n| Metric | Free Cold DM Tool | Conversation-First (Junior) |\n| :--- | :--- | :--- |\n| **Primary Action** | Sending generic DMs to strangers. | Leaving contextual comments on target posts. |\n| **Account Risk** | High (Cloud IPs, rigid timing, high volume). | Zero (Local machine, variable timing). |\n| **Prospect Reaction** | Annoyance, archiving, reporting as spam. | Gratitude, profile visits, reciprocal engagement. |\n| **Brand Reputation** | Diminished. You look like a spammer. | Enhanced. You look like an industry thought leader. |\n| **Meeting Booking Rate** | Less than 1%. Requires massive volume. | 5-10% (from inbound inquiries and warm follow-ups). |\n\nBy focusing on engagement rather than just extraction, you build a compounding asset: your professional reputation. If you are struggling to get replies, we highly recommend reading [7 Ways to Triple Your LinkedIn Engagement Rate Fast](https://heyjunior.ai/blog/linkedin-engagement-rate) to see the mechanics of this strategy in action.\n\n## Frequently Asked Questions\n\n### What is the best LinkedIn automation tool in 2026?\n\nThe \"best\" tool depends entirely on your strategy. If you are trying to extract data into a spreadsheet, tools like PhantomBuster remain excellent choices. However, if your goal is to generate leads, build a sales pipeline, or land a job, the best tools are those that facilitate natural engagement. Platforms like Junior, which focus on smart commenting, local-machine execution, and human-first AI, are vastly outperforming legacy Cold DM platforms.\n\n### Is LinkedIn automation safe in 2026?\n\nIt is only safe if you use the correct architecture. Cloud-based tools that log in from remote servers or browser extensions that manipulate the webpage code are highly unsafe and frequently result in account bans. Automation is safe when it runs locally on your machine, mimics human behavior (variable timing, natural scrolling), and keeps connection volumes within normal human limits. \n\n### What's the difference between LinkedIn outreach tools and LinkedIn prospecting tools?\n\n**Prospecting tools** are used for data extraction and list building. They help you find the right people based on filters (e.g., finding all VPs of Marketing in New York) and exporting their data. \n\n**Outreach tools** are used to communicate with that list. Legacy outreach tools focus on sending automated connection requests and direct messages. Modern engagement tools focus on interacting with the prospect's public content to build a relationship before the pitch.\n\n### Can LinkedIn automation tools get your account banned?\n\nYes, absolutely. LinkedIn actively monitors for automation. The most common triggers for an account restriction are:\n1.  Logging in from different geographical IP addresses simultaneously (the Cloud tool problem).\n2.  Executing actions at exactly the same interval without variation.\n3.  Having a massive backlog of \"Pending\" connection requests because people are ignoring your spammy templates.\n4.  Receiving too many \"I don't know this person\" reports from prospects.\n\nTo avoid this, you must prioritize quality over volume and ensure your tools run locally. For a deeper dive into safe strategies, review our [5 Steps to a LinkedIn Lead Generation Strategy (2026)](https://heyjunior.ai/blog/linkedin-lead-generation-strategy).\n\n## The Final Verdict on Free Tools\n\nFree LinkedIn automation tools are a mirage. They promise effortless scale but deliver ruined reputations and restricted accounts. They trap you into using outdated, spammy tactics that modern buyers despise.\n\nIf you want to generate real pipeline on LinkedIn, you have to stop acting like a robot and start acting like a trusted advisor. You don't need to send 500 cold DMs a week. You need to leave 50 brilliant, personalized comments a week on the posts of your highest-value prospects.\n\nBy abandoning the free generic tools and adopting a conversation-first strategy\u2014powered by smart, local AI like Junior\u2014you can build an audience, warm up your leads, and fill your calendar without ever sending another embarrassing cold pitch.\n\nFor more proven tactics, explore our comprehensive guide on [9 Proven Ways for Lead Generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin).```", "created_at": "2026-06-05T13:49:23.230100+00:00", "updated_at": "2026-06-05T13:49:23.230107+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
