    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 40, "slug": "linkedin-engagement-conversion-data", "title": "LinkedIn engagement conversion data", "excerpt": "Learn how to get recruiter interviews through LinkedIn comments. Discover the engagement conversion data and the exact 3-level strategy to secure inbound DMs.", "featured_image_url": "https://assets.bevisible.app/featured-images/j578288pqcbq2de8dq41spsr3h89efjn/linkedin-engagement-conversion-data-1783090134404-8wky91.png", "published_at": "2026-07-03T14:37:00+00:00", "content": "# LinkedIn engagement conversion data\n\nIf you have ever clicked \"Easy Apply\" on a LinkedIn job posting and watched your application disappear into a void of 1,500 other candidates, you already know the traditional inbound application system is broken. \n\nGetting a recruiter\u2019s attention in 2026 requires bypassing the applicant tracking system (ATS) entirely. The most effective way to do this isn't through cold direct messages (DMs), which are increasingly ignored. It is by understanding how to get recruiter interviews through LinkedIn comments. \n\nPublic engagement builds what psychologists call *recognition bias*. When a recruiter sees your name consistently providing value in their feed, you transition from a stranger to a familiar industry peer. This article breaks down the conversion data behind LinkedIn engagement, why the standard commenting advice fails, and the exact multi-level framework you can use to turn public visibility into direct interviews.\n\n## The Conversion Funnel: From Comment to Recruiter Interview\n\nComments do not directly get you hired. If you treat a comment section like a job application, you will be ignored. Instead, commenting operates as a visibility and trust layer that warms up a future interaction.\n\nRecruiter-focused guides consistently note that engaging on social media is a [relationship-building step, not an application step](https://www.linkedin.com/top-content/recruitment-hr/interview-techniques-for-recruiters/tips-for-engaging-recruiters-on-social-media/?utm_source=chatgpt.com). You are not asking for a job in the comments; you are proving you are worth talking to.\n\n![LinkedIn engagement conversion funnel flowchart showing the path from comment to interview.](https://assets.bevisible.app/inline-images/j578288pqcbq2de8dq41spsr3h89efjn/inline-1-1783090044715-tllbr7.png)\nHere is how the engagement-to-interview conversion funnel actually flows:\n\n1. **The Touchpoint**: You leave a contextual, industry-specific comment on a post by a target recruiter, hiring manager, or company leader.\n2. **The Impression**: The author (and their network) reads the comment. If it adds value, they glance at your profile headline.\n3. **The Profile View**: Intrigue drives a click to your LinkedIn profile.\n4. **The Trust Signal**: Your profile clearly articulates your value proposition, background, and availability.\n5. **The Inbound Action**: The recruiter sends a connection request or an InMail. \n6. **The Conversion**: You move from a casual chat to an official screening call.\n\nWhen executed correctly, this funnel flips the dynamic. You are no longer begging for a chance; the recruiter is sourcing you based on demonstrated competence.\n\n## What the Data Says About LinkedIn Engagement\n\nRecruiters are struggling with candidate response rates just as much as candidates are struggling with application response rates. According to industry sourcing data, the average cold [InMail response rate is hovering around 13%](https://www.pin.com/blog/linkedin-sourcing-tips-2026/?utm_source=chatgpt.com). \n\nBecause cold outreach is inefficient, recruiters heavily prioritize \"warm\" candidates. A warm candidate is someone who has interacted with the company's brand, engaged with the recruiter's content, or shares mutual connections. \n\nBy commenting on a recruiter's posts, you immediately inject yourself into their warm sourcing pool. [LinkedIn outreach strategies that get replies](https://recruiterflow.com/blog/linkedin-outreach/?utm_source=chatgpt.com) rely heavily on multi-touch sequences. Recruiters are taught to view your profile, engage with your content, and wait for a signal before pitching a role. When you initiate the engagement, you do the heavy lifting for them.\n\nTracking the conversion data on your own profile provides immediate feedback. Candidates who shift from \"silent scrolling\" to leaving 5-10 strategic comments per day typically see:\n* A 300% to 500% increase in 90-day profile views.\n* A significant shift in the *quality* of profile viewers (moving from peers to Talent Acquisition and Founders).\n* Inbound connection requests accompanied by context (e.g., \"Loved your take on my post about Q3 hiring trends...\").\n\n## Why Most Job Seeker Comments Fail (The \"I'm Interested\" Trap)\n\nThe biggest mistake job seekers make is treating the comment section like a digital hand-raise. \n\nTake a look at any post from a prominent technical recruiter. The comments are filled with low-effort noise:\n* \"I'm interested!\"\n* \"Great post, please check my profile.\"\n* \"Looking for new opportunities, let me know if you are hiring.\"\n* \"CFBR\" (Commenting for better reach)\n\nThese comments are completely invisible. They create zero value, demonstrate zero expertise, and generate zero memory retention. Worse, [recruiters actively ignore this type of engagement](https://www.reddit.com/r/recruitinghell/comments/1rlohz5/commenting_on_recruiters_linkedin_post/?utm_source=chatgpt.com) unless they already have a relationship with the candidate.\n\nLeaving an \"I'm interested\" comment signals that you want the recruiter to do the work of figuring out if you are a fit. Professional engagement requires you to bring the insight to them.\n\n## The 3-Level Commenting Strategy to Get Noticed\n\nTo effectively [get noticed by decision makers](https://cclarity.io/blog/linkedin-commenting-strategy?utm_source=chatgpt.com), you need to scale the quality of your interactions. Think of your engagement in three distinct tiers.\n\n![3-level commenting strategy pyramid showing Visibility, Authority, and Relationship.](https://assets.bevisible.app/inline-images/j578288pqcbq2de8dq41spsr3h89efjn/inline-2-1783090051136-q2fuf5.png)\n### Level 1: Visibility (Getting Seen)\nYour primary goal here is to show up consistently without being annoying. You want the recruiter to recognize your name and face.\n\n**The framework:** Validate the post + add a brief, relevant observation.\n\n**Example:** \n*Recruiter posts about the difficulty of finding engineers who understand both front-end and basic data architecture.*\n* **Bad comment:** \"I am an engineer looking for a role!\"\n* **Level 1 comment:** \"Interesting trend. I've noticed a similar pattern in the fintech space\u2014teams are heavily prioritizing full-stack developers who can comfortably navigate database optimization.\"\n\n### Level 2: Authority (Demonstrating Expertise)\nOnce your name is familiar, you need to prove you actually know your field. You do this by sharing micro-case studies or contrarian (but polite) insights.\n\n**The framework:** Acknowledge the premise + introduce a specific metric, tool, or lived experience.\n\n**Example:**\n*Recruiter posts about how remote work is impacting team culture.*\n* **Level 2 comment:** \"This matches my experience leading a remote team last year. We found that replacing the weekly hour-long sync with a 15-minute daily async Slack update increased our sprint completion rate by 20%. The tool matters less than the cadence.\"\n\n### Level 3: Relationship (Opening the Door)\nThe highest tier of commenting invites a direct response from the original poster, creating a natural transition into the DMs.\n\n**The framework:** Provide a brief insight + ask a highly specific, calibrated question.\n\n**Example:**\n*Recruiter posts about the upcoming Q4 hiring push in the logistics sector.*\n* **Level 3 comment:** \"The shift toward automated warehousing you mentioned is fascinating. Are you seeing companies prefer candidates with direct hardware integration experience, or are they willing to train software-first engineers on the hardware side?\"\n\nWhen the recruiter replies to your Level 3 comment, you have earned the right to send a DM saying: *\"Thanks for the reply on your post about Q4 logistics hiring. Your point about hardware training made me rethink how I position my recent project. Would love to connect and keep following your updates.\"*\n\n## How Recruiters Actually Source (and How to Intercept Them)\n\nUnderstanding how recruiters work behind the scenes gives you a massive advantage. Internal talent acquisition teams and agency recruiters do not just scroll the feed hoping to bump into talent. They use specific tools and workflows.\n\nThey heavily rely on Boolean searches, X-Raying, and filtering by \"Open to Work\" signals. But they also mine events and engaged lists. If a recruiter hosts an audio event or a LinkedIn Live, they will scrape the attendee list. If they post a thought leadership piece that goes viral within their niche, they will comb through the engaging accounts to build a sourcing pipeline.\n\nWhen you comment on a recruiter's post, you are actively inserting yourself into their primary sourcing pool. If their Boolean search returns 500 qualified candidates, they will naturally prioritize reaching out to the 5 candidates whose names they recognize from their comment notifications.\n\nThis is why commenting works: it is the ultimate tie-breaker. \n\n## Scaling Authentic Engagement with AI\n\nThe challenge with the 3-Level Commenting Strategy is time. Writing thoughtful, context-aware comments on 10 different posts every day takes hours. Most job seekers try it for three days, burn out, and go back to blindly clicking Easy Apply.\n\nThis is where automation becomes necessary, but the *type* of automation matters immensely. \n\nMany job seekers ruin their profiles by using basic [AI Tools for Linkedin Commenting](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow) that generate generic responses like, \"Great insight! Thanks for sharing this valuable perspective.\" These bot-like replies actually damage your reputation. A recruiter can spot a ChatGPT-generated comment from a mile away, and it instantly flags you as someone who cuts corners.\n\nFurthermore, using cloud-based automation tools to mass-comment puts your account at risk of being restricted by LinkedIn. If you are looking for [Phantombuster Alternatives for Automate Linkedin Comments Safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely), you need a system that mimics human behavior.\n\nJunior solves this by operating locally on your machine, ensuring [safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin). Instead of generic spam, Junior analyzes the specific discussion, cross-references your unique background and job-seeking goals, and drafts context-aware replies. You maintain complete editorial control, reviewing and tweaking the draft before it posts. \n\nIt allows you to bypass crowded inboxes by consistently delivering Level 2 and Level 3 comments at scale, turning public visibility into direct interviews without spending five hours a day staring at the feed.\n\n## A Daily Engagement Workflow for Job Seekers\n\nIf you want to start generating recruiter interviews this week, implement this daily operating procedure.\n\n![Handwritten daily engagement checklist for LinkedIn job seekers.](https://assets.bevisible.app/inline-images/j578288pqcbq2de8dq41spsr3h89efjn/inline-3-1783090046104-1gpaoi.png)\n### Step 1: Curate Your Target List\nStop commenting randomly on viral posts from massive influencers. Your goal is to be a big fish in a small pond. \n* Find 10-15 recruiters who specifically hire for your role (e.g., \"Technical Recruiter SaaS,\" \"Marketing Headhunter,\" \"Internal Talent Acquisition Fintech\").\n* Find 10-15 hiring managers (e.g., VP of Engineering, Director of Demand Gen) at companies you want to work for.\n* Ring the \"bell\" on their profiles to get notified when they post.\n\n### Step 2: Optimize Your Headline for the Click\nWhen you comment, people only see your name, your profile picture, and the first roughly 60 characters of your headline. \n* **Weak:** \"Actively looking for new opportunities | Marketing\"\n* **Strong:** \"B2B Product Marketer | Scaling SaaS from $1M to $10M ARR\"\nYour headline must give the recruiter a reason to click through to your full profile.\n\n### Step 3: Execute the 15-Minute Commenting Sprint\nDedicate 15 minutes a day to leaving 5 to 8 thoughtful comments. Use tools to [automate LinkedIn comments safely](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist) to draft the initial ideas, then refine them to ensure they sound exactly like you. Aim for Level 2 (Authority) and Level 3 (Relationship) frameworks.\n\n### Step 4: The Strategic Follow-Up\nTrack the recruiters who reply to your comments or view your profile. If a recruiter views your profile after you leave a comment, wait 24 hours. Then, send a personalized connection request:\n\n> *\"Hi [Name], I saw you checked out my profile after we chatted on your post about [Topic]. I really appreciate the insights you share on the industry. Would love to stay connected in your network.\"*\n\nDo not ask for a job in this connection request. Let them accept. Once they do, you are a first-degree connection. The next time they post a role that fits your background, you can DM them directly, referencing your previous interactions. You are now a familiar colleague, not a cold applicant.\n\n## Adapting to Different Recruiter Archetypes\n\nNot all recruiters engage on LinkedIn the same way. Tailoring your approach based on the archetype of the person posting will dramatically improve your conversion rate.\n\n### Internal Talent Acquisition (TA)\nInternal TA teams work for one specific company. Their posts often revolve around company culture, employee spotlights, and specific open requisitions. \n* **Your Angle:** Focus heavily on culture alignment and product enthusiasm. If an internal TA at Stripe posts about a new product feature, your comment should highlight your understanding of the payments ecosystem. They want to hire people who actually care about the company mission.\n\n### Agency Recruiters (Headhunters)\nAgency recruiters are mercenaries. They are working to fill roles across multiple client companies and are paid on commission. Their posts often feature market trends, interview advice, and blinded job descriptions (e.g., \"Looking for a Senior Dev in NYC, $180k\").\n* **Your Angle:** Focus entirely on hard skills, availability, and market reality. Engaging with agency recruiters should be highly tactical. Share data points about your specific niche to prove you are a top-tier candidate they can easily place with a client.\n\n### The Hiring Manager (The Ultimate Decision Maker)\nOften, the fastest way to get a recruiter interview is to bypass the recruiter entirely and engage the hiring manager. If the VP of Sales tells the recruiter, \"I want to talk to this person, get them on my calendar,\" the interview is guaranteed.\n* **Your Angle:** Talk shop. Hiring managers post about the actual problems they are trying to solve. Leave Level 2 Authority comments that prove you have solved similar problems in the past.\n\n## Edge Cases and Failure Modes\n\nEven with a perfect commenting strategy, there are failure modes to watch out for.\n\n**The \"Too Argumentative\" Trap**\nDemonstrating expertise is great, but correcting a recruiter publicly or aggressively disagreeing with their post is a fast track to being blocked. If you want to offer a contrarian perspective, frame it gently: *\"I've actually seen the opposite in my current role, which is interesting. We found that [X] led to [Y]. I wonder if it differs by industry?\"*\n\n**The Empty Profile Syndrome**\nYou leave a brilliant comment. The recruiter clicks your profile. But your profile has no \"About\" section, no bullet points under your current role, and an outdated resume attached. The conversion funnel immediately breaks. Your profile must be completely optimized to catch the traffic your comments generate.\n\n**Engaging Stale Content**\nCommenting on a post that is three weeks old yields little visibility. The LinkedIn algorithm prioritizes early engagement. You want to be one of the first 10 comments on a recruiter's post to maximize impressions from everyone else who views it later.\n\n## Frequently Asked Questions\n\n**How long does it take to see inbound recruiter interest?**\nIf you consistently leave Level 2 and Level 3 comments on the right profiles, you will typically see an uptick in profile views within 7 to 10 days. Direct inbound DMs from recruiters usually start materializing around week three or four, as recognition bias takes effect.\n\n**What if recruiters in my industry rarely post?**\nIf the specific recruiters you are targeting are inactive, shift your focus. Engage with the company's official page content, or engage with the hiring managers (Directors, VPs) directly. You can also engage on posts from major industry publications where recruiters are likely lurking in the comments.\n\n**Should I engage with other job seekers' posts?**\nYes, but limit it. Engaging with peers builds a supportive community and keeps your account active, but it rarely leads to interviews. To drive conversions, at least 70% of your engagement effort should be directed at people who have the authority to hire you. \n\nBy treating the LinkedIn comment section as a strategic visibility layer rather than a casual chat room, you reclaim control of your job search. Stop fighting the ATS algorithms. Start talking directly to the people holding the keys to the interview room.", "created_at": "2026-07-03T14:49:22.324981+00:00", "updated_at": "2026-07-03T14:49:22.324986+00:00"};
    </script>

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
