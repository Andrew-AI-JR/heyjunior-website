    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 24, "slug": "best-linkedin-lead-generation-companies", "title": "5 LinkedIn Lead Generation Companies to Use in 2026", "excerpt": "Discover the top 5 LinkedIn lead generation companies in 2026. Compare top agencies, costs, and AI alternatives to find the right B2B growth partner.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5753mb689er9j2mbcdr514819876xzf/5-linkedin-lead-generation-companies-to-use-in-202-1781268582328-kd7qtk.png", "published_at": "2026-06-15T12:29:00+00:00", "content": "# 5 LinkedIn Lead Generation Companies to Use in 2026\n\nIf you are trying to fill a B2B sales pipeline, you already know the frustration of modern outbound. Decision-makers have highly sensitive spam filters, inboxes are flooded with automated pitch slaps, and standing out requires a level of personalization that is painfully difficult to scale. \n\nThis friction is exactly why thousands of businesses turn to [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) every year. Handing the keys over to a specialized team sounds like the perfect solution: you pay a monthly retainer, they run the campaigns, and qualified meetings magically appear on your calendar.\n\nBut the reality of outsourcing in 2026 is more complicated. Many agencies simply charge a premium to run your profile through the exact same cloud-based automation tools you could buy for $100 a month\u2014exposing your account to algorithmic penalties while damaging your personal brand with robotic messaging.\n\nTo make an informed choice, you need to understand the difference between a high-touch consultancy, a volume-based agency, and modern AI platforms that bring the capability in-house. \n\nThis guide breaks down the five best LinkedIn lead generation companies operating right now, how they differ, and the exact criteria you should use to evaluate them before signing a contract.\n\n## What Does a LinkedIn Lead Generation Agency Actually Do?\n\nBefore analyzing specific providers, it is crucial to understand the standard operating procedure of a traditional agency. When you hire an external company to manage [lead generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin), they generally take over four core pillars of your outbound motion.\n\n### 1. Persona Mapping and List Building\nThe foundation of any campaign is the data. A competent agency will spend the first week interviewing you to understand your Ideal Customer Profile (ICP). They translate your buying committee into specific Sales Navigator boolean searches. Instead of just searching for \"Marketing Directors in SaaS,\" they will filter for \"Marketing Directors in B2B SaaS who have been in their role for under 6 months and recently posted about account-based marketing.\"\n\n### 2. Campaign Strategy and Copywriting\nOnce the list is built, the agency writes the connection requests and follow-up sequences. This is where the quality gap between agencies becomes glaringly obvious. Low-tier agencies rely on tired templates (\"I see we are in the same industry, let's connect!\"). Top-tier companies build multi-step sequences based on specific pain points, leveraging case studies and soft asks to start conversations rather than immediately demanding a 15-minute demo.\n\n![Diagram showing the four core pillars of a LinkedIn lead generation agency workflow: persona mapping, strategy, outreach, and](https://assets.bevisible.app/inline-images/j5753mb689er9j2mbcdr514819876xzf/inline-1-1781268502801-da5ek5.png)\n### 3. Execution and Daily Outreach\nThis is the mechanical part. The agency sends connection requests and direct messages on your behalf. Most agencies operate by logging into your account (often via a VPN or dedicated proxy to avoid flagging) and using proprietary or white-labeled automation tools to handle the volume. \n\n### 4. Inbox Management and Appointment Setting\nThe final step is sorting the responses. When a prospect replies favorably, the agency's \"inbox managers\" (often offshore SDRs) step in to handle the back-and-forth conversation. Their sole objective is to navigate objections, qualify the prospect, and drop a Calendly link to secure a meeting for your sales team.\n\nUnderstanding this workflow is essential because it reveals the hidden risks: you are trusting a third party to speak on your behalf, often using automated systems that [LinkedIn's evolving algorithms actively police](https://heyjunior.ai/blog/meet-alfred).\n\n## 5 Best LinkedIn Lead Generation Companies (2026)\n\nThe vendor landscape is split between boutique consultancies promising ultra-personalization, high-volume outbound shops, enterprise data platforms, and next-generation AI software platforms. Here are five of the best options depending on your specific needs.\n\n### 1. SalesBread\n[SalesBread](https://salesbread.com/) is a highly regarded, boutique B2B lead generation agency known for a very specific guarantee: bringing clients one qualified lead per day. \n\nInstead of focusing on massive volume, SalesBread operates on a philosophy of hyper-personalization. They recognize that blasting 100 generic connection requests a day is a fast track to diminishing returns. Instead, their team hand-crafts lists and manually reviews profiles to ensure the messaging is contextually relevant to the recipient.\n\n**Key Differentiators:**\n*   **The 1-Lead-Per-Day Guarantee:** They focus on consistent, high-quality outcomes rather than vanity metrics like connection acceptance rates.\n*   **Deep Research:** Their process involves actual humans reviewing target profiles to weave specific, accurate details into the outreach copy.\n*   **Multi-Channel Approach:** While deeply rooted in LinkedIn, they often pair platform outreach with cold email to surround the prospect.\n\n**Best For:** High-ticket B2B service providers, specialized consultants, and enterprise SaaS companies where a single closed deal easily covers the agency retainer. If your Total Addressable Market (TAM) is small and you cannot afford to burn bridges with bad copy, a boutique approach is necessary.\n\n### 2. Cleverly\n[Cleverly](https://www.cleverly.co/) is arguably one of the most well-known volume-based LinkedIn lead generation agencies. They have scaled significantly by productizing the outbound process, relying on data from thousands of past campaigns to understand exactly which templates and sequences convert best across different industries.\n\nWhen you work with Cleverly, you are paying for their historical data advantage. They know what subject lines work for real estate, what connection messages work for IT managed services, and what follow-ups work for recruiting.\n\n**Key Differentiators:**\n*   **Data-Backed Templates:** They do not guess what works; they use messaging frameworks that have proven successful across thousands of accounts.\n*   **Transparent Dashboard:** Clients get access to a proprietary dashboard to track connection rates, reply rates, and total leads generated in real-time.\n*   **Cost-Effective Tiering:** Compared to bespoke boutique agencies, Cleverly offers more accessible pricing tiers, making it viable for smaller businesses and independent agencies.\n\n**Best For:** Mid-market companies, local service providers, and established agencies that need a reliable, \"done-for-you\" volume engine and have a wide enough TAM that a slightly more templated approach will not exhaust their market.\n\n### 3. Callbox\n[Callbox](https://www.callboxinc.com/lead-generation/linkedin-lead-generation-agencies/) operates at the enterprise end of the spectrum. They are not just a LinkedIn agency; they are a comprehensive, multi-channel B2B growth machine. Callbox integrates LinkedIn outreach with cold calling, email marketing, webinar promotion, and even direct mail.\n\nTheir approach treats LinkedIn as one touchpoint in a much larger, complex ABM (Account-Based Marketing) strategy. When targeting a Fortune 500 company, Callbox might use LinkedIn to map the buying committee, send an initial primer message, follow up with a highly targeted email, and then deploy their internal SDRs to call the prospect.\n\n**Key Differentiators:**\n*   **Full-Funnel Capabilities:** They do not just generate a reply on LinkedIn; they provide the infrastructure to call, qualify, and route the lead globally.\n*   **Global Reach:** They have native-speaking teams across multiple regions, making them ideal for international expansion campaigns.\n*   **Enterprise Integration:** They plug directly into complex CRM setups (Salesforce, HubSpot) and align with sophisticated enterprise sales cycles.\n\n**Best For:** Large enterprises, mature SaaS platforms, and global manufacturers who need an end-to-end outsourced SDR team rather than just a LinkedIn messaging service.\n\n### 4. ZoomInfo\nWhile traditionally known as a B2B contact database, [ZoomInfo](https://pipeline.zoominfo.com/sales/lead-generation-companies) has evolved into a comprehensive go-to-market platform offering managed services and automated workflows that function similarly to a lead generation company.\n\nZoomInfo\u2019s platform allows sales teams to identify intent signals (e.g., a company actively researching your category) and automatically trigger multi-channel plays, including LinkedIn outreach. Their managed services arm can help implement these complex automated motions, bridging the gap between a pure software tool and a service agency.\n\n**Key Differentiators:**\n*   **Unmatched Data Accuracy:** Their core competency is possessing the most accurate, up-to-date B2B contact and intent data in the world.\n*   **Intent-Driven Outreach:** Instead of static lists, campaigns can be triggered by dynamic buying signals, dramatically increasing conversion rates.\n*   **Platform Ecosystem:** It serves as a single source of truth for the entire revenue team, not just a siloed LinkedIn channel.\n\n**Best For:** Sophisticated revenue teams with larger budgets who want to build complex, intent-driven automated outbound machines and have the internal operations talent to manage powerful platforms.\n\n![Comparison matrix sketch of different LinkedIn lead generation models including boutique agencies, volume agencies, and AI so](https://assets.bevisible.app/inline-images/j5753mb689er9j2mbcdr514819876xzf/inline-2-1781268508542-waww0y.png)\n### 5. Junior (The AI Platform Alternative)\nFor many sales teams, founders, and job seekers, handing over account access to a third-party agency is a non-starter. Agencies can be expensive (often $2,000 to $5,000+ per month), and there is an inherent risk in letting an offshore team ghostwrite direct messages under your name. \n\nThis is where Junior enters the list as the modern, software-driven alternative to the traditional agency model. Junior is an AI-driven platform specifically designed to transform LinkedIn engagement into tangible business opportunities. \n\nInstead of the outdated \"connect and pitch\" DM strategy used by most agencies, Junior focuses on a conversation-first strategy. It automates the tedious process of finding highly relevant LinkedIn posts from your prospects and generating high-quality, personalized comments that mirror your natural voice.\n\n**Key Differentiators:**\n*   **Comment-Led Engagement, Not Spam DMs:** While agencies flood inboxes, Junior helps you engage in the public feed. This warms up outbound targets, builds industry authority, and avoids the stigma of cold DM spam.\n*   **Local Machine Security:** Unlike cloud-based agency tools that trigger LinkedIn's security warnings, Junior runs directly on the user's local machine, mimicking natural human behavior with variable timing to maintain total account safety.\n*   **Human-First AI Generation:** It avoids template-based spam by utilizing your specific bio, industry context, and networking goals to craft responses that actually sound like you.\n*   **Smart Post Prioritization:** The platform surfaces the most valuable conversations automatically, saving hours of manual scrolling.\n\n**Best For:** Founders, specialized sales teams, consultants, and individuals running a [LinkedIn AI job search](https://heyjunior.ai/blog/linkedin-ai-job-search) who want agency-level pipeline generation but refuse to compromise their personal brand with automated DM spam or hand over account access.\n\n## How to Evaluate a LinkedIn Lead Generation Agency Before You Sign\n\nIf you decide that a traditional done-for-you agency is the right path, you cannot simply hire the first company you find on Google. The barrier to entry for starting an agency is virtually zero. Anyone can buy a white-labeled cloud automation tool, build a landing page, and call themselves a lead generation expert.\n\nTo separate legitimate growth partners from risky operators, ask these five critical questions during the discovery process.\n\n### 1. \"How do you protect my account from being restricted?\"\nThis is the most important question. LinkedIn aggressively penalizes accounts caught using unauthorized automation. If an agency says, \"We use a proprietary cloud-based tool with IP rotation,\" that is a major red flag. Cloud automation frequently triggers security checks because LinkedIn detects the login coming from a datacenter server rather than a normal residential connection.\n\nSafe outreach requires either entirely manual execution by a virtual assistant using a dedicated residential proxy, or using a tool that runs locally on your own machine (which is exactly why Junior was architected to run locally).\n\n### 2. \"What happens if you burn through my Total Addressable Market?\"\nIf your product is a niche enterprise software solution, there might only be 4,000 qualified buyers in North America. If an agency runs a standard \"100 connection requests a day\" playbook, they will exhaust your entire market in 40 days. \n\nAsk how they adjust volume based on TAM size. A good agency will slow down the cadence, increase the depth of research per prospect, and utilize multi-touch campaigns to ensure they do not burn your finite list of potential buyers with a generic pitch.\n\n### 3. \"Do you use dummy accounts or my personal profile?\"\nSome agencies prefer to create fake \"avatar\" profiles (e.g., \"John Smith, Business Development\") to run outreach, protecting your main account from bans. However, buyers in 2026 are highly skeptical of profiles with 80 connections, no recommendations, and stock photo headshots. \n\nUsing your real profile converts significantly better, but it requires absolute trust in the agency's security practices and copywriting abilities. You need to know exactly whose name is on the line.\n\n![Checklist showing red flags of traditional agencies versus green flags of safe AI engagement platforms.](https://assets.bevisible.app/inline-images/j5753mb689er9j2mbcdr514819876xzf/inline-3-1781268494904-f348si.png)\n### 4. \"What do you consider a 'Lead'?\"\nAgencies often guarantee a certain number of leads per month. You must clearly define what that word means in the contract. \n\n*   Is a lead someone who simply accepts a connection request?\n*   Is it someone who replies, \"Thanks, but not right now\"?\n*   Is it someone who specifically asks for a demo or pricing details?\n\nEnsure their definition of a lead aligns with your definition of a qualified sales opportunity. A guarantee of \"30 leads a month\" is useless if 28 of them are aggressively telling you to stop messaging them.\n\n### 5. \"Can I approve the messaging before it goes live?\"\nNever allow an agency to run campaigns without your explicit sign-off on the copy. Reviewing the sequences will quickly reveal whether they are using industry-specific insights or generic \"I see we are in the same group\" templates.\n\n## The Strategic Shift: Why Engagement is Replacing Cold DMs\n\nThe fundamental challenge facing all [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) and agencies in 2026 is saturation. Decision-makers are acutely aware of what an automated DM sequence looks like.\n\nThe classic \"Connect -> Pitch -> Follow Up -> Breakup\" sequence yields lower reply rates every single quarter. As a result, the top sales teams are shifting their budget away from pure DM volume and toward a \"conversation-first\" strategy.\n\nThis is where the concept of warming up leads through public engagement has become critical. Instead of immediately attacking the inbox, modern sellers are leveraging comments. Leaving thoughtful, high-value comments on a prospect's public posts achieves several things that DMs cannot:\n\n1.  **It circumvents the spam filter:** Comments appear in notifications, which prospects check obsessively. DMs often end up in the \"Other\" folder.\n2.  **It leverages reciprocity:** When you publicly support someone's content, human psychology naturally makes them view you favorably.\n3.  **It creates inbound curiosity:** A well-crafted comment often leads the prospect to click your profile and view your headline, organically pulling them into your funnel.\n\nThis exact shift is why tools like Junior are replacing traditional agency retainers for many users. By generating smart, localized comments and maintaining a high [LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate), users are finding that when they finally *do* send a DM, it is treated as a warm introduction from a familiar face rather than a cold pitch from a stranger.\n\n## In-House AI Tools vs. Outsourced Agency Retainers\n\nIf you are on the fence between hiring an agency like SalesBread or Cleverly, versus bringing the capability in-house with a tool like Junior, it helps to map out the tradeoffs.\n\n| Feature | Traditional Lead Gen Agency | AI Platform (e.g., Junior) |\n| :--- | :--- | :--- |\n| **Cost Structure** | $1,500 - $5,000+ per month retainer. | $50 - $200 per month software subscription. |\n| **Time Commitment** | Low. Requires 1-2 hours a month for strategy calls and pipeline review. | Medium. Requires 10-15 minutes a day to review and approve AI actions. |\n| **Account Safety** | Moderate to High Risk. Depends entirely on their tech stack and proxy usage. | Very Low Risk. Software runs locally, mimicking natural human behavior. |\n| **Authenticity** | Low to Moderate. Offshore SDRs are ghostwriting under your name. | High. You review outputs, and local AI adapts strictly to your personal voice and bio. |\n| **Core Strategy** | Volume-based Connection Requests and Direct Messages. | Quality-based public engagement and comment-driven relationship building. |\n| **Flexibility** | Rigid. Pivoting campaigns often requires meetings and lead time. | Instant. Change targeting, messaging, or tone with a few clicks. |\n\nFor companies with massive budgets, complex enterprise sales cycles, and absolutely zero time to manage outreach, a full-service agency like Callbox makes sense. \n\nHowever, for modern founders, consultants, and lean sales teams looking to [scale LinkedIn lead generation with AI safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai), maintaining control via an in-house tool offers a significantly better return on investment and protects personal brand integrity.\n\n## Should You Use LinkedIn Ads Instead?\n\nAnother option companies explore is bypassing organic outreach entirely and paying LinkedIn directly for traffic. \n\nAs noted by [LinkedIn's own marketing resources](https://business.linkedin.com/advertise/resources/lead-generation), their ad platform offers incredibly robust targeting. You can run Sponsored Content or direct Message Ads to your exact ICP without ever risking account limits.\n\nHowever, understanding the difference between [LinkedIn Lead Gen Ads vs. AI Comments](https://heyjunior.ai/blog/linkedin-lead-generation-ads) is crucial. \n\nLinkedIn Ads are phenomenally expensive. Cost-per-click (CPC) in B2B SaaS frequently exceeds $15, and a single qualified lead can easily cost $200 to $400. Ads are highly effective for distributing premium content (like a massive industry report) to a broad audience, but they lack the personal, peer-to-peer connection required to close high-ticket service deals.\n\nOrganic engagement and outreach build trust. A prospect buying a $50,000 consulting package wants to know they are talking to a recognized industry expert, not just someone who outbid competitors in an ad auction. For high-trust B2B sales, authentic organic engagement remains the superior strategy.\n\n## How to Build Your Own LinkedIn Lead Generation Funnel\n\nIf you decide to skip the agency route and build your own outbound engine, you need a systematic approach. A successful [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) is not just about sending messages; it is about creating a frictionless path from stranger to booked meeting.\n\nHere is how to structure a [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) that actually converts in 2026:\n\n### Step 1: Optimize the Profile for Conversion\nYour profile is your landing page. If you drive traffic to a bad landing page, you waste the effort. \n*   **Headline:** Stop using your job title. Use a value proposition. Instead of \"Account Executive at TechCorp,\" use \"Helping Midwest Logistics Companies Reduce Fuel Costs by 15%.\"\n*   **Featured Section:** Link directly to a high-converting asset. This could be a case study, a calendar link, or a lead magnet.\n*   **About Section:** Write it like a sales letter focusing on the buyer's pain points, not a dry resume of your past accomplishments.\n\n### Step 2: Establish the Targeting (Sales Navigator)\nYou cannot run serious outbound without LinkedIn Sales Navigator. The basic search filters are too broad. Use Sales Nav to exclude current clients, target specific company headcounts, and filter for prospects who have posted on LinkedIn in the last 30 days (this ensures they are actually active on the platform).\n\n### Step 3: The Warm-Up Phase (Engagement)\nInstead of sending a connection request immediately, spend one week engaging with your target list. If you are using a tool like Junior, let the local agent find their recent posts and generate insightful, natural-sounding comments. \n\nDo this two or three times over a week. The prospect will start seeing your face and headline in their notifications. You transition from an invisible salesperson to a recognizable industry peer.\n\n![Flowchart illustrating the engagement-first lead funnel from smart comment to booked meeting.](https://assets.bevisible.app/inline-images/j5753mb689er9j2mbcdr514819876xzf/inline-4-1781268494218-4b5ma9.png)\n### Step 4: The Frictionless Ask\nWhen you finally send the connection request, do not pitch. Reference the conversation you just had in the comments.\n\n*\"Hey Sarah, really enjoyed our back-and-forth on your post about Q3 budget cuts. Would love to stay connected here.\"*\n\nOnce they accept, wait a few days. Then, offer a piece of value with zero strings attached. Share a relevant framework, a template, or an observation. If they lean in and respond positively, *then* you ask for the meeting.\n\n## Frequently Asked Questions\n\nTo round out this guide, here are answers to the most common questions surrounding lead generation services and platforms.\n\n### Is LinkedIn lead generation still effective in 2026?\nYes, but the *tactics* have changed. Brute-force automation and generic \"spray and pray\" messaging no longer work. Buyers demand high personalization and context. Strategies rooted in community building, thoughtful commentary, and highly targeted, multi-touch sequences are generating massive ROI. \n\n### How much do LinkedIn lead generation professionals charge?\nYou can [hire top lead generation professionals](https://www.linkedin.com/services/lead-generation-professionals) on an hourly or retainer basis. Independent freelancers might charge $500 to $1,000 a month. Established boutique agencies typically charge between $2,000 and $5,000 per month, often with setup fees. Enterprise solutions that include full SDR support can exceed $10,000 monthly.\n\n### Will my account get banned if I use a service?\nIt is a legitimate risk. If an agency uses poorly configured cloud-based automation tools, LinkedIn will detect the anomalous behavior, log you out, and potentially restrict the account. This is the primary reason many professionals are switching to locally hosted AI engagement tools that mimic human pacing and run directly from their own browser.\n\n## The Final Verdict on B2B Growth\n\nGenerating consistent B2B pipeline is never going to be completely hands-off. Whether you hire a high-end boutique agency like SalesBread, leverage the massive data infrastructure of ZoomInfo, or bring the capability entirely in-house with an AI engagement platform like Junior, success ultimately comes down to relevance.\n\nThe market rewards authenticity and punishes generic spam. If you choose an agency, force them to prove how they maintain your unique voice. If you choose a software platform, ensure it prioritizes account safety and natural engagement over sheer connection volume. The businesses that master this balance in 2026 are the ones that will see their calendars consistently full of qualified buyers.", "created_at": "2026-06-15T12:49:24.311011+00:00", "updated_at": "2026-06-15T12:49:24.311028+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {

                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
