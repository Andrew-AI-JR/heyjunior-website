    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 37, "slug": "best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio", "title": "Best Tools to Find Relevant Linkedin Posts to Comment On Tools Beyond Taplio", "excerpt": "Stop scrolling the native feed. Discover the best tools to find relevant LinkedIn posts to comment on, from local AI assistants to workflow extensions.", "featured_image_url": "https://assets.bevisible.app/featured-images/j573d4skfgsx1dyrq0e8ad02h9899sg5/best-tools-to-find-relevant-linkedin-posts-to-comm-1782841855223-2ala4b.png", "published_at": "2026-06-30T17:30:00+00:00", "content": "# Best Tools to Find Relevant Linkedin Posts to Comment On Tools Beyond Taplio\n\nRelying on LinkedIn's native feed to find conversations worth joining is a losing battle. The algorithm prioritizes dwell time, viral hooks, and broad engagement over the hyper-niche, relevant discussions you actually need to build a pipeline. If you spend an hour scrolling, you might find two or three posts from your ideal prospects. The rest is noise.\n\nThis is why comment marketing\u2014or \"engagement farming\"\u2014has shifted from a manual chore to a tool-driven workflow. By finding the right posts and adding insightful, context-rich comments, professionals are bypassing crowded DMs and turning public visibility into direct interviews and client conversations.\n\nBut because LinkedIn aggressively limits its public search API to protect user data, standard social listening tools often fail on the platform. You need specialized software to filter the noise, track specific creators, and flag relevant keywords.\n\nWhile Taplio has long been the default answer for this, the landscape has fractured. Teams are now prioritizing account safety, deeper AI context, and workflow integration over basic cloud scraping. Here is a deep dive into the best tools to find relevant LinkedIn posts to comment on, how they work, and how to build a scalable engagement engine.\n\n## The Technical Hurdle: Why Finding Posts is So Difficult\n\nBefore diving into the tools, it is crucial to understand why finding relevant LinkedIn posts requires specialized software in the first place.\n\nUnlike X (formerly Twitter), which historically offered robust public APIs for keyword tracking, LinkedIn operates as a walled garden. Native LinkedIn search allows you to search for posts by keyword, but the filtering is notoriously clunky. You cannot easily sort by \"posted in the last hour\" and \"more than 5 comments\" simultaneously without running into search limits or irrelevant results.\n\nFurthermore, LinkedIn actively restricts scraping to protect user data and prevent spam. Tools that ping LinkedIn's servers from a centralized cloud IP often trigger security flags, leading to shadowbans or account restrictions for the user.\n\nThis leaves engagement tools with three primary methods for finding posts:\n1. **Cloud-Based Scraping:** The tool logs in via your session cookie from a remote server, scrapes the feeds of targeted accounts, and pulls them into a separate dashboard.\n2. **Local Browser Automation:** The tool runs on your actual machine, reading the feed directly through your browser just as a human would, bypassing cloud security triggers.\n3. **Manual Bookmarking via Extensions:** The tool injects UI elements into your native LinkedIn interface, allowing you to save and organize posts as you manually browse.\n\n![Diagram illustrating how specialized tools filter native LinkedIn feed noise into targeted conversations.](https://assets.bevisible.app/inline-images/j573d4skfgsx1dyrq0e8ad02h9899sg5/inline-1-1782841665898-u6fjft.png)\n## Category 1: The Cloud-Based Growth Suites\n\nThese tools are built entirely outside of LinkedIn. You log into a separate web app, input your target keywords or creator lists, and the software curates a custom feed for you. \n\n### 1. Taplio: The Industry Standard\n\nTaplio is widely considered the gold standard for dedicated LinkedIn growth, and for good reason. It bundles scheduling, analytics, and engagement into one polished interface.\n\nIts \"Engagement\" feature allows you to input a list of specific creators\u2014such as industry influencers, target accounts, or competitors\u2014and track specific keywords. Taplio pulls their latest posts into a unified feed. You can rapidly type replies, or use their built-in AI to draft responses, without ever opening LinkedIn.com.\n\n**The Drawbacks:** \nWhile powerful, Taplio operates from the cloud. When a server in another country uses your session cookie to fetch posts, LinkedIn can detect the mismatch in IP addresses and usage patterns. Additionally, Taplio's AI commenting tends to lack deep personal context. It summarizes the post well, but it doesn't always sound like *you*.\n\nIf you are evaluating this category, you may want to compare [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) to understand the tradeoffs between cloud convenience and local safety.\n\n### 2. MagicPost\n\nMagicPost takes a different approach to discovery. Instead of just tracking a list of people you already know, it maintains a massive, heavily indexed library of over 500,000 viral and high-performing LinkedIn posts.\n\nYou can filter this database by industry, keyword, format, and engagement velocity. If you are a founder looking to comment on trending topics regarding \"B2B SaaS pricing,\" MagicPost will surface the posts currently generating the most heat. \n\n**Best for:** Creators who want to farm impressions by commenting early on posts that are mathematically proven to go viral.\n\n### 3. Supergrow\n\nSupergrow is a strong, slightly leaner alternative to Taplio. Its post-finding mechanism revolves around a robust bookmarking and list-building system. You can create distinct lists (e.g., \"Q3 Prospects,\" \"Industry Thought Leaders,\" \"Recruiters in Tech\") and Supergrow creates isolated feeds for each cohort.\n\nThis makes it incredibly easy to dedicate 10 minutes to warming up prospects, and another 10 minutes to networking with peers, without crossing the streams.\n\n**Best for:** Sales teams and agencies who need strict organization of their target accounts. If you are looking for more options in this tier, check out the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n## Category 2: Local AI Engagement Assistants\n\nAs LinkedIn cracks down on cloud-based automation, a new category of local, AI-native tools has emerged. These tools prioritize account safety by running on your device and focus heavily on the *quality* of the comment rather than just the speed of delivery.\n\n### 4. Junior\n\nJunior represents the shift toward secure, high-context engagement. Instead of pulling your data into a vulnerable cloud dashboard, Junior is an AI-powered assistant that runs locally on your machine. This means all interactions mimic natural human behavior, drastically reducing the risk of account restrictions.\n\n**How it finds relevant posts:**\nJunior acts as an intelligent layer over your LinkedIn workflow. When navigating to target accounts, saved searches, or prospect lists, Junior reads the context of the active discussions.\n\n**Why the AI is different:**\nThe core differentiator isn't just finding the post; it is what happens next. Most AI commenting tools read a post about \"sales strategies\" and generate a generic reply like, \"Great sales strategies! Thanks for sharing.\" \n\nJunior, however, uses your unique bio, background, and specific goals. If you are a SaaS founder, it drafts a context-aware, human-sounding reply that weaves your founder perspective into the conversation. It bypasses the \"bot\" feel entirely, turning public visibility into actual pipeline. \n\nFor professionals concerned about account longevity, adopting a local architecture is the most sustainable path. Read more about [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n\n![Comparison matrix evaluating cloud suites, local AI assistants, and extensions for LinkedIn commenting.](https://assets.bevisible.app/inline-images/j573d4skfgsx1dyrq0e8ad02h9899sg5/inline-2-1782841667819-vgn0p8.png)\n## Category 3: Workflow-Friendly Browser Extensions\n\nIf you prefer to work directly inside the native LinkedIn interface but need better organization, browser extensions bridge the gap. They don't offer the massive aggregation of cloud suites, but they significantly improve the manual commenting experience.\n\n### 5. AuthoredUp\n\nAuthoredUp is primarily known as a content formatting and analytics tool, but its extension provides a vastly improved interface for tracking engagement. It allows you to easily switch between multiple post previews and monitor conversations you are involved in.\n\nWhile it won't actively *find* new posts via keyword scraping, it is an excellent tool for managing the posts you have already decided to engage with, ensuring you never miss a reply in a long thread.\n\n### 6. Aware\n\nAware sits directly in your browser and injects a side-panel into LinkedIn. It allows you to categorize your feed and track specific creators natively. When a tracked creator posts, Aware flags it within your browser session.\n\n**Best for:** Solo consultants and job seekers who want a lightweight, distraction-free layer over LinkedIn without paying for a heavy enterprise suite.\n\n## Category 4: Data Extraction and Advanced Scraping\n\nFor enterprise sales teams and lead generation agencies running complex, multi-touch campaigns, simply tracking a feed isn't enough. They need to extract post data at scale to build automated outreach workflows.\n\n### 7. Phantombuster\n\nPhantombuster isn't a commenting tool per se; it is a data extraction automation platform. However, it is a critical tool for finding posts at scale. \n\nA common workflow involves using Phantombuster to scrape a Sales Navigator search (e.g., \"VP of Marketing in London\"), and then running a secondary \"Phantom\" to extract the recent posts of those specific individuals. This output is then fed into a spreadsheet or a CRM, where the team can manually review and comment on the most relevant content.\n\n**The Drawbacks:**\nPhantombuster requires managing session cookies, and rapid scraping can easily trigger LinkedIn's defense mechanisms. It also lacks a built-in UI for actually placing the comments\u2014you still have to do that manually or pipe the data into another tool. If you are building this kind of stack, review these [Phantombuster Alternatives for Automate Linkedin Comments Safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely).\n\n## 5 Core Strategies for Finding High-Impact Posts\n\nHaving the right tool is only half the equation. If you track the wrong keywords or the wrong creators, you will waste your AI credits drafting replies to an empty room. \n\nHere are the specific strategies you should input into your chosen tool to find posts that actually drive profile views and inbound messages.\n\n### 1. The \"Trigger Event\" Search\n\nInstead of tracking broad industry terms like \"Marketing\" or \"SaaS,\" configure your tools to look for trigger events. These are context-rich situations where the poster is actively seeking a solution, experiencing a pain point, or celebrating a milestone.\n\n*   **Bad Keyword Tracking:** \"B2B Sales\"\n*   **Good Keyword Tracking:** \"hiring SDRs,\" \"just promoted to VP,\" \"frustrated with Salesforce,\" \"tool recommendations for lead gen\"\n\nWhen your tool flags these posts, a well-crafted, bio-aligned comment positions you perfectly as a resource exactly when the user has intent.\n\n### 2. The \"Adjacent Authority\" Method\n\nMany people make the mistake of only tracking their direct competitors or their direct prospects. The real goldmine of engagement is found in \"adjacent authorities.\"\n\nIf you sell email marketing software, don't just track other email marketers. Track copywriting experts, deliverability consultants, and e-commerce growth agencies. These creators share your target audience, but they are not your competitors. \n\nLoad a list of 50 adjacent authorities into a tool like Junior or Supergrow. When they post, your insightful comments will be seen by their audience\u2014which perfectly overlaps with yours.\n\n### 3. The 60-Minute Window\n\nLinkedIn's algorithm heavily weighs engagement velocity. If a post receives high-quality comments in the first 60 minutes, its reach expands exponentially. \n\nYour tool should ideally alert you when your Tier-1 target accounts post. Commenting early ensures your reply sits at the top of the thread. A top-level comment on a post that eventually hits 500,000 views can drive hundreds of inbound profile visits to your own page.\n\n### 4. Commenting on the Commenters\n\nSometimes the best post to engage with isn't a post at all\u2014it's a high-level comment left by a prospect on an industry influencer's post.\n\nIf an influencer with 100k followers posts about a new trend, your target prospect might leave a thoughtful 3-paragraph comment. Instead of trying to stand out among the 500 replies to the main post, reply directly to the *prospect's* comment. This triggers a direct notification to them and starts a micro-conversation isolated from the main noise.\n\n### 5. Tracking Event Attendees\n\nIf a major virtual event or webinar is happening in your niche, the attendees will likely be posting takeaways on LinkedIn. Use native search or your scraping tool to track the specific event hashtag (e.g., #SaaStrAnnual). Engaging with these posts establishes immediate common ground, making a subsequent connection request highly likely to be accepted.\n\n![Visual framework outlining five core strategies for finding high-impact LinkedIn posts to comment on.](https://assets.bevisible.app/inline-images/j573d4skfgsx1dyrq0e8ad02h9899sg5/inline-3-1782841666705-h696lx.png)\n## The Evaluation Checklist: How to Choose\n\nWith so many overlapping features, selecting the right tool for finding and commenting on LinkedIn posts requires a strict evaluation matrix. Before you commit to an annual contract, run the tool through this framework. (For a more exhaustive breakdown, consult the [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist)).\n\n### Criterion 1: Execution Environment (Local vs. Cloud)\n*   **The Risk:** Cloud tools fetch data via remote servers using your cookie. LinkedIn hates this.\n*   **The Check:** Does the tool require you to copy/paste your `li_at` cookie into a web app? If yes, it is cloud-based. Does it operate via a secure desktop app or localized extension? If yes, it is local.\n*   **Recommendation:** Prioritize local execution like Junior if your LinkedIn account is a critical business asset.\n\n### Criterion 2: Contextual AI Capabilities\n*   **The Risk:** \"Great post!\" syndrome. Generic AI damages your brand reputation.\n*   **The Check:** Does the AI allow you to input your specific tone of voice, your company's value proposition, and your personal background? Does it read the *entire* thread for context, or just the main post?\n*   **Recommendation:** Avoid tools that only offer simple \"agree/disagree\" sliders. Demand bio-aligned drafting.\n\n### Criterion 3: Curation vs. Search\n*   **The Risk:** You still spend hours sifting through the tool's feed.\n*   **The Check:** Can you build distinct lists (e.g., prospects, peers, influencers)? Does the tool filter out posts that lack substantive text (like random image shares)? \n*   **Recommendation:** Look for robust list-management features. If a tool just dumps everything into one massive feed, it hasn't solved the core problem.\n\n### Criterion 4: Workflow Integration\n*   **The Risk:** The tool breaks your natural rhythm, forcing you to switch tabs constantly.\n*   **The Check:** Does the tool sit comfortably within your daily routine? Can you quickly approve, edit, and post a generated comment in under 15 seconds?\n*   **Recommendation:** The best tools get out of the way. They present the post, draft a high-quality reply, allow for a human edit, and execute.\n\n## Building a 30-Minute Daily Commenting Routine\n\nEven with the best tools, you need a disciplined process. Commenting aimlessly won't yield results. Here is how top founders and sales teams structure a 30-minute daily routine using their engagement stack.\n\n**Minutes 0-10: The Prospect Warm-Up**\n*   Open your tool and select your \"Active Prospects\" list.\n*   Review the recent posts from decision-makers you are currently trying to close or book a meeting with.\n*   Leave highly customized, thoughtful comments that add value to their specific point. Do not pitch. The goal here is mere exposure\u2014getting your face and name in their notification tray so your next email is recognized.\n\n**Minutes 10-20: The Authority Build**\n*   Switch to your \"Industry Influencers\" list.\n*   Find 3-5 posts from massive creators in your space that were published recently.\n*   Use your AI assistant to draft a contrarian but polite perspective, or to add a supplementary data point the creator missed. \n*   These comments are designed to hijack reach. You are commenting so that the *creator's audience* clicks on your profile.\n\n**Minutes 20-30: Peer Networking and Reciprocity**\n*   Switch to your \"Peers and Partners\" list.\n*   Engage with people at your level\u2014other founders, parallel agency owners, or colleagues.\n*   Be supportive, ask clarifying questions, and foster community. This builds the reciprocal relationships that will eventually drive engagement to your own future posts.\n\n## The Risks of Automation and How to Mitigate Them\n\nThe allure of \"set it and forget it\" LinkedIn automation is strong, but it is a trap. Fully automated commenting\u2014where software finds a post and publishes an AI comment without human review\u2014is the fastest way to ruin your reputation.\n\nAI hallucinations happen. A prospect might post about a failed product launch, and a poorly tuned AI might automatically comment, \"Congratulations on the milestone!\" It only takes one of these mistakes to burn a relationship permanently.\n\nThis is why the \"Co-Pilot\" model is the only viable path forward. Tools must augment your intelligence, not replace it. \n\n1.  **Always human-review:** Use the tool to find the post and draft the baseline response. But take the 5 seconds to read it and tweak a word or two before hitting send.\n2.  **Vary your engagement:** Don't comment 100 times a day. LinkedIn's algorithm favors quality over quantity. 15 incredible comments will drive more profile views than 100 generic ones.\n3.  **Audit your lists monthly:** People change roles, and creators change their content pillars. Clean out your tracked lists regularly so your tool isn't surfacing irrelevant content.\n\nIf you want to understand where the industry is heading regarding safe usage, review the [Best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026) to see how local execution and human-in-the-loop systems are becoming mandatory.\n\n![Workflow diagram demonstrating the human-in-the-loop co-pilot model for LinkedIn commenting.](https://assets.bevisible.app/inline-images/j573d4skfgsx1dyrq0e8ad02h9899sg5/inline-4-1782841715526-kenbp3.png)\n## Moving Forward: From Passive Scrolling to Active Pipeline\n\nFinding relevant LinkedIn posts to comment on shouldn't be an exercise in frustration or endless scrolling. The native platform is simply not designed for targeted, strategic relationship building.\n\nBy adopting the right tools, you transform LinkedIn from a noisy timeline into an organized, actionable pipeline. Whether you opt for a cloud-based suite to organize massive lists, a browser extension to refine your native experience, or a local, context-aware AI like Junior to ensure authenticity and account safety, the goal remains the same: stop shouting into the void of your own feed, and start joining the conversations that are already happening.\n\nThe professionals who win on LinkedIn aren't necessarily the ones creating the most content. They are the ones who show up in the right threads, at the right time, with the exact right insight.", "created_at": "2026-06-30T18:19:22.827297+00:00", "updated_at": "2026-06-30T18:19:22.827302+00:00"};
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
