    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 22, "slug": "linkedin-lead-generation-agency", "title": "How to Pick a LinkedIn Lead Generation Agency in 2026", "excerpt": "Discover how to choose the right LinkedIn lead generation agency in 2026. Learn the red flags, compare top services, and explore AI-driven in-house alternatives.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57186akxng4ppk1wpte7hjns9877njs/how-to-pick-a-linkedin-lead-generation-agency-in-2-1781099409642-d52in3.png", "published_at": "2026-06-13T13:16:00+00:00", "content": "# How to Pick a LinkedIn Lead Generation Agency in 2026\n\nOutsourcing your LinkedIn outreach sounds like a dream. You pay a monthly retainer, hand over your target criteria, and suddenly your calendar is booked with qualified sales calls. \n\nExcept, for many B2B teams, the reality looks quite different. You sign the contract, hand over the keys to your LinkedIn account, and watch as your profile blasts generic, template-heavy messages to your most valuable prospects. Your account gets temporarily restricted for automation abuse, and the \"leads\" the agency sends over are junior employees who merely asked for a brochure to be polite.\n\nIn 2026, the landscape of B2B outreach has fractured. On one side, buyers are completely numb to traditional cold direct messages (DMs). On the other, LinkedIn has dramatically tightened its security protocols against cloud-based automation. \n\nChoosing the right partner is no longer just about who has the cleverest copywriting. It is a revenue and brand safety decision. This guide will walk you through exactly how to evaluate, interview, and select a [LinkedIn lead generation agency](https://www.callboxinc.com/lead-generation/linkedin-lead-generation-agencies/) that actually drives pipeline\u2014and when you might be better off keeping the process in-house.\n\n## What Does a LinkedIn Lead Generation Agency Actually Do?\n\nBefore you can evaluate a vendor, you need to understand the modern baseline for this service. Five years ago, a LinkedIn agency simply rented a scraped list, loaded it into a spam tool, and hit \"send\" on 100 connection requests a day. \n\nToday, a legitimate agency operates as an extension of your sales development team. Their core mandate is to initiate conversations and hand them off to your closers. \n\nA standard full-service engagement typically includes:\n\n*   **Profile Makeovers:** Rewriting your headline, summary, and experience to read like a landing page rather than a resume. \n*   **Granular List Building:** Moving beyond basic Sales Navigator filters to identify buying signals (e.g., recent funding, hiring surges, or specific technology installations).\n*   **Message Sequencing:** Designing multi-touch campaigns that might include profile views, post likes, connection requests, and sequential follow-ups.\n*   **Inbox Management:** Having a human (or sophisticated AI) monitor the replies, handle basic objections, and politely disqualify bad fits.\n*   **Appointment Setting:** Pushing qualified respondents directly onto your calendar via scheduling links.\n\n![Diagram comparing agency responsibilities with internal sales workflow.](https://assets.bevisible.app/inline-images/j57186akxng4ppk1wpte7hjns9877njs/inline-1-1781099285847-c65z2y.png)\nHowever, the gap between a bottom-tier provider and a top-tier partner lies in *how* they execute these steps. The wrong agency treats outreach as a numbers game. The right agency treats it as account-based marketing (ABM) disguised as a 1-on-1 conversation.\n\n## The 6 Crucial Factors to Evaluate Before Hiring a Partner\n\nWhen you are vetting an agency, look past the promises of \"1 lead per day.\" Focus your due diligence on these six operational pillars. \n\n### Factor 1: Brand Safety and Governance Protocol\n\nThis is the single most important factor in 2026. LinkedIn actively penalizes accounts that use reckless automation. If an agency uses cloud-based automation tools that log into your account from a server in a different country, your account will likely be flagged, restricted, or permanently banned.\n\nAsk the agency exactly how they execute the outreach. \n*   Do they log in manually from a dedicated local IP?\n*   Do they use software that mimics human interaction delays?\n*   Do they respect LinkedIn's weekly connection limits (currently hovering around 100-200 per week for warmed-up accounts)?\n\nIf they wave away your security concerns or promise they can send 500 connection requests a day, walk away. Your personal brand reputation is worth more than a few extra at-bats.\n\n### Factor 2: Omnichannel Approach vs. LinkedIn-Only\n\nRelying solely on LinkedIn is a brittle strategy. What happens if your prospect is on vacation or rarely checks the platform? \n\nTop-tier agencies use a multichannel approach. They will extract the email addresses of the prospects they find on LinkedIn and run simultaneous cold email campaigns. They might engage on LinkedIn, send an email two days later referencing the connection request, and follow up with a phone call if they offer full-cycle SDR services.\n\nBefore signing, clarify if you are buying a single channel or a cohesive [lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) that integrates LinkedIn, email, and potentially [LinkedIn lead generation ads](https://heyjunior.ai/blog/linkedin-lead-generation-ads).\n\n### Factor 3: Process Transparency and Platform Compliance\n\nTransparency is non-negotiable. You must own the data, and you must have visibility into the inbox. \n\nSome \"black box\" agencies refuse to show you the exact messaging they use, claiming it is their \"proprietary secret.\" Never accept this. If your name and face are attached to a message, you must approve the copy. \n\nFurthermore, require them to operate within a shared CRM or a transparent tracking sheet. You should be able to log in on a Tuesday at 2:00 PM and see exactly how many people were contacted, who they were, and what the reply rate is.\n\n### Factor 4: Verifiable Performance in Your Niche\n\nA strategy that works for selling $50/month SaaS to startup founders will fail catastrophically when selling $250,000 logistics contracts to supply chain executives. \n\nAsk for [case studies and testimonials](https://belkins.io/blog/best-linkedin-lead-generation-companies) specifically relevant to your buyer persona. If you are selling to highly technical buyers (engineers, developers, IT directors), they are notoriously hostile to traditional sales pitches. The agency must demonstrate they know how to bypass the spam filters in your buyer's brain.\n\n### Factor 5: Lead Quality and the Definition of a \"Lead\"\n\nThe biggest point of friction between B2B companies and lead generation agencies is the definition of a lead. \n\nIf you pay an agency on a performance basis (e.g., $300 per lead), they are financially incentivized to lower the barrier to entry. They might classify a response like, \"Sure, send over a PDF,\" as a qualified lead and bill you for it. When your sales team follows up, the prospect ghosts them.\n\nYou must explicitly define the qualification criteria in the contract. A standard definition should be: *A lead is a prospect matching our Ideal Customer Profile (ICP) who has explicitly agreed to a calendar meeting to discuss our services.*\n\n### Factor 6: Seamless Integration with Your Internal Team\n\nAn agency is only as good as the handoff. How do they pass the baton to your Account Executives? \n\nLook for agencies that integrate directly with your CRM (Salesforce, HubSpot, Pipedrive). When a meeting is booked, all the context\u2014the LinkedIn chat history, the prospect's company details, and the specific pain point mentioned\u2014should automatically sync to the meeting invite and the CRM record. If your AE has to hunt through a messy spreadsheet five minutes before the call, the agency is failing you.\n\n![Decision matrix comparing cost, control, and brand safety for LinkedIn outreach methods.](https://assets.bevisible.app/inline-images/j57186akxng4ppk1wpte7hjns9877njs/inline-2-1781099288989-trexjn.png)\n## The Real Cost: Retainers, Performance, and Hybrid Pricing\n\nPricing for LinkedIn lead generation varies wildly based on the agency's location, the seniority of their staff, and their business model. Generally, you will encounter three structures.\n\n### 1. The Monthly Retainer\n\nThis is the most common model for premium, U.S.- or European-based agencies. You pay a flat fee every month, regardless of how many leads are generated. \n*   **Typical Cost:** $2,500 to $6,000 per month.\n*   **Pros:** Predictable costs; the agency is incentivized to focus on high-quality targeting rather than rushing volume to get paid.\n*   **Cons:** You carry all the risk. If they fail to produce pipeline, you are still out the retainer.\n\n### 2. Pay-Per-Lead (PPL) or Pay-Per-Meeting\n\nIn this model, you only pay when the agency delivers a booked meeting or a positive reply.\n*   **Typical Cost:** $150 to $800 per meeting, depending on the seniority of the prospect.\n*   **Pros:** Lower upfront risk; directly tied to ROI.\n*   **Cons:** Extremely high risk of misaligned incentives. The agency may use aggressive, clickbait-style messaging to trick prospects into taking a call, resulting in terrible meeting quality and angry prospects.\n\n### 3. The Hybrid Model\n\nThe most balanced approach. You pay a smaller setup/management fee to cover their software and labor costs, plus a performance bonus for every qualified meeting that actually occurs.\n*   **Typical Cost:** $1,000 - $2,000/month base + $150 - $300 per qualified meeting.\n*   **Pros:** Shares the risk between both parties while maintaining quality standards.\n\n## 8 Top LinkedIn Lead Generation Agencies to Consider\n\nIf you are ready to outsource, the market is flooded with options. Based on recent market analysis and industry reputation, here are eight of the top [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) operating today.\n\n### 1. Belkins\n\nBest suited for mid-market to enterprise B2B companies ($50M\u2013$1B+ revenue) with aggressive growth targets. Belkins is known for a heavily researched, highly personalized approach. They don't just run automation; they employ dedicated SDRs who hand-craft outreach and integrate deeply with your internal sales operations.\n\n### 2. SalesBread\n\n[SalesBread](https://salesbread.com/) guarantees one qualified lead per day. They are ideal for companies that need month-to-month flexibility without being locked into annual contracts. Their differentiator is extreme list granularity\u2014they spend hours manually filtering out bad fits before sending a single message, resulting in higher conversion rates on smaller lists.\n\n### 3. Cleverly\n\nCleverly is one of the most well-known names in the space, particularly for small to medium-sized businesses. They leverage data from thousands of successful campaigns to template their messaging. If you need a cost-effective, high-volume approach and your product has broad appeal, they are a solid choice.\n\n### 4. Callbox\n\nCallbox shines when you need a truly global, omnichannel approach. They integrate LinkedIn outreach, cold calling, and email. If you need to penetrate massive enterprise accounts where a multi-touch, multi-stakeholder strategy is required, Callbox has the infrastructure to support it.\n\n### 5. Pearl Lemon Leads\n\nBased out of the UK, Pearl Lemon is highly effective for multichannel lead generation, particularly for European brands or companies trying to break into the EMEA market. They are aggressive, transparent, and highly communicative.\n\n### 6. Respect.Studio\n\nRespect.Studio leans heavily into the relationship-building aspect of LinkedIn. They are excellent for consultants, boutique agencies, or founders who want to position themselves as thought leaders rather than just pitching products. Their focus is on high-touch, personalized engagement.\n\n### 7. Intelus\n\nIntelus takes a slightly different approach by offering dedicated, highly-trained offshore virtual assistants who act as your personal SDRs. This allows for a very human touch at a more competitive price point, making it a strong option for scaling teams on a budget.\n\n### 8. Lead Cookie\n\nLead Cookie offers a straightforward, no-nonsense service that combines LinkedIn and cold email. They guarantee results within the first 30 days and provide an excellent onboarding experience. They are highly transparent about their methods and work well for established B2B service businesses.\n\n![Comparison table of LinkedIn lead generation agency pricing models.](https://assets.bevisible.app/inline-images/j57186akxng4ppk1wpte7hjns9877njs/inline-3-1781099305167-2u4ofs.png)\n## Red Flags: When to Walk Away During the Sales Pitch\n\nAgencies are experts at selling themselves. During your evaluation calls, listen carefully for these specific red flags:\n\n**\"We guarantee 50 leads in your first month.\"**\nB2B sales is complex. No honest agency can guarantee a specific volume of leads before they have tested your offer in the market. Guarantees usually mean they will aggressively categorize any pulse as a \"lead\" to hit their quota.\n\n**\"We use our own proprietary LinkedIn accounts.\"**\nSome agencies offer to build \"avatar\" profiles (fake personas) to do the outreach so your main account stays safe. This violates LinkedIn's Terms of Service. When these fake accounts are eventually caught and banned, any leads generated from them often vanish, and the brand damage can spill over to your company page.\n\n**Refusal to discuss failure.**\nAsk the agency: *\"Tell me about a time a campaign completely bombed, and how you fixed it.\"* If they claim they've never had a failed campaign, they are lying. A good agency will openly discuss how they pivot when the market rejects an initial angle.\n\n## Agency vs. In-House AI: The Paradigm Shift in 2026\n\nHistorically, companies hired agencies because they lacked the time to do manual outreach and the technical expertise to manage complex automation tools. \n\nHowever, the introduction of sophisticated, localized AI has disrupted the traditional agency model. Many companies are realizing they don't need a $4,000/month agency; they need a smarter tool stack and one dedicated internal team member.\n\n### The Problem with Traditional Automation\n\nTraditional [LinkedIn automation tools](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) (the ones many cheaper agencies still use) operate in the cloud. They log into your account from a random IP address, scrape pages at superhuman speeds, and fire off 50 identical DMs in an hour. \n\nLinkedIn's security algorithms easily catch this. Even tools that claim to be safe often result in temporary shadowbans, where your messages are silently filtered into the recipient's \"Other\" inbox.\n\n### The Conversation-First Approach\n\nThe most effective way to generate pipeline on LinkedIn today is not through unsolicited DMs, but through public engagement. Leaving highly insightful, relevant comments on your prospects' posts naturally draws them to your profile and invites connection requests *from them*.\n\nThis is where the \"in-house AI\" approach shines. Instead of paying an agency to spam inboxes, you equip your own sales team with tools that augment their natural networking behavior.\n\nFor example, **Junior** was built specifically to solve the risks associated with cloud automation and agency outsourcing. \n\nUnlike traditional tools, Junior runs directly on your local machine. From LinkedIn's perspective, it looks exactly like you are sitting at your computer. It avoids account flagging by design. \n\nMore importantly, Junior focuses on the conversation-first strategy. It intelligently finds relevant posts from your target prospects and generates highly personalized, context-aware comments that match your specific voice and bio. It doesn't send spammy DMs. It initiates authentic public conversations that naturally warm up outbound leads, allowing you to [increase your engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate) and build authority without the stigma of cold pitch spam.\n\nIf you want the scale of an agency but demand the authenticity and security of an in-house expert, leveraging a local AI tool like Junior is often the smarter, more sustainable path.\n\n![Diagram illustrating the safety of local machine execution versus risky cloud automation.](https://assets.bevisible.app/inline-images/j57186akxng4ppk1wpte7hjns9877njs/inline-4-1781099293708-0ov08p.png)\n## How to Onboard an Agency for Maximum Success\n\nIf you do decide that an outsourced agency is the right fit for your current growth stage, how you start the engagement dictates how it will end. \n\nDo not hand over a credit card and check out. Treat the first 30 days as a critical co-building phase. \n\n**Step 1: Define the Ideal Customer Profile (ICP) rigidly.**\nDo not just say \"marketing directors in software.\" Specify the company headcount, the specific sub-niches of software, the technologies they use, and the trigger events (e.g., just hired a new VP of Sales) that make them a good fit.\n\n**Step 2: Co-write the messaging.**\nThe agency will likely provide templates. Rewrite them. Inject your actual tone of voice. Remove industry jargon. Ensure the call-to-action is a low-friction ask (e.g., \"Mind if I share a brief framework on how we solved X?\") rather than a high-friction demand (e.g., \"Do you have 15 minutes on Tuesday for a demo?\").\n\n**Step 3: Establish the feedback loop.**\nWhen the first leads come in, your sales team must provide immediate, granular feedback to the agency. If a lead was unqualified, tell the agency exactly *why*. Was the company too small? Was the prospect the wrong seniority level? The agency needs this feedback to refine their targeting parameters.\n\n## Frequently Asked Questions\n\n### How long does LinkedIn lead generation take to produce results?\n\nIf an agency promises a calendar full of meetings in week one, be skeptical. The first 14 to 21 days should be spent warming up your account, finalizing targeting parameters, and A/B testing initial messaging. You should expect to see a trickle of responses in weeks three and four, with consistent pipeline generation scaling up by month two or three.\n\n### Will the agency use my personal LinkedIn account?\n\nYes. To be effective, B2B outreach must come from a real human\u2014usually a Founder, CEO, or VP of Sales. [Generating leads on LinkedIn](https://business.linkedin.com/advertise/resources/lead-generation) from a blank company page yields abysmal conversion rates. This is why brand safety and using safe, locally run processes are absolutely paramount.\n\n### Is LinkedIn lead generation still effective in 2026?\n\nYes, but the definition of \"effective\" has changed. Brute-force volume is dead. Highly targeted, conversation-driven approaches are thriving. Buyers will still take meetings from LinkedIn outreach, but only if the person reaching out demonstrates genuine context, relevance, and respect for their time.\n\n### Do I need a Sales Navigator subscription?\n\nAlmost universally, yes. Any reputable agency will require you to have an active LinkedIn Sales Navigator account. The basic search filters are simply not powerful enough for the granular targeting required to run a successful [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel).\n\n## The Final Verdict on Outsourcing\n\nChoosing a LinkedIn lead generation agency is essentially hiring an external SDR team to speak on behalf of your brand. It is a decision that requires strict due diligence around compliance, process transparency, and messaging quality.\n\nIf you have the budget and need to immediately scale outbound across multiple channels, a premium partner like Belkins or SalesBread can deliver tremendous value. \n\nHowever, if your primary goal is to build long-term authority, warm up prospects authentically, and avoid the risks of cloud-based automation bans, you may not need an agency at all. Implementing a localized, [AI-driven lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-ai) using a platform like Junior allows you to own your pipeline, protect your account, and turn authentic engagement into actual revenue.\n\nThe tool or the team you choose matters less than the philosophy behind them. Choose a partner\u2014whether human or software\u2014that prioritizes conversations over sheer volume.", "created_at": "2026-06-13T13:19:24.158029+00:00", "updated_at": "2026-06-13T13:19:24.158035+00:00"};
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
