    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 14, "slug": "meet-alfred", "title": "Meet Alfred vs Junior: Which LinkedIn Tool is Safer?", "excerpt": "Comparing Meet Alfred and Junior for LinkedIn automation. Discover the risks of cloud-based multi-channel tools versus the safety of local AI engagement.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57c6pjhtykk5tm27rh8095f29877wbp/meet-alfred-vs-junior-which-linkedin-tool-is-safer-1780579158214-7ev03y.png", "published_at": "2026-06-04T15:27:47.751000+00:00", "content": "# Meet Alfred vs Junior: Which LinkedIn Tool is Safer?\n\nThere is a distinct sinking feeling when you try to log into LinkedIn, only to be met with a gray screen and a message stating: *\"Your account has been temporarily restricted.\"* For sales professionals, founders, and agency owners who rely on the platform for revenue, an account ban isn\u2019t just an inconvenience\u2014it is an immediate disruption to the sales pipeline.\n\nAs LinkedIn continues to tighten its algorithm and anti-automation security measures in 2026, the software you use to manage your outreach dictates the safety of your digital reputation. The market is currently split between legacy cloud-based volume tools and modern, localized engagement platforms.\n\nIn this comprehensive breakdown, we are comparing two completely different approaches to platform growth: **Meet Alfred**, a well-known multi-channel automation workhorse, and **Junior**, a local-first AI engagement tool built specifically for high-value, conversation-led networking. \n\nWe will examine their architectures, their lead generation strategies, their pricing, and ultimately answer the most critical question: Which LinkedIn tool is actually safe to use today?\n\n## The Evolution of LinkedIn Automation Tools\n\nTo understand why tool safety is currently the most debated topic in B2B sales, you have to look at how LinkedIn\u2019s detection systems have evolved.\n\nFive years ago, automation tools functioned as digital battering rams. You could load a list of 1,000 URLs, set a generic \"Hi {first_name}, I see we are in the same industry\" message, and blast it out from a cloud server. LinkedIn's detection was rudimentary, largely relying on simple velocity limits (e.g., blocking users who sent 200 connection requests in an hour).\n\nToday, LinkedIn uses sophisticated behavioral analysis. They don't just look at *how many* actions you take; they analyze *how* those actions are executed. They monitor:\n*   **IP consistency and origin:** Is your traffic coming from an AWS datacenter proxy or a residential ISP?\n*   **Session fingerprinting:** Are you using a headless browser with easily identifiable automation signatures?\n*   **Interaction pacing:** Are your clicks happening at exact, mathematical intervals?\n*   **Read/Write ratios:** Do you spend time \"reading\" the feed, or does your account only execute outbound actions like a machine?\n\nThis shift in enforcement has fundamentally changed the landscape of [top 10 LinkedIn automation tools](https://heyjunior.ai/blog/top-10-linkedin-automation-tools). Tools that rely on cloud-based scraping and mass cold DM spam are becoming liabilities, forcing professionals to re-evaluate their tech stacks.\n\n## What is Meet Alfred?\n\n[Meet Alfred](https://meetalfred.com/) is a veteran in the automation space. Billed as an all-in-one sales enablement platform, it is designed to automate multi-channel outreach campaigns across LinkedIn, email, and Twitter. It appeals heavily to teams wanting to execute high-volume, multi-touchpoint sequences from a single dashboard.\n\nRather than just sending a LinkedIn message, a Meet Alfred campaign might look like this: send a LinkedIn connection request on Day 1, send an email on Day 3 if they don't accept, and send a Twitter DM on Day 5.\n\n### Top Features of Meet Alfred\n\n*   **Multi-Channel Sequences:** The core selling point. You can stitch together LinkedIn actions, cold emails, and Twitter interactions into complex, condition-based campaigns.\n*   **Built-in CRM:** It acts as a lightweight CRM to track replies, tags, and campaign statuses, reducing the immediate need for external software.\n*   **Cloud-Based Execution:** Campaigns run in the cloud 24/7. You don't need to keep your computer awake for messages to send.\n*   **Extensive Integrations:** It connects natively via APIs and Webhooks to tools like Hubspot, Pipedrive, Zapier, and Hyperise.\n*   **Email Warm-Up:** Built-in tools to improve email deliverability alongside your LinkedIn efforts.\n\n### Downsides and User Reviews\n\nWhile the feature set is vast, Meet Alfred\u2019s architecture introduces significant friction in today's security climate. Because it is a cloud-based platform, your LinkedIn account is essentially being operated from a remote server using a dedicated proxy IP.\n\nAccording to [Trustpilot reviews](https://www.trustpilot.com/review/meetalfred.com) and industry analyses from sites like [HeyReach](https://www.heyreach.io/blog/meet-alfred-review) and [LinkedHelper](https://www.linkedhelper.com/blog/linked-helper-vs-meet-alfred/), users frequently highlight a few recurring issues:\n\n1.  **Account Restrictions:** Cloud automation is inherently risky. Even with dedicated IPs, LinkedIn can easily detect datacenter traffic and headless browser patterns, leading to sudden warnings or bans.\n2.  **Clunky Interface:** Managing complex multi-channel campaigns can lead to a bloated UI that is difficult for beginners to navigate.\n3.  **The Stigma of Spam:** Because the tool encourages volume, users often fall into the trap of sending highly templated, generic outreach. In 2026, decision-makers are blind to automated DMs, driving response rates down.\n\n## What is Junior?\n\n[Junior](https://heyjunior.ai) is an AI-driven platform that takes a fundamentally different approach. Instead of focusing on cold DM volume, Junior is designed to transform LinkedIn engagement into tangible business opportunities through authentic, conversation-first interactions.\n\nJunior operates on the premise that leaving a thoughtful, highly contextual comment on a prospect's post is far more effective\u2014and much safer\u2014than sending them a cold, automated pitch in their inbox.\n\n### Top Features of Junior\n\n*   **Local-Machine Architecture:** Unlike cloud tools, Junior runs directly on the user's local machine. This ensures that all LinkedIn actions originate from your actual device and residential IP address, virtually eliminating the risk of proxy-related bans.\n*   **Human-First AI Generation:** Junior doesn't use generic templates. It uses your specific bio, industry context, and networking goals to generate high-quality, personalized comments that mirror your natural voice.\n*   **Smart Post Prioritization:** The tool identifies relevant, high-leverage LinkedIn posts where your engagement will have the most impact.\n*   **Variable Timing and Natural Interaction:** Junior mimics human behavior by utilizing variable timing for interactions, avoiding the robotic consistency that triggers LinkedIn\u2019s security filters.\n*   **Performance Analytics:** Detailed tracking to see how your engagement is driving profile views, connection requests, and conversation starts.\n\n![Flowchart comparing cloud-based automation infrastructure to local execution architecture on LinkedIn](https://assets.bevisible.app/inline-images/j57c6pjhtykk5tm27rh8095f29877wbp/inline-1-1780579069555-jq72zu.png)\n## Security Showdown: Cloud Execution vs. Local Execution\n\nThe most critical differentiator between Meet Alfred and Junior\u2014and the direct answer to the safety question\u2014lies in their infrastructure.\n\n### The Vulnerability of Cloud Automation (Meet Alfred)\n\nWhen you connect your LinkedIn account to a cloud tool like Meet Alfred, you are granting a remote server access to your session cookies. The tool operates a headless browser (a browser without a user interface) in a data center to navigate LinkedIn on your behalf.\n\nTo avoid logging in from an IP address halfway across the world, cloud tools assign you a \"dedicated proxy.\" However, LinkedIn's security engineers know exactly which IP ranges belong to AWS, Google Cloud, and popular proxy providers. \n\nFurthermore, headless browsers render pages differently than actual consumer browsers like Chrome or Safari. LinkedIn can run scripts to detect these minute rendering differences. If LinkedIn detects datacenter IP behavior combined with headless browser signatures, your account is immediately flagged. \n\nIf you are researching [how to scale LinkedIn lead generation with AI safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai), cloud proxy architecture is the single biggest risk factor you must mitigate.\n\n### The Safety of Local Execution (Junior)\n\nJunior eliminates the proxy problem entirely by running locally on your own machine. \n\nWhen Junior interacts with LinkedIn, it happens through your actual browser, using your actual residential or office Wi-Fi network. To LinkedIn\u2019s security algorithms, Junior's actions look exactly like you sitting at your desk clicking and typing.\n\nBecause there is no sudden shift in IP address geolocation, no datacenter routing, and no headless browser rendering anomalies, Junior bypasses the primary triggers that catch traditional automation tools. Combined with natural interaction patterns and variable timing, Junior maintains account security while still delivering the scale required for an effective [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy).\n\n## Strategy Comparison: Mass Outreach vs. High-Value Engagement\n\nBeyond technical safety, these two tools represent opposing philosophies on how to generate B2B revenue.\n\n### The Meet Alfred Strategy: The Numbers Game\n\nMeet Alfred is built for the traditional outbound playbook. The strategy relies on top-of-funnel volume to compensate for low conversion rates. \n\n1.  Scrape a list of 2,000 Sales Nav leads.\n2.  Send 50 connection requests a day.\n3.  Send a sequence of 3 cold DMs to those who accept.\n4.  Follow up via cold email.\n\nWhile this multi-channel approach is detailed in reviews on [Woodpecker](https://woodpecker.co/blog/meet-alfred/) and others, its effectiveness is waning. Buyers are exhausted by automated pitches. They can spot a templated sequence instantly. Worse, running this volume of DMs pushes the absolute limits of LinkedIn's commercial use policies.\n\n### The Junior Strategy: The Conversation-First Approach\n\nJunior is built for a modern, inbound-led networking model. It acknowledges that the best way to get someone's attention isn't to interrupt their inbox, but to add value to their public content.\n\nInstead of spamming DMs, Junior helps you execute a [simple LinkedIn strategy for lead generation (no spam)](https://heyjunior.ai/blog/linkedin-strategy-for-lead-generation):\n\n1.  **Identify:** Junior finds high-value posts from your target prospects or industry leaders.\n2.  **Engage:** Junior generates a thoughtful, deeply contextual comment based on the post's content and your unique perspective.\n3.  **Attract:** The author (and their audience) sees your insightful comment, views your profile, and initiates an inbound connection request or message.\n4.  **Convert:** You seamlessly transition a warm interaction into a meaningful conversation, leading to sales pipeline or client acquisitions.\n\nBy prioritizing public engagement, you build industry authority while simultaneously warming up leads. It is a highly effective way to increase your [LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate) without resorting to risky automation tactics.\n\n![Comparison matrix showing mass volume outbound strategy versus a conversation-first engagement strategy](https://assets.bevisible.app/inline-images/j57c6pjhtykk5tm27rh8095f29877wbp/inline-2-1780579066356-v77x4v.png)\n## Core Feature and Usability Breakdown\n\nLet\u2019s compare how Meet Alfred and Junior stack up across the features that matter most to daily users.\n\n### 1. Setup and Onboarding\n\n**Meet Alfred:** Because of its multi-channel nature, setup can be complex. You must connect your LinkedIn account (often requiring 2FA workarounds for proxies), integrate your email domains, configure DNS settings for email deliverability, and build branching logic for your campaigns. It requires a dedicated administrator to manage properly.\n\n**Junior:** Setup is nearly instantaneous. Because it runs locally, there are no proxies to configure. You simply define your networking goals, input your professional bio so the AI understands your tone, and the system is ready to begin surfacing relevant posts and generating comments.\n\n### 2. Campaign Management\n\n**Meet Alfred:** Excels at complex, \"if/then\" sequencing. If a user doesn't accept a LinkedIn request within 3 days, Alfred can automatically trigger a cold email via an integrated data provider. For agencies managing massive outbound operations, this unified dashboard is powerful.\n\n**Junior:** Focuses exclusively on optimizing the engagement feed. It doesn't do complex DM branching because the goal is to drive natural conversations. Its management tools are built around smart post prioritization\u2014ensuring you are only spending time interacting with content that will drive ROI.\n\n### 3. AI Quality and Authenticity\n\n**Meet Alfred:** Uses basic AI primarily for spinning text to create variations of cold DMs to avoid spam filters. The messaging remains fundamentally template-based (e.g., \"Hi [Name], loved your background at [Company]\").\n\n**Junior:** AI is the core engine. By utilizing your specific background and the exact context of a target's post, it generates comments that are virtually indistinguishable from a human expert. It actively avoids the cringe-worthy, generic AI speak that plagues the platform, focusing instead on mirroring your authentic voice.\n\n## Pricing Comparison\n\nWhile exact pricing tiers fluctuate, understanding the pricing models helps clarify what you are actually paying for.\n\n*   **Meet Alfred:** Generally operates on higher-tier monthly subscriptions. You are paying for the cloud server costs, the proxy IP maintenance, and the CRM/Email infrastructure. Their multi-channel plans are robust but can be overkill if you only want to focus on LinkedIn.\n*   **Junior:** Because it leverages your local machine for execution rather than expensive cloud arrays, Junior can dedicate its technical overhead to running advanced AI models. Pricing is structured around the value of high-quality AI generation and engagement tracking, making it highly competitive for individual professionals and teams alike.\n\n*Note: For full breakdowns of industry pricing, you can review [9 LinkedIn lead generation services that actually work](https://heyjunior.ai/blog/linkedin-lead-generation-services).*\n\n## User Scenarios: Which Tool Should You Choose?\n\nChoosing between Meet Alfred and Junior depends entirely on your risk tolerance and your go-to-market strategy.\n\n### When to Choose Meet Alfred\n\nYou are running a high-volume, multi-channel outbound agency where LinkedIn is just one small piece of a spray-and-pray approach. You already have burner LinkedIn profiles (accounts you don't mind losing) and you need to coordinate thousands of cold emails and automated DMs across a massive database. You accept the high risk of account bans as a cost of doing business.\n\n*(For comparisons of similar multi-channel tools, you can read [StrategyBrain's AI Sales Rep analysis](https://www.linkedin.com/pulse/comparison-analysis-strategybrains-ai-sales-rep-vs-meet-z2ttc).)*\n\n### When to Choose Junior\n\nYou value your primary LinkedIn profile and cannot afford an account restriction. You are a B2B founder, a sales professional, a consultant, or a job seeker looking to build real authority and pipeline. \n\nYou recognize that one genuine conversation sparked by a thoughtful comment is worth more than 100 ignored cold DMs. You want to [build a LinkedIn lead generation funnel that converts](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) using a human-first approach, warming up outbound leads naturally and safely.\n\n![Four step diagram showing how a thoughtful comment leads to a warm connection on LinkedIn](https://assets.bevisible.app/inline-images/j57c6pjhtykk5tm27rh8095f29877wbp/inline-3-1780579065335-7le4sm.png)\n## The Real Cost of Getting Banned on LinkedIn\n\nMany users brush off the risk of cloud automation until it happens to them. The consequences of losing a well-established LinkedIn profile are severe:\n\n1.  **Loss of Network:** Years spent accumulating 5,000+ targeted connections disappear instantly.\n2.  **Pipeline Destruction:** Any active conversations in your DMs are severed. Deals in progress can be lost completely if you don't have alternative contact information.\n3.  **Brand Damage:** When a profile is banned, your name disappears from the platform, damaging the trust you've built in your industry.\n4.  **Recovery Nightmare:** Recovering a restricted account requires submitting government ID to LinkedIn support and waiting weeks for an appeal\u2014which is often denied if you were caught using cloud scrapers.\n\nThis is why, for the majority of professionals exploring [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation), safety must be the primary evaluation metric.\n\n## Frequently Asked Questions\n\n### Is Meet Alfred a CRM?\nMeet Alfred functions as a lightweight CRM, allowing you to manage leads, track conversation stages, and tag users within its platform. However, most serious sales teams use it in conjunction with robust CRMs like HubSpot or Salesforce, pushing data via Webhooks or API.\n\n### Does Meet Alfred work with Sales Navigator?\nYes, Meet Alfred integrates with LinkedIn Sales Navigator, allowing you to scrape saved lists and input them directly into campaigns. However, hitting Sales Navigator heavily with cloud automation still carries significant ban risks.\n\n### Can Junior help with a job search?\nAbsolutely. In fact, engaging thoughtfully with hiring managers and team leads is one of the most effective ways to bypass the traditional application pile. By using Junior to leave insightful comments on a target company's posts, you build familiarity before you ever ask for an interview. It is one of the best [LinkedIn AI job search hacks for more interviews](https://heyjunior.ai/blog/linkedin-ai-job-search).\n\n### Are there alternatives to Meet Alfred?\nYes, the market is full of Meet Alfred alternatives like Waalaxy, LinkedHelper, and Zopto. However, most of these rely on similar mass-DM or cloud-based mechanics. Junior represents an alternative not just in software, but in underlying strategy (engagement vs. mass outreach).\n\n## Summary: The Verdict on Safety\n\nIf the question is strictly *\"Which tool is safer?\"* the answer is objectively **Junior**.\n\nMeet Alfred provides a powerful suite for multi-channel sequencing, but its reliance on cloud-based proxy architecture puts your LinkedIn account directly in the crosshairs of platform security updates. It is a tool built for a high-volume era that LinkedIn is actively trying to eliminate.\n\nJunior, conversely, is built for the platform's future. By operating locally on your machine, it inherently neutralizes the threat of proxy detection and IP flagging. More importantly, by prioritizing authentic, AI-assisted commenting over templated cold DMs, it aligns perfectly with the types of engagement LinkedIn\u2019s algorithm actually wants to promote.\n\nFor anyone serious about establishing a professional reputation, warming up high-value leads, and [generating leads on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin) without risking their account, moving away from mass automation and embracing Junior's human-first AI engagement is the smartest strategic move you can make in 2026.", "created_at": "2026-06-04T15:27:47.869828+00:00", "updated_at": "2026-06-04T15:27:47.869837+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
