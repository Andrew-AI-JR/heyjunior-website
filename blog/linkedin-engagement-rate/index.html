    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 10, "slug": "linkedin-engagement-rate", "title": "7 Ways to Triple Your LinkedIn Engagement Rate Fast", "excerpt": "Stop settling for crickets on your posts. Learn how to calculate, benchmark, and triple your LinkedIn engagement rate using conversation-first strategies.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5702m7n5ebq5k3p9qzspfnd15876ef8/7-ways-to-triple-your-linkedin-engagement-rate-fas-1780058991991-c54x6y.png", "published_at": "2026-06-01T12:35:00+00:00", "content": "# 7 Ways to Triple Your LinkedIn Engagement Rate Fast\n\nYou log into LinkedIn, publish a meticulously drafted 500-word insight about your industry, and close the tab feeling accomplished. Twenty-four hours later, the results are in: three likes, zero comments, and a reach that barely clears your immediate colleague circle. \n\nIt stings.\n\nBut the real problem isn't just a bruised ego. On LinkedIn, silence is expensive. When your posts fail to resonate, you miss out on profile views, inbound connection requests, and the warm conversations that eventually convert into booked meetings and closed deals. \n\nMost professionals try to fix this by posting more frequently, shouting into the void in hopes that volume will somehow compensate for a lack of resonance. But increasing your posting frequency without fixing your underlying strategy is like stepping on the gas in a car with no traction. You burn a lot of energy, but you don't move forward.\n\nInstead of obsessing over impressions or raw follower counts, the smartest founders, sales teams, and lead generation agencies focus on a single, more telling metric: **engagement rate**. \n\nIn this guide, we are going to dissect exactly what your LinkedIn engagement rate tells you, how to benchmark it against your peers, and seven tactical ways to triple it without resorting to cringe-worthy engagement pods or spammy behavior.\n\n## What is the LinkedIn Engagement Rate?\n\nYour LinkedIn engagement rate is the percentage of people who interacted with your content relative to the number of people who saw it (impressions) or follow you. It measures how compelling your audience finds your insights.\n\nWhile impressions tell you how many feeds your post appeared in, engagement rate tells you if anyone actually cared enough to stop scrolling and take action. \n\n### How to calculate your LinkedIn engagement rate\n\nIf you use LinkedIn's native analytics, they do some of the heavy lifting for you, especially for company pages. You can find detailed [content analytics for your LinkedIn Page](https://www.linkedin.com/help/lms/answer/a564051) directly in your admin dashboard. But if you want to calculate the engagement rate for a personal profile or a specific post manually, the standard formula is straightforward.\n\n**The standard engagement rate formula:**\n`(Total Interactions / Total Impressions) \u00d7 100 = Engagement Rate %`\n\nTotal interactions include:\n*   Likes (and other reactions)\n*   Comments\n*   Shares\n*   Saves\n*   Clicks (on your profile, links, or \"see more\")\n\n![Whiteboard sketch of the LinkedIn engagement rate formula](https://assets.bevisible.app/inline-images/j5702m7n5ebq5k3p9qzspfnd15876ef8/inline-1-1780058882652-m9j0kn.png)\nFor example, if your post received 5,000 impressions, 40 likes, 12 comments, 3 shares, and 20 clicks, your total interactions equal 75. \n\n`(75 / 5000) \u00d7 100 = 1.5% engagement rate`\n\n### Why engagement rate is a misleading metric\n\nBefore you start obsessing over decimal points, it is necessary to acknowledge a harsh reality: all engagement is not created equal. \n\nMany creators have pointed out that engagement rate is a [useful but misleading activity](https://www.linkedin.com/posts/alexcboyd_engagement-rate-is-a-useful-but-misleading-activity-7341479886911340544-Q7ua). Why? Because the algorithm cannot differentiate between a prospective client leaving a thoughtful comment and a random person arguing with you in the replies. \n\nFurthermore, high-level decision-makers\u2014CEOs, VPs, enterprise buyers\u2014are notorious \"lurkers.\" They read, they consume, and they judge your credibility, but they rarely click \"like\" or comment publicly. You might have a seemingly low engagement rate on a highly technical post, yet that exact post could be the reason an enterprise prospect decides to respond to your cold outbound message.\n\nOptimize for engagement, but never at the expense of your actual [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy). A viral post filled with comments from college students will not help a B2B SaaS founder close more pipeline.\n\n## How to Benchmark Your LinkedIn Engagement Rate in 2026\n\nIf you want a definitive [LinkedIn engagement rate](https://sproutsocial.com/insights/linkedin-engagement-rate/) baseline, you have to factor in your audience size and content type. \n\n### Understanding industry benchmarks\n\nSo, what exactly is \"good\"? \n\nAccording to recent [engagement rate benchmarks for 2026](https://www.linkedin.com/posts/lukecostleywhite_your-linkedin-engagement-rate-benchmarks-activity-7421842866693394434-Qscl), a healthy [engagement with content on LinkedIn](https://www.acc.com/sites/default/files/2019-11/LinkedIn_Engagement.pdf) varies significantly based on follower count. As your audience grows, your engagement rate will naturally decline. This happens because the algorithm begins showing your content to a broader, less targeted, and less emotionally invested segment of your network.\n\n### Engagement rate vs. follower size\n\nMany experts agree that [usually sits between](https://www.linkedin.com/posts/ojhashweta_personalbranding-thoughtleadership-content-activity-7396411766202597376-M27Q) 1% and 3.5% for an average, healthy profile. However, if you have under 5,000 followers, your numbers should look different than someone with 50,000.\n\n| Follower Count | Poor Engagement | Average Engagement | Excellent Engagement |\n| :--- | :--- | :--- | :--- |\n| 0 - 5,000 | < 2.0% | 3.0% - 5.0% | > 6.0% |\n| 5,000 - 15,000 | < 1.5% | 2.0% - 3.5% | > 4.5% |\n| 15,000 - 50,000 | < 1.0% | 1.5% - 2.5% | > 3.0% |\n| 50,000+ | < 0.5% | 1.0% - 1.5% | > 2.0% |\n\n![Chart showing the inverse relationship between LinkedIn follower count and average engagement rate](https://assets.bevisible.app/inline-images/j5702m7n5ebq5k3p9qzspfnd15876ef8/inline-2-1780058871493-hp1y6s.png)\nIf you are consistently falling into the \"Poor\" category, it is a clear signal that your content strategy needs a revamp. \n\n## 7 Ways to Triple Your LinkedIn Engagement Rate Fast\n\nIf your numbers are lagging, tweaking a few words in your posts won't be enough. You need a systemic shift in how you operate on the platform. Here are seven tactical ways to rapidly increase your engagement rate.\n\n### 1. Stop the scroll with unexpected content formats\n\nLinkedIn users develop \"pattern matching\" blindness. If every post you publish is a solid block of text or a link with an auto-generated preview image, users will scroll right past it. To stop the thumb, you need to break the visual pattern.\n\n*   **PDF Carousels (Document Posts):** These consistently boast the highest engagement rates on the platform. They force the user to click through slides, signaling high \"dwell time\" to the algorithm. Keep your carousels highly tactical (e.g., \"5 Steps to Audit Your Sales Pipeline\" rather than \"Why Sales is Changing\").\n*   **Zero-Link Text Posts with High White Space:** If you use text, format it for mobile. Use one-sentence paragraphs. Bold key phrases. \n*   **Native Video:** A short, 60-to-90 second raw video speaking directly into the camera (with captions) builds immense parasocial trust. Don't overproduce it. The \"walking and talking\" or \"sitting at the desk\" aesthetic feels more authentic and less like an ad.\n\n### 2. Warm up outbound leads through authentic comments\n\nHere is a lesser-known secret about LinkedIn: the fastest way to get engagement on *your* content is to consistently engage with *other people's* content. We call this the \"Inbound via Outbound\" loop.\n\nWhen you leave a highly insightful, multi-sentence comment on a prospect's post, three things happen:\n1.  The prospect sees your name and appreciates the support.\n2.  Their audience sees your comment. If it's smart, they will click your profile.\n3.  The algorithm registers that you have a relationship with these users, making it far more likely that *your* next post will appear in *their* feed.\n\n![Flowchart illustrating how commenting on others' posts drives engagement to your own profile](https://assets.bevisible.app/inline-images/j5702m7n5ebq5k3p9qzspfnd15876ef8/inline-3-1780058865869-nczuso.png)\nThis strategy is foundational, but it is also incredibly time-consuming to do manually. Finding the right posts, reading them, and drafting a thoughtful response takes hours. This is why [9 LinkedIn Lead Generation Services That Actually Work](https://heyjunior.ai/blog/linkedin-lead-generation-services) heavily emphasize outbound commenting.\n\nIf you want to automate this without sacrificing authenticity, this is where specialized tools excel. By learning [How to Scale LinkedIn Lead Generation with AI (Safely)](https://heyjunior.ai/blog/linkedin-lead-generation-ai), you can use platforms like Junior. Junior runs securely on your local machine, automatically finding relevant posts from your target audience and drafting personalized, high-quality comments that mirror your natural voice. It eliminates the manual labor of outbound engagement while protecting your account from being flagged\u2014warming up leads before you ever send a DM.\n\n### 3. Master professional mindset and timing\n\nTiming still matters, but not in the way most people think. It's less about \"Post on Tuesdays at 9 AM\" and more about posting when *your specific audience* is in a professional mindset.\n\nIf you target founders, they might be scrolling LinkedIn at 6:30 AM while having coffee before the day gets chaotic. If you target mid-level developers, they might check the platform during their 12:30 PM lunch break. \n\nExperiment with off-peak hours. Posting at 8:43 AM instead of exactly 9:00 AM can help you avoid the massive flood of scheduled content that hits the feed at the top of the hour.\n\n### 4. Lead conversations, not announcements\n\nExamine your last five posts. Are you talking *at* your audience or *with* them?\n\n*   **Broadcasting (Low Engagement):** \"We are thrilled to announce that our company just launched Feature X. Check it out here!\"\n*   **Conversation Starting (High Engagement):** \"We just spent three months building Feature X because we noticed sales teams were losing 30% of their pipeline to a specific bottleneck. Have you noticed this in your own outreach? What's your current workaround?\"\n\nThe first post tells people something they don't care about. The second post highlights a shared pain point and explicitly asks for the reader's expertise. People love sharing their own experiences. Give them a stage to do so in your comment section.\n\n### 5. Engage fast and with empathy\n\nThe first 60 minutes after you publish a post are often called the \"Golden Hour.\" The LinkedIn algorithm watches this window closely. If your post receives early traction, the algorithm amplifies its reach to the 2nd and 3rd-degree networks of the people engaging.\n\nWhen someone leaves a comment, do not just \"like\" it and move on. Reply to it. Reply quickly. And reply with a question or an expansive thought.\n\n*   *Commenter:* \"Great framework, I'm going to try this.\"\n*   *Your Reply:* \"Thanks, Sarah! Which of the three steps do you think will be the hardest to implement with your current team?\"\n\nThis turns a single interaction into a multi-threaded conversation, instantly doubling the engagement count on that specific thread and keeping the post alive in the feed.\n\n### 6. Leverage employee advocacy and leadership voices\n\nCompany pages struggle to get organic reach. People log onto LinkedIn to connect with people, not logos. If you want to increase the engagement rate around your brand, you need to route your content through the personal profiles of your leadership team and employees.\n\nIf a company has 100 employees, and 20 of them post about a shared industry insight (in their own words), the aggregate engagement will dwarf whatever the corporate page could produce. Encourage your team to share field notes, daily lessons, and personal perspectives on the industry.\n\n### 7. Turn engagement into action with content tagging\n\nA high engagement rate means nothing if it doesn't lead to business outcomes. To truly leverage your interactions, you need a system to track *who* is engaging and *what* they care about. \n\nImplement a content tagging system. Categorize your posts by theme (e.g., \"Pricing strategy\", \"Cold outreach\", \"Hiring\"). Over a quarter, calculate the engagement rate by theme. You might find that your \"Hiring\" posts get high vanity metrics, but your \"Cold outreach\" posts generate the most direct messages and profile views from target accounts.\n\nOnce you know which topics convert, you can align your engagement strategy with your [7 LinkedIn Automation Tools for Lead Generation (2026)](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) to systematically follow up with the people who engaged with your high-intent topics.\n\n## Avoid Common LinkedIn Engagement Traps\n\nAs you actively work to increase your metrics, be careful not to fall into the traps that will ultimately throttle your reach or ruin your reputation.\n\n### The Engagement Pod Illusion\n\nEngagement pods are groups of users who agree to like and comment on each other's posts to artificially inflate metrics. Do not use them. The algorithm is incredibly sophisticated at detecting forced, repetitive, and networked engagement. Furthermore, having the same 15 random consultants comment \"Awesome insights! \ud83d\udd25\" on your posts destroys your credibility with actual buyers who are reading your feed.\n\n### The Generic AI Comment Epidemic\n\nWith the rise of generative text, LinkedIn comment sections are flooding with robotic, templated summaries.\n\n*   *\"Great post! I completely agree that [Insert topic] is very important in today's digital landscape. Thanks for sharing!\"*\n\nLeaving comments like this actually hurts your brand. It signals that you are lazy and inauthentic. If you are going to use AI to scale your outreach, use tools that prioritize a conversation-first approach. The goal of AI should be to parse complex posts and draft a response based on *your specific bio and opinions*, keeping the interaction deeply human.\n\n![Venn diagram showing the 3P Credibility Audit: Personal, Professional, and Provocative](https://assets.bevisible.app/inline-images/j5702m7n5ebq5k3p9qzspfnd15876ef8/inline-4-1780058867426-603akw.png)\n## Turn Engagement Data Into Strategic Insights\n\nStop viewing your engagement rate as a scoreboard and start viewing it as a compass. \n\n### The 3P Credibility Audit\n\nTo ensure your engagement is actually building trust, audit your high-performing posts using the 3P framework:\n\n1.  **Personal:** Did this post show the human behind the screen? (Fails, lessons learned, personal operating principles).\n2.  **Professional:** Did this post demonstrate subject matter expertise? (Case studies, data breakdowns, tactical frameworks).\n3.  **Provocative:** Did this post challenge the status quo? (Myth-busting, contrarian takes backed by evidence).\n\nIf your highest engagement only comes from \"Personal\" posts (like a picture of your dog), you have an audience, but not necessarily a pipeline. The goal is to balance these three pillars so your engagement rate reflects both likability and professional authority.\n\n## FAQs for LinkedIn Engagement Rate\n\n**What is a good engagement rate on LinkedIn?**\nFor most active professionals with 5,000 to 15,000 followers, a good engagement rate hovers between 2.0% and 3.5%. Anything above 5% is considered exceptional.\n\n**Do comments count more than likes?**\nYes. While LinkedIn doesn't publish its exact algorithm weights, data consistently shows that comments\u2014specifically long-form comments that spark replies\u2014carry significantly more weight in driving a post's reach than simple reactions or likes.\n\n**How often should I post to maximize engagement?**\nQuality trumps frequency. Posting 3-4 times a week with high-value, well-formatted content will yield a much higher average engagement rate than posting mediocre content twice a day. Give your posts time to breathe and accumulate \"dwell time.\"\n\n## Make Every LinkedIn Interaction Count\n\nTripling your LinkedIn engagement rate doesn't require a sudden transformation into a flashy influencer. It requires a fundamental shift from broadcasting announcements to starting meaningful conversations. \n\nBy focusing on unexpected formats, mastering the golden hour of engagement, and leveraging the \"Inbound via Outbound\" loop of commenting on target accounts, you can build a highly engaged audience that actually cares about what you have to say. Stop fighting the algorithm with volume. Start working with it through relevance, authentic interaction, and strategic outreach.", "created_at": "2026-06-01T12:49:23.006809+00:00", "updated_at": "2026-06-01T12:49:23.006814+00:00"};
    </script>

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
