    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 38, "slug": "junior-vs-dripify-finding-consulting-clients-without-automated-messaging", "title": "Junior vs Dripify: finding consulting clients without automated messaging", "excerpt": "Discover how consultants can find clients on LinkedIn without cold DMs by comparing Junior vs Dripify. Learn to use strategic commenting for inbound leads.", "featured_image_url": "https://assets.bevisible.app/featured-images/j572deds37aq7z8k8a5fedvgph89fv9t/junior-vs-dripify-finding-consulting-clients-witho-1782915592395-zc7enp.png", "published_at": "2026-07-01T14:04:00+00:00", "content": "# Junior vs Dripify: finding consulting clients without automated messaging\n\nMost cold emails get ignored because they only pitch. \u201cDo you have 15 minutes?\u201d \u201cOpen to a quick call?\u201d None of that works anymore, especially when you are selling high-trust, high-ticket consulting services. [1](https://www.linkedin.com/posts/clara-awuse_heres-how-i-turn-cold-dms-into-paying-clients-activity-7333757312865562625-zbNu)\n\nIf you have spent any time trying to grow your consulting pipeline on LinkedIn, you have likely encountered the standard advice: build a list, load it into an automation tool, and blast out connection requests with a five-step follow-up sequence. For years, this was the playbook. It is why our inboxes are flooded with automated messages that read, *\"Hi {first_name}, I see we are both in the {industry} space.\"*\n\nThis outbound volume strategy is the exact model built into platforms like Dripify. But for consultants, fractional executives, and agency owners, treating LinkedIn like a numbers game introduces severe risks. Not only does it yield abysmal conversion rates for complex services, but it actively damages your brand equity.\n\nThe alternative is shifting from outbound spam to inbound attraction. But how do you scale inbound without spending four hours a day manually engaging on the platform? This is where a fundamentally different category of tools emerges, focusing on conversations rather than campaigns.\n\nIn this analysis, we will compare the traditional outbound sequence model (Dripify) against the context-aware conversation model (Junior). We will explore how consultants can systematically find clients without sending a single cold DM, why strategic commenting outperforms automated outreach, and how to position your profile to capture the demand you create.\n\n## The Broken Mechanics of Cold Outreach for Consultants\n\nSelling software subscriptions at $50 a month is vastly different from selling a $15,000 consulting retainer or a complex digital transformation project. The former relies on features, pricing, and timing. The latter relies entirely on trust, perceived authority, and an intimate understanding of the client's specific business context.\n\n### The Trust Deficit in Automated Sequences\n\nWhen you use an outbound tool like Dripify to send automated direct messages, you are initiating a low-trust interaction. The recipient instinctively knows it is an automated sequence. Even with advanced spin-syntax and personalization tokens, the underlying structure of a cold DM sequence betrays its lack of genuine human effort.\n\nFor a consultant, this creates a profound disconnect. You are asking an executive to trust you with their most complex business problems, yet your very first interaction with them is an automated, template-driven message that required zero effort on your part.\n\n### The Fragility of Referral Pipelines\n\nMany established consultants resist LinkedIn entirely because they have historically relied on word-of-mouth. But then it stopped. Budgets got cut, companies restructured, your contacts moved on, and suddenly the pipeline that you relied on for years completely dried up. [2](https://www.youtube.com/watch?v=chM6DGQaEg8&t=31) \n\nWhen referrals dry up, the panic sets in, often leading to a hasty subscription to an outbound automation tool. But trying to force a consulting sale through a cold DM sequence to strangers is like trying to force a square peg into a round hole. You need visibility, but you need the *right kind* of visibility. You need to be seen demonstrating expertise, not begging for 15 minutes on a calendar.\n\n### The LinkedIn Account Risk\n\nBeyond brand damage, there is a structural risk to traditional automation. Platforms like Dripify operate in the cloud. They log into your LinkedIn account from remote servers, scraping data and executing actions at volumes that trip LinkedIn's security algorithms. Over the past few years, LinkedIn has aggressively cracked down on cloud-based automation, resulting in shadowbans, restricted reach, and permanent account suspensions.\n\nIf you are a consultant, your LinkedIn profile is your digital storefront, your resume, and your rolodex combined. Risking that asset for a 0.5% conversion rate on a cold DM sequence is a poor business decision.\n\n## Junior vs Dripify: Two Fundamentally Different Paradigms\n\nTo understand how to generate clients without cold DMs, we have to look at the tools designed to facilitate growth on LinkedIn. Dripify and Junior represent two completely opposing philosophies regarding how business gets done on the platform.\n\n### Dripify: The Outbound Volume Engine\n\nDripify is designed for scale and sequence. It assumes that if you message enough people, someone will eventually say yes. \n\n**Core Mechanics:**\n*   **Cloud-Based Scraping:** Operates on remote servers to bypass local browser limitations.\n*   **Campaign Sequences:** Connect, wait 2 days, message 1, wait 3 days, message 2.\n*   **Private Interactions:** All activity happens in the inbox (Direct Messages), completely hidden from the public feed.\n*   **One-to-One Scale:** You are communicating with one prospect at a time, relying on volume to hit your numbers.\n\n**Best Use Case:** High-volume, low-ticket transactional sales (e.g., selling inexpensive B2B software or basic commodities where the buyer doesn't require deep trust).\n\n**The Problem for Consultants:** It positions you as a vendor desperately seeking work, rather than an authority whose time is scarce and valuable.\n\n![Diagram comparing outbound automation sequences with inbound conversation strategies](https://assets.bevisible.app/inline-images/j572deds37aq7z8k8a5fedvgph89fv9t/inline-1-1782915474027-0m2s02.png)\n### Junior: The Inbound Conversation Engine\n\nJunior is built on the premise that the best way to get a client on LinkedIn is to let them see you solving complex problems in public. Instead of invading private inboxes, it helps you participate in high-visibility public discussions.\n\n**Core Mechanics:**\n*   **Local Execution:** Runs entirely locally on your own machine. It interacts with the platform the exact same way a human does, protecting your account safety and complying with natural interaction patterns. You can read more about this in our guide on [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n*   **Context-Aware Replies:** Instead of sending canned messages, Junior analyzes the specific context of a post and drafts human-sounding replies based on your unique bio, expertise, and goals.\n*   **Public Visibility:** Your activity happens in the comment section of high-performing posts, meaning your insights are seen by the original author *and* their thousands of followers.\n*   **One-to-Many Scale:** A single, highly insightful comment can drive hundreds of profile views from targeted prospects.\n\n**Best Use Case:** Job seekers, lead gen agencies, founders, and consultants who need to build authority and start authentic conversations without appearing spammy.\n\n**The Advantage for Consultants:** It bypasses crowded inboxes entirely, turning public visibility into inbound direct messages and pipeline.\n\n### Feature Comparison Matrix\n\n| Feature/Approach | Dripify (Outbound Automation) | Junior (Inbound Conversation) |\n| :--- | :--- | :--- |\n| **Primary Strategy** | Cold DMs & Connection Sequences | Strategic Commenting & Feed Engagement |\n| **Technical Architecture** | Cloud-based (Higher risk of bans) | Local execution (Safe, natural patterns) |\n| **Content Generation** | Spin-syntax templates | Context-aware AI based on user bio |\n| **Visibility Type** | Private (1-to-1 in the inbox) | Public (1-to-many in the feed) |\n| **Trust Building** | Low (Perceived as spam) | High (Demonstrates actual expertise) |\n| **Ideal User** | High-volume SDRs | Consultants, Founders, Agencies |\n\n## A 4-Step Framework for Finding Clients Without Cold DMs\n\nIf you are abandoning the Dripify model of cold outreach, you need a system to replace it. Most people think LinkedIn success is all about posting tons of content and sending loads of messages, but that actually is not true. [3](https://www.youtube.com/watch?v=Zr_68GPChrU) \n\nThe most successful consultants use a specific, repeatable framework focused on profile optimization, targeted visibility, and frictionless inbound pathways.\n\n### Step 1: Optimize Your Profile for Buyers (Not Recruiters)\n\nThe biggest mistake consultants make is treating their LinkedIn profile like a chronological resume. A prospect looking for a consultant does not care that you were a \"Senior Manager of Operations in 2014.\" They care about one thing: *Can you solve my specific problem right now?*\n\nYour LinkedIn profile must function as a high-converting landing page. When your commenting strategy (Step 3) starts driving traffic to your profile, this page must immediately qualify the prospect and direct them toward booking a call.\n\n**The Headline Formula**\nYour headline should not be your job title (e.g., \"Management Consultant\"). It should be a clear, positioning statement.\n*   *Format:* [Who you help] achieve [Measurable Outcome] by solving [Specific Problem].\n*   *Example:* Helping B2B SaaS Founders reduce churn by 20% through automated customer success frameworks.\n\n**The Banner Image**\nDo not use a generic stock photo of a skyline or a laptop. Use this prime real estate to restate your value proposition, show social proof (logos of companies you've helped), and provide a clear call-to-action (e.g., \"Read my free case study below\").\n\n**The Featured Section**\nThis is your digital portfolio. You must showcase value to highlight case studies, whitepapers, or testimonials that prove your competence. [4](https://www.youtube.com/watch?v=muQYJYpA4jg) Do not feature your own viral posts about generic topics. Feature specific, problem-solving assets that a buyer would want to read.\n\n**The About Section**\nWrite this as a sales letter to your ideal client. Address their pain points, explain your methodology, and end with an explicit call to action on how to contact you.\n\n![Wireframe diagram showing the key elements of an optimized LinkedIn profile for consultants](https://assets.bevisible.app/inline-images/j572deds37aq7z8k8a5fedvgph89fv9t/inline-2-1782915488886-yxp1lf.png)\n### Step 2: Transition to Problem-Solving Content\n\nWhilst building the online presence and brand awareness, you may research a certain niche or a type of persona you want to deliver your services to. [5](https://www.reddit.com/r/DigitalMarketing/comments/1oh6iw6/how_do_you_find_clients_on_linkedin_need_some/) \n\nOnce you know who you are targeting, you must create content that speaks directly to their daily friction points. You do not need to post every day. You do not need to chase viral reach with generic business platitudes. You need to \"solve problems in public.\"\n\n**The Three Pillars of Consulting Content:**\n1.  **Symptom Awareness:** Content that points out a pain the prospect is experiencing (e.g., \"Why your sales cycles are extending past 90 days\").\n2.  **Framework/Methodology:** Content that explains *how* you solve the problem, without giving away the custom implementation (e.g., \"The 3-part pipeline velocity audit I run for SaaS clients\").\n3.  **Social Proof/Case Studies:** Detailed breakdowns of how you helped a specific client achieve a specific result.\n\nBy focusing on these pillars, you position yourself as a peer and an authority, not a vendor.\n\n### Step 3: Hijack Reach Through Strategic Commenting\n\nIf you have a small audience (under 5,000 followers), posting content can feel like screaming into the void. The algorithm favors accounts with established momentum. \n\nThis is where the magic of strategic commenting comes in, and where tools like Junior shine as a superior alternative to traditional automation.\n\nInstead of trying to force your audience to grow organically from zero, you \"hijack\" the reach of larger accounts that already have your target audience in their comment section. If an industry influencer posts about B2B marketing, and your ideal clients are in the comments, leaving a highly insightful, top-tier comment on that post places your name, headline, and expertise directly in front of thousands of targeted views.\n\n**The Anatomy of a Pipeline-Generating Comment:**\n*   **Do not agree blindly:** Comments like \"Great post!\" or \"Thanks for sharing\" are useless. They generate zero profile clicks.\n*   **Add an \"And\":** Acknowledge the author's point, and then add a supporting framework or a contrarian nuance from your own consulting experience.\n*   **Use data:** \"I agree with your point on retention. We actually audited 50 SaaS companies last year and found that...\"\n\n**How Junior Scales This Authentically**\nDoing this manually takes hours. You have to find the right posts, read them deeply, and craft a thoughtful response. Junior automates the heavy lifting without sacrificing the human element. It finds the relevant discussions happening in your niche and drafts context-aware replies based on *your* specific expertise and goals.\n\nBecause Junior runs locally and uses advanced AI to understand the nuance of the conversation, the comments sound like you. You bypass the crowded inboxes of Dripify campaigns, and instead, you place a billboard for your consulting business in the middle of a crowded, highly relevant public square.\n\nIf you want to dive deeper into how different AI commenting tools handle context, check out our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n### Step 4: Move Conversations to Pipeline\n\nWhen you execute Step 3 correctly, a predictable pattern emerges. \n\n1. You leave an insightful comment on a popular post using Junior.\n2. A potential client (who was reading the thread) sees your comment and finds it valuable.\n3. They hover over your name, see your optimized headline (from Step 1), and click to view your profile.\n4. They read your About section and your featured case studies (Step 2).\n5. *They* send *you* a connection request or an inbound DM.\n\nThis is the holy grail for consultants. When a prospect reaches out to you organically based on your demonstrated expertise, the entire sales dynamic shifts. You are no longer fighting objection battles about pricing or trust. You are an expert diagnosing a problem.\n\nWhen these inbound leads arrive, do not immediately pitch. Respond naturally: *\"Thanks for reaching out, Sarah. Glad that comment on John's post resonated. What are you guys currently doing about [Problem]?\"*\n\nKeep it conversational. The goal of the DM is not to close a $15k deal; it is simply to determine if a 15-minute discovery call is warranted.\n\n## Real-World Scenario: Landing a Client Without Pitching\n\nTo illustrate the difference between the Dripify outbound model and the Junior inbound model, let's look at a hypothetical scenario of a Supply Chain Consultant trying to land a mid-market manufacturing client.\n\n**The Dripify Approach (The Failing Model):**\nThe consultant uses a cloud-scraper to find 1,000 COOs at manufacturing companies. They load them into a sequence.\n*   *Day 1:* Connection Request: \"Hi David, looking to connect with other supply chain leaders.\"\n*   *Day 3 (If accepted):* \"Thanks for connecting! Does your company struggle with inventory forecasting? We offer a bespoke consulting service...\"\n*   *Result:* David deletes the message. He receives ten of these a day. The consultant burns a bridge and risks LinkedIn restricting their account for high-volume automated messaging.\n\n**The Junior Approach (The Winning Model):**\nThe consultant uses Junior to identify active conversations around supply chain disruptions, port delays, and inventory management.\n*   *Action:* An industry publication posts an article about recent freight cost spikes.\n*   *Execution:* Junior drafts a highly specific comment based on the consultant's bio: *\"The freight spikes are brutal, but the hidden cost most COOs are missing right now is warehouse holding fees on misallocated safety stock. We ran an audit last week and found a 14% bloat just in holding costs. Moving to a dynamic forecasting model is the only way to offset the freight hit.\"*\n*   *Result:* David (the COO) is reading the comments on this publication. He sees this insight. It hits his exact pain point. He clicks the consultant's profile, sees a case study on \"Reducing Warehouse Holding Costs by 20%,\" and sends a DM: *\"Saw your comment on the freight post. We are actually struggling with holding costs right now. Do you have time for a brief chat?\"*\n\nThe consultant secured the meeting without ever sending a cold pitch.\n\n## Why Technical Safety Dictates Your Growth Strategy\n\nWe cannot discuss LinkedIn automation without addressing the elephant in the room: account security. If you are comparing tools in 2026, you have to look beyond just the features and understand the underlying architecture. \n\n### The Era of Cloud-Based Suspensions\n\nTools that rely on cloud servers (often associated with mass outreach and data scraping) are under constant siege by LinkedIn's security teams. These tools log into your account from an IP address in a data center, bypassing standard browser behaviors. LinkedIn flags this rapidly. \n\nIf you are a consultant, losing your LinkedIn profile is catastrophic. You lose your network, your recommendations, your published content, and your primary lead generation channel. Relying on cloud-based volume automation is a gamble with your business's most valuable digital asset.\n\n![Technical architecture comparison of cloud-based scraping versus safe local execution](https://assets.bevisible.app/inline-images/j572deds37aq7z8k8a5fedvgph89fv9t/inline-3-1782915480113-2jb9ha.png)\n### The Local Execution Advantage\n\nThis is why Junior was fundamentally designed differently. Instead of relying on risky cloud servers, Junior runs locally on your machine. To LinkedIn, the activity looks exactly like you sitting at your desk, scrolling through the feed, and typing out thoughtful comments. \n\nBy leveraging natural interaction patterns, Junior protects your account safety while still giving you the scale and consistency needed to generate inbound pipeline. You get the leverage of AI without the existential risk of traditional automation bots.\n\nFor a deeper dive into evaluating tools for safety, review our [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist).\n\n## Moving Beyond Engagement: Comparing the Broader Market\n\nWhile Junior and Dripify represent two ends of the spectrum (Inbound vs Outbound), the market is filled with tools trying to solve the LinkedIn growth puzzle. \n\nMany users historically turned to tools like Taplio for content scheduling and basic engagement, but found them lacking in authentic conversational depth. If you are currently using a broader scheduling tool and want to understand how dedicated conversation AI differs, our breakdown on [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) provides a clear comparative analysis.\n\nUltimately, the tool you choose dictates the strategy you employ. If you choose an outbound messaging tool, you are forced to play a volume game. If you choose a contextual commenting tool, you are empowered to play an authority game.\n\n## Frequently Asked Questions for Consulting Growth on LinkedIn\n\n### Can consultants still use outbound DMs successfully?\n\nYes, but the nature of the DM must change. Cold, automated sequences are largely dead for high-ticket services. However, highly targeted, manual outreach based on a trigger event (e.g., they viewed your profile, they commented on a specific post, their company just raised a funding round) can still work. The key is that the DM must be deeply personalized and strictly manual. Save automation for visibility, not for the inbox.\n\n### How much time does a strategic commenting strategy take?\n\nIf done entirely manually, researching the right posts, reading them, and drafting thoughtful replies can take 1-2 hours a day. This is the primary bottleneck for busy consultants. By using a local AI tool like Junior to surface the right posts and draft context-aware replies, you can reduce this to 15-20 minutes a day while maintaining the same quality and authenticity.\n\n### Won't people know I'm using AI to comment?\n\nThey will if you use generic, poorly prompted AI tools that spit out words like \"delve,\" \"unlock,\" and \"game-changer.\" The differentiator with Junior is that it drafts replies based on *your* specific bio, tone, and past interactions. It doesn't write generic platitudes; it structures a framework for an insightful reply that you can quickly review, tweak, and post. It sounds like you because it is trained on your context.\n\n### Is commenting on competitors' posts a good idea?\n\nIt can be, provided you handle it with extreme professional grace. Do not argue or attempt to steal leads overtly. Instead, add complementary value. If a competitor posts a great framework, comment on a specific edge case where that framework applies perfectly. You demonstrate peer-level expertise without appearing combative. The audience reading the comments will recognize your authority.\n\n## The Final Verdict on Scaling a Consulting Pipeline\n\nFinding clients on LinkedIn without cold DMs is not just possible; it is the most sustainable way to build a high-ticket consulting business. \n\nThe era of blasting inboxes with \"Just floating this to the top of your inbox\" messages is over. Decision-makers are exhausted by the noise. They do not want to be sold to by a bot; they want to discover experts who can solve their complex problems.\n\nBy transitioning away from Dripify's volume-based outbound model and embracing Junior's conversation-first inbound model, you align your marketing with how high-level buyers actually make purchasing decisions. You protect your brand equity, you safeguard your LinkedIn account through local execution, and most importantly, you turn your LinkedIn presence from a digital resume into an active, inbound revenue engine. \n\nOptimize your profile, solve problems in public, let Junior help you scale your visibility in the comments, and watch the inbound conversations replace the cold outreach grind.", "created_at": "2026-07-01T14:49:22.328992+00:00", "updated_at": "2026-07-01T14:49:22.328999+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
