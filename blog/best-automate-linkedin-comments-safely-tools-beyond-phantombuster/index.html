    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 35, "slug": "best-automate-linkedin-comments-safely-tools-beyond-phantombuster", "title": "Best Automate Linkedin Comments Safely Tools Beyond Phantombuster", "excerpt": "Discover how to automate LinkedIn comments safely without risking your account. Compare local AI tools against legacy cloud platforms like PhantomBuster.", "featured_image_url": "https://assets.bevisible.app/featured-images/j574325mzm699zynttse86v0kh898d3d/best-automate-linkedin-comments-safely-tools-beyon-1782669004895-et40cv.png", "published_at": "2026-06-28T17:30:00+00:00", "content": "# Best Automate Linkedin Comments Safely Tools Beyond Phantombuster\n\nA mid-sized SaaS sales team recently learned a painful lesson about LinkedIn automation. Trying to rapidly build pipeline, they deployed a popular cloud-based commenting script that pinged LinkedIn's servers directly via undocumented API endpoints. For three days, their engagement skyrocketed. On the fourth day, six of their core sales accounts were permanently restricted. They lost access to thousands of warm connections, active conversations, and months of pipeline data in a single afternoon.\n\nAutomating your LinkedIn engagement is no longer about finding the tool that can blast the highest volume of \"Great post!\" or \"Thanks for sharing\" replies across your feed. LinkedIn's anti-bot infrastructure has grown incredibly sophisticated. It monitors browser fingerprints, typing cadence, IP continuity, and the semantic depth of your replies. If you want to [safely automate LinkedIn engagement](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin), you need tools that run locally, emulate human behavior perfectly, and draft replies that genuinely contribute to the conversation based on your actual expertise.\n\nWhile legacy tools like PhantomBuster paved the way for social scraping and cloud automation, the demands of 2026 require a safer, more nuanced approach. In this guide, we will break down exactly how LinkedIn detects automation, why local execution beats cloud scripts, and the best tools available for scaling your visibility without risking your account.\n\n## Why the Rules of LinkedIn Engagement Have Changed\n\nFor years, growth hackers treated LinkedIn comments like a numbers game. The strategy was simple: scrape a list of industry influencers, feed their post URLs into a cloud script, and auto-drop generic praise. \n\nToday, this approach actively damages your brand and flags your account. \n\n### The Shadowban Reality\n\nLinkedIn monitors accounts that post comments faster than a human could realistically read the post, synthesize a thought, and type it out. [LinkedIn flags accounts that post comments faster than a person could type them](https://www.simular.ai/use-cases/linkedin-auto-comment). Furthermore, they expect a balanced mix of activities: scrolling, reading, commenting, liking, and direct messaging. If your account exclusively drops comments at exactly 3-minute intervals via a headless cloud server in AWS US-East, you will trip security heuristics almost immediately.\n\n### The Death of Generic Reactions\n\nBeyond technical flags, there is a reputational cost. As AI-generated content floods the internet, users have developed an acute radar for automated slop. As many practitioners note, [fully automating LinkedIn comments defeats the entire purpose of adding your actual perspective](https://www.reddit.com/r/nocode/comments/1m0kuii/an_ai_that_comments_on_linkedin_anyone_building/). If your comments read like a robotic summary of the original post, the original author will simply ignore them\u2014or worse, block you. You need automation that handles the heavy lifting of discovery and drafting, while pulling from your unique background to sound human.\n\n![Diagram comparing old cloud-based LinkedIn automation with safe local AI execution.](https://assets.bevisible.app/inline-images/j574325mzm699zynttse86v0kh898d3d/inline-1-1782668851414-rabnj7.png)\n## The Technical Architecture of Automation: Cloud vs. Direct API vs. Local\n\nTo understand why some tools are safer than others, you have to look under the hood. How does the software actually interface with LinkedIn?\n\n### 1. Direct API Scripts (High Risk)\nThese tools attempt to reverse-engineer LinkedIn's private APIs or mobile app endpoints. They send raw data packets directly to LinkedIn's servers. \n- **The Problem:** LinkedIn instantly sees that these requests lack the standard headers, cookies, and browser fingerprints (like Canvas or WebGL data) associated with a real Chrome or Safari browser. \n- **The Verdict:** Avoid these entirely. They are the fastest route to a permanent ban.\n\n### 2. Cloud-Based Browser Emulators (Medium Risk)\nTools like PhantomBuster use headless browsers running on remote cloud servers to log into your account. They load the actual webpage and click the buttons.\n- **The Problem:** While they load the UI, you are logging in from an IP address in a data center halfway across the country. If you check your LinkedIn messages on your phone in New York, and a cloud server comments on a post from an IP in Frankfurt two minutes later, LinkedIn logs an impossible travel anomaly. \n- **The Verdict:** Usable if you use dedicated proxies and strictly limit daily volume, but inherently risky. \n\n### 3. Local Desktop Execution (Zero Risk)\nLocal automation tools live directly on your machine. When they operate, they use your actual computer's IP address, your existing browser fingerprint, and your active session cookies. \n- **The Problem:** They require your computer to be on and awake to run.\n- **The Verdict:** The undisputed safest method. Because the automation runs natively on your hardware, LinkedIn cannot distinguish the software's actions from your own manual browsing.\n\n## Best Automate Linkedin Comments Safely Tools\n\nIf you are looking for [Phantombuster alternatives for automating LinkedIn comments safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely), the market has shifted toward specialized AI engagement platforms. Here are the top tools leading the charge.\n\n### 1. Junior (Best for Total Account Safety & Authentic Context)\n\nJunior represents the next generation of [LinkedIn engagement tools](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026). Rather than operating as a cloud-based macro, Junior runs locally on your machine. This fundamental architectural choice eliminates the risk of impossible travel flags, proxy failures, and mismatched browser fingerprints that plague older SaaS tools. \n\nWhat sets Junior apart is its approach to conversation design. It doesn't just read the post; it cross-references the post's context with your unique bio, company goals, and tone of voice. When it drafts a reply, it sounds like *you* wrote it. It is designed specifically for job seekers, sales teams, agencies, and founders who want to bypass crowded DMs and turn public visibility into direct conversations. Because it leverages your actual computer for execution and your actual expertise for drafting, it bridges the gap between massive scale and bespoke relationship building.\n\n### 2. PhantomBuster (Best for Complex Multichannel Workflows)\n\nPhantomBuster remains a titan in the automation space, primarily known for its extensive library of data extraction APIs and chained workflows. Their LinkedIn Auto Commenter phantom allows you to automatically comment on a pre-defined list of posts or profiles.\n\nBecause PhantomBuster operates via the cloud, safety requires manual intervention. As they advise their own users, to avoid restriction, you must [write comments that add value or start a conversation, not generic reactions, and control your volume](https://phantombuster.com/automations/linkedin/16226/linkedin-auto-commenter). PhantomBuster is powerful if you are building complex data pipelines (like scraping a list, finding their emails, and commenting on their posts simultaneously), but it requires careful proxy management and lacks the deep, personalized AI drafting found in dedicated commenting tools.\n\n### 3. Simular.ai (Best for Browser Process Simulation)\n\nSimular focuses on avoiding detection through meticulous emulation of human browser behaviors. It attempts to replicate the exact delays, mouse jitter, and scrolling habits of a real user engaging with a feed. It specifically addresses the cadence problem, recognizing that [LinkedIn flags accounts that post comments faster than a person could type them](https://www.simular.ai/use-cases/linkedin-auto-comment). Simular is heavily technical, appealing to growth engineers who want fine-grained control over exactly how the simulated browser interacts with the DOM (Document Object Model) of the LinkedIn interface.\n\n### 4. ConnectSafely.ai (Best for Managed Cloud Safety limits)\n\nFor teams that absolutely must use a cloud-based solution and cannot run local software, ConnectSafely.ai offers a highly regulated environment. They enforce strict daily limits, mandate the use of static residential IPs, and heavily randomize execution times. They position themselves as a safer alternative to aggressive scraping tools by focusing entirely on maintaining account health, noting that their architecture helps [maintain zero bans across thousands of users by staying within platform guidelines](https://connectsafely.ai/articles/linkedin-comment-automation-engagement-guide-2026).\n\n### 5. JoinValley (Best for Contextual Lead Gen Extraction)\n\nValley takes an interesting approach by turning commenting into a direct lead qualification engine. Rather than just trying to maintain visibility, Valley's AI reads long-form posts to identify underlying pain points. Their philosophy is that [AI-powered comment tools can do more than mimic engagement\u2014they can read the context of a post, extract relevant themes, and generate responses](https://www.joinvalley.co/blog/automate-linkedin-comments-strategies) that naturally bridge into a sales pitch. It is heavily geared toward outbound B2B sales teams who view the comment section purely as the first step in a cold outreach sequence.\n\n![A feature matrix comparing legacy cloud scraping tools with modern local AI commenting tools.](https://assets.bevisible.app/inline-images/j574325mzm699zynttse86v0kh898d3d/inline-2-1782668858582-i7lufg.png)\n## Comparison: Legacy Tools vs. Modern Safe AI\n\nIf you are comparing tools (like [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) or looking beyond PhantomBuster), understanding the feature tradeoffs is critical.\n\n| Feature Matrix | Legacy Cloud Tools (e.g. PhantomBuster) | Modern Local AI (e.g. Junior) |\n| :--- | :--- | :--- |\n| **Execution Architecture** | Remote Cloud Data Centers | Local Machine (Your Hardware) |\n| **IP Address Risk** | High (Requires dedicated proxy setup) | Zero (Uses your native ISP connection) |\n| **Setup Complexity** | High (Managing session cookies, proxies) | Low (Runs natively in background) |\n| **Comment Personalization** | Low (Often relies on spun text or basic variables) | High (Drafts based on your unique bio/goals) |\n| **Bot Detection Avoidance** | Moderate (Relies on static delays) | High (Natural interaction patterns) |\n| **Primary Use Case** | Mass data scraping and high-volume blasts | Building authentic relationships and pipeline |\n\n## Core Principles of Safe LinkedIn Comment Automation\n\nChoosing the right software architecture is only half the battle. How you configure your campaigns determines whether you build influence or get restricted. \n\n### 1. The Principle of Natural Cadence\nHumans do not engage with LinkedIn in perfectly spaced intervals. We binge content while drinking coffee, check our phones quickly before a meeting, and ignore the platform entirely on weekends. \n\nIf your automation posts exactly one comment every 45 minutes, 24 hours a day, it looks like a script. Safe automation requires randomization. Set your tools to operate during your actual working hours. Introduce variance in the time between actions (e.g., waiting anywhere from 3 to 14 minutes between comments). Ensure the tool simulates realistic reading time before typing\u2014spending 45 seconds on a post before leaving a 30-word comment, rather than commenting instantly.\n\n### 2. The Contextual Depth Rule\nNever automate the final submission if you can't guarantee the quality of the output. The safest approach is utilizing an \"AI Copilot\" model. The software handles the tedious work: it monitors your target accounts, finds relevant posts, reads the content, and *drafts* a highly contextual, intelligent reply based on your background. It then queues these drafts for you to review, edit, and approve. \n\nThis ensures you never accidentally comment \"Great insights!\" on a post where someone is mourning a lost client, while still saving you 90% of the time required to maintain a presence.\n\n### 3. Volume Ceilings\nMore is not better. LinkedIn actively monitors the volume of outbound actions. If you historically leave 2 comments a week and suddenly drop 150 comments on a Tuesday, your account will trigger a manual review. \n\nWarm up your engagement. Start with 10-15 high-quality comments per day. Gradually scale up to 30-40 comments per day over a few weeks. The goal of commenting is to attract high-intent profile views from your ideal buyers, not to set a high score for total actions.\n\n## The 20-Minute Daily Engagement System\n\nTo maximize results without risking your account, pair your local automation tool with a disciplined daily routine. Relying entirely on autonomous background processes is risky; using AI to augment a short, focused daily workflow is highly effective.\n\n1. **Curate Your Target List (Weekly):** Build a specific list of 50-100 accounts you want to engage with. These should be a mix of ideal clients, industry peers, and larger influencers in your space. Feed this list into your local automation tool.\n2. **AI Drafting (Background):** Let your tool monitor this list daily. When they post, the tool reads the content and drafts an intelligent, relevant reply that integrates your specific perspective.\n3. **The 20-Minute Review (Daily):** Log in to your tool's dashboard over coffee. Review the queued AI drafts. \n    - **Approve** the ones that perfectly capture your voice.\n    - **Edit** the ones that need a personal anecdote or specific data point.\n    - **Discard** the ones where the original post isn't relevant to your goals.\n4. **Natural Publishing (Background):** Once approved, your local automation tool trickles the comments out over the next few hours, simulating human typing speeds and reading delays.\n\nBy following this system, you ensure that every comment reflects your actual expertise, completely bypassing the risks associated with fully autonomous cloud blasts. It aligns perfectly with the consensus among senior developers and marketers that true success requires [adding your actual perspective\u2014about 20 minutes a day with the right tools](https://www.reddit.com/r/nocode/comments/1m0kuii/an_ai_that_comments_on_linkedin_anyone_building/).\n\n![Process diagram showing the 20-minute daily workflow for safely reviewing and approving AI drafted LinkedIn comments.](https://assets.bevisible.app/inline-images/j574325mzm699zynttse86v0kh898d3d/inline-3-1782668870878-66ng4y.png)\n## Frequent Failure Modes in Automation (And How to Fix Them)\n\nEven with safe tools, user error can cause problems. Here are the most common ways professionals accidentally sabotage their own automated engagement strategies.\n\n### Failure Mode 1: The \"Over-Optimized\" Persona Prompt\nWhen users set up AI commenting, they often write bio prompts that are too promotional. *\"I am a B2B sales expert who closes deals fast. Always mention how my service helps.\"*\n\n**The Fix:** This results in comments that read like infomercials. Your bio prompt should focus on your *perspective*, not your product. Configure your AI with a prompt like: *\"I am a sales leader who believes in relationship-led growth over aggressive cold calling. I value transparency and practical frameworks. Respond conversationally, keeping answers concise and focusing on the underlying strategy in the post.\"*\n\n### Failure Mode 2: Ignoring Replies\nAutomation gets you into the conversation, but humans have to close the deal. A major red flag for LinkedIn's algorithm (and your prospects) is an account that leaves 40 brilliant comments a day but never responds when the original poster replies back.\n\n**The Fix:** Block out 10 minutes at the end of the day specifically to handle inbound notifications. If someone replies to your automated comment, reply back manually. This signals to LinkedIn that there is a real human monitoring the account.\n\n### Failure Mode 3: Disconnected IP Hopping\nIf you stubbornly stick to a cloud automation tool, you might log in via a French proxy on your automation platform, but check your phone app on a cellular connection in Texas simultaneously.\n\n**The Fix:** The only reliable fix is moving to local automation. If you must use the cloud, you need a dedicated static residential IP that matches your geographic location, and you must pause the automation whenever you manually log into the mobile app. \n\nFor a complete rundown of evaluating your setup, review our [AI Tools for LinkedIn Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist).\n\n## Essential Features to Look for in a Commenting Tool\n\nIf you are evaluating [the best AI tools for LinkedIn commenting beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow), ensure the platform includes these non-negotiable features:\n\n- **Local Execution Capability:** The software runs on your hardware, eliminating IP mismatch risks.\n- **Custom Context Injection:** It uses your unique bio, past content, and specific writing style instructions rather than a generic LLM wrapper.\n- **Humanized Typing Cadence:** The software injects randomized delays and pauses, never posting instantly.\n- **Draft-and-Approve Workflow:** It does not force you into fully autonomous posting, allowing human oversight of the generated replies.\n- **Targeted Monitoring:** It allows you to track specific creators, URLs, or Sales Navigator lists rather than just spamming the general home feed.\n\n## Frequently Asked Questions About Safe Engagement\n\n### Can LinkedIn detect AI-generated comments?\nLinkedIn's algorithms are increasingly capable of identifying text that lacks human nuance or exhibits generic AI syntax (like starting every comment with \"Fascinating perspective!\" or using excessive emojis). However, if your tool uses advanced models trained on your specific voice, provides deep contextual insights, and is posted using a local machine simulating human pacing, it is functionally indistinguishable from manual effort.\n\n### Is it safer to use a Chrome Extension or a Desktop App?\nDesktop apps running natively on your machine are generally the safest because they can control the entire browser environment and pacing independently of your active tab. Chrome extensions are safer than cloud tools (since they use your local IP), but they can sometimes interfere with other scripts on the page or act erratically if you switch tabs while they are processing.\n\n### How many comments per day should I automate?\nIf your account is new to automation, start with a hard ceiling of 10-15 automated draft approvals per day. Once your account shows consistent, healthy engagement for a month, you can safely scale up to 30-50 high-quality comments daily. Going beyond 50 comments a day yields diminishing returns; it becomes difficult to maintain quality, and you drastically increase the risk of algorithmic throttling.\n\n## Final Thoughts on Scaling Your Visibility\n\nAutomating your LinkedIn comments safely requires a fundamental mindset shift. You are not automating the *relationship*; you are automating the *discovery and drafting process*. \n\nTools that rely on generic cloud scraping and aggressive direct API pings belong in the past. They expose your account to unnecessary risk and damage your reputation with generic, robotic replies. The future of LinkedIn growth belongs to professionals who use local, context-aware AI\u2014like Junior\u2014to find the right conversations, draft intelligent responses based on deep personal expertise, and handle the publishing cadence safely. By combining smart local software with a 20-minute daily review routine, you can consistently bypass crowded DMs, build authentic authority, and turn public visibility into a predictable pipeline of warm conversations.\n```", "created_at": "2026-06-28T18:19:22.264077+00:00", "updated_at": "2026-06-28T18:19:22.264083+00:00"};

                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
