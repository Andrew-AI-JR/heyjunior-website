    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 26, "slug": "best-ai-tools-for-job-search", "title": "11 Best AI Tools for Job Search in 2026 (Ranked)", "excerpt": "Stop throwing resumes into the ATS black hole. Discover the 11 best AI tools for job search in 2026 to automate applications, optimize resumes, and network.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57738hj24pb88hwkqfqcsbevh877nz0/11-best-ai-tools-for-job-search-in-2026-ranked-1781444939941-k5944j.png", "published_at": "2026-06-17T13:45:00+00:00", "content": "# 11 Best AI Tools for Job Search in 2026 (Ranked)\n\nSending 500 identical resumes into the applicant tracking system (ATS) black hole was a losing strategy in 2023. By 2026, it is actively penalizing you. \n\nRecruiters are currently flooded with thousands of AI-generated cover letters and mass-applied resumes for every open role. To cut through the noise, you need a different approach. The smartest candidates have shifted away from reactive applying and moved toward proactive networking, targeted resume optimization, and interview simulation. \n\nAI is no longer just for writing cover letters\u2014it is the infrastructure for a modern career transition. From building a sophisticated [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) tailored for hiring managers to predicting interview questions based on the exact job description, the landscape of career tech has fractured into highly specialized tools.\n\nWe tested, analyzed, and ranked the top platforms currently dominating the market. Here are the 11 best AI tools for job search in 2026, categorized by where they fit in your hiring workflow.\n\n## The State of AI in Hiring (And Why Your Strategy Must Adapt)\n\nThe dynamic between candidates and employers has turned into an AI arms race. While job seekers use tools to mass-apply, companies use AI to filter those applications out just as quickly. Relying strictly on tools that auto-submit your resume to hundreds of jobs a day often results in a high volume of instant rejections.\n\nThe real leverage lies in using AI to access the hidden job market. Up to 70% of open roles are never posted publicly; they are filled through referrals and internal networking. If your AI tech stack only focuses on the public job boards, you are competing for the most saturated 30% of the market.\n\n![Diagram showing the four phases of a modern AI job search: Network Warming, Asset Optimization, Application Management, and I](https://assets.bevisible.app/inline-images/j57738hj24pb88hwkqfqcsbevh877nz0/inline-1-1781444869061-i0hltg.png)\nTo win in 2026, your toolset needs to address four distinct phases:\n1.  **Network Warming:** Building relationships before you need them.\n2.  **Asset Optimization:** Making your resume machine-readable and highly relevant.\n3.  **Application Management:** Tracking your pipeline so you don't drop the ball.\n4.  **Interview Preparation:** Simulating the real-time pressure of a hiring manager.\n\nHere is how the top tools stack up across these categories.\n\n## 1. Junior: Best for Unlocking the Hidden Job Market\n\nIf you want to bypass the ATS entirely, you need to talk to the people doing the hiring. However, sending cold \"Can we grab a virtual coffee?\" DMs to busy directors usually gets ignored. \n\nJunior approaches the job search differently by focusing on the conversation-first strategy. Designed as an AI-driven platform for LinkedIn engagement, it transforms how you interact with potential employers, internal recruiters, and industry peers. \n\nInstead of spamming connections with automated DMs, Junior automates the process of finding relevant LinkedIn posts from your target accounts (e.g., hiring managers at your top 10 dream companies) and generates highly personalized, contextual comments that mirror your natural voice. \n\n### Why It Works for Job Seekers\nBy leaving thoughtful comments on a hiring manager's posts over a few weeks, you become a familiar face. When you finally reach out about an open role, it is a warm conversation rather than a cold pitch. It is one of the most effective [LinkedIn AI job search](https://heyjunior.ai/blog/linkedin-ai-job-search) strategies available today.\n\n*   **The Local Advantage:** Unlike many cloud-based automation tools that risk getting your LinkedIn account flagged, Junior runs directly on your local machine to maintain security and mimic natural interaction patterns.\n*   **Human-First AI:** It uses your specific bio and networking goals to generate comments. It avoids the obvious \"Great post!\" template spam.\n*   **Smart Prioritization:** It filters out the noise and only engages with high-value posts from decision-makers.\n\n**Best For:** Candidates who want to build a professional reputation, warm up outbound connections, and get referred internally without the stigma of cold spam.\n\n## 2. Teal: Best for Pipeline Tracking and Resume Management\n\nTeal has evolved from a simple Chrome extension to a comprehensive career workspace. If you are tracking more than five active applications, managing them in a spreadsheet quickly becomes chaotic.\n\nTeal acts as a personal CRM for your career transition. Its core strength lies in its ability to parse job descriptions from sites like LinkedIn or Indeed and highlight the exact keywords the employer is looking for. \n\n### Key Features\n*   **Dynamic Resume Builder:** Instead of keeping one master resume, Teal allows you to store a massive library of bullet points. When you apply for a specific role, you simply check the boxes for the bullets most relevant to that job description, and it generates a targeted PDF.\n*   **Application Tracker:** Save jobs directly from the browser, move them through stages (Applied, Interviewing, Offer), and set follow-up reminders.\n\n**The Tradeoff:** Teal is phenomenal for organization, but you still have to do the manual work of applying and interviewing. It tells you *what* keywords to use, but you have to implement them.\n\n## 3. Jobscan: Best for Beating the ATS Black Hole\n\nWhen you do need to apply through a public portal, your resume will likely be parsed by an Applicant Tracking System like Workday or Greenhouse. These systems score your resume against the job description.\n\nJobscan reverse-engineers this process. You paste your resume on one side of the screen and the job description on the other. The AI scans both and provides a match rate percentage, along with specific recommendations on which hard skills, soft skills, and exact phrasing you are missing.\n\n### The ROI of Jobscan\nGetting your match rate above 80% drastically increases the likelihood of a human recruiter actually opening your file. Jobscan also offers formatting checks to ensure your PDF doesn't break the ATS parser\u2014a surprisingly common failure mode where a highly qualified candidate gets rejected simply because the ATS couldn't read a two-column resume design.\n\n## 4. Jobright.ai: Best AI Copilot for Job Matching\n\nSearching for jobs takes hours of filtering out sponsored listings, ghost jobs, and roles that technically match your search query but require five more years of experience than you have.\n\n[Jobright.ai](https://jobright.ai/) acts as an AI career copilot. Instead of typing \"Senior Product Manager\" into a search bar, you interact with Jobright via chat. You upload your resume and tell the AI your parameters (e.g., \"I want a remote product management role in health tech that pays over $130k and requires less than 5 years of experience\").\n\nThe platform crawls the web, filtering out roles that don't fit your exact background. It actively reads the requirements and cross-references them against your resume before suggesting the role, saving you hours of manual reading.\n\n![Comparison funnel showing 500 mass applications yielding poor results versus 20 targeted interactions yielding high success.](https://assets.bevisible.app/inline-images/j57738hj24pb88hwkqfqcsbevh877nz0/inline-2-1781444860462-qde64o.png)\n## 5. Careerflow.ai: Best for LinkedIn Profile Optimization\n\nYour resume is your private application; your LinkedIn profile is your public landing page. If a recruiter looks you up and your profile is sparse, you lose credibility.\n\n[Careerflow.ai](https://www.careerflow.ai/) functions as an intelligent layer over your LinkedIn profile. It provides a real-time score of your profile's effectiveness based on current recruiter search behaviors. The AI suggests specific headline rewrites, optimized \"About\" sections, and skill tags that will make you appear higher in LinkedIn Recruiter search results.\n\n*Pro Tip:* Use Careerflow to optimize your profile's inbound SEO, then use a tool like Junior to [triple your LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate) through outbound comments. The combination of high search visibility and active networking is incredibly potent.\n\n## 6. Huntr: Best for Autofilling Complex Applications\n\nHuntr started as an application tracker (similar to Teal) but has pivoted heavily into workflow automation for the actual application process.\n\nWe all know the pain of uploading a polished resume only for Workday to demand you manually type out your last ten years of work history into their clunky web forms. Huntr's Chrome extension uses AI to read the input fields on almost any job board or ATS and perfectly autofills your data.\n\nThis single feature can reduce the time it takes to apply for a job from 15 minutes to 30 seconds, allowing you to maintain application volume without losing your mind.\n\n## 7. Sonara: Best for Autonomous Applying (With Caveats)\n\nIf you want to completely outsource the manual labor of job applications, [Sonara](https://www.sonara.ai/) is built for high-volume auto-applying. You set your parameters, and the AI goes out and submits applications on your behalf while you sleep.\n\n### The Auto-Apply Dilemma\nWhile tools like Sonara and [AIApply](https://aiapply.co/) (which generates tailored cover letters and auto-applies) are technically impressive, they come with a warning label. \n\nRecruiters are becoming adept at spotting generic, AI-blasted applications. Using these tools to apply to 1,000 jobs might yield a 0.5% interview rate. This volume-based approach can work for entry-level or highly standardized roles, but for mid-to-senior level positions, relationship-building almost always yields a higher ROI than auto-applying. \n\nIf you use auto-apply tools, use them as a supplementary background process, not your primary strategy.\n\n## 8. Canyon AI: Best for Mock Interview Simulation\n\nGetting the interview is only half the battle. Passing the technical and behavioral screens requires practice, and practicing in the mirror is notoriously ineffective.\n\nCanyon AI (and similar tools emerging in this space) ingest the job description of the role you are interviewing for and simulate a live video interview. The AI asks you specific, tailored questions that the hiring manager is likely to ask. \n\nIt listens to your verbal responses and provides immediate feedback on your pacing, filler words, clarity, and whether you actually answered the question using the STAR method (Situation, Task, Action, Result). It is the closest thing to having a senior recruiter drill you before the real event.\n\n## 9. Crystal Knows: Best for Personality Profiling\n\nWhen you finally secure an interview, knowing your audience is a massive advantage. \n\nCrystal Knows is an established AI tool that analyzes public data (mostly LinkedIn profiles) to generate a highly accurate personality profile of anyone. Before you interview with a hiring manager, you can run their profile through Crystal. \n\nIt will tell you if they prefer data-heavy, direct answers (high D on the DISC assessment) or if they prefer collaborative, story-driven responses. Tailoring your communication style to match your interviewer's preferences drastically increases rapport.\n\n## 10. Apollo.io: Best for Sourcing Hiring Manager Emails\n\nWhile technically built for B2B sales teams, Apollo.io is an unbelievable secret weapon for job seekers. \n\nIf you see a job posted on a company website, you can go to Apollo, search for that company, filter by \"Department: Engineering\" and \"Seniority: Director,\" and instantly find the person who is likely the hiring manager. \n\nApollo provides verified business email addresses. Instead of applying through the front door with everyone else, you can use AI to draft a concise, value-driven cold email directly to the decision-maker. Just remember the golden rule of cold outreach: be brief, be relevant, and don't ask for a job on the first message.\n\n![Matrix drawn in a notebook mapping job search strategies by effort and impact, highlighting networking via AI comments.](https://assets.bevisible.app/inline-images/j57738hj24pb88hwkqfqcsbevh877nz0/inline-3-1781444860861-qy5ai6.png)\n## 11. SalaryExpert: Best for AI Compensation Benchmarking\n\n\"What are your salary expectations?\" is the trap question of the initial recruiter screen. Guess too high, and you are screened out. Guess too low, and you leave tens of thousands of dollars on the table.\n\nSalaryExpert uses machine learning to aggregate millions of compensation data points globally. It factors in your specific location, years of experience, niche skills, and the size of the company to give you a highly accurate, up-to-date salary range. Entering a negotiation with customized, data-backed salary intelligence gives you the confidence to anchor high.\n\n## 3 Ways Job Seekers Fail When Using AI\n\nIntegrating AI into your job search is powerful, but many candidates misuse these tools and sabotage their own efforts. According to [skillup.org](https://skillup.org/resources/career-resources/ai-job-search-tools) and various career coaches, here are the most common failure modes:\n\n### 1. The \"Robot Voice\" in Outreach\nUsing ChatGPT to write a LinkedIn connection request usually results in bloated, unnatural language. Phrases like \"I am writing to express my profound interest in seamlessly integrating with your dynamic team\" scream AI. \n\nHuman recruiters want to talk to humans. If you are using AI to write messages, you must strip away the corporate speak. This is why tools like Junior are designed to learn your specific tone and keep comments conversational rather than formal.\n\n### 2. Prioritizing Quantity Over Quality\nThere is a temptation to use tools like Sonara to apply to 500 jobs a day. The problem? When you finally get an interview, you have no idea what the company does, why you want to work there, or what the role entails. You fail the initial screen because your interest isn't genuine. A targeted list of 20 high-fit companies approached through warm networking will always outperform 1,000 blind applications.\n\n### 3. Ignoring the Networking Ecosystem\nA frequent discussion on [Reddit's job search communities](https://www.reddit.com/r/jobsearchhacks/comments/1i2aruc/any_recommendations_for_ai_job_searching_tools/) highlights that AI tools are great for fixing resumes, but they don't replace the need for a referral. \n\nIf you spend 40 hours optimizing your resume keywords and 0 hours leaving thoughtful comments on industry posts or engaging with peers, your strategy is imbalanced. You have to participate in the community.\n\n![A checklist of AI outreach rules: No Robot Voice, Quality Over Quantity, and Engage Before Pitching.](https://assets.bevisible.app/inline-images/j57738hj24pb88hwkqfqcsbevh877nz0/inline-4-1781444852481-2yi2lb.png)\n## Building Your 2026 AI Job Search Tech Stack\n\nYou do not need to buy all 11 tools on this list. A practical, high-ROI tech stack looks like this:\n\n| Phase | Tool Choice | Purpose | Cost Expectation |\n| :--- | :--- | :--- | :--- |\n| **1. Discovery** | Jobright.ai | Find the right roles without scrolling endless job boards. | Free / Freemium |\n| **2. Asset Prep** | Teal + Jobscan | Track pipeline and optimize the resume for the ATS. | $20 - $40/month |\n| **3. Networking** | Junior | Automate thoughtful LinkedIn engagement to build warm relationships. | Varies by tier |\n| **4. Interview** | Canyon AI | Run behavioral mock interviews to refine delivery. | Freemium |\n\n## Frequently Asked Questions\n\n**Can an employer tell if I used AI to write my resume?**\nYes and no. If you copy and paste a raw ChatGPT output complete with \"As an AI language model\" or use overly complex vocabulary, they will know. If you use AI to structure your bullet points and highlight specific metrics you achieved, it just looks like a well-written resume.\n\n**Is it safe to use LinkedIn automation tools?**\nIt depends entirely on the architecture of the tool. Cloud-based tools that send mass connection requests can trigger LinkedIn's spam filters and result in account bans. Tools that run locally on your machine and focus on engagement rather than volume\u2014which is the exact difference discussed in [Meet Alfred vs Junior: Which LinkedIn Tool is Safer?](https://heyjunior.ai/blog/meet-alfred)\u2014are significantly safer.\n\n**Are auto-apply tools worth it?**\nIf you are looking for remote data entry or highly standardized entry-level work where volume is the only metric, yes. If you are applying for a mid-level marketing, sales, engineering, or leadership role, no. You are better off using [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) and networking strategies to get in front of the hiring manager.\n\n## Next Steps for Your Job Search\n\nThe era of the passive candidate is over. Employers are using AI to filter you out, so you must use AI to route around those filters. \n\nStart by auditing your current workflow. Are you spending 90% of your time filling out forms on Workday? If so, shift your focus. Use Teal to track your targets, Jobscan to optimize your baseline resume, and immediately begin running a [LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) tailored for networking. \n\nBy commenting, engaging, and building visibility with the exact people who have the power to hire you, you move out of the ATS database and into their direct messages. That is how you land the job in 2026.", "created_at": "2026-06-17T13:49:24.308443+00:00", "updated_at": "2026-06-17T13:49:24.308483+00:00"};
    </script>

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
