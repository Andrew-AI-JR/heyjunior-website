    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 3, "slug": "linkedin-lead-generation-strategy", "title": "5 Steps to a LinkedIn Lead Generation Strategy (2026)", "excerpt": "Discover a modern, 5-step LinkedIn lead generation strategy for 2026. Learn how to move past generic spam, use local AI safely, and build a high-converting pipeline.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5738xdr2rx56f46ny69p9c6s1877c9a/5-steps-to-a-linkedin-lead-generation-strategy-202-1779460738280-6vfl1s.png", "published_at": "2026-05-22T12:00:00+00:00", "content": "# 5 Steps to a LinkedIn Lead Generation Strategy (2026)\n\nThe standard playbook for LinkedIn outreach broke somewhere around late 2024. If you have an active account, your inbox is likely a graveyard of identical messages: \"Hi [First Name], I noticed we both work in [Industry]. I'd love to connect and share synergies.\" \n\nThis approach relies on a volume-first mindset\u2014the belief that if you send 1,000 automated connection requests, 10 people will eventually buy. In 2026, this tactic actively damages your professional reputation. Response rates for generic cold direct messages (DMs) have plummeted to near-zero, and LinkedIn's security algorithms aggressively flag accounts utilizing cloud-based spam tools.\n\nThe alternative is a conversation-first engagement strategy. Instead of treating the platform like a cold-calling directory, successful sales teams, lead generation agencies, and founders treat it like an ongoing, global networking event. You don't walk up to a stranger at a conference and immediately pitch your SaaS product. You listen to their conversation, offer a relevant insight, and build rapport. \n\nThis guide breaks down a modern, sustainable LinkedIn lead generation strategy. We will cover how to qualify prospects, shift from spam to authentic engagement, leverage local AI automation safely, and build a pipeline that converts.\n\n## What Is Lead Generation?\n\nBefore detailing the steps, it helps to strip away the marketing jargon. [Lead generation](https://business.linkedin.com/advertise/resources/marketing-terms/lead-generation) is the process of attracting and engaging individuals who have a recognized problem that your business can solve, and capturing their information to move them into a sales pipeline.\n\nOn a platform with over a billion professionals, lead generation is less about finding people and more about filtering them. The goal is to move a user from unaware, to engaged, to opting into your ecosystem\u2014whether that means booking a discovery call, signing up for an email list, or filling out a form.\n\n### The Volume vs. Relevance Myth\n\nThere is a persistent myth in B2B sales that scaling lead generation simply requires more raw activity. If 100 emails yield 1 meeting, 1,000 emails should yield 10. \n\nOn LinkedIn, this math fails. \n\nThe platform enforces strict connection limits (often around 100 per week), and users have developed a high sensitivity to generic outreach. When a prospect receives a connection request from someone with \"Helping X achieve Y\" in their headline, their guard immediately goes up. A strategy built on high-volume, low-relevance outreach will result in restricted accounts and a burned total addressable market (TAM).\n\nRelevance scales better than volume. Leaving five highly contextual, intelligent comments on a target prospect's recent posts does more to warm them up than 50 automated DMs. \n\n## How to Qualify B2B Leads\n\nNot every connection is a lead. Treating your entire network as a sales pipeline creates friction and wastes resources. Effective [LinkedIn lead generation](https://mailchimp.com/resources/linkedin-lead-generation/) requires a strict qualification framework before you ever initiate contact.\n\n### Lead Scoring\n\nLead scoring involves assigning a numerical value to a prospect based on their fit and their behavior. On LinkedIn, you lack traditional marketing automation data (like website dwell time), but you can score leads based on profile data and platform activity.\n\n*   **Profile Fit (0-50 points):** Does their job title match your buyer persona? Do they work at a company with the right headcount? Are they in your target geography?\n*   **Activity Level (0-50 points):** Did they post in the last 30 days? Do they comment on industry content? Have they engaged with your company page?\n\nTarget only prospects scoring 75 or higher. Reaching out to a perfect persona who hasn't logged into LinkedIn since 2023 is a waste of a connection request.\n\n### Matching Against Buyer Personas\n\nYour buyer persona dictates your search parameters. Instead of searching for \"Marketing Directors,\" search for the specific triggers that indicate a need for your product.\n\nFor example, if you sell compliance software, don't just look for \"Head of Compliance.\" Look for \"Head of Compliance\" at companies that recently announced a Series B funding round, or individuals who recently posted about changing regulatory frameworks.\n\n### Letting User Actions Dictate Timing\n\nTiming is often the deciding factor in B2B sales. The best prospects are those demonstrating a current need. Monitor LinkedIn for trigger events:\n\n*   **Job changes:** A new executive often brings in new tools within their first 90 days.\n*   **Company growth:** A sudden spike in hiring usually indicates new budgets.\n*   **Content engagement:** If a prospect comments on a post complaining about CRM data decay, and you sell a data-cleaning tool, that action dictates immediate, contextual outreach.\n\n![Inline visual 1](https://assets.bevisible.app/inline-images/j5738xdr2rx56f46ny69p9c6s1877c9a/inline-1-1779460700698-ahxp6k.png)\n## Step One: Determine a Plan for Lead Qualification\n\nThe foundational step of your [lead generation strategy](https://www.linkedin.com/business/marketing/blog/content-marketing/what-is-lead-generation) is turning your own profile into a high-converting landing page. When you engage with a prospect, the first thing they will do is click your name. If your profile reads like a resume designed to get you hired, they will bounce. If it reads like a resource designed to solve their problem, they will linger.\n\n### Profile Optimization Checklist\n\n*   **The Banner Image:** This is free billboard space. It should clearly state your value proposition, showcase social proof (logos of clients), and include a subtle call-to-action (CTA).\n*   **The Headline:** Move away from \"CEO at X.\" Use a formula that clearly defines who you help and how. Example: \"Helping B2B SaaS teams reduce churn by 20% | Founder at RetentionX.\"\n*   **The Featured Section:** This is your lead magnet zone. Pin a link to your newsletter, a high-value case study, or a direct booking link for a consultation. Do not leave this section empty.\n*   **The About Section:** Write this in the first person. Start with the pain point your target audience faces, explain your unique mechanism for solving it, and end with a clear CTA. \n\n| Element | Resume-Style (Bad) | Landing Page-Style (Good) |\n| :--- | :--- | :--- |\n| **Headline** | Account Executive at TechCorp | I help logistics companies automate dispatch | \n| **About** | 10 years of experience in sales. | Logistics dispatch is broken. Here is how we fix it. |\n| **Featured** | Link to a 5-year-old certificate | Link to a \"2026 Dispatch Benchmark Report\" |\n| **Experience** | Managed a quota of $1M | Partnered with 40+ logistics firms to scale operations |\n\n## Step Two: Choose Your Lead Generation Tactics\n\nOnce your profile is optimized, you must locate the exact individuals who need your expertise. The free version of LinkedIn is severely limited for this; Sales Navigator is highly recommended for building precise lists.\n\n### Advanced Boolean Search\n\nStop relying on basic keyword searches. Use Boolean operators to filter out noise and build highly targeted prospect lists.\n\n*   **AND:** Narrows your search. (e.g., *\"Director of Sales\" AND \"B2B SaaS\"*)\n*   **OR:** Broadens your search to capture variations. (e.g., *\"VP of Sales\" OR \"Head of Sales\" OR \"Sales Director\"*)\n*   **NOT:** Excludes irrelevant results. (e.g., *\"Founder\" NOT \"Co-founder\" NOT \"Owner\"*)\n*   **Quotes:** Searches for exact phrases. (e.g., *\"Lead Generation Agency\"*)\n\nA strong search string looks like this: *(\"VP of Marketing\" OR \"Chief Marketing Officer\") AND (\"SaaS\" OR \"Software\") NOT (\"Consultant\" OR \"Freelance\")*\n\n### Segmenting High-Value Prospects\n\nDivide your list into distinct tiers based on your lead scoring model:\n\n1.  **Tier 1 (High Intent, High Activity):** These are the prospects posting weekly, commenting on industry trends, and matching your ideal customer profile perfectly. They require highly personalized, conversation-first engagement.\n2.  **Tier 2 (Good Fit, Low Activity):** These match your persona but rarely post. They require a different approach, often involving engaging with their company page or sending highly specific, research-backed emails rather than relying solely on LinkedIn engagement.\n3.  **Tier 3 (Information Gatherers):** People who fit the persona but lack buying power (e.g., junior employees). Connect with them to build network density, but do not prioritize them for active outreach.\n\n## Step Three: Run B2B Lead Generation Campaigns (The Engagement Engine)\n\nThis is where most strategies fail. The instinct is to take the list generated in Step Two and dump it into a cloud-based automation tool that sends 100 identical connection requests.\n\n[Effective lead generation campaigns](https://www.reddit.com/r/b2bmarketing/comments/1pqiby5/what_are_some_effective_linkedin_lead_gen/) currently rely on warming up the prospect *before* the pitch. This is the conversation-first strategy.\n\n### The Conversation-First Playbook\n\nIf a prospect sees your name three times in positive contexts before you send a DM, your reply rate increases exponentially. The method is simple but requires discipline:\n\n1.  **Identify their content:** Find a recent post from your Tier 1 prospect.\n2.  **Leave a substantive comment:** Do not write \"Great post!\" or \"Thanks for sharing.\" Add a counter-point, share a relevant statistic, or ask a thoughtful follow-up question. \n3.  **Wait for the reply:** When the prospect replies to your comment, you have initiated a conversation.\n4.  **Transition to the inbox:** Now, send a connection request referencing the public conversation. *\"Hey [Name], really enjoyed our back-and-forth on your post about sales cycles. Would love to stay connected on the feed.\"*\n5.  **Provide value, then ask:** Once connected, send a resource related to their post, not a calendar link. Only after they acknowledge the resource do you ask to explore a business conversation.\n\n### Scaling Authenticity with Local AI\n\nExecuting the conversation-first playbook manually is incredibly time-consuming. Reading 50 posts and writing 50 bespoke comments a day will burn out any sales rep. This is why professionals turn to AI.\n\nHowever, there is a stark difference in how AI is deployed. Cloud-based automation tools run on remote servers. LinkedIn easily detects these IP discrepancies and flags or bans the accounts. Furthermore, cloud tools often rely on rigid, generic templates that sound like a robot wrote them.\n\nThis is where platforms like Junior provide a distinct advantage. Junior is an AI-driven platform designed specifically for this conversation-first strategy. \n\nInstead of running in the cloud and risking your account, Junior operates directly on your local machine. It automates the tedious process of finding relevant posts from your target list and generates high-quality, personalized comments. \n\nThe differentiator is the generation quality. Junior uses your specific bio, networking goals, and historical writing style to create comments that mirror your natural voice. It avoids the template-based spam that plagues the platform. You get the scale of automation with the security of a local application and the nuance of human interaction.\n\n![Inline visual 2](https://assets.bevisible.app/inline-images/j5738xdr2rx56f46ny69p9c6s1877c9a/inline-2-1779460704092-0oiik4.png)\n### A Practical Scenario: The Agency Shift\n\nConsider a lead generation agency targeting marketing executives. For months, they ran a standard playbook: scraping emails and sending automated LinkedIn DMs. They were booking two meetings a month and burning through hundreds of leads.\n\nThey shifted their strategy. They identified 100 Tier 1 executives. Using a local AI tool, they automated the process of tracking these executives' posts. Every morning, the rep spent 20 minutes reviewing and approving AI-drafted, highly relevant comments on those posts. \n\nAfter two weeks of consistent commenting, the rep sent connection requests. Because the executives recognized the rep's name and face from the comments section, the acceptance rate jumped from 15% to 65%. When the rep finally transitioned to a soft pitch in the DMs, the executives were warm to the idea. Meetings booked jumped to 12 a month, utilizing a fraction of the lead volume.\n\n## Step Four: Create Irresistible Website Content\n\nOutbound engagement is only half of the equation. To build a truly scalable [B2B lead generation](https://business.linkedin.com/advertise/resources/lead-generation) machine, you need inbound magnetism. When you leave intelligent comments, people will click your profile. When they click your profile, they need to find content that proves your authority.\n\n### The Three Content Pillars\n\nTo consistently generate leads, your organic LinkedIn content must rotate through three specific pillars:\n\n1.  **Actionable Frameworks (The \"How-To\"):** Give away your secrets. If you run a branding agency, post a step-by-step carousel on exactly how you conduct a brand audit. Make the content so good that people want to save it. This builds immense trust.\n2.  **Contrarian Insights (The \"Why You're Wrong\"):** Challenge industry norms. If everyone in your industry says \"cold calling is dead,\" write a data-backed post on why cold calling is actually seeing a resurgence. This creates pattern interruption and drives engagement.\n3.  **Social Proof & Case Studies (The \"Results\"):** Tell stories about your clients. Focus on the transformation. Detail the state of their business before your intervention, the exact steps you took, and the measurable results they achieved. \n\n### Formatting for the Feed\n\nLinkedIn's algorithm favors \"dwell time\"\u2014the amount of time a user spends looking at your post. \n\n*   Use strong hooks in the first two lines (before the \"see more\" button).\n*   Write in short, punchy paragraphs.\n*   Use carousels (PDF documents) for step-by-step guides, as they require users to click through multiple slides, increasing dwell time.\n*   Never put an external link in the main text of the post. LinkedIn suppresses content that drives users off the platform. Put the link in the comments or direct users to your featured section.\n\n## Step Five: Market and Advertise Across Relevant Platforms\n\nOrganic engagement and content creation will build your foundation, but to scale predictably, you must eventually integrate paid strategies. Once you have a proven offer and a clear understanding of your buyer persona, LinkedIn Ads can accelerate your pipeline.\n\n### LinkedIn Lead Gen Forms: What Can They Do for Me?\n\nDriving traffic from a LinkedIn ad to an external landing page introduces friction. Users are browsing on their phones, they click an ad, wait for a slow website to load, and then have to manually type their email address into a form. The drop-off rate is massive.\n\n[LinkedIn Lead Gen Forms](https://www.cognism.com/blog/linkedin-lead-generation) solve this by keeping the user on the platform. When a user clicks your ad, a native form pops up, pre-filled with their accurate LinkedIn profile data (name, email, job title, company size). \n\nBecause the friction is removed, conversion rates on Lead Gen Forms are historically much higher than traditional landing pages.\n\n### How to Get Started with Native Forms\n\nSetting up these forms requires strict attention to detail to ensure you don't generate low-quality pipeline.\n\n1.  **Create or select a Lead Gen Form template:** LinkedIn provides templates, but building a custom one tailored to your specific offer is better.\n2.  **Offer enticing incentives:** A prospect is not going to trade their verified contact information for a generic one-pager. The offer must be high-value: an original research report, a proprietary template, or a free audit.\n3.  **Use fewer form fields:** Every additional question you ask drops your conversion rate. Stick to the essentials: Name, Work Email, and perhaps one qualifying question (like Company Size or Current Tool Stack).\n4.  **Write a custom thank you message and enter a destination URL:** Immediately deliver the promised asset and provide a secondary CTA, such as a link to book a strategy call.\n5.  **Measure and Optimize:** Connect the form directly to your CRM (like HubSpot or Salesforce) so sales reps can follow up within minutes of the form submission.\n\n![Inline visual 3](https://assets.bevisible.app/inline-images/j5738xdr2rx56f46ny69p9c6s1877c9a/inline-3-1779460704196-cqyqwc.png)\n### Ad Formats to Pair with Lead Gen Forms\n\nLead Gen Forms can be attached to several ad formats:\n\n*   **Sponsored Content (Single Image or Carousel Ads):** These appear directly in the feed. They are excellent for promoting webinars, whitepapers, and industry reports.\n*   **Message Ads (formerly InMail):** These deliver targeted messages directly to a prospect's inbox. Since standard cold DMs have low response rates, Message Ads should be used sparingly and only for highly targeted, valuable invitations (like an exclusive executive dinner or a highly relevant case study).\n\n## Strategies for Effective Lead Generation: Best Practices\n\nAs you integrate these five steps, keep these operational best practices in mind to protect your account and maximize ROI.\n\n### 1. Maintain Account Security (Local vs. Cloud)\n\nWe touched on this during the engagement phase, but it bears repeating. LinkedIn has declared war on automation. If you use a cloud-based tool that logs into your account from an IP address in a different state or country, you will trigger security protocols.\n\nRunning tools directly on your local machine mitigates this risk. The platform sees behavior coming from your actual computer, on your usual IP address. This human-first approach to architecture ensures your account stays active while you scale your outreach.\n\n### 2. Put Privacy Front-and-Center\n\nWhether you are using organic outreach or Lead Gen Forms, B2B buyers are highly protective of their data. Be transparent about what happens when they hand over their email. Do not automatically subscribe someone to a daily newsletter if they only requested a single PDF. Respecting inbox boundaries builds the trust necessary to close high-ticket deals.\n\n### 3. Track Response Trends, Not Just Volume\n\nA modern lead generation operation lives and dies by its analytics. Sending 500 connection requests means nothing if none convert to pipeline.\n\nTrack the following metrics:\n\n*   **Comment-to-Connection Rate:** How many people accept your request after you've engaged with their content?\n*   **Connection-to-Reply Rate:** How many new connections respond to your first DM?\n*   **Reply-to-Meeting Rate:** The ultimate indicator of your message-market fit.\n\nIf your comment-to-connection rate is low, your profile needs work or your comments are too generic. If your connection-to-reply rate is low, you are pitching too quickly. Use these metrics as diagnostic tools to refine your approach continuously.\n\n## Shifting from Spam to Strategy\n\nThe era of the brute-force LinkedIn campaign is over. Buyers are too smart, and the platform algorithms are too strict. \n\nA successful LinkedIn lead generation strategy in 2026 demands a sophisticated blend of precise targeting, authentic conversation-first engagement, high-value content creation, and frictionless conversion mechanisms. By optimizing your profile, utilizing local AI to scale meaningful interactions, and seamlessly integrating native lead forms, you can transform LinkedIn from a frustrating cold-call directory into your most predictable source of qualified pipeline. Treat the platform like a community rather than a database, and the results will follow.```", "created_at": "2026-05-23T17:33:16.279925+00:00", "updated_at": "2026-05-23T17:33:16.279932+00:00"};

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
