    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 45, "slug": "junior-vs-engage-ai-authentic-linkedin-networking-for-job-seekers", "title": "Junior vs Engage AI: authentic LinkedIn networking for job seekers", "excerpt": "Discover what software helps job seekers network on LinkedIn. Compare Junior vs Engage AI to find the best tool for authentic, safe commenting and networking.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57aw47qaxk4atzp6yehrx30718akv0g/junior-vs-engage-ai-authentic-linkedin-networking-1784297957212-is7viw.png", "published_at": "2026-07-17T14:00:00+00:00", "content": "# Junior vs Engage AI: authentic LinkedIn networking for job seekers\n\nThe standard job search playbook is broken. You tweak your resume, upload it to a corporate portal, and pray the Applicant Tracking System (ATS) doesn't filter you out. When you get desperate, you move to LinkedIn, sending dozens of connection requests with the same slightly desperate note: *\"Hi, I admire your company and would love to connect to discuss potential opportunities.\"*\n\nIf you're lucky, one in twenty people accepts. If you're very lucky, one actually replies. \n\nModern job seekers are realizing that trying to force your way into a hiring manager's crowded inbox is a losing game. The alternative is \"social selling\" your way into a job\u2014putting yourself on the radar of decision-makers by engaging with their public content before you ever ask for a favor. \n\nBut when you're looking for software to help you network on LinkedIn, the market is confusing. You'll find tools that track your applications, tools that scrape emails, and tools that automate direct messages. \n\nThis guide breaks down the ecosystem of LinkedIn networking software for job seekers. We will look at foundational tracking tools, and then dive deep into the most critical category for modern job hunting: AI commenting and engagement platforms. Specifically, we'll compare the two leading approaches\u2014Engage AI and Junior\u2014to help you build authentic relationships without risking your account or your reputation.\n\n## The shift in LinkedIn networking for job seekers\n\nFor years, \"networking on LinkedIn\" meant one of two things: manually scrolling and commenting for hours a day, or using heavy automation tools to blast hundreds of cold direct messages (DMs).\n\nBoth approaches are failing today.\n\nFirst, hiring managers and internal recruiters are exhausted by automated cold outreach. Their inboxes are flooded with generic pitches from lead generation agencies and job seekers alike. They have developed a strong filter for \"connection request spam.\"\n\nSecond, LinkedIn has aggressively cracked down on cloud-based messaging automation. Using traditional connection bots often leads to temporary restrictions or permanent account bans. For a job seeker, losing your LinkedIn profile is catastrophic.\n\nThe most effective networking strategy today relies on the **Mere-Exposure Effect**. This psychological phenomenon dictates that people tend to develop a preference for things merely because they are familiar with them. \n\nBy leaving thoughtful, context-aware comments on a target hiring manager's posts over a few weeks, you become a familiar, welcome face. When you eventually send that connection request or DM, you aren't a cold lead anymore. You're a recognized peer.\n\n## What software helps job seekers network on LinkedIn?\n\nWhen job hunting on LinkedIn, \"networking\" requires handling three distinct tasks: tracking who you reach out to, finding their contact info, and executing the actual interaction. \n\nBecause LinkedIn strictly bans heavy automation software (and will ban your account for using it), the best software tools for job seekers are those that assist your workflow rather than attempting to automate it blindly in the background.\n\n### 1. Job Search CRMs & Trackers\n\nThese tools sit on top of LinkedIn to help you map out target companies, save interesting professionals, and track your conversation history so you never forget to follow up.\n\n*   **Teal:** A highly popular dedicated job-tracker tool. Its Chrome extension integrates directly with LinkedIn. When you view a job description or an individual's profile (like a VP of Marketing you want to work for), you can clip it instantly to your Teal dashboard, log them as a networking contact, and set a reminder to follow up.\n*   **Huntr:** Similar to Teal, Huntr allows you to build a visual Kanban board of your job search pipeline. It features a robust web clipper that extracts company and contact info directly from LinkedIn pages to keep your networking organized.\n\n### 2. Referral & Insider Identifiers\n\nInstead of blindly scrolling through a company's \"People\" tab trying to guess who to message, these tools highlight warm entry points.\n\n*   **JobWizard:** This extension features a built-in LinkedIn Referral Finder. When you are looking at a job posting, it automatically surfaces mutual connections, 2nd-degree connections, or alumni who work at that company so you know exactly who to target for networking.\n\n### 3. Engagement and Commenting Tools\n\nWhile trackers help you organize *who* to talk to, engagement tools help you actually execute the conversation. \n\nLeaving high-quality comments on 20 different target profiles a day is mentally exhausting. AI commenting tools solve the \"blank page syndrome\" by drafting relevant replies to posts. For a long time, Engage AI was the primary tool cited for this. Now, alternatives like Junior are addressing the visibility and quality gaps left by earlier AI iterations.\n\n![Diagram comparing the success rates of cold DM automation versus strategic public commenting for job seekers](https://assets.bevisible.app/inline-images/j57aw47qaxk4atzp6yehrx30718akv0g/inline-1-1784297864033-rrznfj.png)\n## Why comment-driven networking beats cold outreach\n\nBefore comparing the specific software, it is worth understanding why public commenting has replaced the cold DM as the networking method of choice for smart job seekers.\n\n**Bypassing the crowded inbox**\nA VP of Engineering might receive 50 cold DMs a week from recruiters, vendors, and job seekers. They ignore most of them. However, that same VP might post an article about their team's new deployment process and receive only three comments. By commenting, you bypass the crowded, high-friction inbox and enter a low-competition, high-visibility space.\n\n**Showcasing your expertise**\nA DM is a private claim: *\"I am a great data analyst.\"* A comment is a public demonstration: *\"I found similar anomalies when analyzing seasonal churn rates last quarter; did your team use a specific clustering method to isolate those outliers?\"* When you comment intelligently, you prove your competence before they even look at your resume.\n\n**Reciprocity and the algorithm**\nContent creators on LinkedIn crave engagement. When you consistently like and comment on someone's posts, LinkedIn's algorithm rewards them with more reach. Subconsciously, the author recognizes you as a supporter. When you finally ask for an informational interview, they are much more likely to say yes.\n\n## Engage AI: The pioneer in AI commenting\n\nEngage AI was one of the earliest tools to recognize the power of comment-driven networking. It exists primarily as a browser extension that injects itself into the LinkedIn feed.\n\n### How it works\nWhen you scroll past a post, Engage AI provides a button in the comment field. You select a tone (e.g., Friendly, Funny, Disagree, Congratulate), and the tool reads the original post and generates a response. \n\n### The job seeker experience with Engage AI\nFor a job seeker, Engage AI provides speed. If you have identified 30 target companies and want to engage with their leadership, Engage AI allows you to leave 30 comments in a fraction of the time it would take to write them manually.\n\nHowever, it comes with a few notable limitations for those looking to build authentic professional relationships:\n\n*   **The genericism trap:** Because standard AI tools only look at the post they are replying to, they lack context about *you*. A recent graduate and a 15-year veteran might generate the exact same comment using the \"Professional\" tone setting.\n*   **The \"AI Slop\" factor:** Over time, LinkedIn users have become highly sensitive to obvious AI comments. Responses that start with \"Great insights! I completely agree that...\" or simply summarize the post are often ignored or, worse, viewed negatively by hiring managers.\n*   **Reactive vs. Proactive:** Engage AI generally relies on you manually finding the posts in your feed to comment on, which can still be a time-consuming scrolling process.\n\nIf you want to understand the broader market of tools in this category, check out our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n## Junior: Authentic, locally-run AI engagement\n\nJunior was built to solve the exact problems that earlier AI commenting tools created: generic, spammy interactions and account safety risks. It is an AI-powered automation tool designed to start authentic conversations through strategic post commenting, serving job seekers, founders, and sales teams.\n\n### How Junior works differently\nUnlike traditional cloud-based connection tools or simple prompt wrappers, Junior operates on three distinct pillars:\n\n1.  **Unique Bio and Goals Context:** Before Junior drafts a comment, it knows who you are. A job seeker provides their background, their niche (e.g., mid-level UX designer), and their goal (e.g., seeking roles in health-tech, wanting to highlight knowledge of accessible design). Junior uses this context to craft replies that actually sound like you, adding your unique perspective rather than just summarizing the original post.\n2.  **Proactive Discovery:** Instead of making you scroll for hours, Junior actively finds relevant discussions based on your target audience, surfacing the posts where your engagement will have the highest impact.\n3.  **Local Execution:** Junior runs locally on the user's machine. This means it uses natural interaction patterns\u2014mimicking a real human clicking and typing in a browser\u2014to protect account safety. \n\n### The job seeker experience with Junior\nFor someone hunting for a job, Junior acts as a networking co-pilot. It bypasses the need for cold DMs by finding the right conversations and drafting context-aware, human-sounding replies. You review the draft, tweak it if necessary, and post. This turns public visibility into direct interviews by naturally attracting hiring managers to your profile.\n\n![Whiteboard sketch comparing cloud-based AI tools with locally-run AI architecture for account safety](https://assets.bevisible.app/inline-images/j57aw47qaxk4atzp6yehrx30718akv0g/inline-2-1784297865395-kb1een.png)\n## Junior vs Engage AI: Feature-by-Feature Comparison\n\nTo decide which software helps you network effectively, you need to look at how these tools handle the specific demands of job hunting.\n\n| Feature Focus | Engage AI | Junior |\n| :--- | :--- | :--- |\n| **Core Mechanism** | Browser extension (injects button in UI) | Desktop app running a local automated browser |\n| **Personal Context** | Low (relies on generic tone presets) | High (injects your custom bio, background, and specific goals) |\n| **Content Discovery** | Manual (you must scroll and find posts) | Automated (finds relevant discussions for you) |\n| **Output Quality** | Often repetitive, risks sounding like generic AI | Human-sounding, context-aware, introduces your unique angle |\n| **Account Safety** | Standard extension risks | High (runs locally, mimics human interaction patterns) |\n| **Best used for...** | High-volume, quick superficial engagement | Targeted, high-value relationship building and networking |\n\n### AI Generation Quality & Contextual Awareness\nWhen a hiring manager reads a comment, they are looking for value. \n\nIf a Director of Data Science posts about struggling with messy legacy data, an Engage AI \"Friendly\" response might be: *\"Great post! Dealing with messy legacy data is definitely a huge challenge for teams today.\"*\n\nIf a job seeker using Junior targets the same post, Junior filters the response through the user's bio (e.g., \"Data Analyst looking for roles in fintech, skilled in Python and SQL\"). The resulting draft looks more like: *\"This resonates. In my last role, we found that migrating the legacy datasets into a clean SQL warehouse before applying any Python scripts cut our processing time in half. Have you found a specific stack works best for your team's cleanup?\"*\n\nThe difference is night and day. One is obvious filler; the other demonstrates competence and invites a reply.\n\n### Account Safety and Architecture\nJob seekers cannot afford to end up in LinkedIn jail. As outlined in our guide to [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin), the platform's detection algorithms are highly sensitive.\n\nCloud-based tools that ping LinkedIn's servers from random IP addresses often trigger security warnings. Junior mitigates this entirely by running locally on your own machine. It uses your IP address and mimics human interaction patterns (like pacing and natural clicking), keeping your account secure while you network.\n\n### Workflow Integration for Job Hunters\nJob hunting is a project management exercise. If you are using Huntr or Teal to track your target companies, your engagement tool needs to fit that workflow.\n\nWith manual tools or simple extensions, you have to remember to visit your target list's profiles every day to see if they posted. Junior allows you to proactively find relevant posts based on the keywords, companies, and roles you care about, turning a scattered, reactive workflow into a streamlined daily habit.\n\n## Step-by-step: How to network with hiring managers using AI\n\nSoftware alone won't get you a job. You need a structured networking strategy. Here is a proven, four-week playbook combining tracking software and AI engagement to land interviews.\n\n### Week 1: Identification and Tracking\nDo not start engaging blindly. \n1. Decide on 15-20 target companies.\n2. Use LinkedIn search to find the likely hiring managers (Directors, VPs, or Senior Managers in your department) and internal recruiters at those companies.\n3. Add them to your job search CRM (like Teal).\n4. Follow them on LinkedIn and ring the \"bell\" icon on their profile so you are notified when they post.\n\n### Week 2: Consistent Engagement\nThis is where Junior becomes your daily driver.\n1. Set up Junior with a highly specific bio. Include your core skills, your current career transition, and your unique perspective.\n2. Spend 15 minutes a day reviewing the posts Junior surfaces from your target audience.\n3. Review the AI-drafted comments. Ensure they add value, ask a smart question, or share a brief anecdote. \n4. Post the comments. Do not ask for a job. Just be a smart, interesting professional in their replies.\n\n### Week 3: Escalating the Interaction\nWatch how your targets respond. Are they liking your comments? Are they replying to your questions? \nWhen a hiring manager replies to your comment with substance, you have an opening. \n\n### Week 4: The Transition to the Inbox\nNow, and only now, do you send a direct message. \nBecause you have been showing up in their notifications for three weeks, you are no longer a stranger. Your connection request should reference the public conversation:\n\n*\"Hi Sarah, really enjoyed our back-and-forth in the comments this week about legacy data migration. I'm actually exploring new Data Analyst roles and [Company] is at the top of my list. Would you be open to a brief chat about how your team is structuring the data org next year?\"*\n\nThis workflow converts at an exponentially higher rate than cold outreach. If you're curious how this approach scales against traditional messaging automation, read our breakdown on [Junior vs Dripify: finding consulting clients without automated messaging](https://www.heyjunior.ai/blog/junior-vs-dripify-finding-consulting-clients-without-automated-messaging).\n\n![A four-week timeline showing the process of identifying targets, engaging consistently, and asking for a connection](https://assets.bevisible.app/inline-images/j57aw47qaxk4atzp6yehrx30718akv0g/inline-3-1784297867194-t4oqte.png)\n## The risks of getting it wrong: Avoiding the \"AI slop\" trap\n\nWhile software can accelerate your networking, poor use of AI will actively damage your professional reputation. Hiring managers are becoming adept at spotting \"AI slop\"\u2014the verbose, heavily formatted, hollow text that standard ChatGPT outputs default to.\n\n**Red flags that ruin networking attempts:**\n*   **Overuse of emojis:** If your comment has a rocket ship, a fire emoji, and a lightbulb in a single sentence, it looks automated.\n*   **Summarizing the post:** Starting a comment with \"You make a great point about X. It is true that X is important because...\" adds zero value to the conversation.\n*   **Ignoring nuance:** If a professional posts about a difficult layoff or a career failure, and an AI tool misinterprets the tone and replies with \"Great insights! Thanks for sharing!\", you look insensitive and robotic.\n\nThe key to successful AI networking is viewing the software as a *drafter*, not an *autopilot*. By utilizing a tool like Junior that leverages your specific bio, you start with a much higher baseline of quality. But you must still read, refine, and approve the output. Authentic networking requires a human in the loop.\n\n## Evaluating your options: A quick checklist for job seekers\n\nIf you are serious about upgrading your job search tech stack, don't just download the first Chrome extension you see. \n\nUse this criteria to evaluate your LinkedIn networking software (for a deeper dive, review our [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist)):\n\n*   **Does it understand my background?** (If the tool can't take your resume/bio as context, its outputs will be generic).\n*   **Does it run locally?** (Cloud-based bots risk your account; local automation is significantly safer).\n*   **Does it find posts for me?** (An AI writer is useless if you still have to spend two hours finding the right people to talk to).\n*   **Does it write like a human?** (Test the outputs. If they sound like a corporate press release, delete the tool).\n\nWhen comparing Junior and competitors like Taplio, the differences in output quality become stark. You can read more about that specific matchup in [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth).\n\n## Frequently Asked Questions about LinkedIn Networking Software\n\n**Is it safe to use automation on LinkedIn for my job search?**\nIt depends heavily on the architecture of the tool. Heavy, cloud-based connection bots that send 100 cold DMs a day are highly unsafe and frequently result in bans. Tools that assist your daily workflow by running locally on your machine and mimicking natural human behavior are much safer. Always prioritize safety over sheer volume.\n\n**Can recruiters tell if I use AI to comment on their posts?**\nIf you use a basic tool without providing personal context, yes. Generic AI is easy to spot. However, if you use a context-aware tool like Junior, inject your own professional background into the prompts, and review the drafts to ensure they reflect your actual opinions, the comments will read as authentic, insightful contributions.\n\n**What happens if I rely only on job boards instead of networking?**\nYou will be competing against hundreds, sometimes thousands, of other applicants for a single role. The ATS will filter candidates based on keywords, meaning highly qualified people are routinely rejected. Networking helps you access the \"hidden job market\"\u2014roles that are filled via referral or direct interaction before they are ever publicly posted.\n\n## Building a career, not just a contact list\n\nThe goal of networking on LinkedIn isn't to accumulate the highest number of connections. It is to build meaningful professional relationships that can open doors to interviews, referrals, and hidden opportunities.\n\nSoftware like Teal and Huntr are excellent for keeping your job search organized. But when it comes to the actual act of networking\u2014making a memorable impression on a hiring manager\u2014you need a strategy built on engagement, not spam.\n\nWhile tools like Engage AI popularized the concept of AI commenting, job seekers today require more nuance, better context, and stronger account safety. By leveraging a locally run, hyper-personalized tool like Junior, you can bypass crowded inboxes, showcase your expertise in public, and turn your daily LinkedIn feed into a consistent pipeline of interviews.", "created_at": "2026-07-17T14:19:22.303862+00:00", "updated_at": "2026-07-17T14:19:22.303868+00:00"};
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
