    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 39, "slug": "linkedin-recruiter-engagement-guide", "title": "LinkedIn recruiter engagement guide", "excerpt": "Learn how to bypass crowded inboxes and get recruiter interviews through strategic LinkedIn comments. Discover the 3-level framework for turning visibility into DMs.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5734fcehv1x9315ds9zrvns8189ffdg/linkedin-recruiter-engagement-guide-1783001958143-ego387.png", "published_at": "2026-07-02T14:03:00+00:00", "content": "# LinkedIn recruiter engagement guide\n\nMost job seekers treat LinkedIn like a digital fax machine. They find a job posting, attach their resume, hit submit, and wait in a line of 500 other hopefuls. When that fails, they pivot to cold messaging recruiters, dropping unprompted paragraphs into inboxes that are already overflowing with automated spam.\n\nYou can get recruiter interviews through LinkedIn comments, but not by dropping a quick \"I'm interested!\" and hoping for the best. The comments section is a visibility and trust layer. It is the mechanism that moves you from a complete stranger to a familiar name, and finally to a warm direct message that results in an interview.\n\nRecruiters use LinkedIn differently than the rest of us. They are actively hunting for talent, but they are also building their personal brands, sharing market observations, and trying to attract passive candidates. When you understand how to engage with their public activity, you bypass the crowded application portal entirely.\n\n## The psychology of recognition bias in hiring\n\nBefore you write a single comment, you need to understand why cold outreach fails and why public engagement works.\n\nWhen a recruiter opens a cold DM from someone asking for a job, their default posture is defensive. They have to evaluate your background from scratch, determine if you are a fit for any current open roles, and decide if they have the time to reply. \n\nCommenting flips this dynamic through recognition bias. People naturally prefer and respond better to names they have seen before. If you consistently leave thoughtful, industry-relevant comments on a recruiter's posts over three weeks, you become a peer in their mind. By the time you finally send a direct message, you are no longer a stranger demanding a job. You are that smart professional who always adds good context to their discussions.\n\nRecruiter-focused guides consistently note that social media engagement is a relationship-building step, not an application step. According to [LinkedIn's own tips for engaging recruiters](https://www.linkedin.com/top-content/recruitment-hr/interview-techniques-for-recruiters/tips-for-engaging-recruiters-on-social-media/?utm_source=chatgpt.com), the goal is to warm up future conversations so you never have to send a truly cold outreach message again.\n\n## The \"Three Levels\" commenting strategy\n\nThe biggest mistake professionals make on LinkedIn is assuming all engagement is created equal. Commenting \"Great post!\" or \"Following\" does absolutely nothing for your visibility. These empty calories take up space but fail to create memory or value.\n\nAs noted in discussions among recruiters themselves, low-effort engagement is routinely ignored unless the recruiter already knows you personally ([Reddit](https://www.reddit.com/r/recruitinghell/comments/1rlohz5/commenting_on_recruiters_linkedin_post/?utm_source=chatgpt.com)). To actually convert visibility into interviews, you need to progress through three specific levels of commenting.\n\n### Level 1: Visibility (Getting seen)\n\nYour initial goal is simply to show up consistently on the radar of recruiters and hiring managers in your target industry. You are not asking for anything. You are demonstrating that you are active, observant, and plugged into the market.\n\n**What this looks like:**\n* \"Interesting trend\u2014I've seen similar patterns in the logistics sector over the last two quarters.\"\n* \"This matches what we are seeing with mid-market B2B buyers right now.\"\n* \"Curious how this shift impacts hiring for technical sales roles in Q3.\"\n\nAt this stage, you are validating the recruiter's original post while attaching your name to a relevant industry keyword.\n\n![Pyramid diagram showing the 3 levels of LinkedIn commenting: Visibility, Authority, and The Hook.](https://assets.bevisible.app/inline-images/j5734fcehv1x9315ds9zrvns8189ffdg/inline-1-1783001870410-ud035s.png)\n### Level 2: Authority (Getting respected)\n\nOnce a recruiter recognizes your name from Level 1 comments, you move to Level 2. Here, you transition from simply agreeing to actively adding value. You want the recruiter (and their network) to read your comment and think, *\"This person really knows their stuff.\"*\n\n**What this looks like:**\n* **The mini case study:** \"When we faced this churn issue last year, we implemented [X solution] and saw a 15% recovery rate within a month. Have you seen teams trying that approach?\"\n* **The polite disagreement:** \"I agree with your premise on remote work, but I've found that junior developers actually need the hybrid model more for asynchronous shadowing. The onboarding metrics tend to reflect that.\"\n* **Answering other commenters:** When someone else asks a question on the recruiter's post, you step in to answer it helpfully. \n\n### Level 3: The Hook (Getting the DM)\n\nThe final level is designed to prompt the recruiter to view your profile or initiate a message. You do this by hinting at deeper knowledge or a specific result without giving the entire playbook away in the comment section.\n\n**What this looks like:**\n* \"We completely overhauled our outbound sequence based on this exact philosophy. Happy to share the raw numbers if anyone is curious.\"\n* \"I built a quick tracking template for this specific problem last week. Might be worth testing for your client's scenario.\"\n\nYou are creating an information gap. A recruiter who specializes in outbound sales or operations will naturally want to see those numbers or that template. This gives them a reason to click your profile and message you first.\n\n## Identifying the right targets\n\nYou cannot execute this strategy blindly on your homepage feed. You need a curated list of decision-makers. \n\nFor job seekers and consultants, you should target two distinct groups:\n1. **Agency and internal recruiters** who specialize in your exact niche.\n2. **Hiring managers** (Directors, VPs, Founders) who lead the departments you want to join.\n\n### Building your engagement list\n\nTo find these individuals, you need to use precise search parameters. Many recruiters rely on advanced techniques to find candidates, and you can reverse-engineer those same [sourcing tricks](https://www.pin.com/blog/linkedin-sourcing-tips-2026/?utm_source=chatgpt.com) to find them.\n\n1. **Use Boolean search:** Type `(\"Technical Recruiter\" OR \"Talent Acquisition\") AND (\"SaaS\" OR \"Fintech\")` into the LinkedIn search bar. Filter by the locations or companies you are targeting.\n2. **Filter by activity:** A recruiter who hasn't posted in six months is not a good target for a comment strategy. Filter your search results by \"Posts\" to find individuals who are actively publishing content.\n3. **Identify the \"Loud\" hiring managers:** Look for department heads who frequently share team wins, publish thought leadership, or complain about industry pain points. These are prime targets for Level 2 (Authority) comments.\n\nIf you struggle to track these individuals manually, you can use specialized software. Reviewing the [best tools to find relevant LinkedIn posts to comment on](https://www.heyjunior.ai/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio) can help you set up dedicated feeds based on specific creator lists or keywords, ensuring you never miss a post from a target recruiter.\n\n## A workflow for converting public visibility into direct interviews\n\nKnowing what to say is only half the battle. You need a systematic workflow to turn that initial comment into a scheduled calendar invite.\n\n### Step 1: Optimize your profile as a landing page\n\nBefore you leave your first comment, your profile must be ready to receive traffic. When a recruiter reads a brilliant insight you left on their post, their next action is hovering over your name to read your headline. If they click through, your profile needs to immediately confirm the expertise you demonstrated in the comment.\n\nYour headline should not say \"Actively seeking opportunities.\" It should state your capability: \"Senior Product Manager | Scaling B2B SaaS platforms from 1M to 10M ARR.\" \n\n### Step 2: The 2-2-1 engagement cadence\n\nDo not rush the relationship. If you leave a comment on Monday and immediately ask for a job on Tuesday, you will burn the connection. Use a 2-2-1 cadence over a two-week period:\n\n* **2 Level 1 comments:** Simple agreements, adding minor context, getting your name on their screen.\n* **2 Level 2 comments:** Sharing a specific framework, challenging a premise politely, or adding a mini case study.\n* **1 Profile Visit + Connection Request:** After they have liked or replied to at least one of your comments, view their profile and send a connection request. \n\nThe connection request should reference the public interaction: *\"Hi Sarah, really enjoyed our back-and-forth on your post about Q3 hiring trends yesterday. Would love to stay connected on the timeline here.\"*\n\n![Timeline flowchart illustrating the 2-2-1 engagement cadence over two weeks.](https://assets.bevisible.app/inline-images/j5734fcehv1x9315ds9zrvns8189ffdg/inline-2-1783001854650-iyacl8.png)\n### Step 3: Triggering the DM\n\nOnce connected, wait for a \"Trigger Event\" to initiate a direct message. A trigger event is a signal that the timing is right for a private conversation. \n\nAccording to data on [outreach strategies that get replies](https://recruiterflow.com/blog/linkedin-outreach/?utm_source=chatgpt.com), context is the defining factor in response rates. \n\nStrong trigger events include:\n* The recruiter posts a job opening that fits your exact profile.\n* The recruiter asks a direct question to their network about a problem you know how to solve.\n* You notice their company just announced a funding round or a new product launch.\n\nWhen the trigger event happens, send a DM that references your past interactions: \n\n*\"Hey David, I saw your post this morning about the new Senior Dev role. Based on our conversations in the comments lately about the struggles of migrating legacy systems, it sounds like you need someone who has handled that specific transition. I led a similar migration at [Previous Company] last year. Let me know if you're open to a quick chat about what you're looking for.\"*\n\n## Navigating recruiter post types\n\nRecruiters generally post four types of content. Your commenting strategy must adapt to the specific format to remain effective.\n\n### 1. The \"We are hiring\" post\n\nThis is the most common and the most crowded. When a recruiter posts a job description, 90% of the comments will be \"Interested! Here is my resume.\" \n\n**Your move:** Do not ask for the job in the comments. Instead, ask a highly specific, operational question about the role that proves you understand the day-to-day reality of the job.\n\n*Example:* \"Great opportunity. For the primary territory this AE will cover, is the focus more on net-new logo acquisition or expanding the existing mid-market accounts?\"\n\nThis forces the recruiter to reply to you directly, establishing a dialogue while demonstrating your competence.\n\n### 2. The industry rant or observation\n\nRecruiters frequently share their frustrations about candidate behavior, market trends, or hiring manager expectations.\n\n**Your move:** Validate their perspective and add a supporting data point from the candidate or employee side.\n\n*Example:* \"You hit the nail on the head regarding interview ghosting. From the candidate side, I've noticed it usually happens when the process stretches past four weeks. The timeline communication at the beginning seems to be the breaking point.\"\n\n### 3. The personal story or career milestone\n\nThese posts are designed for engagement and usually feature a photo of the recruiter at a conference, celebrating a work anniversary, or discussing a personal challenge.\n\n**Your move:** Keep it human. This is not the time for a dense technical case study. Offer genuine congratulations and relate to the human element of their story.\n\n### 4. The poll\n\nPolls are engagement traps, but they are highly effective. \n\n**Your move:** Vote in the poll, but always explain your vote in the comments. The vote gets you registered in their analytics; the comment gets you recognized.\n\n*Example:* \"I voted for option B, but honestly, it was a close tie with C. In my experience, option B works better for seed-stage startups, while C becomes necessary after Series A.\"\n\n## Engagement mistakes that ruin your chances\n\nThe line between \"value-adding professional\" and \"annoying reply guy\" is thin. If you commit these common errors, recruiters will silently mute your activity.\n\n### The CFBR trap\n\n\"Commenting For Better Reach\" (CFBR) is a hollow tactic that signals desperation. It tells the recruiter you have nothing of substance to add, but you want credit for participating. Avoid it entirely. \n\n### Hijacking the narrative\n\nIf a recruiter posts about the importance of soft skills in leadership, do not write a 500-word essay in the comments about why technical certifications are actually more important, complete with links to your own portfolio. You are commenting in their living room; be a good guest. Add to their premise rather than trying to steal their audience.\n\n### Premature pitching\n\nNever ask for a job, a meeting, or a resume review in the public comments. It puts the recruiter in an awkward position. If they say yes to you publicly, they have to say yes to the 50 other people who ask. Keep the public feed focused on ideas, and save the requests for the private inbox.\n\n## The reality of manual engagement vs. safe automation\n\nThe strategy outlined above works exceptionally well. The problem is execution. \n\nFinding 15 relevant recruiter posts every day, reading them thoroughly, and drafting thoughtful, context-aware comments takes hours. Most professionals abandon this strategy after four days because the manual workload is exhausting.\n\nTo maintain consistency, many turn to automation tools. However, the LinkedIn automation landscape is heavily fragmented, and choosing the wrong tool can result in account restrictions.\n\n### The danger of cloud-based spam tools\n\nMany legacy tools operate by sending automated connection requests and generic messages from cloud servers. They try to automate the \"Direct Message\" phase without doing the necessary \"Visibility\" and \"Authority\" work first. \n\nWorse, cloud-based tools trigger LinkedIn's security protocols because they log into your account from unfamiliar server IP addresses. If you want to understand the technical risks, review this [evaluation checklist for automating LinkedIn safely](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist). \n\n### Automating engagement the right way\n\nIf you want to scale your recruiter engagement without sounding like a bot or risking your account, you need a tool built specifically for authentic conversation starting.\n\nThis is where an AI-powered local application like Junior changes the dynamic. Instead of blasting cold DMs, Junior helps you execute the exact comment strategy detailed in this guide at scale. \n\nHere is how it integrates into the workflow:\n\n1. **Local and safe:** Junior runs directly on your local machine, mimicking natural human clicking and typing patterns. It does not use suspicious cloud servers. (You can read more about [safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin) to see why this matters).\n2. **Finding the posts:** You set up your target parameters (e.g., specific recruiters or hiring managers in SaaS). Junior monitors their activity for you.\n3. **Context-aware drafting:** When a target posts, Junior reads the post and drafts a highly relevant, human-sounding reply based on your unique bio, past experiences, and goals. It doesn't write \"Great post!\"\u2014it writes the Level 2 and Level 3 comments you need to stand out.\n4. **You stay in control:** You review, tweak, and approve the comment before it goes live.\n\nBy turning public visibility into pipeline, Junior allows job seekers and consultants to bypass the crowded inbox entirely. It replaces the exhausting manual grind of social listening with a streamlined approval queue. For a deeper breakdown of how this approach compares to older methods, see our guide on the [best AI tools for LinkedIn commenting beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n![Visual comparison between risky cloud-based spam tools and safe, local, context-aware automation.](https://assets.bevisible.app/inline-images/j5734fcehv1x9315ds9zrvns8189ffdg/inline-3-1783001867549-4s2zek.png)\n## Tracking your engagement metrics\n\nIf you are serious about treating your job search or client acquisition like a pipeline, you need to track what works. You should monitor three specific metrics to know if your commenting strategy is effective.\n\n| Metric | What it measures | Goal / Benchmark |\n| :--- | :--- | :--- |\n| **Profile Views** | Is your commenting driving curiosity? | A 30-50% increase in profile views within two weeks of starting a daily comment routine. |\n| **Inbound Connection Requests** | Are recruiters finding your comments valuable enough to initiate contact? | 2-3 inbound requests per week from targeted companies. |\n| **DM Response Rate** | Did the \"warm-up\" phase actually work? | When you finally send a DM to a recruiter you've engaged with, you should see a 60%+ reply rate. |\n\nIf your profile views are flat, your comments are likely too generic (stuck in Level 1). If your profile views are high but nobody is connecting with you, your profile headline and summary are likely disjointed from the expertise you show in the comments.\n\n## Expanding beyond recruiters\n\nWhile this guide focuses on getting recruiter interviews, the exact same framework applies to hiring managers and department leaders. \n\nIn fact, engaging directly with a VP of Marketing or a Director of Engineering is often more lucrative than engaging with a recruiter. Recruiters are gatekeepers; they match resumes to requirements. Hiring managers are the actual buyers; they have the authority to create roles, bypass formal interview processes, and hire based on demonstrated competence.\n\nWhen you leave a brilliant comment on a VP's post, and they realize you understand their exact operational pain points, they will often forward your profile to their internal recruiter with a note that says, *\"Get this person on a call.\"* \n\nIf you are comparing broad networking tools to targeted relationship-building systems, reviewing a comparison like [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) will help clarify why targeted, context-rich engagement always outperforms broad vanity metrics.\n\n## Frequently asked questions (FAQ)\n\n**How long does it take to get an interview using this method?**\nIt typically takes two to three weeks of consistent engagement to build enough recognition bias to trigger a warm DM. This is a pipeline strategy. If you need a job tomorrow, this will not save you. If you want to line up high-quality interviews for next month, this is the most reliable method available.\n\n**Should I comment on agency recruiters or internal talent acquisition?**\nBoth, but adjust your approach. Internal talent acquisition (HR for a specific company) cares deeply about cultural fit, retention, and company mission. Frame your comments around those themes. Agency recruiters care about market speed, candidate placement rates, and hard technical skills. Frame your comments around industry trends and specific deliverables.\n\n**What if my target recruiter never posts anything?**\nMove on. You cannot force a commenting strategy on an inactive account. Focus your energy on the 20% of recruiters and hiring managers who actively use LinkedIn as a publishing platform. \n\n**Is it okay to disagree with a recruiter publicly?**\nYes, but tone is everything. Use the \"Yes, and...\" framework. Validate their core premise, but introduce a nuanced edge case. Professional, polite disagreement demonstrates critical thinking and often generates the highest amount of profile clicks from other readers.\n\n## Shifting from applicant to peer\n\nThe reason cold applications feel so demoralizing is the power dynamic. When you submit a resume to a portal, you are entirely at the mercy of the reviewer. You are a supplicant asking for an opportunity.\n\nWhen you execute a strategic, sustained commenting strategy, you change the power dynamic. By publicly demonstrating your expertise, answering questions, and providing context to industry discussions, you position yourself as a peer. \n\nRecruiters do not want to wade through thousands of desperate applications. They want to discover competent professionals who understand the market. By showing up in their comments with insight and authority, you make their job easier. You bypass the digital fax machine and step directly into the conversation.", "created_at": "2026-07-02T14:19:22.733807+00:00", "updated_at": "2026-07-02T14:19:22.733811+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
