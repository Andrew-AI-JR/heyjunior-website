    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 11, "slug": "linkedin-strategy-for-lead-generation", "title": "A Simple LinkedIn Strategy for Lead Generation (No Spam)", "excerpt": "Discover a complete, spam-free LinkedIn strategy for lead generation. Learn how to transition from cold DMs to conversation-first engagement that drives B2B sales.", "featured_image_url": "https://assets.bevisible.app/featured-images/j573b8q8rfy1tv2trfajerjs1s8772wp/a-simple-linkedin-strategy-for-lead-generation-no-1780145376108-qvwvyb.png", "published_at": "2026-06-02T12:37:00+00:00", "content": "# A Simple LinkedIn Strategy for Lead Generation (No Spam)\n\nOpen your LinkedIn messaging tab right now. Chances are, it looks like a graveyard of automated pitches. \"I noticed we are in the same industry...\" or \"We help companies like yours scale...\" followed by a calendar link. \n\nIf you are relying on bulk, untargeted outreach to fill your pipeline, you are likely experiencing diminishing returns. Decision-makers are exhausted by pitch-slapping. Platforms are cracking down on cloud-based mass-messaging tools. As algorithms and user preferences evolve, the old playbook of scraping thousands of profiles and hitting them with generic direct messages is practically obsolete.\n\nReal lead generation on LinkedIn in 2026 requires a pivot. It requires moving from a volume-based interruption model to an engagement-first, conversation-driven model. You have to earn the right to the inbox by first delivering value in the feed.\n\nIn this guide, we will break down a complete, actionable [5 Steps to a LinkedIn Lead Generation Strategy (2026)](https://heyjunior.ai/blog/linkedin-lead-generation-strategy), focusing entirely on how to generate high-quality B2B pipeline without ever feeling like a spammer.\n\n## Why Traditional LinkedIn Lead Generation is Failing\n\nFor years, B2B sales teams and lead gen agencies played a simple numbers game. If you send 100 connection requests a day, get 20 acceptances, and pitch all 20, you might get one meeting. \n\nThis brute-force method is failing for three distinct reasons:\n\n1. **Algorithm Penalties:** LinkedIn actively restricts accounts that exhibit bot-like behavior, particularly those using aggressive cloud-based automation tools that fire off hundreds of identical messages simultaneously.\n2. **Buyer Resistance:** Modern buyers do not want to be sold to via cold outreach. They prefer to evaluate vendors through peer recommendations, content consumption, and organic interactions.\n3. **Reputational Damage:** Spamming your target market burns bridges. When you pitch too early, you signal that you view the prospect purely as a transaction, not a relationship.\n\nAs professionals note across platforms, from industry forums to [Reddit discussions on B2B marketing](https://www.reddit.com/r/b2bmarketing/comments/1pqiby5/what_are_some_effective_linkedin_lead_gen/), the most successful sellers have abandoned the \"connect and pitch\" routine. \n\nInstead, they are adopting the **Conversation-First Strategy**. \n\n### The Conversation-First Philosophy\n\nInstead of treating the Direct Message (DM) as the starting line, the Conversation-First Strategy treats the DM as the finish line. \n\nYour goal is to become a familiar, trusted face in your prospect's feed. You do this by leaving thoughtful, highly relevant comments on their posts, engaging with their company updates, and sharing insights that matter to their specific pain points. \n\nWhen you finally do send that connection request or DM, it isn't cold. It's a natural continuation of a public conversation you have already started.\n\n![Comparison diagram showing traditional cold outreach versus modern engagement-first LinkedIn strategies](https://assets.bevisible.app/inline-images/j573b8q8rfy1tv2trfajerjs1s8772wp/inline-1-1780145279267-w9v6p4.png)\n## Step 1: Turn Your Profile Into a High-Converting Landing Page\n\nBefore you execute any outreach or content strategy, you must address your foundation. When you engage with a prospect\u2014whether by commenting on their post or viewing their profile\u2014the very first thing they will do is click your name to see who you are.\n\nIf your profile reads like a resume detailing your quota-crushing sales history, they will immediately categorize you as a threat to their inbox.\n\nYour profile must transition from a resume to a buyer-centric landing page.\n\n### The Header Banner\nDo not use the default grey background or a generic cityscape. Your banner is prime real estate. It should visually communicate exactly what you do and who you help. Use a clean, professional design that includes a one-sentence value proposition or social proof (e.g., \"Helping SaaS teams scale outbound organically\").\n\n### The Headline Formula\nYour headline follows you everywhere. It appears next to every comment you make and every post you publish. \"Account Executive at TechCorp\" does not compel anyone to click. \n\nInstead, use a formula that balances your role with your value:\n* *[Title] | Helping [Target Audience] achieve [Specific Result] without [Common Pain Point]*\n* *Example:* B2B Sales Consultant | Helping agencies fill their pipeline without cold DM spam.\n\n### The Featured Section\nTreat this as your lead magnet hub. Instead of pinning posts with high vanity metrics, pin assets that actually drive conversion:\n* A link to your newsletter.\n* A high-value case study or whitepaper.\n* A link to a webinar or live event you are hosting.\n* A scheduling link for a consultation (if framed as a strategy session, not a sales pitch).\n\n## Step 2: Building Personas for B2B Lead Gen\n\nYou cannot write resonant comments or content if you don't know exactly who you are speaking to. [What is lead generation](https://www.linkedin.com/business/marketing/blog/content-marketing/what-is-lead-generation) fundamentally? It is the process of attracting the *right* people and guiding them toward a solution. The \"right people\" must be defined with extreme prejudice.\n\nBroad targeting leads to weak messaging.\n\n### Moving Beyond Job Titles\nMost lead generation efforts stop at job titles: *\"I want to target CMOs in North America.\"*\n\nThis is insufficient. To build a highly effective persona, you need to map out:\n* **Firmographics:** Company size, revenue, industry, growth stage (e.g., Series B SaaS startups).\n* **Technographics:** What tools do they currently use? (This is easily searchable via tools like BuiltWith or within Sales Navigator).\n* **Trigger Events:** What recent changes make them ripe for your solution? (e.g., newly hired executives, recent funding rounds, expanding into new markets).\n* **Pain Points:** What keeps them awake at night? What metrics are they failing to hit?\n\n### Gaining Resonance with the Buying Committee\nIn B2B sales, you are rarely selling to a single individual. The average B2B buying committee involves 6 to 10 decision-makers. \n\nYour LinkedIn strategy should not focus solely on the ultimate decision-maker (e.g., the CEO), who is likely inundated with noise. Engage the end-users, the internal champions, and the technical evaluators. \n\nIf you are selling HR software, don't just target the CHRO. Engage with the Payroll Managers, the Recruitment Coordinators, and the Employee Experience leads. Build groundswell within the organization. When you finally speak to the CHRO, you can honestly say, *\"I've been speaking with your team, and they mentioned struggling with X.\"*\n\n## Step 3: The Engagement Engine (Where the Magic Happens)\n\nThis is the core differentiator of the \"no spam\" approach. Instead of blasting messages, you are going to systematically engage with your defined personas in public.\n\n### Identifying Target Accounts with Sales Navigator\nUse LinkedIn Sales Navigator to build two distinct lists:\n1. **The Lead List:** The specific individuals you want to build relationships with.\n2. **The Account List:** The companies you want to penetrate.\n\nUse the \"Posted on LinkedIn in the last 30 days\" filter. There is no point in trying to engage organically with a prospect who hasn't logged into the platform since 2023.\n\n### The Anatomy of a \"Top 1%\" Comment\nA \"Great post!\" or \"Thanks for sharing!\" comment is useless. It adds no value and does not make you stand out. To trigger curiosity and build authority, your comments must be miniature pieces of content.\n\nUse the **O.I.Q. Framework** for commenting:\n* **Observation:** Acknowledge their core point to show you actually read the post.\n* **Insight:** Add your own unique perspective, a brief data point, or a contrarian (but polite) angle.\n* **Question:** End with a relevant, open-ended question to invite a response.\n\n*Example:* \n> \"Spot on regarding the shift away from cold calling, Sarah. (Observation) I've noticed our clients who shifted just 20% of their cold call blocks into social engagement saw a 3x increase in their reply rates within two months. (Insight) Are you finding that reps struggle more with the writing aspect or the consistency of social selling? (Question)\"\n\n### The Cadence of Engagement\nYou cannot comment once and expect a meeting. You need a structured cadence:\n* **Day 1:** Leave a thoughtful comment on their recent post.\n* **Day 4:** Like a comment they left on someone else's post.\n* **Day 7:** Leave a second highly-valuable comment on their new post.\n* **Day 10:** Send a connection request referencing the interaction.\n\n![A 10-day timeline showing the exact cadence for warming up a LinkedIn prospect before connecting](https://assets.bevisible.app/inline-images/j573b8q8rfy1tv2trfajerjs1s8772wp/inline-2-1780145277062-synfsk.png)\n## Step 4: Safely Automating Your Strategy Without Spamming\n\nIf you are thinking, *\"This sounds incredibly time-consuming to track and execute for 100 prospects,\"* you are correct. This is where AI and automation enter the picture\u2014but it must be applied surgically.\n\nIf you simply want to blast connection requests, you can look into [9 LinkedIn Lead Generation Services That Actually Work](https://heyjunior.ai/blog/linkedin-lead-generation-services), but if you want to maintain control and authenticity, you need the right tools.\n\n### The Danger of Cloud Automation\nMany legacy [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) operate in the cloud. They log into your account from a server IP (often in a different country), execute actions at robotic speeds, and send template-based DMs. LinkedIn's security algorithms easily detect this, leading to shadowbans, account restrictions, or permanent bans.\n\n### How to Scale LinkedIn Lead Generation with AI (Safely)\nTo [scale LinkedIn lead generation with AI safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai), you must use tools that mimic human behavior. \n\nThe safest approach is utilizing local automation. Tools that run directly on your own machine\u2014acting within your own IP address and browser session\u2014drastically reduce the risk of account flagging. \n\nFurthermore, modern AI shouldn't be used to write generic cold DMs. It should be used to assist with the heaviest lift: **finding relevant posts and drafting contextual comments based on your unique voice.** \n\nImagine a system that aggregates the most relevant posts from your target personas, reads the context, and drafts a highly-personalized, O.I.Q.-style comment based on your specific industry expertise and bio. You act as the editor, tweaking the comment and approving it. This allows you to maintain extreme authenticity while 10x-ing your engagement output.\n\n## Step 5: Moving from Public Comment to Private Conversation\n\nOnce you have engaged with a prospect publicly 2 to 3 times, the transition to the inbox feels natural, not intrusive.\n\n### The Connection Request\nNever send a blank connection request, and never send a pitch in the connection request. Your request should purely reference the public interaction.\n\n*Script Example:* \n> \"Hey [Name], I really enjoyed our brief back-and-forth on your post about [Topic] on Tuesday. I'd love to connect to keep following your content.\"\n\nBecause they recognize your face and name from the comments, your acceptance rate will skyrocket. Engagement-warmed connection requests often see acceptance rates above 60-70%, compared to the 15-20% average of cold requests.\n\n### The Follow-Up DM\nOnce they accept, do not immediately pitch. You are still building rapport. \n\nWait 24 to 48 hours. Then, send a message that provides un-gated value related to the topic you bonded over.\n\n*Script Example:* \n> \"Thanks for connecting, [Name]. Based on what you said about struggling with [Pain Point], I thought you might find this framework interesting. We used it internally to solve that exact issue. No need to reply, just thought it might be useful. Cheers!\"\n\nIf the asset is genuinely useful, they will often reply. When they reply, the conversation has officially begun, and you can organically guide it toward a discovery call.\n\n## Step 6: Creating Content for B2B Lead Gen\n\nOutbound engagement is only half the battle. To maximize your lead generation, you need an inbound engine. When you leave those \"Top 1%\" comments, prospects will visit your profile. When they do, they need to see that you are an authority in your space.\n\n### The 3-1-1 Content Strategy\nMany B2B professionals struggle with what to post. They default to sharing company press releases (which no one reads) or purely promotional webinars.\n\nAdopt a sustainable posting framework like the 3-1-1 rule per week:\n* **3 Actionable/Educational Posts:** Frameworks, templates, \"how-to\" guides, industry observations, or tear-downs. This proves your competence.\n* **1 Story-Driven Post:** A lesson learned from a failure, a customer success story, or a personal career insight. This builds human connection and trust.\n* **1 Hand-Raiser (Promotional) Post:** A direct ask. \"I am looking for 3 founders who want to fix X this month. DM me 'Growth' and I'll send over the details.\"\n\n### Content Formats that Win\n* **Text + Selfie:** Surprisingly, these still perform exceptionally well for storytelling.\n* **Carousels (PDFs):** The best format for step-by-step guides and visual frameworks. They generate high \"dwell time,\" which the LinkedIn algorithm heavily rewards.\n* **Polls:** Excellent for middle-of-the-funnel engagement. You can reach out to everyone who voted for a specific pain point with a tailored message.\n\n![Matrix diagram explaining the 3-1-1 LinkedIn posting framework for B2B content](https://assets.bevisible.app/inline-images/j573b8q8rfy1tv2trfajerjs1s8772wp/inline-3-1780145288920-ldbbu3.png)\n## Step 7: Leveraging LinkedIn Lead Gen Forms and Ads (For Scaling)\n\nOnce your organic engagement and content engines are running smoothly, you may want to accelerate your results using paid distribution. According to [LinkedIn's own lead generation resources](https://business.linkedin.com/advertise/resources/lead-generation), Sponsored Content paired with Native Forms is one of the most effective ways to capture intent.\n\n### LinkedIn Lead Gen Forms: What Can They Do for Me?\nWhen a user clicks on a traditional ad, they are redirected to a landing page on your website. They have to wait for it to load, pull out their keyboard, and manually type in their name, email, and company details. Conversion drop-off at this stage is massive.\n\nLinkedIn Lead Gen Forms eliminate this friction. They keep the user on the platform and automatically populate the form fields using the data from the user's LinkedIn profile.\n\n### B2B Lead Form Tips\nTo maximize the conversion rate of your ad campaigns, follow these best practices:\n\n1. **Offer Enticing Incentives:** B2B buyers will not hand over their contact info for a generic newsletter. Offer a high-value asset: an industry benchmark report, an ROI calculator, or an exclusive template.\n2. **Use Fewer Form Fields:** Every additional field decreases your conversion rate. If you only need their email and company size to qualify them, do not ask for their phone number, job title, and zip code. LinkedIn auto-fills many fields, but keeping the visual length short is crucial.\n3. **Put Privacy Front-and-Center:** B2B buyers are wary of being spammed. Ensure your privacy policy is clear and explicitly state what they are opting into.\n\n### The Hybrid Approach: Retargeting Your Engaged Audience\nThe most powerful way to use LinkedIn Ads is to combine them with your organic strategy. \n\nInstead of running ads to a completely cold audience, use LinkedIn's targeting to run ads to people who have already interacted with your company page, visited your website, or attended your LinkedIn Events. You are effectively using your organic engagement to build a warm audience, and using paid Lead Gen Forms to capture their contact information efficiently.\n\n## Step 8: How to Qualify B2B Leads\n\nNot every connection request acceptance or form fill is a good lead. Your strategy must include a rigorous qualification process to ensure your sales team is not wasting time on unqualified prospects.\n\n### Lead Scoring\nImplement a lead scoring model based on user actions. A prospect who \"likes\" a post gets 1 point. A prospect who leaves a substantive comment gets 5 points. A prospect who fills out a Lead Gen Form for a bottom-of-the-funnel case study gets 20 points. \n\nLetting user actions dictate the follow-up urgency ensures you prioritize prospects showing the highest intent.\n\n### Matching Against Buyer Personas\nBefore a lead is passed to an Account Executive, they must be matched against your established buyer personas. If an intern at a target account downloads your whitepaper, that is not a qualified sales lead\u2014but it *is* an opportunity to ask that intern who manages the department, helping you map the buying committee.\n\n### Step-by-Step Qualification Workflow\n1. **Step One: Determine a plan for lead qualification.** Decide on the criteria (BANT: Budget, Authority, Need, Timeline) required before a lead is considered \"Sales Qualified.\"\n2. **Step Two: Choose your lead generation tactics.** Align your content offers with different stages of the funnel.\n3. **Step Three: Run B2B lead generation campaigns.** Deploy your organic and paid strategies to drive the leads into your scoring matrix.\n\n## Step 9: Measuring Lead Generation on LinkedIn\n\nTo know if your strategy is actually working, you must measure the right metrics. It is easy to get caught up in vanity metrics\u2014likes, impressions, and follower counts. While these indicate top-of-funnel brand awareness, they do not pay the bills.\n\n### Metrics That Actually Matter\n* **Profile Views from Target Accounts:** Are your comments and posts actually driving the right people to investigate who you are?\n* **Connection Acceptance Rate:** If this is below 30%, your targeting is off, your profile needs work, or your connection message is too pitch-heavy.\n* **Inbound DM Volume:** How many people are initiating conversations with you based on your content?\n* **Comment-to-Meeting Conversion Rate:** Of the people you systematically engage with using the O.I.Q framework, how many eventually book a discovery call?\n* **Pipeline Velocity:** How fast are leads sourced from LinkedIn moving from initial contact to closed-won revenue, compared to other channels?\n\n![Funnel diagram outlining the key metrics to track for LinkedIn lead generation success](https://assets.bevisible.app/inline-images/j573b8q8rfy1tv2trfajerjs1s8772wp/inline-4-1780145278501-z8pnua.png)\nTracking these metrics allows you to pivot quickly. If you are getting massive impressions but zero inbound DMs, your content is likely too generic or entertaining, rather than authoritative and problem-solving.\n\n## Common LinkedIn Lead Generation Mistakes (And How to Fix Them)\n\nEven with a solid strategy, it is easy to fall into traps that stunt your growth. \n\n### 1. Inconsistent Activity\nLinkedIn's algorithm heavily favors consistency. If you post three times in one week, disappear for a month, and come back to do a massive comment-sprint, you will be penalized with low reach. \n**The Fix:** Block out 30 minutes every single day for engagement. Treat it as non-negotiable pipeline generation time.\n\n### 2. Over-Reliance on AI-Slop Content\nWith the rise of generative AI, the feed is flooded with generic, perfectly formatted bulleted lists that say absolutely nothing of value. Buyers can spot ChatGPT-generated posts from a mile away.\n**The Fix:** If you use AI to write content, use it to structure *your* original thoughts. Feed the AI your specific opinions, real-world data, and case studies. Never let the AI dictate the underlying insight.\n\n### 3. Ignoring Job Seekers and Junior Staff\nIf you only ever respond to CEOs, you are missing out on immense networking potential. The job seeker you ignore today could be the VP of Operations at your target account tomorrow. \nFurthermore, for individuals executing a [LinkedIn AI job search](https://heyjunior.ai/blog/linkedin-ai-job-search) strategy, building goodwill across all levels of an organization is paramount. \n**The Fix:** Be generous with your network. Engage with people below your target paygrade; they often have the ear of the decision-maker.\n\n## Frequently Asked Questions\n\n### How many connection requests can I send per day safely?\nLinkedIn's official limits fluctuate, but generally, staying under 100 requests per week (about 15-20 per day) is considered safe. However, if you are utilizing the conversation-first strategy, you won't need to send anywhere near this volume. Quality and personalization drastically reduce the need for high-volume sending.\n\n### Do I need LinkedIn Premium or Sales Navigator for this to work?\nYou can execute the basics of this strategy on a free account. However, if you are serious about B2B lead generation, Sales Navigator is practically mandatory. It provides advanced search filters (company headcount, recent leadership changes, posting activity) that are impossible to replicate on the free tier.\n\n### How long does it take to see tangible ROI from a conversation-first strategy?\nThis is not a get-rich-quick scheme. If you are starting from scratch with an unoptimized profile and zero organic presence, expect to spend 3 to 4 weeks purely building authority and warming up accounts. Measurable pipeline generation typically begins to flow steadily between days 30 and 60, compounding significantly over time.\n\n## Final Thoughts: The ROI of Authenticity\n\nThe era of the cold, automated LinkedIn pitch is over. The buyers have spoken, and the platforms have adjusted their algorithms accordingly. \n\nThe future of LinkedIn strategy for lead generation belongs to those who view the platform not as a database to be scraped, but as an ongoing industry conference. By optimizing your profile for conversion, strategically engaging with your target personas in the feed, and using smart, local automation to assist rather than replace your authentic voice, you can build a sustainable pipeline that scales.\n\nStop interrupting the feed, and start becoming a valuable part of it. The meetings, the sales, and the revenue will naturally follow. All without sending a single piece of spam.```", "created_at": "2026-06-02T12:49:24.222471+00:00", "updated_at": "2026-06-02T12:49:24.222479+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {

            const encodedTitle = encodeURIComponent(title);

                },
                {
                    name: 'X',

                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {

                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
