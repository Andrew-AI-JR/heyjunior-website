    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 23, "slug": "linkedin-lead-generation-service", "title": "What Does a LinkedIn Lead Generation Service Really Cost?", "excerpt": "Wondering what a LinkedIn lead generation service actually costs? We break down agency retainers, hidden fees, reputation risks, and exact ROI calculations.", "featured_image_url": "https://assets.bevisible.app/featured-images/j5727mfnwhaxx24f4syq17jnxs877b98/what-does-a-linkedin-lead-generation-service-reall-1781182216066-jbt4hu.png", "published_at": "2026-06-14T12:25:00+00:00", "content": "# What Does a LinkedIn Lead Generation Service Really Cost?\n\nIf you have spent more than a week trying to sell B2B services, you have likely received a pitch from a lead generation agency promising to flood your calendar with qualified appointments. They guarantee a certain number of leads, promise to take the heavy lifting off your plate, and present a solution that sounds almost too good to pass up.\n\nThen you see the price tag.\n\nThe monthly retainer for a reputable [LinkedIn lead generation service](https://heyjunior.ai/blog/linkedin-lead-generation-services) often sits between $3,000 and $8,000. But the invoice you pay at the end of the month is rarely the only expense involved. When evaluating outbound sales partners, the sticker price is just the beginning. You also have to account for infrastructure fees, the time required to manage the agency, and the often-ignored cost to your brand reputation if the outreach relies on poorly spun templates.\n\nUnderstanding what you are actually paying for\u2014and what you might be sacrificing\u2014is the first step to building a sustainable [lead generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin) pipeline. \n\nLet\u2019s break down the true cost of hiring an agency, the hidden fees no one mentions in the discovery call, and the modern alternatives that allow you to scale your outreach without sacrificing your authenticity.\n\n## The Sticker Price: A Breakdown of Pricing Models\n\nNot all agencies bill the same way. The market is broadly divided into three pricing structures, each carrying its own set of financial incentives and risks.\n\n### 1. Retainer-Based Agencies (The Done-For-You Model)\n\nThe most common structure among established B2B agencies is the flat monthly retainer. Under this model, you pay a fixed fee for a dedicated team to manage your profile, build target lists, write copy, and execute the outreach sequences.\n\n**Typical Cost:** $3,000 to $8,000+ per month.\n\n**Why it costs this much:** You are paying for human capital. A high-end agency will assign an account manager, a copywriter, and an SDR (Sales Development Representative) to your account. Agencies like [Callbox](https://www.callboxinc.com/lead-generation/linkedin-lead-generation-agencies/) or [Belkins](https://belkins.io/blog/best-linkedin-lead-generation-companies) invest heavily in domestic talent, thorough market research, and omnichannel orchestration (combining LinkedIn with cold email and phone outreach). \n\n**The Risk:** If the campaign falls flat in month one, you are still on the hook for the full retainer. This is why many founders look for agencies like [SalesBread](https://salesbread.com/), which offer month-to-month pricing rather than locking clients into rigid quarterly or annual contracts.\n\n### 2. Pay-Per-Lead (PPL) or Pay-Per-Appointment\n\nTo counter the risk of paying a retainer for zero results, many newer agencies offer a Pay-Per-Lead (PPL) model. You only pay when a prospect agrees to a meeting or expresses explicit interest.\n\n**Typical Cost:** $150 to $800+ per lead, depending on your industry and target buyer (a meeting with a local dentist costs less than a meeting with an enterprise CISO).\n\n**Why it costs this much:** The agency takes on 100% of the upfront risk. If their campaign fails, they lose money. To compensate, they charge a premium for every successful conversion.\n\n**The Risk:** Misaligned incentives. When an agency is paid solely based on volume, quality inevitably suffers. They may push aggressive, spammy messaging to force meetings, resulting in a calendar full of prospects who are not actually ready to buy. You might find yourself wasting hours on calls with people who only agreed to meet out of politeness or to get a free consultation.\n\n### 3. Hybrid and Performance-Based Pricing\n\nA middle ground is the hybrid model: a lower base retainer combined with a performance bonus for every qualified meeting booked.\n\n**Typical Cost:** $1,500 to $2,500 monthly retainer + $100 to $300 per booked meeting.\n\n**Why it costs this much:** It covers the agency\u2019s baseline operational costs (software, list building, basic management) while keeping them motivated to actually deliver results.\n\n**The Risk:** You still face disputes over what constitutes a \"qualified\" lead. If the agency books a meeting with a company that has no budget, should you still have to pay the $250 bonus? Clear definitions in your contract are mandatory here.\n\n![A whiteboard comparison of LinkedIn lead generation pricing models including retainer, pay-per-lead, and hybrid structures.](https://assets.bevisible.app/inline-images/j5727mfnwhaxx24f4syq17jnxs877b98/inline-1-1781182101980-o86i89.png)\n## The Hidden Costs Most Agencies Exclude from the Pitch\n\nWhen a sales rep tells you their service is \"completely done-for-you,\" they are rarely factoring in the ancillary costs required to make the campaign function. \n\n### Software and Infrastructure Fees\n\nNo reputable agency operates your account manually. They use a stack of sales intelligence and automation tools. While some agencies absorb these costs, many require you to foot the bill for the infrastructure.\n\n*   **LinkedIn Sales Navigator:** Almost every B2B agency requires you to maintain an active Sales Navigator Core or Advanced subscription. This provides the advanced filtering needed to build precise lead lists. Cost: **$99 to $149 per month** per seat.\n*   **Data Enrichment Providers:** If the agency is running an omnichannel campaign (LinkedIn + Email), they will need tools to verify email addresses. Some agencies pass the cost of tools like Apollo, ZoomInfo, or Hunter.io directly to the client. Cost: **$50 to $1,000+ per month**.\n*   **Inbox Warming and Domain Registration:** If cold email is part of the package, you will need secondary domains and inbox warming services to protect your main company domain. Cost: **$30 to $100 per month**.\n\n### The Cost of a Ruined Reputation (Template Fatigue)\n\nThis is the most expensive, yet least quantifiable, hidden cost.\n\nLet\u2019s say an agency sends 1,000 automated connection requests on your behalf using a generic template: *\"Hi {first_name}, I saw we both work in {industry}. I'd love to add you to my network!\"* \n\nIf 10 people respond positively, the agency reports a success. But what about the other 990 people? Many of them immediately recognized the automated pattern. They rolled their eyes, clicked \"Ignore,\" and mentally categorized your personal brand as spam.\n\nWhen [building a LinkedIn lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy), your reputation is your most valuable asset. Delegating your voice to an agency that relies on high-volume, low-effort templates actively damages your standing in the industry. Over time, your connection acceptance rate will plummet, and your profile will become effectively burned.\n\n### Account Restrictions and Security Risks\n\nLinkedIn\u2019s terms of service strictly prohibit the use of unauthorized third-party software, particularly cloud-based automation tools that log into your account from random IP addresses to send bulk messages. \n\nIf an agency uses cheap, cloud-based automation, LinkedIn\u2019s security algorithms will flag your account. \n\n1.  **First strike:** A temporary warning and a forced password reset.\n2.  **Second strike:** A temporary restriction from sending connection requests.\n3.  **Third strike:** Permanent account suspension.\n\nLosing a LinkedIn profile you have spent a decade building is a catastrophic business cost. This is why many professionals are moving away from traditional cloud automation and comparing alternatives closely (for example, comparing [Meet Alfred vs Junior](https://heyjunior.ai/blog/meet-alfred) to see which architecture actually protects the user).\n\n## What Actually Determines the Price of an Agency?\n\nIf you are comparing proposals from an agency charging $1,500 a month and an agency charging $6,000 a month, you need to know exactly where that money is going. The disparity usually comes down to four major factors.\n\n### 1. Offshore vs. Domestic Talent\n\nAgencies operating out of North America, the UK, or Western Europe have significantly higher payroll costs. They pass these costs to you. The advantage is that their SDRs and copywriters possess native-level cultural nuance, which is highly important for writing outreach messages that don't sound stiff or unnatural. Agencies utilizing offshore talent can charge a fraction of the price, but the messaging often relies on rigid, easily detectable scripts.\n\n### 2. The Qualification Process\n\nCheap agencies scrape a list, load it into a sequencer, and press start. Expensive agencies manually review every single prospect on the list before sending a message. They check for recent funding rounds, hiring trends, and relevant company news to craft personalized icebreakers. \n\nAccording to [LinkedIn Marketing Solutions](https://business.linkedin.com/advertise/resources/lead-generation), effective lead generation requires defining clear target audiences and creating resonant content. A premium agency spends the first two weeks of your engagement purely on audience definition and persona mapping before a single message is sent.\n\n### 3. Omnichannel vs. LinkedIn-Only\n\nA service that only runs LinkedIn automation will always be cheaper than a service that coordinates touchpoints across LinkedIn, cold email, and phone calls. Omnichannel campaigns require complex logic (e.g., \"If they accept the connection request but don't reply, send Email A. If they ignore the connection request, send Email B\"). \n\n### 4. Brand Governance and Compliance\n\nTop-tier agencies have strict internal governance protocols. They won't send a campaign until you have approved every single variation of the copy. They also throttle their sending limits manually to mimic human behavior, ensuring your account stays safe. Cheap agencies often adopt a \"move fast and break things\" approach, taking risks with your profile to hit their volume quotas.\n\n![A diagram illustrating the four main factors that dictate the price of a B2B lead generation agency.](https://assets.bevisible.app/inline-images/j5727mfnwhaxx24f4syq17jnxs877b98/inline-2-1781182109239-p1f0yg.png)\n## Do You Even Need a Done-For-You Agency?\n\nBefore signing a $5,000-per-month contract, it is worth asking if a traditional outbound agency is actually the right model for your business. \n\nFor enterprise companies with massive total addressable markets (TAMs) and high average contract values (ACVs), hiring an agency like [Martal Group](https://martal.ca/linkedin-lead-generation-service/) makes financial sense. But for founders, consultants, small sales teams, and job seekers, traditional done-for-you lead gen is often overkill\u2014and potentially counterproductive.\n\nToday, the most effective way to generate opportunities on LinkedIn isn't through high-volume cold pitches in the DMs. It is through the **conversation-first strategy**.\n\n### The Conversation-First Strategy\n\nInstead of interrupting a stranger's inbox with a pitch, the conversation-first strategy involves finding relevant posts in your industry and leaving highly thoughtful, personalized comments. \n\nWhen you leave a valuable comment on a target prospect's post:\n1.  You prove your expertise publicly.\n2.  You trigger a notification directly to their phone without triggering their \"sales defense\" mechanism.\n3.  You capture the attention of everyone else reading that thread.\n\nThis approach warms up the lead naturally. When you eventually send a connection request, you aren't a cold prospector\u2014you are the insightful person who added value to their content yesterday.\n\n### Scaling Authenticity with AI (The Local Advantage)\n\nThe historical problem with the conversation-first strategy is that it takes hours. Scrolling through the feed, finding relevant posts, reading them, and writing thoughtful replies is exhausting.\n\nThis is where modern AI tools disrupt the traditional agency model. Rather than paying an agency $4,000 a month to send generic DMs, modern professionals use platforms designed specifically for organic engagement. \n\nFor example, tools like **Junior** are built entirely around this conversation-first methodology. Junior automates the tedious part\u2014finding highly relevant posts based on your target audience\u2014and generates high-quality, personalized comments that mirror your natural voice. \n\nUnlike traditional [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) that rely on dangerous cloud servers, Junior runs directly on your local machine. This means the activity mimics your actual behavior, maintaining account security and avoiding the dreaded LinkedIn ban hammer. It uses your specific bio and networking goals to ensure the AI generation avoids template-based spam, resulting in natural interaction patterns with variable timing.\n\nBy leveraging [AI for LinkedIn lead generation safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai), you can establish authority and fill your pipeline with warm leads for a fraction of the cost of an agency, all while keeping complete control over your personal brand.\n\n## 5 Warning Signs When Evaluating a Lead Gen Partner\n\nIf you decide that outsourcing to an agency is still the right path for your specific situation, you must vet them rigorously. Treat the agency evaluation process like hiring a senior executive. \n\nWatch out for these five glaring red flags during the sales process:\n\n1.  **They Promise Exact Volume Metrics Before Seeing Your Offer:** If an agency guarantees \"20 qualified meetings a month\" on the very first call, walk away. No one can guarantee results until they have tested your specific offer against a specific audience segment.\n2.  **They Refuse to Share Their Exact Messaging:** If an agency claims their messaging strategy is \"proprietary\" and refuses to let you approve the scripts before they go live, they are likely using spammy, hyper-aggressive templates they know you wouldn't approve of.\n3.  **They Don't Ask About Your Sales Cycle:** A good agency wants to understand your entire [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel). They need to know how you close, what your average sales cycle length is, and what objections you typically face. If they only care about top-of-funnel volume, they will hand off unqualified junk.\n4.  **They Ignore Inbound and Organic Content:** Outbound outreach performs exponentially better when the sender has an active, optimized profile. If the agency has no plan to improve your profile or advise on your organic content, they do not understand modern social selling.\n5.  **They Rely Purely on Cloud Automation:** Ask them explicitly: *\"How do you log into my account, and how do you bypass LinkedIn's weekly connection limits?\"* If they talk about cloud proxies or boast about bypassing limits to send 500 requests a week, your account will eventually be restricted.\n\n## How to Calculate Your LinkedIn Lead Generation ROI\n\nTo determine if an agency (or a software tool) is worth the cost, you need to map out a realistic Return on Investment (ROI) equation. Lead generation should never be viewed as a sunk marketing cost; it is a mathematical acquisition engine.\n\nHere is the standard framework for calculating B2B lead generation ROI:\n\n*   **Total Monthly Cost:** Agency Retainer + Software + Your Time\n*   **Estimated Meetings Booked:** The realistic number of calls the campaign will generate.\n*   **Show Rate:** The percentage of prospects who actually show up to the call (usually 60-80% for cold outbound).\n*   **Close Rate:** The percentage of attended meetings that turn into paying customers (typically 10-20% for cold outbound).\n*   **Customer Lifetime Value (LTV):** The total revenue a single client brings in over their relationship with you.\n\n### A Realistic Scenario\n\nLet\u2019s say you hire an agency for **$4,000 per month**, plus $100 for Sales Navigator.\nYour Total Cost = **$4,100/month**.\n\nThe agency books **12 meetings** a month.\nYour show rate is 75%, so you have **9 actual conversations**.\nYour close rate on cold traffic is 15%, meaning you close **1.35 deals** per month.\nYour average client LTV is **$10,000**.\n\nMonthly Revenue Generated: $13,500\nMonthly Cost: $4,100\n**Net ROI:** Highly positive. \n\nHowever, if your LTV is only $2,000, that same 1.35 deals yields just $2,700 in revenue. In that scenario, paying an agency $4,100 puts you in the red every single month. This is why agencies are generally only viable for high-ticket B2B sales.\n\nIf your LTV does not support a $4,000 retainer, you must reduce your acquisition cost. This is exactly where combining a smart content strategy with local AI engagement tools dramatically changes the math, bringing your monthly overhead down to the cost of a software subscription while maintaining high-quality output.\n\n![A handwritten ROI calculation for outbound sales on a notepad next to a calculator.](https://assets.bevisible.app/inline-images/j5727mfnwhaxx24f4syq17jnxs877b98/inline-3-1781182103277-pwqzf2.png)\n## Frequently Asked Questions About LinkedIn Lead Gen Services\n\n### Do I need a Sales Navigator subscription on top of agency fees?\nYes, almost universally. Agencies require Sales Navigator to run precise boolean searches and filter prospects by headcount, revenue, and recent job changes. Expect to pay around $99/month directly to LinkedIn, independent of your agency fees.\n\n### How long does it take to see results?\nIf an agency tells you they will have deals closing in week one, be highly skeptical. A standard outbound campaign requires 2-3 weeks of onboarding, profile optimization, and list building. You will likely start seeing initial replies in weeks 3-4, and actual pipeline developing in months 2-3. B2B sales cycles dictate the timeline.\n\n### Are LinkedIn ads part of a standard lead generation service?\nUsually, no. Organic outreach (managing your DMs and connections) is an entirely different discipline than running paid advertising. Agencies that handle [LinkedIn Lead Gen Ads vs. AI Comments](https://heyjunior.ai/blog/linkedin-lead-generation-ads) or Sponsored InMail typically charge a percentage of your total ad spend (e.g., 15-20%) rather than a flat outbound retainer.\n\n### What happens if I pause the service?\nIf you stop paying a done-for-you agency, your lead flow drops to absolute zero the next day. You do not own the process. This is the primary difference between renting an agency's outbound engine and building your own internal process using smart engagement tools. \n\n## The Final Verdict on Costs\n\nUnderstanding what a LinkedIn lead generation service costs requires looking far past the monthly retainer. You have to account for software overhead, the time spent managing the relationship, and the immense value of your professional reputation.\n\nIf you have a high average contract value, a large addressable market, and zero time to oversee outreach, paying $5,000 a month to a premium agency can yield an incredible return on investment. But if you want to avoid the stigma of cold DM spam, protect your account from cloud-based bans, and organically [triple your LinkedIn engagement rate](https://heyjunior.ai/blog/linkedin-engagement-rate), a conversation-first strategy powered by local AI is a far more cost-effective and reputation-safe alternative.\n\nThe most expensive lead generation service isn't the one that charges $8,000 a month. It's the one that burns your market, spams your peers, and leaves you with a damaged brand that takes years to repair.", "created_at": "2026-06-14T12:49:22.237153+00:00", "updated_at": "2026-06-14T12:49:22.237159+00:00"};
    </script>

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
