    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 46, "slug": "junior-vs-taplio-social-selling-through-commenting-or-automated-outreach", "title": "Junior vs Taplio: social selling through commenting or automated outreach", "excerpt": "Compare Taplio's automated posting with Junior's strategic AI commenting. Discover best practices for safe, context-driven social selling on LinkedIn.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57dd09v00v9rfk15w2fwg22fn89fy8r/junior-vs-taplio-social-selling-through-commenting-1784384327790-6ibpto.png", "published_at": "2026-07-18T14:15:00+00:00", "content": "# Junior vs Taplio: social selling through commenting or automated outreach\n\nOpen your LinkedIn inbox right now. Chances are, it is filled with identical, multi-paragraph pitches from people you have never met. They follow the exact same cadence: a polite opener, a presumed shared interest, and a rapid pivot to a calendar link. \n\nThis is the predictable result of first-generation AI social selling. When tools made it trivial to send thousands of personalized direct messages, everyone did exactly that. Consequently, open rates plummeted. Trust evaporated. Buyers learned to recognize the cadence of automated outreach within the first sentence.\n\nThe industry is currently experiencing a massive shift in how sales teams, founders, and job seekers generate opportunities. The strategy is moving away from the private inbox and back into the public feed. Instead of broadcasting generic content or blasting cold connections, the most successful practitioners are leveraging AI for hyper-contextual engagement. \n\nThis shift brings us to a direct comparison of two distinctly different philosophies in LinkedIn automation: Taplio\u2019s content-and-outreach machine versus Junior\u2019s comment-driven engagement engine. \n\nIf you want to understand the [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth) debate, you first need to understand how the rules of social selling have fundamentally changed.\n\n## The Evolution of AI Social Selling on LinkedIn\n\nSocial selling is the practice of leveraging your professional brand to fill your pipeline with the right people, insights, and relationships. It is not a new concept. However, the introduction of AI has created a deep divide in how practitioners execute their strategies.\n\nEarly AI adopters focused entirely on volume. If a human SDR could write 50 personalized emails a day, an AI agent could send 5,000. But LinkedIn is a closed ecosystem that heavily monitors and throttles excessive behavior. Furthermore, human psychology has adapted. Buyers are highly sensitive to automated enthusiasm.\n\nAccording to recent analysis on outreach strategies, while AI heavily enhances performance when used to streamline research and personalize genuine outreach ([business.linkedin.com](https://business.linkedin.com/sell/resources/sales-terms/ai-in-sales)), it fails completely when it attempts to entirely replace the human element of connection. Testing various AI-based outreach tools reveals that none have been able to successfully replicate genuine human interaction out of the box ([nethunt.com](https://nethunt.com/blog/linkedin-outreach/)).\n\nThe real leverage of AI in social selling isn't writing faster pitches; it is identifying the exact right moments to interact and providing the context needed to sound intelligent. This is the core divergence between broad automation suites like Taplio and specialized engagement tools like Junior.\n\n## Taplio: The Broadcast and Bulk Outreach Philosophy\n\nTaplio is one of the most recognized tools in the LinkedIn creator ecosystem. It was built primarily for individuals who want to scale their personal brand through high-volume content creation and broad network expansion. \n\n### Core Mechanics of Taplio\n\nTaplio operates on the assumption that visibility equals revenue. Its core feature set is designed around making you the loudest voice in your niche:\n\n1.  **Content Ideation and Generation:** Taplio analyzes viral posts and uses AI to generate similar content for your profile. You can queue up weeks of posts in a single sitting.\n2.  **Scheduling:** A robust calendar system to drip out content at optimal times.\n3.  **Automated DM Campaigns:** The ability to scrape lists of users (e.g., everyone who liked a specific post) and enroll them in automated direct messaging sequences.\n4.  **Cloud-Based Architecture:** The tool connects to your LinkedIn account via the cloud, allowing it to run 24/7 without your computer being turned on.\n\n### The Failure Mode of the Broadcast Strategy\n\nWhile Taplio is an exceptional tool for content scheduling, its approach to social selling carries significant risks. \n\nThe primary issue is the \"echo chamber\" effect. Because thousands of users are utilizing the same AI models to rewrite the same viral templates, feeds often feel repetitive. More critically, relying on automated DM sequences derived from post engagements often leads to immediate friction. Sending a pitch to someone just because they clicked \"like\" on an industry infographic violates the core tenet of building trust before selling.\n\nFurthermore, Taplio's cloud-based automation introduces account safety concerns. LinkedIn's security algorithms are highly tuned to detect cloud server IP addresses making API requests on behalf of a user. \n\n## Junior: The Contextual Commenting Philosophy\n\nJunior approaches social selling from the opposite direction. Instead of trying to manufacture viral moments or force cold interactions in the DM, Junior focuses entirely on the public feed. \n\nThe philosophy is simple: your ideal clients, hiring managers, and partners are already having conversations on LinkedIn. You do not need to interrupt them with a cold message; you just need to join their existing conversation with a highly relevant, intelligent contribution.\n\n### Core Mechanics of Junior\n\nJunior is designed for [safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin). It acts as an intelligent assistant that helps you scale authentic interactions:\n\n1.  **Strategic Post Discovery:** Rather than blindly mass-liking, Junior helps you find the specific discussions happening in your niche right now.\n2.  **Context-Aware Drafting:** Junior reads the original post, understands the nuance, and cross-references it with your unique professional bio and goals. It drafts comments that actually add value, rather than generic \"Great insights!\" filler.\n3.  **No Cold DMs:** Junior intentionally avoids automated inbox messaging. The goal is to drive profile views and inbound connections through public visibility.\n4.  **Local Execution:** Junior runs locally on your machine. To LinkedIn, the activity looks exactly like you browsing the site from your regular browser. This eliminates the risk associated with cloud-server automation.\n\n![Whiteboard comparison of Taplio's broadcast strategy versus Junior's engagement strategy](https://assets.bevisible.app/inline-images/j57dd09v00v9rfk15w2fwg22fn89fy8r/inline-1-1784384250285-431xau.png)\n### Why Commenting Generates Higher Quality Pipeline\n\nWhen you leave an insightful comment on an industry leader's post, three things happen simultaneously:\n\n*   **The Author notices you:** You are validating their content, which triggers reciprocity.\n*   **The Audience notices you:** If your comment adds a unique perspective or politely challenges a premise, the author's followers will click your profile.\n*   **The Algorithm rewards you:** LinkedIn prioritizes content with active discussions. Your engagement signals to the platform that you are an active, valuable user.\n\nWhen a prospect eventually reaches your inbox after reading your comments for weeks, they are no longer a cold lead. They already understand how you think. For independent consultants and boutique agencies, this transition is critical. In a direct comparison of [Junior vs Dripify: finding consulting clients without automated messaging](https://www.heyjunior.ai/blog/junior-vs-dripify-finding-consulting-clients-without-automated-messaging), we consistently see that comment-driven leads close at a significantly higher rate because the relationship begins with shared public value, not a private pitch.\n\n## Best Practices for AI Social Selling in 2026\n\nRegardless of which tool you lean toward, succeeding in the current environment requires a disciplined strategy. You cannot simply turn on a software suite and expect signed contracts. \n\nImplementing a successful AI social selling motion requires following a specific blueprint. Research into high-performing sales motions points to a 4-part blueprint for social selling: establishing a professional brand, finding the right people, engaging with insights, and building relationships ([inventive.ai](https://www.inventive.ai/blog-posts/4-part-blueprint-to-social-selling-on-linkedin)). \n\nHere is how to execute that blueprint utilizing modern AI tools.\n\n### 1. Build Credibility Before Leveraging AI\n\nAI is an amplifier. If your profile is confusing or lacks authority, driving more traffic to it will not yield results. \n\nBefore deploying any automation, your foundational credibility must be solid. Experts consistently note that building real credibility through documented work experience and verifiable results is non-negotiable before scaling outreach, as authenticity is the core currency of trust ([youtube.com/MEZGJx1QjpE](https://www.youtube.com/watch?v=MEZGJx1QjpE&t=403)).\n\n*   **Optimize the Headline:** It should clearly state who you help and how you do it, not just list your job title.\n*   **Feature Your Best Proof:** Use the Featured section to link directly to case studies, public portfolios, or media appearances.\n*   **Align the Tone:** If your Junior-assisted comments are highly analytical and professional, your profile summary cannot be filled with aggressive sales copy and emojis.\n\n### 2. Transition from Reactive to Proactive Prospecting\n\nSocial selling fails when practitioners simply scroll their default feed and comment randomly. The algorithm tends to show you content from people you already know, which does not expand your network.\n\nYou must proactively curate your environment. Identify key people in your industry, target accounts, or hiring managers using advanced search filters or Sales Navigator. Once you have this list, you can use specialized tools to monitor their activity. If you are comparing [Best Tools to Find Relevant Linkedin Posts to Comment On Tools Beyond Taplio](https://www.heyjunior.ai/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio), look for software that allows you to easily pull in specific feeds from your target accounts.\n\n### 3. The 3-Tier Commenting Framework\n\nWhen utilizing Junior to draft your comments, do not simply accept the first output without review. You must maintain the \"human in the loop.\" Use AI to overcome the blank page syndrome, but apply your own editorial taste. \n\nAim for a mix of these three comment types:\n\n*   **The Additive Insight (60%):** The post makes a good point, and you add a supporting data point or personal anecdote that proves the point further.\n*   **The Polite Pivot (30%):** You agree with the premise but suggest an alternative method or highlight an edge case the author missed.\n*   **The Question (10%):** Asking a highly specific, technical question that proves you understand the subject matter deeply and allows the author to elaborate.\n\n![A 3-step flowchart showing the transition from finding a post to leaving a contextual comment and finally connecting](https://assets.bevisible.app/inline-images/j57dd09v00v9rfk15w2fwg22fn89fy8r/inline-2-1784384253285-l2es7z.png)\n### 4. Moving the Conversation to the DM\n\nThe goal of commenting is ultimately to generate private conversations. However, the timing of the transition is critical.\n\nDo not send a connection request immediately after leaving a comment. Wait for the author to reply to your comment. Once they have engaged back, you have established a micro-relationship. \n\nAt that point, send a connection request with a short, non-sales note: *\"Really enjoyed our quick back-and-forth on your post about [topic] today. Would love to stay connected and see more of your insights on the feed.\"*\n\nNotice there is no pitch. You are simply securing the connection. The pitch only happens weeks later, after consistent mutual engagement, or when they post a specific problem that your service solves. This exact strategy has allowed practitioners to build massive revenue pipelines simply by waiting for the right contextual moment ([youtube.com/ZeBbeonLqnU](https://www.youtube.com/watch?v=ZeBbeonLqnU&vl=en)).\n\n## The Critical Factor: Account Safety and Automation Architecture\n\nWhen evaluating [Best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026), you cannot ignore the technical architecture of the software. LinkedIn aggressively bans accounts that use prohibited automation.\n\nThe industry divides tools into two categories: Cloud-based and Local.\n\n### The Risks of Cloud Automation (Taplio, Phantombuster)\n\nTools that run in the cloud require your session cookies. They essentially log in as you from a server located in an AWS data center. \n\nTo LinkedIn's security team, this looks highly suspicious. If your phone checks the app from an IP address in Chicago, and three minutes later a cloud server in Virginia sends 50 DMs on your behalf, the platform immediately flags the impossible travel. \n\nFor users exploring [Best Automate Linkedin Comments Safely Tools Beyond Phantombuster](https://www.heyjunior.ai/blog/best-automate-linkedin-comments-safely-tools-beyond-phantombuster), the consensus is that cloud-based automation is inherently risky for your primary, revenue-generating profile.\n\n### The Security of Local Execution (Junior)\n\nJunior utilizes a completely different architecture. It is a desktop application that runs locally on your machine. When Junior performs an action\u2014like helping you draft a comment or analyzing a post\u2014it does so through your actual browser profile, from your actual IP address.\n\nThere is no impossible travel. The interaction patterns mimic human behavior, complete with natural delays and randomized browsing paths. If you are comparing [Phantombuster Alternatives for Automate Linkedin Comments Safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely), local execution is the non-negotiable requirement for protecting a decade of networking history.\n\n![Architecture diagram illustrating the security difference between cloud-based and local execution](https://assets.bevisible.app/inline-images/j57dd09v00v9rfk15w2fwg22fn89fy8r/inline-3-1784384254788-8up5lc.png)\n## Evaluation Checklist: Choosing the Right Tool\n\nTo determine whether a content-broadcasting tool or a targeted-commenting tool is right for your current goals, run through this brief [Automate Linkedin Comments Safely Evaluation Checklist](https://www.heyjunior.ai/blog/automate-linkedin-comments-safely-evaluation-checklist) to audit your needs:\n\n**Choose Taplio or similar broad suites if:**\n*   Your primary goal is raw follower count and vanity metrics.\n*   You have a massive total addressable market (B2C or broad B2B SaaS) where volume matters more than deep personalization.\n*   You are comfortable risking your account with cloud-based automation.\n*   You are struggling to post consistently and need AI to generate bulk content ideas.\n\n**Choose Junior if:**\n*   Your primary goal is booking high-intent sales calls or securing job interviews.\n*   You sell high-ticket services (consulting, agency retainers, enterprise SaaS) where trust and nuance are required.\n*   Protecting your LinkedIn account from bans is your absolute highest priority.\n*   You want to leverage your existing expertise into public conversations rather than blasting cold DMs.\n*   You are looking for the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow) that actually understand context.\n\n## Structuring Your Daily Workflow\n\nThe most successful users of AI social selling do not spend hours a day on the platform. They use tools to compress their effort into a focused 20-minute daily sprint.\n\nHere is a practical workflow using Junior for an independent consultant targeting SaaS founders:\n\n**Minutes 0-5: Curation**\nOpen your saved Sales Navigator list of target accounts. Scan for recent posts. \n\n**Minutes 5-15: Engagement**\nUse Junior to analyze the 3-5 most relevant posts. Review the AI-drafted responses. Edit them to inject your specific tone or a recent statistic you read. Post the comments.\n\n**Minutes 15-20: Inbound Management**\nCheck your notifications. Reply to anyone who responded to your comments from yesterday. Accept inbound connection requests that came from your profile visibility. If someone viewed your profile after you left a comment, send a warm connection request.\n\nThis workflow requires zero cold DMs, zero stress about content creation, and zero risk to the account. It simply relies on being visible and helpful in the exact places your prospects are already spending their time.\n\n## Frequently Asked Questions About AI Social Selling\n\n### Is it obvious to readers when I use an AI commenting tool?\nIt depends entirely on the tool and your workflow. If you use generic Chrome extensions that output \"Thanks for sharing!\" or rely heavily on emojis, it is immediately obvious. If you use a context-aware tool like Junior that references the specific arguments in the post and aligns with your pre-written bio, it reads naturally. The key is to always read and lightly edit the output before hitting send.\n\n### Can I use Taplio for scheduling and Junior for commenting?\nYes, this is a common hybrid approach. Many founders use a scheduling tool to maintain a baseline of 2-3 posts per week, while dedicating their active daily time to commenting with Junior. The risk of the scheduling tool remains, but combining inbound content with proactive outbound commenting is a highly effective strategy.\n\n### How long does it take for commenting to generate actual leads?\nSocial selling is a compounding asset. Unlike cold calling, where the result is binary and immediate, commenting builds a web of visibility. Most practitioners report seeing a noticeable uptick in profile views and inbound connections within 14 days. Measurable pipeline (booked calls) typically begins materializing between days 30 and 45 as relationships mature.\n\n## The Future of the LinkedIn Feed\n\nAs AI continues to lower the barrier to content creation, the volume of noise on LinkedIn will only increase. We will see more automated posts, more AI-generated carousels, and more generic outreach sequences.\n\nIn this environment, doing the opposite of the masses is the only way to win. When everyone is broadcasting, the person who actually listens and responds stands out. \n\nWhile tools like Taplio have their place for creators looking to schedule high volumes of content, the actual work of social selling\u2014building relationships, proving expertise, and earning trust\u2014happens in the interactions. \n\nBy leveraging tools like Junior to find the right conversations and provide intelligent, context-aware responses safely from your own machine, you can turn the crowded LinkedIn feed into your most reliable source of pipeline. Engage strategically, keep the human in the loop, and watch your public visibility turn into private opportunity.\n\nIf you are ready to evaluate your current setup, start by running your current process against our [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist) to ensure you are protecting your account while maximizing your reach.", "created_at": "2026-07-18T14:19:22.601524+00:00", "updated_at": "2026-07-18T14:19:22.601529+00:00"};
    </script>

        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
