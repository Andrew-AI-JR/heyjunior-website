    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 34, "slug": "phantombuster-alternatives-for-automate-linkedin-comments-safely", "title": "Phantombuster Alternatives for Automate Linkedin Comments Safely", "excerpt": "Discover the safest Phantombuster alternatives for LinkedIn comment automation. Learn why local execution and context-aware AI protect your account from bans.", "featured_image_url": "https://assets.bevisible.app/featured-images/j571xypxnga0s8750mdpsw79k18981hp/phantombuster-alternatives-for-automate-linkedin-c-1782582543836-ma8asl.png", "published_at": "2026-06-27T17:30:00+00:00", "content": "# Phantombuster Alternatives for Automate Linkedin Comments Safely\n\nIt usually happens on a Tuesday morning. You try to log into LinkedIn, but instead of your feed, you are greeted by a stark white screen and a terrifying message: *\"Your account has been temporarily restricted.\"*\n\nIf you have been using cloud-based scrapers or legacy automation tools to run your LinkedIn engagement, this scenario is an occupational hazard. Automation has a reputation for being risky, largely because early tools prioritized sheer volume over human behavior. When the goal is extracting a list of event attendees, a heavy-duty cloud scraper like PhantomBuster is highly effective. But when you apply that same brute-force architecture to *engaging* with other professionals\u2014specifically leaving comments on their posts\u2014the risk profile changes entirely. \n\nAutomating your LinkedIn comments safely requires a completely different approach. It demands avoiding generic templates, limiting your daily volume to mimic natural human behavior, and utilizing architectures that do not trigger LinkedIn's sophisticated anti-bot security protocols. \n\nIf you are looking to bypass crowded inboxes and turn public visibility into direct interviews, pipeline, and client conversations, you need tools designed specifically for authentic engagement rather than data scraping. This guide breaks down exactly how LinkedIn detects risky automation, why cloud-based systems often fail the safety test for commenting, and the best Phantombuster alternatives built to protect your account while driving real pipeline.\n\n## The Technical Mechanics of LinkedIn Account Bans\n\nTo understand why you need an alternative to traditional cloud automation, you first need to understand how LinkedIn catches bots. \n\nLinkedIn\u2019s security algorithm does not just look at *what* you are posting; it looks closely at *how* you are posting it. When you click \"comment\" natively, your browser sends a massive payload of metadata to LinkedIn's servers. If you are using an automation tool, that tool has to replicate this metadata flawlessly, or you get flagged.\n\nHere are the three primary tripwires that legacy automation tools often hit:\n\n### 1. IP and Geolocation Mismatches\nWhen you log into LinkedIn on your phone or work computer, you do so from a residential or commercial IP address associated with your physical location. Cloud-based automation tools run on virtual servers (often AWS, Google Cloud, or DigitalOcean) located in data centers. \n\nIf LinkedIn sees you actively scrolling on your mobile app in Chicago, but simultaneously posting a comment from an AWS data center in Frankfurt, the geographic and IP-type mismatch triggers an immediate security review. \n\n### 2. Velocity and Timing Patterns\nHuman beings do not comment on 50 posts in three minutes. They read, scroll, pause, type, delete a typo, and hit submit. [LinkedIn flags accounts that post comments faster than a person could type them](https://www.simular.ai/use-cases/linkedin-auto-comment). Furthermore, LinkedIn expects a mix of activities\u2014some scrolling, some liking, some reading, and some commenting. A tool that blindly executes a \"comment only\" script at exact 45-second intervals creates a robotic signature that is trivial for machine learning models to detect.\n\n### 3. DOM and Browser Fingerprinting\nEvery browser has a unique fingerprint based on its extensions, screen resolution, installed fonts, and operating system. Headless browsers (used by many automation tools to scrape data in the background) often have distinct fingerprints that lack standard human elements, like mouse movements or typical screen rendering paths. If a tool injects a comment via a direct API endpoint rather than simulating a real browser click on the Document Object Model (DOM), it bypasses the normal frontend checks entirely. \n\n![Diagram comparing cloud-based IP routing versus local execution for LinkedIn automation.](https://assets.bevisible.app/inline-images/j571xypxnga0s8750mdpsw79k18981hp/inline-1-1782582460135-lwjdff.png)\n## Why Phantombuster is Not Built for Safe Commenting\n\nPhantomBuster is a phenomenal tool for data enrichment. If you need to scrape 1,000 Sales Nav profiles and find their email addresses, it is one of the most robust platforms on the market. However, its architecture makes it fundamentally risky for *outbound engagement* like commenting.\n\nPhantomBuster operates via cloud-based instances using session cookies. You hand over your LinkedIn session cookie, and their servers execute actions on your behalf. \n\nHere is why this is problematic for commenting:\n\n*   **The Cloud Penalty:** Because it runs on their servers, you run the risk of the data center IP mismatch mentioned above. \n*   **Action Isolation:** PhantomBuster runs \"Phantoms\"\u2014isolated scripts that do one thing. The \"Auto Commenter\" Phantom goes down a list of URLs and drops a comment. It does not naturally intersperse this activity with organic scrolling or feed reading. \n*   **Template Reliance:** Historically, these tools relied on static text inputs or spin-tax (e.g., \"{Great|Awesome} post, {Name}!\"). These [generic reactions](https://phantombuster.com/automations/linkedin/16226/linkedin-auto-commenter) add zero value and are quickly recognized as spam by both the platform and the original poster.\n\nIf you want to read more about safely navigating these risks, our guide on [Safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin) covers the nuances of algorithm updates in detail.\n\n## The Core Principles of Safe LinkedIn Comment Automation\n\nTo move away from high-risk scraping tools, you need a system built around four non-negotiable principles. If a tool cannot meet these criteria, it should not be trusted with your LinkedIn account.\n\n### Principle 1: Local Execution Over Cloud Execution\nThe single most effective way to protect your LinkedIn account is to run your automation locally. \n\nLocal execution means the software runs directly on your machine (often as a desktop app or a sophisticated browser extension), utilizing your actual browser, your actual IP address, and your actual geographic location. To LinkedIn's servers, a locally executed automation looks exactly like you sitting at your desk. There is no session cookie hijacking and no data center IP masking.\n\n### Principle 2: Contextual AI Understanding\n[Fully automating LinkedIn comments defeats the entire purpose](https://www.reddit.com/r/nocode/comments/1m0kuii/an_ai_that_comments_on_linkedin_anyone_building/) if the tool cannot add your actual perspective. Early automation left comments like \"Thanks for sharing!\" which actively damaged the user's personal brand. \n\nModern alternatives use Large Language Models (LLMs) to read the post. [AI-powered comment tools can do more than mimic engagement\u2014they can read the context of a post, extract relevant themes, and generate highly targeted responses](https://www.joinvalley.co/blog/automate-linkedin-comments-strategies). The best tools allow you to input your unique bio, your company's value proposition, and your specific tone of voice, ensuring the AI writes something you would actually say.\n\n### Principle 3: Strict Velocity Limits\nYour automation should respect human physical limits. Even if an AI can draft 100 comments a minute, you should never deploy them that fast. Safe tools enforce strict daily limits and randomize the delays between actions. A safe velocity is typically 15 to 30 well-crafted comments spread across a standard workday, mimicking a user checking their feed between meetings.\n\n### Principle 4: Human-in-the-Loop Capabilities\nWhile full automation sounds appealing, the safest and highest-converting strategy is a \"Human-in-the-Loop\" (HITL) approach. The tool should find relevant posts and draft the contextual reply, but pause to let you hit \"approve\" or tweak a word before posting. This acts as an ultimate safety net against AI hallucinations while still saving you 90% of the manual typing time.\n\n![Flowchart outlining the safe engagement architecture for LinkedIn commenting.](https://assets.bevisible.app/inline-images/j571xypxnga0s8750mdpsw79k18981hp/inline-2-1782582461734-f2pgsk.png)\n## Top Phantombuster Alternatives for Safe Commenting\n\nIf you are ready to migrate to a safer, more effective setup, the market has evolved significantly. Here are the top alternatives specifically tailored for engaging safely on LinkedIn, rather than just extracting data. For a broader look at the landscape, see our roundup of the [Best LinkedIn engagement tools 2026](https://www.heyjunior.ai/blog/best-linkedin-engagement-tools-2026).\n\n### 1. Junior: The Local, Context-Aware Standard\n\nJunior is built entirely around the philosophy that outbound engagement should be authentic, safe, and highly relevant. Designed for job seekers, sales teams, agencies, and founders, Junior specifically replaces the \"spray and pray\" cold DM approach by generating visibility through strategic post commenting.\n\n**Why it replaces PhantomBuster:**\nUnlike PhantomBuster\u2019s cloud-based execution, Junior runs locally on the user's machine. This fundamentally eliminates the risk of IP mismatches and data center flags. It uses your own browser session natively, meaning LinkedIn sees all the natural interaction patterns it expects from a real user.\n\n**How it works:**\nJunior does not rely on static URL lists or generic spin-tax. It actively finds relevant discussions based on your target audience and uses advanced AI to draft context-aware, human-sounding replies. It ingests your unique bio and specific conversion goals, meaning every comment serves a strategic purpose\u2014whether that is demonstrating subject matter expertise to a potential client or showing thought leadership to a hiring manager.\n\n**Safety Features:**\n*   **Local Execution:** Uses your IP and hardware.\n*   **Natural Delays:** Simulates human reading and typing times.\n*   **Bio-Driven Context:** Prevents the AI from making generic statements by forcing it to adopt your actual persona and perspective.\n\nIf you are weighing this against other popular platforms, check out our deep dive on [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth).\n\n### 2. Simular.ai: The Browser Emulator\n\nSimular takes a different approach to safety by focusing heavily on mimicking the physical inputs of a human user. It is highly conscious of the fact that [LinkedIn flags accounts that post comments faster than a person could type them](https://www.simular.ai/use-cases/linkedin-auto-comment).\n\n**Why it replaces PhantomBuster:**\nWhile PhantomBuster executes actions via API endpoints or basic headless scripts, Simular actively emulates mouse movements, scrolling, and keystrokes. It is designed to pass sophisticated DOM fingerprinting tests.\n\n**Pros:**\n*   Excellent mimicry of human physical behavior.\n*   Strong randomization of delays.\n\n**Cons:**\n*   Can be resource-intensive depending on how the emulation is handled.\n*   Focuses more on the *action* of commenting rather than the *strategic AI generation* of the comment itself.\n\n### 3. ConnectSafely.ai: The Compliant Cloud Option\n\nFor enterprise teams that absolutely mandate a cloud-based solution because they are managing hundreds of accounts and cannot run local software, ConnectSafely.ai is a specialized alternative. \n\n**Why it replaces PhantomBuster:**\nConnectSafely focuses exclusively on staying under the radar. According to their documentation, [tools like ConnectSafely.ai maintain zero bans across thousands of users by staying within platform guidelines](https://connectsafely.ai/articles/linkedin-comment-automation-engagement-guide-2026). They do this through highly sophisticated residential proxy networks and heavily throttled velocity controls.\n\n**Pros:**\n*   Cloud convenience with better proxy management than legacy scrapers.\n*   Built for agency scalability.\n\n**Cons:**\n*   Still carries inherent cloud risks if proxy health degrades.\n*   Often requires a much higher technical learning curve to configure proxy rotations correctly.\n\n### 4. JoinValley (Valley): The Campaign Orchestrator\n\nValley approaches commenting as part of a broader, multi-channel outbound strategy. They understand that a comment is not just engagement; it is a touchpoint in a sales sequence.\n\n**Why it replaces PhantomBuster:**\nPhantomBuster treats a comment as a standalone task. Valley treats it as context. [AI-powered comment tools can do more than mimic engagement\u2014they can read the context of a post, extract relevant themes, and generate highly targeted responses](https://www.joinvalley.co/blog/automate-linkedin-comments-strategies). Valley integrates this context deeply into the next steps of a campaign.\n\n**Pros:**\n*   Great for integrating comments into broader email/DM sequences.\n*   Strong contextual extraction.\n\n**Cons:**\n*   Can be overly complex if your sole goal is simply increasing feed visibility and inbound profile views.\n\nFor a structured way to compare these options against your specific needs, use our [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist).\n\n## Framework: Evaluating Automation Architectures\n\nWhen you are ready to switch from a legacy scraper to a modern engagement tool, you need a structured way to evaluate the underlying architecture. Not all AI is created equal, and not all \"safe\" tools actually protect your account.\n\nUse this evaluation matrix when testing a new tool:\n\n| Feature Vector | High Risk (Legacy Scrapers) | Safe Standard (Modern Local/AI) |\n| :--- | :--- | :--- |\n| **Execution Environment** | Cloud Data Center (AWS/GCP) | Local Machine / Dedicated Residential Proxy |\n| **Content Generation** | Spin-tax (Great post!) | Contextual LLM tied to user bio |\n| **Velocity Control** | Static Delays (e.g., exactly 60s) | Randomized, human-mimicking intervals |\n| **Platform Interaction** | API injections / Cookie hijacking | DOM interaction / Browser emulation |\n| **Workflow Design** | Bulk linear lists | Interspersed with feed scrolling |\n\n![Decision matrix comparing legacy scrapers against modern local AI automation tools.](https://assets.bevisible.app/inline-images/j571xypxnga0s8750mdpsw79k18981hp/inline-3-1782582460553-g6ecyr.png)\n## Step-by-Step: How to Safely Ramp Up Your Automated Comments\n\nIf you have just installed a local tool like Junior, you cannot immediately set it to comment on 100 posts a day. Account safety requires a \"warm-up\" period to establish a baseline of activity that LinkedIn's algorithm accepts as normal.\n\nHere is a four-week schedule to safely automate your LinkedIn comments without triggering velocity flags.\n\n### Week 1: The Observation Phase\n*   **Volume:** 3 to 5 comments per day.\n*   **Method:** Fully manual approval (Human-in-the-Loop). Let the AI draft the comment, read it, tweak one or two words to align perfectly with your voice, and manually click approve.\n*   **Goal:** Train the AI on your tone while keeping volume low enough that LinkedIn views it as organic manual activity.\n\n### Week 2: The Baseline Establishment\n*   **Volume:** 8 to 12 comments per day.\n*   **Method:** Continue with manual approval. Start targeting higher-leverage posts (e.g., 2nd-degree connections in your target industry rather than just 1st-degree friends).\n*   **Goal:** Establish a consistent daily habit. The algorithm wants to see that you are logging in daily and engaging steadily, not spiking your activity wildly.\n\n### Week 3: The Velocity Increase\n*   **Volume:** 15 to 20 comments per day.\n*   **Method:** You can begin relying more heavily on the AI's first drafts if they are consistently hitting your quality bar. Ensure your local tool is pacing these comments out. If you generate 20 comments, they should be spread across a 4-to-6 hour window, not submitted in five minutes.\n*   **Goal:** Push your visibility to the point where you start seeing a noticeable uptick in inbound profile views.\n\n### Week 4: The Cruising Altitude\n*   **Volume:** 25 to 35 comments per day.\n*   **Method:** Strategic automation. You are now leaving enough high-quality, bio-informed comments that you are appearing in the feeds of your prospects' networks constantly.\n*   **Goal:** Convert public visibility into private conversations. When prospects see your thoughtful comments daily, they will visit your profile and initiate DMs.\n\n*Note on upper limits: We strongly advise against exceeding 40-50 automated comments per day, regardless of the tool you use. Above this threshold, the return on investment diminishes, and the risk of algorithmic scrutiny increases exponentially.* \n\n## The Anatomy of a High-Converting AI Comment\n\nSafety is not just about avoiding bans; it is about avoiding reputational damage. If you automate a comment that clearly sounds like a bot, your peers will notice, and your personal brand will suffer.\n\n[Fully automating LinkedIn comments defeats the entire purpose](https://www.reddit.com/r/nocode/comments/1m0kuii/an_ai_that_comments_on_linkedin_anyone_building/) if the output is soulless. The goal is to spend your time reviewing and approving actual perspective, rather than typing from scratch.\n\nHere is how to structure the instructions in your AI tool (like Junior) to ensure the outputs are safe, authentic, and compelling:\n\n### 1. The \"Yes, And\" Framework\nA good automated comment should never just agree. It needs to validate the original poster and then add a distinct, new piece of information. \n*   *Bad AI:* \"I completely agree with this! Great insights on B2B sales.\"\n*   *Good AI (Contextual):* \"I agree with this approach to cold calling. In my experience running a lead gen agency, adding that upfront contract in the first 10 seconds usually drops the hang-up rate by half. Have you seen similar metrics with your team?\"\n\n### 2. Formatting for Readability\nTell your tool to format comments like a human. That means:\n*   No hashtags (humans rarely use hashtags in comments).\n*   Lower case letters at the start of informal sentences occasionally.\n*   Avoiding AI-heavy words like \"delve,\" \"testament,\" or \"underscore.\"\n*   Using line breaks for readability if the comment is longer than two sentences.\n\n### 3. Leveraging Your Unique Bio\nThis is where tools running locally with your specific context shine. If you are a cybersecurity consultant, your AI prompt should explicitly state: *\"You are a pragmatic cybersecurity consultant. When commenting, frame your perspective around risk mitigation and compliance, drawing on enterprise environments.\"* This ensures the LLM filters the original post through your specific professional lens.\n\nFor more advanced prompt techniques and a review of modern options, read our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n![Anatomy of a safe, high-converting AI generated LinkedIn comment.](https://assets.bevisible.app/inline-images/j571xypxnga0s8750mdpsw79k18981hp/inline-4-1782582466587-bvp2u3.png)\n## Common Mistakes to Avoid When Migrating Tools\n\nWhen teams move away from PhantomBuster or similar scrapers toward safe engagement tools, they often carry over bad habits. Avoid these common failure modes:\n\n*   **The \"Run It Overnight\" Trap:** Cloud scrapers are often left running 24/7. Do not do this with a local commenting tool. Real humans do not leave thoughtful commentary on industry posts at 3:15 AM on a Sunday. Run your local automation during your actual working hours.\n*   **Over-Targeting Mega-Influencers:** Automating comments on posts by Gary Vaynerchuk or Simon Sinek is a waste of your API limits. Those posts have thousands of comments, and yours will be buried. Target niche creators, prospects, and industry peers who get 5 to 50 comments per post. Your visibility ratio will be exponentially higher.\n*   **Ignoring the Inbox:** Comment automation is a top-of-funnel strategy. Its purpose is to drive profile views and connection requests. If you automate your comments beautifully but fail to monitor your DMs to catch the inbound interest, the entire exercise is pointless.\n\n## Measuring the True ROI of Automated Engagement\n\nFinally, you need to track the right metrics to ensure your new, safer automation setup is actually working. \n\nWhen using legacy tools, users often fixated on vanity metrics: *\"My script left 500 comments today!\"* \n\nWith contextual, locally-run AI like Junior, the volume will be lower, but the conversion rate will be significantly higher. Track these three metrics to measure success:\n\n1.  **90-Day Profile Views:** This should climb steadily week over week as your comments act as mini-billboards across your industry's feeds.\n2.  **Inbound Connection Requests:** Are people in your target audience asking to connect with *you* after seeing your insights on mutual connections' posts?\n3.  **DM Reply Rates:** When you do eventually send a direct message, your reply rate should be significantly higher because you are no longer a stranger\u2014they recognize your face and name from thoughtful discussions in the feed.\n\nAutomating your LinkedIn presence does not require risking your account with outdated cloud scrapers. By shifting to local execution, enforcing strict velocity limits, and demanding contextual AI generation, you can scale your visibility, protect your reputation, and start authentic conversations that actually drive your business forward.\n```", "created_at": "2026-06-27T17:49:22.691690+00:00", "updated_at": "2026-06-27T17:49:22.691696+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',

                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
