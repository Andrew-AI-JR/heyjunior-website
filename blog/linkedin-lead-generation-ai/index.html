    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 5, "slug": "linkedin-lead-generation-ai", "title": "How to Scale LinkedIn Lead Generation with AI (Safely)", "excerpt": "Learn how to safely scale your LinkedIn lead generation with AI. Discover workflows, tools, and conversation-first strategies that avoid account bans and boost sales.", "featured_image_url": "https://assets.bevisible.app/featured-images/j572hnre2ewp1xneaxnmgasc29877wpz/how-to-scale-linkedin-lead-generation-with-ai-safe-1779460755189-n4go0t.png", "published_at": "2026-05-25T12:56:00+00:00", "content": "# How to Scale LinkedIn Lead Generation with AI (Safely)\n\nOpen your LinkedIn inbox right now. Chances are, you have at least three unread messages that start with some variation of: *\"Hi [First Name], I noticed your impressive background in [Industry] and wanted to connect!\"* \n\nWe all know what happens next. A connection is accepted, and within three seconds, an automated five-paragraph pitch arrives, attempting to book a 15-minute sync. \n\nThis is the current state of automated B2B outreach. It is noisy, largely ineffective, and actively damaging to professional reputations. \n\nAs artificial intelligence becomes ubiquitous, the barrier to generating thousands of outbound messages has dropped to zero. But as [practitioners frequently discuss in automation communities](https://www.reddit.com/r/LeadGeneration/comments/1hszspb/ai_automation_suggestions_for_linkedin_lead/), brute-force volume is yielding diminishing returns. LinkedIn is aggressively cracking down on template-based spam, heavily penalizing accounts that trigger their automated abuse detection systems.\n\nScaling LinkedIn lead generation with AI in 2026 isn't about sending more messages. It is about using AI to identify the exact right prospects, prioritize where they are most active, and engage them in a way that feels indisputably human. \n\nThis guide breaks down how to transition from legacy, spam-heavy automation to a modern, conversation-first AI lead generation strategy\u2014without risking your account.\n\n## The Evolution of AI in B2B Lead Generation\n\nHistorically, LinkedIn automation meant scraping a list of URLs from Sales Navigator, loading them into a cloud tool, and firing off a sequence of static messages with `{{first_name}}` and `{{company}}` tags. \n\nToday's AI lead generation stack operates much deeper in the funnel. According to the [AI lead generation guide on LinkedIn Pulse](https://www.linkedin.com/pulse/ai-lead-generation-guide-best-tools-practices-sendbird-fbicc), modern AI involves omnichannel orchestration, predictive scoring, and dynamic personalization that actually reads a prospect's recent activity before acting.\n\n### The Shift from \"Cold DM\" to \"Conversation-First\"\n\nThe most glaring mistake sales teams make with AI is using it solely to write outbound direct messages. \n\nWhen a prospect receives a cold DM, their defense mechanisms instantly activate. But when you engage with their public content\u2014leaving a thoughtful, insightful comment on a post they just published\u2014you trigger a completely different psychological response. You are validating their ideas in public. \n\nThis \"Conversation-First\" approach builds a halo effect. By the time you do slide into their DMs, you aren't a cold prospector; you are a familiar face who already added value to their network.\n\n![Inline visual 1](https://assets.bevisible.app/inline-images/j572hnre2ewp1xneaxnmgasc29877wpz/inline-1-1779460716928-4tse62.png)\n## Why Account Safety is the Ultimate Bottleneck\n\nBefore diving into workflows, we need to address the elephant in the room: account restrictions. LinkedIn's algorithm is specifically designed to hunt down and restrict accounts using automated bot behavior.\n\n### The Ticking Time Bomb of Cloud-Based IP Addresses\n\nMany popular automation tools operate on cloud servers. This means your LinkedIn account is logging in from a data center IP address (like AWS or DigitalOcean) rather than a residential or office ISP. LinkedIn's security infrastructure easily flags this discrepancy. If you normally log in from a laptop in Chicago, but a server in Frankfurt is simultaneously sending out 50 connection requests on your behalf, you will end up in \"LinkedIn Jail.\"\n\n### The Local-First Solution\n\nTo scale safely, your AI automation must mimic human behavior flawlessly. This is where tools like **Junior** differentiate themselves. Instead of running on a remote cloud server, Junior runs directly on your local machine. \n\n*   **IP Consistency:** Because the automation runs locally, the IP address matches your normal browsing behavior exactly.\n*   **Variable Timing Patterns:** Human beings don't send exactly 40 messages at 30-second intervals. Safe AI automation introduces randomized, variable delays between actions.\n*   **Session Context:** Local execution maintains the integrity of your browser cookies and session tokens, drastically reducing the likelihood of automated bot-checks.\n\n## Core Workflows for AI-Powered LinkedIn Lead Generation\n\nBuilding a high-converting, safe LinkedIn engine requires connecting multiple AI capabilities. We can break these down into three primary stages: Targeting, Scoring, and Engagement.\n\n### 1. AI-Driven Ideal Customer Profile (ICP) Expansion\n\nTraditional targeting relies on static job titles (e.g., \"Director of Marketing\"). AI allows for semantic targeting. By feeding an LLM your best current customers, you can generate behavioral indicators to look for on LinkedIn.\n\nInstead of just looking for job titles, AI helps you look for trigger events:\n*   Founders who recently posted about \"scaling challenges\" or \"hiring.\"\n*   Sales leaders asking for recommendations on CRM implementations.\n*   Job seekers actively engaging with posts from recruiters in a specific niche.\n\n### 2. Automated Lead Scoring and Qualification\n\nNot every active profile is a good lead. You can use workflow automation platforms to score leads before you ever interact with them. For example, a robust [automated LinkedIn lead generation, scoring & communication](https://n8n.io/workflows/3490-automated-linkedin-lead-generation-scoring-and-communication-with-ai-agent/) setup can process incoming profile data against your specific criteria.\n\n| Criteria | AI Assessment Mechanism | Score Weight |\n| :--- | :--- | :--- |\n| **Profile Relevance** | Does the headline and \"About\" section align with target pain points? | +30 |\n| **Activity Level** | Has the user posted or commented in the last 14 days? | +40 |\n| **Network Overlap** | Do we share mutual connections in the industry? | +15 |\n| **Company Growth** | Does external data show the company is actively hiring? | +15 |\n\n*If a lead scores above 75, they move to the Engagement stage.*\n\n### 3. Smart Post Prioritization and Comment Generation\n\nThis is where the magic happens for organic pipeline generation. Instead of spamming inboxes, you use AI to monitor your highly-scored leads and engage with their content.\n\nHowever, a comment that says, *\"Great insights, thanks for sharing!\"* is practically useless. It screams bot. \n\nPlatforms like **Junior** utilize a human-first approach to AI generation. By feeding the AI your specific bio, your professional viewpoints, and your networking goals, the platform generates high-quality, personalized comments that mirror your natural voice.\n\n![Inline visual 2](https://assets.bevisible.app/inline-images/j572hnre2ewp1xneaxnmgasc29877wpz/inline-2-1779460717992-pnbfdb.png)\n## 4 Frameworks for AI Prompts That Sound Human\n\nIf you are configuring the AI models yourself, or setting up custom instructions in an engagement tool, you need frameworks to prevent the AI from sounding like an encyclopedia. \n\nHere are four prompt architectures for generating world-class LinkedIn comments:\n\n### The \"Insight-Add\" Framework\n**Use Case:** When a prospect posts a listicle or a framework.\n**Prompt Logic:** *Analyze the user's post. Identify the core premise. Do not summarize the post. Instead, provide one specific, advanced addition to their list based on [My Persona's Expertise]. Keep the tone conversational, use lowercase letters sparingly, and end with a validating statement.*\n**Resulting Comment:** \"Solid breakdown, Sarah. I'd actually add that step 3 usually breaks down when teams try to scale it past 10 people. Have you seen that same bottleneck?\"\n\n### The \"Counter-Intuitive\" Framework\n**Use Case:** When a prospect posts an industry truism or common opinion.\n**Prompt Logic:** *Analyze the post. Find the underlying assumption. Generate a polite but slightly contrarian perspective drawn from [My Industry Experience]. Frame it as a \"yes, and\" rather than an argument. Limit to 3 sentences.*\n**Resulting Comment:** \"Most people definitely look at CAC first, but we've actually found that optimizing for activation rate early on lowers CAC organically downstream. Curious if you weigh both equally?\"\n\n### The \"Clarifying Question\" Framework\n**Use Case:** When a prospect posts a new company milestone or project launch.\n**Prompt Logic:** *Acknowledge the milestone briefly. Do not use exclamation marks excessively. Ask one highly specific, technical, or strategic question about how they achieved it to invite a reply.*\n**Resulting Comment:** \"Impressive rollout. Getting the legacy data migrated must have been a headache\u2014did you handle the mapping in-house or rely on the new vendor for that?\"\n\n### The \"Shared Experience\" Framework\n**Use Case:** When a prospect posts a struggle, failure, or personal reflection.\n**Prompt Logic:** *Adopt an empathetic, peer-to-peer tone. Briefly share a related one-sentence anecdote from [My Background]. Validate their experience. Zero sales pitch.*\n**Resulting Comment:** \"Been there. We completely misjudged our Q3 capacity last year and had to rebuild the whole roadmap in a weekend. It's a brutal lesson but you only make that mistake once.\"\n\n## Transitioning from Comment to Conversation (The Handoff)\n\nThe goal of AI engagement isn't just to be a reply guy; it's to generate a sales pipeline, client acquisitions, or interviews. The transition from public comment to private Direct Message must be seamless.\n\n**The Rule of 2:** Wait for the prospect to reply to your comments at least two separate times before moving to the DM.\n\nOnce they have engaged back, the DM writes itself (and can be safely automated):\n\n> *\"Hey [Name], really enjoyed our back-and-forth on your post about [Topic] earlier this week. I actually have a resource/template related to that specific bottleneck we discussed. Happy to send it over if it's helpful?\"*\n\nThis inbound-led outbound approach routinely sees 60-80% reply rates, compared to the 2-5% average of cold AI outreach.\n\n## The Tech Stack: Best AI Lead Generation Tools for LinkedIn\n\nSelecting the right tools is critical for balancing scale with safety. While some teams try to build entirely custom solutions, most rely on specialized platforms. \n\nHere is how the current landscape of [AI B2B lead generation tools](https://www.lindy.ai/blog/ai-b2b-lead-generation) breaks down:\n\n### The Legacy Automation Players\nTools like [Expandi](https://expandi.io/) have long been staples for LinkedIn outreach. They offer robust campaign management, safety limits, and integration with email for omnichannel sequences. They are highly effective for traditional volume-based outbound, provided you stay strictly within LinkedIn's rate limits.\n\n### The Data Enrichment Engines\nPlatforms like [Leadspicker](https://www.leadspicker.com/) focus heavily on the data layer. They use AI to scrape, clean, and enrich lead lists so that by the time you are ready to reach out, you have a 360-degree view of the prospect's tech stack, hiring trends, and company news.\n\n### The Local, Conversation-First AI\nPlatforms like **Junior** represent the newest evolution in the space. Instead of focusing solely on outbound DMs or mass connection requests, Junior is purpose-built to warm up outbound leads and establish authority through authentic interaction. By automating the discovery of relevant posts and generating hyper-personalized, natural-sounding comments directly from your local machine, it bypasses the stigma (and risk) of cold DM spam entirely.\n\n![Inline visual 3](https://assets.bevisible.app/inline-images/j572hnre2ewp1xneaxnmgasc29877wpz/inline-3-1779460718073-hyy3n8.png)\n## 7 Best Practices to Avoid LinkedIn Account Bans in 2026\n\nIf you are scaling up your AI lead generation efforts, protect your digital real estate. A permanent ban on a seasoned LinkedIn profile can cost a founder or sales rep thousands of dollars in lost pipeline.\n\n1.  **Ditch Cloud IPs for Engagement:** As emphasized, run engagement automations locally whenever possible to ensure IP consistency.\n2.  **Warm Up Your Account:** If you historically send 2 messages a week, do not suddenly automate 50 actions a day. Ramp up volume by 10-15% week over week.\n3.  **Keep Dwell Time Realistic:** If an AI tool visits a profile, clicks \"Connect,\" and sends a message in 0.8 seconds, the algorithm flags it. Ensure your tools simulate human \"dwell time\" (reading the page for 15-45 seconds).\n4.  **Embrace Variable Schedules:** Do not schedule automations to run exactly at 9:00 AM every single day. Introduce randomized start times and varied intervals between actions.\n5.  **Monitor Your Pending Invites:** Having thousands of pending, unanswered connection requests is a massive red flag to LinkedIn. Automate the withdrawal of connection requests that are older than 30 days. Keep your pending queue under 500 at all times.\n6.  **Maintain a High SSI (Social Selling Index):** LinkedIn favors accounts that use the platform naturally. Mix automated outreach with manual scrolling, liking, and organic posting.\n7.  **Personalize Beyond the First Name:** The fastest way to get marked as spam by a *user* (which is worse than being flagged by the algorithm) is a generic pitch. AI must reference highly specific profile data.\n\n## Measuring Success: Beyond Vanity Metrics\n\nWhen transitioning to an AI-driven, conversation-first strategy, the metrics you track must evolve. Tracking \"Connection Requests Sent\" is a legacy metric. \n\nInstead, focus your performance analytics on:\n\n*   **Comment-to-Reply Rate:** Out of the AI-assisted comments you leave, how many does the author reply to? A rate above 30% indicates your AI prompt tuning is highly natural and relevant.\n*   **Inbound Profile Views:** As you engage with target prospects, they will click your face to see who you are. A spike in profile views from your ICP is a leading indicator of pipeline growth.\n*   **Inbound Connection Requests:** The ultimate validation of the \"halo effect.\" Prospects are so intrigued by your public engagement that they request to connect with *you*.\n*   **Time-to-Meeting:** Does a warm, comment-led DM transition result in a booked call faster than a cold DM sequence? (In almost all cases, yes).\n\n## The Myth of \"Set It and Forget It\" AI\n\nOne of the most dangerous myths in B2B tech is that AI is a \"set it and forget it\" magic bullet. \n\nIf you build an automated workflow, turn it on, and walk away for a month, you will eventually drift off-course. AI models hallucinate. Target markets shift. Prospects change the way they talk.\n\nYour AI lead generation system requires a \"human-in-the-loop\" approach. You must dedicate at least 30 minutes a week to reviewing the AI's output. Are the comments sounding a bit too repetitive? Is the lead scoring criteria letting unqualified prospects through? \n\nTreat your AI agent like a newly hired Junior SDR. You wouldn't hand a new hire the keys to your entire LinkedIn network without regularly reviewing their work, giving them feedback, and refining their scripts.\n\n## Frequently Asked Questions (FAQ)\n\n### Is using AI on LinkedIn against the Terms of Service?\nLinkedIn's Terms of Service strictly prohibit the use of bots or automated software to scrape data or spam users. However, using AI to *assist* in generating content, scoring leads, or managing workflows locally is widely practiced. The key is avoiding unnatural, high-volume bot behavior (like instant mass-messaging or cloud-based server requests) that triggers abuse algorithms.\n\n### How many automated comments can I safely leave per day?\nIf you are using a local, variable-timing tool, start with 10-15 highly relevant comments per day. Slowly scale to 30-40 over a few weeks. Prioritize quality over quantity; 15 excellent comments will generate more pipeline than 100 generic ones.\n\n### Can AI completely replace my SDR team?\nNo. AI is an exoskeleton for your revenue team, not a replacement. AI excels at research, data enrichment, lead scoring, and initial ice-breaking. Human SDRs excel at nuance, relationship building, negotiating, and navigating complex enterprise buying committees. Tools like Junior help SDRs skip the cold outreach grind and focus entirely on high-value conversations.\n\n## Final Thoughts\n\nThe era of spray-and-pray LinkedIn automation is dead, and good riddance. \n\nThe next generation of sales leaders, founders, and agencies are realizing that scale doesn't mean sending more garbage\u2014it means scaling authenticity. By leveraging AI to enrich data, score prospects intelligently, and generate natural, localized engagement, you can build a massive, highly qualified pipeline without ever sending another cringe-worthy cold DM.\n\nFocus on the conversation first, protect your account through smart local architecture, and let the AI do the heavy lifting of breaking the ice.", "created_at": "2026-05-25T13:19:24.222910+00:00", "updated_at": "2026-05-25T13:19:24.222917+00:00"};

                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            const apiBaseUrl = window.getApiBaseUrl();
            
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                container.innerHTML = '<p>Article not found.</p>';
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/api/blog/${encodeURIComponent(slug)}`);
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Article not found.');
                    }
                    throw new Error('Failed to load article.');
                }
                
                const post = await response.json();
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
