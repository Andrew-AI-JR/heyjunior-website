    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 16, "slug": "linkedin-automation-tool-warning", "title": "LinkedIn Automation Tool Warning: Avoid These 3 Mistakes", "excerpt": "Discover the 3 crucial mistakes that trigger a LinkedIn automation tool warning and learn how to safely scale your outreach with local, AI-driven engagement.", "featured_image_url": "https://assets.bevisible.app/featured-images/j571yep4b262041ab15m30aae98767js/linkedin-automation-tool-warning-avoid-these-3-mis-1780490963070-cwcbzv.png", "published_at": "2026-06-06T12:33:00+00:00", "content": "# LinkedIn Automation Tool Warning: Avoid These 3 Mistakes\n\nIt usually happens on a Tuesday morning. You try to log into your account, but instead of seeing your feed, you are hit with a stark, unclosable banner: *\"We've restricted your account temporarily. We noticed you're using an automation tool...\"*\n\nYour heart sinks. Your pipeline is tied to this profile, your connections are locked away, and suddenly, the software you relied on to scale your outreach feels like a liability.\n\nLinkedIn has aggressively ramped up its detection algorithms over the last two years. The platform's [official policy on automated activity](https://www.linkedin.com/help/linkedin/answer/a1340567) explicitly prohibits software that scrapes data or automates actions, and they are enforcing this with increasing precision. But here is the frustrating reality: the detection systems are pattern-based. As many users have noted in [discussions about unfair warnings](https://www.reddit.com/r/linkedin/comments/152m7uu/unfairly_recieved_warning_for_using_an_automation/), you do not even need to be using a bot to get flagged. Manual users doing aggressive, repetitive connection sprints often trigger the exact same tripwires.\n\nWhether you are managing outbound for a sales team, running a lead generation agency, or trying to scale your own founder brand, surviving on LinkedIn requires understanding what actually triggers these warnings. \n\nIf you want to build a sustainable pipeline without risking your digital reputation, you must stop triggering the security algorithms. Here are the three most dangerous mistakes that cause a LinkedIn automation tool warning, and exactly how to fix them.\n\n## What Does a LinkedIn Automation Warning Actually Look Like?\n\nBefore fixing the underlying behavior, you need to understand how LinkedIn escalates its penalties. The platform rarely issues a permanent, unrecoverable ban on the first offense unless the violation is egregious (like launching a massive scrape of tens of thousands of profiles in a single hour). \n\nInstead, LinkedIn operates on an escalation ladder. Understanding where you sit on this ladder dictates your immediate next steps.\n\n### The Escalation Ladder\n\n1.  **The Silent Throttling (Ghosting):** You will not see a warning banner here. Instead, your reach plummets, your connection requests remain pending indefinitely, and your comments seem to vanish into the void. This happens when your engagement rate drops due to suspected spam, but you haven't crossed the threshold for a hard restriction.\n2.  **The Forced Logout & CAPTCHA:** You are suddenly logged out across all devices. When you attempt to log back in, you are forced to solve a complex CAPTCHA or verify your identity via email or SMS. This is LinkedIn's automated check to ensure a script isn't blindly navigating the DOM (Document Object Model).\n3.  **The First-Strike Banner:** This is the formal \"LinkedIn automation tool warning.\" You receive a message stating that unusual activity was detected. You are usually forced to check a box agreeing to LinkedIn's Terms of Service before regaining access. Your account limits (like connection requests) are severely slashed for the next 30 to 90 days.\n4.  **Identity Verification Lock (LinkedIn Jail):** Your profile is hidden from the public. You cannot access messages. To recover the account, you must upload a government-issued ID (passport or driver's license) to prove you are a real person. This review process can take anywhere from 24 hours to two weeks.\n5.  **The Permanent Ban:** Your account is permanently deactivated. Appeals are met with automated rejections. \n\nAccording to automation tracking data from [PhantomBuster's analysis of warnings](https://phantombuster.com/blog/social-selling/linkedin-automation-tool-warning/), recovering from the first-strike banner is highly probable, but hitting the Identity Verification Lock drastically increases your chances of losing the account entirely if you resume the flagged behavior.\n\n## Mistake #1: Cloud-Based IP Hopping and Server Execution\n\nThe single biggest architectural flaw in most mainstream LinkedIn automation tools is how they connect to your account. \n\nMany popular solutions are cloud-based. You sign up, hand over your LinkedIn login credentials (or your session cookie), and a remote server executes tasks on your behalf. \n\n### Why Cloud IPs Trigger Warnings\n\nTo LinkedIn's security algorithms, a cloud-based tool looks incredibly suspicious. Consider this scenario:\n\n*   At 8:00 AM, you check LinkedIn on your iPhone from your home Wi-Fi in Chicago.\n*   At 8:05 AM, a cloud server located in an AWS data center in Frankfurt, Germany, logs into your account and sends 20 connection requests.\n*   At 8:30 AM, you open your laptop at a coffee shop in Chicago and reply to a message.\n\nThis geographic ping-ponging\u2014often referred to as \"impossible travel\"\u2014is an immediate red flag. No human can travel from Chicago to Frankfurt and back in 30 minutes. \n\nFurthermore, LinkedIn maintains lists of known data center IP addresses (AWS, DigitalOcean, Google Cloud). If an account is heavily interacting via an IP address registered to a server farm rather than a residential ISP (Comcast, AT&T, Vodafone), the trust score of that session immediately drops.\n\n![Diagram comparing cloud automation IP hopping versus local machine execution](https://assets.bevisible.app/inline-images/j571yep4b262041ab15m30aae98767js/inline-1-1780490878835-20s8ef.png)\nSome tools attempt to bypass this by assigning you a \"dedicated residential proxy.\" While this solves the data center problem, it rarely solves the geographic discrepancy unless the proxy is located in your exact city. Even then, browser fingerprinting (tracking your device's operating system, screen resolution, and hardware components) will reveal that the device executing the actions in the cloud does not match the laptop you usually use.\n\n### The Local Machine Solution\n\nTo avoid the IP and hardware mismatch, the execution must happen exactly where your daily browsing happens: on your local machine.\n\nThis is why modern, secure platforms like Junior are designed to run locally. By processing actions directly from your own computer, using your actual browser profile and your residential or office IP address, the traffic looks entirely native. There is no impossible travel. There are no data center IPs. To LinkedIn's security layer, it simply looks like you are sitting at your desk, navigating the platform.\n\nIf you are currently evaluating [LinkedIn automation tools for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation), local execution should be a non-negotiable requirement.\n\n## Mistake #2: Unrealistic Volume and Fixed Timing\n\nThe second major mistake is attempting to treat a professional networking platform like a mass-email server. \n\nMany users set up their tools to send exactly 100 connection requests a day, at intervals of exactly 45 seconds, executing precisely between 9:00 AM and 5:00 PM. \n\nThis is robotic behavior, and algorithms are exceptionally good at spotting robots.\n\n### The Myth of \"Safe Limits\"\n\nFor years, growth hackers shared \"safe limits\" online\u2014advising users to stay under 100 connection requests per day or 250 profile views. Today, fixed limits are a trap. \n\nLinkedIn does not apply the same limits to every account. Your limits are dynamically generated based on your account's historical behavior, the age of your profile, your SSI (Social Selling Index) score, and most importantly, your current acceptance rate.\n\nIf you have a young account with 300 connections and you suddenly jump to sending 80 requests a day, you will trigger a restriction. If your connection requests are frequently ignored or marked as \"I don't know this person,\" your limits shrink drastically.\n\n### The Danger of Fixed Velocity\n\nIt is not just about the total volume; it is about the *velocity* and *variance* of the actions. \n\nHumans do not click buttons every 60 seconds. Humans scroll erratically. They pause to read a post, click a notification, leave a tab open while they get coffee, and occasionally binge-scroll for five minutes.\n\nWhen a script runs exactly every two minutes without scrolling, pausing, or interacting with the feed naturally, it creates a perfectly flat activity graph. As noted in a viral [LinkedIn post about genuine activity](https://www.linkedin.com/posts/tonyrestell_sometimes-your-genuine-activity-on-linkedin-activity-7405234221780250624-VLHh), even human beings can get flagged if they behave too systematically, like sitting down and blitzing through 50 tabs of profiles in ten minutes without reading the pages.\n\n![Graph showing the difference between robotic fixed intervals and variable human behavior](https://assets.bevisible.app/inline-images/j571yep4b262041ab15m30aae98767js/inline-2-1780490884475-l8reme.png)\n### Implementing Natural Interaction Patterns\n\nTo scale safely, any automation must introduce variable timing and behavioral randomness. \n\n*   **Variable Delays:** Actions should never occur on fixed intervals. A request might take 45 seconds, the next might take 3 minutes, and the next might take 90 seconds.\n*   **Micro-actions:** The tool should scroll down the page, hover over elements, and simulate reading time before executing an action.\n*   **Smart Caps:** Instead of pushing to a fixed limit, the system should monitor the account's historical baseline and gradually warm up activity.\n\nTools designed with natural interaction patterns mimic the friction of human behavior. By slowing down the execution and randomizing the delays, you keep your account out of the algorithmic crosshairs while still maintaining a consistent presence. \n\n## Mistake #3: Template-Based Spam and Irrelevant Engagement\n\nTechnical footprint aside, the fastest way to lose your account is through negative user feedback. \n\nLinkedIn allows its users to report messages as spam and connection requests as \"I don't know this person.\" If your automated outreach relies on rigid, generic templates, you are actively encouraging your prospects to report you.\n\n### The Death of the \"Pitch Slap\"\n\nThe traditional approach of sending a connection request followed immediately by a four-paragraph sales pitch is dead. Decision-makers receive dozens of these every week. \n\nWhen you send messages like, *\"Hi [FirstName], I saw you work in [Industry] and wanted to connect to share synergies,\"* the recipient instantly recognizes it as automated. Best case scenario, they ignore it. Worst case, they flag it.\n\nWhen your flag rate reaches a certain percentage relative to your total outbound volume, LinkedIn's algorithms intervene. No amount of local execution or randomized timing can save you if real humans are actively reporting your content as spam.\n\n### The Conversation-First Strategy\n\nThe alternative to template spam is the conversation-first strategy. Instead of invading a prospect's Direct Messages with an unearned pitch, you engage with them in public where they are already active.\n\nLeaving high-quality, insightful comments on a prospect's posts serves several functions:\n1.  **It avoids the inbox filter:** Comments do not require a connection request to be seen.\n2.  **It builds authority:** A smart comment is visible to the prospect's entire network, establishing you as a peer rather than a vendor.\n3.  **It is inherently safe:** Meaningful comments are rarely reported as spam. In fact, creators appreciate the engagement, which boosts your own account's standing.\n\n![Comparison between a flagged template spam message and a high-converting contextual comment](https://assets.bevisible.app/inline-images/j571yep4b262041ab15m30aae98767js/inline-3-1780490879079-uvwmnf.png)\nThis is why modern [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) have shifted away from bulk DM blasts. \n\nGenerating these comments natively and authentically is where AI shines. A platform like Junior analyzes the specific context of a prospect's post, cross-references it with your personal bio and networking goals, and generates a response that mirrors your natural voice. It turns a tedious manual task into a streamlined workflow, ensuring that every touchpoint adds value rather than noise. By warming up outbound leads through authentic interaction, you lay the groundwork for a natural, high-converting conversation down the line.\n\n## How LinkedIn Detects Automation (Under the Hood)\n\nTo fully grasp why these three mistakes are so fatal, it helps to understand the technical mechanisms LinkedIn employs to monitor the platform. According to security researchers and guidelines shared by groups like [FameLab on automation detection](https://www.famelab.io/why-does-linkedin-think-im-using-an-automation-tool/), the monitoring is multi-layered.\n\n### 1. Front-End DOM Monitoring\nMost basic Chrome extensions operate by injecting code directly into the webpage's Document Object Model (DOM). They find the CSS selector for the \"Connect\" button and forcefully trigger a click event via JavaScript. \n\nLinkedIn regularly updates its DOM structure (changing class names and button IDs) specifically to break these scrapers. Furthermore, the platform listens for synthetic click events. If a button is clicked but the browser registers zero mouse movement leading up to that click, the system flags the action as non-human.\n\n### 2. Header and API Anomalies\nWhen you browse a website naturally, your browser sends specific HTTP headers (like User-Agent, Accept-Language, etc.). Some poorly configured tools fail to match these headers perfectly, or they attempt to use hidden LinkedIn APIs that are not meant for public consumption. Calling an internal API endpoint directly without the accompanying frontend analytics calls is a massive red flag.\n\n### 3. Session and Cookie Anomalies\nIf a tool clears your session cookies too frequently or attempts to maintain concurrent active sessions across disparate geographic locations, the security layer assumes the account has been compromised or sold to a bot farm, triggering the forced logout and verification loop.\n\n## Recovering from a LinkedIn Warning: A Step-by-Step Guide\n\nIf you have already received a warning banner or a temporary restriction, panic will not help, but swift action will. Continuing to run your current stack after receiving a warning is the fastest route to a permanent ban.\n\nFollow this recovery sequence immediately:\n\n### Step 1: Disconnect and Revoke Access\nStop all ongoing campaigns immediately. If you are using a cloud-based tool, log into their dashboard and delete your account credentials. \n\nNext, go to your LinkedIn Settings > Data Privacy > Permitted Services, and revoke access to any third-party apps you do not strictly need. Finally, go to Settings > Sign in & Security > Where you're signed in, and end all active sessions except your current one.\n\n### Step 2: Clear Cache and Rest\nClear your browser's cookies and cache. Do not attempt to send any connection requests, messages, or comments for at least 48 to 72 hours. Let the account \"cool down.\" If you have pending connection requests that are older than three weeks, withdraw them manually. A high ratio of unaccepted requests signals to the algorithm that you are spamming.\n\n### Step 3: Shift to Native, Manual Behavior\nWhen you resume activity, do so manually for at least two weeks. Reply to incoming messages. Scroll your feed. Like a few posts. Do not run any bulk actions. The goal is to establish a baseline of undeniably human behavior to satisfy the algorithm's monitoring period.\n\n### Step 4: Audit Your Tech Stack\nBefore turning any software back on, run it through this safety checklist:\n*   Does it run on my local machine and utilize my actual IP address?\n*   Does it simulate real human delays and variable timing?\n*   Does it rely on personalization and relevance rather than rigid copy-paste templates?\n*   Is it focused on engagement (comments, reading) rather than just extraction (scraping, blasting)?\n\nIf the answer to any of these is \"no,\" you need to upgrade your tooling.\n\n![Flowchart showing the step-by-step recovery process after receiving a LinkedIn warning](https://assets.bevisible.app/inline-images/j571yep4b262041ab15m30aae98767js/inline-4-1780490880379-y35nef.png)\n## Safely Scaling Your Strategy Without the Risk\n\nThe fear of an account warning often drives professionals to the opposite extreme: complete manual paralysis. They stop doing outbound entirely because they are terrified of losing their profile. \n\nBut relying purely on manual outreach is a bottleneck. If you want to build a [LinkedIn lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel) that actually converts, you have to find a way to maintain volume without sacrificing quality or safety.\n\n### The \"Warm Outreach\" Advantage\n\nThe safest way to scale is by shifting your definition of \"automation.\" Instead of automating the *pitch*, automate the *prospecting and initial engagement*. \n\nUse technology to surface the most relevant posts from your target accounts. Use AI to draft intelligent, highly contextual comments that you can review and post with a single click. \n\nThis approach yields massive dividends. Prospects who see you consistently engaging with their content in a thoughtful way are infinitely more likely to accept a future connection request and respond to a direct message. You are no longer a cold outbound metric; you are a familiar face in their notifications.\n\n### Integrating Safe AI\n\nWhen scaling with AI, safety must be embedded into the core workflow. If you want to understand the exact mechanics of doing this correctly, check out our guide on [how to scale LinkedIn lead generation with AI (safely)](https://heyjunior.ai/blog/linkedin-lead-generation-ai). \n\nBy ensuring your tools run locally, honoring variable timing, and utilizing AI to generate hyper-relevant, non-spammy interactions, you protect your account while simultaneously increasing your conversion rates.\n\nA warning from LinkedIn is not the end of your social selling journey\u2014it is a mandatory pivot. It forces you to abandon lazy, cloud-based spam tactics and adopt a sophisticated, conversation-first strategy that aligns with how business is actually done.", "created_at": "2026-06-06T12:49:23.826327+00:00", "updated_at": "2026-06-06T12:49:23.826333+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
