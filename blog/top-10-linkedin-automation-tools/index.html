    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 12, "slug": "top-10-linkedin-automation-tools", "title": "Top 10 LinkedIn Automation Tools (Safe for 2026)", "excerpt": "Discover the top 10 safe LinkedIn automation tools for 2026. Compare cloud vs. local architecture, engagement vs. outreach, and scale your lead gen without bans.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57c80par3mk6dffw2mv7dprb5876nfx/top-10-linkedin-automation-tools-safe-for-2026-1780235383388-ifp3du.png", "published_at": "2026-06-03T13:37:00+00:00", "content": "# Top 10 LinkedIn Automation Tools (Safe for 2026)\n\nIf you ask most sales professionals how they feel about LinkedIn automation in 2026, you will hear a deep, collective sigh. We have reached a saturation point where the standard \"connect and pitch\" sequence is practically invisible to buyers. Worse, LinkedIn\u2019s security algorithms are aggressively flagging accounts that rely on outdated, high-volume scraping and messaging methods.\n\nYet, the demand for [lead generation on LinkedIn](https://heyjunior.ai/blog/lead-generation-on-linkedin) has never been higher. The platform remains the only reliable, up-to-date B2B directory in the world. \n\nThe difference between the accounts getting banned and the accounts generating actual revenue comes down to architecture and strategy. The era of blind, high-volume outreach is over. The new era is built on nuanced engagement, local machine processing, and AI that actually sounds like you.\n\nIn this guide, we break down the top 10 LinkedIn automation tools that are genuinely safe and effective for 2026. We will look at how they connect to the platform, what specific use case they serve best, and why the architecture of your tool matters more than its feature list.\n\n## How LinkedIn Automation Tools Actually Work in 2026\n\nBefore choosing a platform, you have to understand how these tools interact with LinkedIn's infrastructure. LinkedIn does not have a native, open API for automated messaging or connection requests. Every tool on the market is essentially reverse-engineering access. \n\nHow they do this dictates your risk level.\n\n### The Three Architectures\n\n**1. Cloud-Based (Cookie IP Binding)**\nCloud tools ask for your LinkedIn session cookie and run automation from a remote server. To prevent immediate bans, good cloud tools assign a dedicated proxy IP address to your account (usually in your country). While safer than they were in 2022, cloud tools are still detectable because the browser fingerprint (user-agent, screen resolution, local fonts) generated by the server often does not match your actual daily browsing activity.\n\n**2. Browser Extensions (DOM Injection)**\nThese sit in your Chrome or Edge browser and inject scripts directly into the LinkedIn web page. They run on your actual IP address and use your active session. The downside? LinkedIn can easily read the active extensions in your browser. When LinkedIn runs a background security check, poorly coded extensions light up like a flare.\n\n**3. Local Machine Processing (The 2026 Standard)**\nLocal execution tools run as standalone software on your actual computer. They do not operate from a remote server or inject code into your primary browser. Instead, they operate their own secure Chromium instance locally, mimicking human mouse movements, clicks, and scrolling patterns. Because the activity originates from your physical machine, your native IP, and your exact hardware fingerprint, it is nearly impossible for LinkedIn to distinguish the automation from your manual activity.\n\n![Comparison matrix of Cloud, Browser, and Local LinkedIn automation architectures](https://assets.bevisible.app/inline-images/j57c80par3mk6dffw2mv7dprb5876nfx/inline-1-1780235298505-6nl842.png)\nUnderstanding this technical foundation is the first step in building a [linkedin lead generation strategy](https://heyjunior.ai/blog/linkedin-lead-generation-strategy) that won't result in an account restriction.\n\n## The \"Safety First\" Decision Framework: Choosing Your Tool\n\nNot all automation is built for the same purpose. A common mistake is buying a high-volume outreach tool when what you actually need is a scraping utility or an engagement booster. \n\nBefore looking at the list, identify your primary bottleneck:\n\n*   **The Prospecting Bottleneck:** You know who to target, but manually exporting them from Sales Navigator and finding their verified emails takes hours.\n*   **The Engagement Bottleneck:** You have a list of targets, but sending cold DMs isn't working. You need a way to warm them up by commenting on their content and building familiarity before pitching.\n*   **The Scale Bottleneck:** You are an agency managing 15 different client accounts and need a centralized dashboard to run moderate-volume outreach across all of them simultaneously.\n\nMatch your specific bottleneck to the tool categories below.\n\n## Category 1: Engagement & Conversation Starters\n\nThe most profitable shift in 2026 is moving from \"outreach-first\" to \"engagement-first.\" Instead of pitching in the first message, these tools focus on interacting with your prospect's public content, creating a natural opening for a conversation.\n\n### 1. Junior\n\nJunior is built specifically to address the modern reality of LinkedIn: buyers ignore cold pitches but respond to thoughtful public interactions. Rather than automating direct messages, Junior automates the process of finding relevant posts from your target audience and generating high-quality, personalized comments that mirror your natural voice.\n\n*   **How it works:** Junior is a local-machine application. It runs securely on your computer, utilizing your specific bio, networking goals, and historical writing style to draft comments. It prioritizes posts from high-value prospects, applies variable timing (so it doesn't comment instantly on every post), and initiates meaningful conversations.\n*   **Best for:** Sales teams, founders, and consultants who want to build authority and warm up outbound leads without the stigma of cold DM spam. It is also highly effective for individuals running a [linkedin ai job search](https://heyjunior.ai/blog/linkedin-ai-job-search) by engaging with hiring managers.\n*   **Safety Profile:** Exceptional. By running locally and focusing on comments rather than connection volume, Junior mimics natural networking behavior and avoids triggering LinkedIn's anti-spam velocity limits.\n*   **Pros:** Complete avoidance of \"bot\" sounding templates; entirely local execution for maximum safety; focuses on the highest-converting action (public engagement).\n*   **Cons:** Not designed for users who simply want to blast 1,000 connection requests a week.\n\n### 2. Taplio\n\nTaplio started as a content scheduling tool but has evolved into a comprehensive LinkedIn growth platform. It provides AI-assisted post drafting, analytics, and basic engagement features aimed at personal brand building.\n\n*   **How it works:** Taplio operates primarily as a cloud platform but utilizes an official integration combined with a browser extension for certain actions. It helps you schedule content, analyze which posts perform best, and provides a CRM-like interface to reply to comments on your own posts.\n*   **Best for:** Creators, thought leaders, and founders whose primary strategy is inbound lead generation through high-volume content publishing.\n*   **Safety Profile:** Moderate to High. Because Taplio focuses heavily on content publishing (which LinkedIn encourages) rather than aggressive outbound messaging, it rarely runs into account restrictions.\n*   **Pros:** Excellent analytics dashboard; clean UI for managing comments; solid AI inspiration for post creation.\n*   **Cons:** The engagement features are mostly limited to interacting with people who already comment on your posts, rather than proactively engaging cold prospects. You can read more about their specific features on the [Taplio blog](https://taplio.com/blog/linkedin-tools).\n\n## Category 2: Outreach & Chat Automation\n\nIf you have a dialed-in offer and need to automate the connection request and follow-up message process, these tools are the current market leaders. They have survived the recent algorithm updates by implementing smarter limits and sequence logic.\n\n### 3. Expandi\n\nExpandi is arguably the most recognized cloud-based LinkedIn automation tool on the market. They pioneered the use of dedicated, country-specific IP proxies for cloud automation, setting the safety standard for the industry several years ago.\n\n*   **How it works:** Cloud-based execution with a dedicated proxy. Expandi is known for its \"Smart Sequences,\" which allow you to build complex logic trees. For example: If a prospect doesn't accept a connection request after 5 days, automatically send them an Open InMail; if they view your profile but don't reply, send a specific follow-up.\n*   **Best for:** B2B sales teams and growth hackers who need a reliable, feature-rich platform to run complex, multi-touch campaigns.\n*   **Safety Profile:** High for a cloud tool. Expandi enforces strict daily limits and includes features like automatic account warm-up and randomized delay times between actions.\n*   **Pros:** Highly visual campaign builder; excellent integration with major CRMs (HubSpot, Salesforce); robust agency dashboard.\n*   **Cons:** The learning curve is steep. Building a truly effective Smart Sequence requires a deep understanding of mapping out a [linkedin lead generation funnel](https://heyjunior.ai/blog/linkedin-lead-generation-funnel).\n\n### 4. Sbl.so\n\nSbl.so represents the newer wave of AI-native outreach tools. Instead of just sending static template sequences, it attempts to act as an automated SDR, using AI to handle the back-and-forth chat once a prospect replies.\n\n*   **How it works:** Sbl.so integrates deep AI analysis into the inbox. When a prospect responds with an objection (e.g., \"We already use a competitor\"), the tool can analyze the intent and draft or automatically send a contextually appropriate rebuttal based on your pre-trained sales materials.\n*   **Best for:** Teams selling complex B2B software or services where the initial reply is rarely a direct \"yes,\" but rather a request for more information or a mild objection.\n*   **Safety Profile:** Moderate. While the messaging is smart, any tool automating the actual back-and-forth chat carries a risk of generating a hallucinated response if the AI misinterprets the prospect's tone.\n*   **Pros:** Significantly reduces inbox management time; impressive intent categorization; strong reporting. Their approach is detailed further in their breakdown of [best linkedin automation tools](https://sbl.so/blog/best-linkedin-automation-tools/).\n*   **Cons:** Relinquishing control of live chat to AI requires immense trust and rigorous initial setup to ensure the brand voice is protected.\n\n### 5. Botdog\n\nBotdog has positioned itself as a streamlined, user-friendly alternative to the heavier enterprise platforms. It focuses heavily on the core mechanics of connection requests, follow-ups, and email enrichment.\n\n*   **How it works:** It acts as a bridge between LinkedIn prospecting and cold email, automatically finding the business email addresses of the profiles you target on LinkedIn. You can run simple, effective sequences that hit both channels.\n*   **Best for:** Individual SDRs and small business owners who need a straightforward [linkedin automation tool for lead generation](https://heyjunior.ai/blog/linkedin-automation-tool-for-lead-generation) without needing a certification to understand the software.\n*   **Safety Profile:** Moderate. It operates well within standard limits but lacks some of the hyper-advanced randomizer settings found in enterprise tools.\n*   **Pros:** Very intuitive interface; good built-in email finder; cost-effective compared to larger competitors.\n*   **Cons:** Lacks the deep conditional logic required for highly complex, multi-persona enterprise campaigns. The tool is frequently highlighted as a top choice for straightforward outreach on the [Botdog blog](https://botdog.co/blog-posts/best-lead-generation-software-tools).\n\n![Quadrant chart categorizing LinkedIn automation tools by use case](https://assets.bevisible.app/inline-images/j57c80par3mk6dffw2mv7dprb5876nfx/inline-2-1780235300540-mg3dej.png)\n## Category 3: Agency & Multi-Account Scale\n\nAgencies managing LinkedIn outreach for multiple clients face a unique set of challenges. They need to manage dozens of accounts without crossing IP boundaries, generating repetitive footprints, or logging in and out constantly.\n\n### 6. HeyReach\n\nHeyReach is built from the ground up for lead generation agencies. If you are managing 10, 20, or 50 LinkedIn accounts, traditional single-user tools become an administrative nightmare.\n\n*   **How it works:** HeyReach allows agencies to connect multiple sender accounts to a single campaign. Instead of running 5 separate campaigns for 5 SDRs, you build one master sequence and the tool distributes the sending volume safely across the 5 connected profiles.\n*   **Best for:** [LinkedIn lead generation services](https://heyjunior.ai/blog/linkedin-lead-generation-services) and large outbound sales floors.\n*   **Safety Profile:** Moderate to High. By distributing volume across multiple accounts, no single account has to push the limits of LinkedIn's daily quotas.\n*   **Pros:** Master inbox for all connected accounts; unified reporting; the ability to rotate sender accounts seamlessly if one hits a limit.\n*   **Cons:** Overkill for solo founders or small teams. The pricing model is built around scale, making it expensive for a single user. Their agency-first philosophy is well-documented in their own review of [automation tools](https://www.heyreach.io/blog/best-linkedin-automation-tools).\n\n### 7. Lemlist\n\nOriginally famous for personalized cold email (particularly dynamic images), Lemlist has evolved into a formidable multi-channel platform that seamlessly integrates LinkedIn steps into email sequences.\n\n*   **How it works:** Lemlist operates as a cloud-based multi-channel engine. A typical sequence might look like: Day 1: Profile View (LinkedIn), Day 2: Cold Email, Day 4: Connection Request (LinkedIn), Day 7: Follow-up Email. \n*   **Best for:** Teams who view LinkedIn as a secondary touchpoint to support a primary cold email strategy.\n*   **Safety Profile:** High. Because it naturally spaces out LinkedIn actions with email actions, the overall velocity of LinkedIn activity remains low and human-like.\n*   **Pros:** Exceptional email deliverability features; the multi-channel sequences are easy to build; great community and training resources.\n*   **Cons:** The native LinkedIn inbox management isn't as robust as dedicated, standalone LinkedIn tools.\n\n## Category 4: Prospecting & Scraping Utilities\n\nSometimes you don't need a tool to send messages; you just need a tool to pull accurate data so you can execute your outreach elsewhere. Data accuracy is the foundation of any outbound campaign.\n\n### 8. Evaboot\n\nSales Navigator is powerful, but its search engine is notoriously flawed. If you search for \"VP of Sales\" in \"Software Development,\" LinkedIn will often include people who *used* to be VPs of Sales, or people who sell software for a completely unrelated industry. Evaboot fixes this.\n\n*   **How it works:** It acts as a smart scraper for Sales Navigator. You build your search, run Evaboot, and it exports the list while simultaneously cross-referencing every profile to ensure they actually match your search criteria. It then cleans the data (removing emojis and legal entity tags like \"LLC\" from company names) and finds their emails.\n*   **Best for:** Data-driven outbound teams who want pristine, error-free lists before launching any automation.\n*   **Safety Profile:** High. It only performs data extraction, doing so within safe limits, and does not automate messaging.\n*   **Pros:** The best data-cleaning algorithm on the market; accurately flags false positives in Sales Nav searches.\n*   **Cons:** It is strictly a data tool. You will need to pair it with an outreach tool or an email sender to actually execute the campaign.\n\n### 9. PhantomBuster\n\nPhantomBuster is the Swiss Army knife of growth hacking. It operates on \"Phantoms\"\u2014individual automated actions you can chain together to create complex data workflows.\n\n*   **How it works:** Cloud-based API execution. You can use one Phantom to scrape the attendees of a LinkedIn Event, another to enrich those profiles with emails, and a third to automatically send them a connection request.\n*   **Best for:** Technical marketers, growth hackers, and operations specialists who want to build highly customized, trigger-based workflows.\n*   **Safety Profile:** Variable. Because it gives you absolute freedom to build custom workflows, it is very easy to accidentally configure a Phantom to perform 1,000 actions in an hour and get yourself banned. You must strictly adhere to their recommended rate limits.\n*   **Pros:** Unmatched flexibility; integrates with almost any platform via webhooks; capable of extracting highly specific data (like group members or post commenters).\n*   **Cons:** Not user-friendly for beginners; requires active monitoring to ensure workflows don't break when LinkedIn updates its UI.\n\n### 10. Crystal (CrystalKnows)\n\nWhile not a traditional messaging automation tool, Crystal automates the process of understanding your buyer\u2019s psychology. It is an indispensable tool for teams executing high-ticket, low-volume targeted outreach.\n\n*   **How it works:** Crystal uses a browser extension to analyze a prospect's LinkedIn profile (their bio, work history, and writing style) and instantly generates a DISC personality profile. It then gives you actionable advice on how to communicate with them (e.g., \"Be brief and avoid small talk,\" or \"Use a warm, conversational tone\").\n*   **Best for:** Enterprise Account Executives and founders doing highly personalized manual outreach or preparing for high-stakes discovery calls.\n*   **Safety Profile:** Completely safe. It acts as an overlay analysis tool and does not perform bulk actions.\n*   **Pros:** Incredibly accurate personality assessments; integrates directly into the LinkedIn message box to provide real-time coaching.\n*   **Cons:** Enterprise pricing makes it less accessible for solo operators; it is a qualitative tool, not a volume-scaling tool.\n\n![Engagement-first LinkedIn funnel moving from comments to direct messages](https://assets.bevisible.app/inline-images/j57c80par3mk6dffw2mv7dprb5876nfx/inline-3-1780235283721-9oh3r0.png)\n## 3 LinkedIn Automation Myths You Need to Unlearn in 2026\n\nIf you look at recent discussions among practitioners on platforms like [Reddit](https://www.reddit.com/r/sales/comments/1i6m67o/what_linkedin_automation_tool_are_you_using/), SDRs are completely fatigued by typical sequence tools. The tactics that worked in 2021 are actively harming sender reputations today. Here are three myths you must abandon.\n\n### Myth 1: Volume Beats Personalization\n\n**The Myth:** If I send 100 connection requests a day, and 20% accept, and 5% reply, I just need to max out my limits every day to guarantee pipeline.\n\n**The Reality:** LinkedIn heavily restricts connection requests to roughly 100-200 *per week* for most accounts. Trying to force higher volume through bypass loopholes usually results in a shadowban, where your messages go to the \"Other\" folder, or a hard restriction. The modern playbook focuses on extracting 100 highly qualified accounts per week and using multi-touch engagement (viewing, commenting, emailing) to drive a 40%+ acceptance rate.\n\n### Myth 2: Cloud Tools Are 100% Undetectable\n\n**The Myth:** Because my cloud tool uses a dedicated proxy IP in my home city, LinkedIn thinks it's me.\n\n**The Reality:** IP addresses are only one part of device fingerprinting. LinkedIn tracks mouse movement velocity, the exact time gaps between page loads, screen resolution, and session tokens. When a cloud server logs in, it creates a footprint that is inherently different from your physical laptop. This is why local-machine processing (used by platforms like Junior) has become the gold standard for accounts that cannot afford any risk of suspension.\n\n### Myth 3: You Have to Automate the Direct Message\n\n**The Myth:** The only way to generate leads on LinkedIn is to automate the sending of InMails and direct messages.\n\n**The Reality:** The most successful users in 2026 use automation to handle the *pre-inbox* activity. They automate list building, data cleaning, profile views, and intelligent public commenting. By the time they manually send a direct message, the prospect already recognizes their name and face from the feed. This strategy dramatically increases reply rates and completely eliminates the risk of sending an embarrassing, misformatted template DM.\n\n## The ROI Calculation Most People Miss\n\nWhen evaluating the cost of these tools, teams often just look at the monthly subscription fee (usually ranging from $49 to $150 per seat). But the true cost of LinkedIn automation involves calculating the cost of a ruined reputation.\n\nIf you use a cheap, aggressive extension that blasts 500 template messages a week:\n1.  **Brand Damage:** You burn through your total addressable market. Prospects who receive a terrible automated pitch will likely never buy from you in the future.\n2.  **Account Replacement:** If a senior executive's account gets permanently restricted, you lose years of organic network building. The cost of warming up a fake, secondary \"burner\" account is high, and the conversion rates on burner accounts are notoriously low.\n3.  **Wasted SDR Time:** If your tool hallucinates or sends broken tags (e.g., \"Hi {First_Name}\"), your SDRs will spend hours doing damage control instead of selling.\n\nInvesting in a safer, perhaps slightly slower, engagement-first tool pays compounding dividends. \n\n## Frequently Asked Questions\n\n### Will LinkedIn automation get my account banned?\n\nIf you use poorly coded Chrome extensions, ignore weekly limits, and send spam, yes. LinkedIn actively polices the platform. However, if you use secure architectures (local machine or dedicated cloud proxies), stay within the 100-150 connections per week limit, and focus on high-quality targeting, the risk is minimal. Always prioritize tools that mimic human delays and variable actions.\n\n### How many connection requests can I safely send per day?\n\nThe algorithm is dynamic and based on your account's historical activity. A brand-new account should send no more than 5-10 per day. A warmed-up account with a high Social Selling Index (SSI) and a paid Sales Navigator subscription can safely handle 20-25 per day. Pushing beyond 150 per week consistently will trigger security warnings.\n\n### What metrics should I track for LinkedIn automation?\n\nStop tracking \"total messages sent.\" Start tracking:\n*   **Connection Acceptance Rate:** If this drops below 25%, your targeting is wrong or your profile is not optimized.\n*   **Reply Rate:** A healthy automated campaign should see a 10-15% reply rate. If it's lower, your messaging is too sales-heavy.\n*   **Positive Sentiment Rate:** Out of the replies, how many are actually open to a conversation? 100 replies telling you to \"unsubscribe\" is not pipeline.\n\n### What\u2019s the difference between LinkedIn outreach tools and LinkedIn prospecting tools?\n\nProspecting tools (like Evaboot or Apollo) are search engines and data scrapers. They help you build the list of who to target and find their contact information. Outreach tools (like Expandi or Sbl.so) are execution engines. They take that list and automate the actual sequence of viewing, connecting, and messaging.\n\n### How do I warm up a new LinkedIn account for automation?\n\nNever plug a new account into an automation tool on day one. Spend 2-3 weeks operating manually. Send 2-3 connection requests a day to industry peers. Like and comment on posts natively. Fill out every section of the profile. Only after you have established a baseline of normal human activity should you connect a tool, starting at extremely low volume (5 actions per day) and scaling up slowly over a month.\n\n## The Final Word on Scaling Safely\n\nThe landscape of LinkedIn automation in 2026 is actually highly favorable for those willing to do it right. Because LinkedIn has cracked down on lazy, high-volume spam, the inbox is slightly less crowded than it was a few years ago. \n\nBuyers are still there, and they are still willing to connect with practitioners who offer genuine value. By choosing tools that prioritize safety, data accuracy, and thoughtful [how to scale linkedin lead generation with ai safely](https://heyjunior.ai/blog/linkedin-lead-generation-ai) (like authentic commenting and multi-channel synchronization), you can build a sustainable pipeline that outlasts the next algorithm update.\n\nFocus on the conversation, not the transaction. Choose the architecture that protects your account, and let the automation handle the heavy lifting of distribution while you focus on the human element of closing the deal.", "created_at": "2026-06-03T13:49:27.260601+00:00", "updated_at": "2026-06-03T13:49:27.260608+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {

                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {

                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
