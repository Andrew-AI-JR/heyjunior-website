    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 31, "slug": "safe-ai-engagement-on-linkedin", "title": "Safe AI engagement on LinkedIn", "excerpt": "Wondering if it's safe to use AI for LinkedIn engagement? Learn the critical difference between risky autonomous cloud bots and safe, assistive local AI tools.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57aka4w773wa7atrqt4fss78s89cgqh/safe-ai-engagement-on-linkedin-1782569969643-rzumc9.png", "published_at": "2026-06-27T14:06:00+00:00", "content": "# Safe AI engagement on LinkedIn\n\nEvery day, thousands of professionals log into LinkedIn, stare at their feed, and realize they simply do not have the three hours required to leave meaningful comments, nurture relationships, and build their network manually. The temptation to automate this process is massive. \n\nBut the moment you search for automation tools, you are hit with a barrage of horror stories: permanent account bans, shadowbanned profiles, and reputations ruined by bots blasting out generic, tone-deaf messages. \n\nThe core question for job seekers, sales teams, and founders in 2026 is straightforward: **Is it safe to use AI for LinkedIn engagement?**\n\nThe short answer is that using AI for LinkedIn engagement is generally safe when it is applied as an assistive layer to your workflow. However, it becomes highly risky\u2014and frequently results in account bans\u2014when it crosses the line into autonomous, unreviewed action-taking. \n\nThe distinction between a helpful AI assistant and a prohibited bot is no longer just about the software you use; it is about how that software interacts with LinkedIn's infrastructure, how the content reads to the platform's algorithms, and whether a human remains in the driver's seat. \n\nThis guide breaks down exactly what constitutes safe AI engagement, the technical mechanics of how LinkedIn catches bad actors, and the modern workflows that allow you to scale your visibility without risking your account.\n\n## The legal and platform reality of LinkedIn automation\n\nTo understand safety, we have to separate legal risk from platform risk. Many practitioners use the term \"illegal\" when discussing automation tools, which muddies the water for users trying to make informed decisions.\n\n### Is LinkedIn automation actually illegal?\n\nIf you use a tool to automate your LinkedIn outreach, are you breaking the law? According to an in-depth analysis by [linkedintools.site](https://linkedintools.site/is-linkedin-automation-illegal/?utm_source=chatgpt.com), the honest answer for 2026 is that LinkedIn automation is not illegal in a criminal sense, but it is explicitly against the platform's rules. While there have been high-profile court cases regarding web scraping (such as disputes over public data extraction), using a tool to draft comments or send connections will not result in criminal charges. \n\nHowever, it carries severe platform consequences. LinkedIn operates as a private platform, meaning they have absolute authority to terminate your access if you violate their terms.\n\n### What the Terms of Service explicitly prohibit\n\nLinkedIn's stance on automated software is not a gray area. As detailed in the [LinkedIn Help](https://www.linkedin.com/help/linkedin/answer/a1341387/prohibited-software-and-extensions%3Flang%3Den?utm_source=chatgpt.com) documentation regarding prohibited software and extensions, the platform forbids the use of bots or other automated methods to access the services. \n\nSpecifically, the platform prohibits tools that automatically:\n* Create posts, comments, or likes.\n* Send or redirect direct messages.\n* Add or download contacts (scraping).\n* Simulate human browsing behavior to extract data at scale.\n\n### Why cold automation cannot be made completely safe\n\nMany legacy tools claim to offer \"safe\" automation by introducing random delays between automated clicks. However, as noted by [connectsafely.ai](https://connectsafely.ai/articles/what-is-safe-linkedin-automation-guide-2026?utm_source=chatgpt.com), cold automation cannot be made completely safe. The fundamental problem is that LinkedIn\u2019s terms explicitly forbid the automated sending of messages or downloading of user data. Masking a bot with random delays does not change the fact that the underlying action violates the core terms of service. When LinkedIn updates its detection scripts, these tools eventually fail, taking their users' accounts down with them.\n\n## The 2026 crackdown: From action limits to \"AI Slop\"\n\nHistorically, LinkedIn punished accounts based entirely on volume. If you sent 100 connection requests in an hour, your account was flagged. But in 2026, the safety equation has evolved to include the *quality* and *origin* of the text itself.\n\n### What is \"AI slop\" and why is LinkedIn hiding it?\n\nAs generative AI became ubiquitous, LinkedIn feeds became clogged with generic, low-effort content. Long-winded posts summarizing basic concepts, comments saying nothing more than \"Great insights, thanks for sharing!\", and automated thought leadership flooded the platform.\n\nIn response, LinkedIn launched a major initiative to reduce this AI-generated \"slop.\" According to a report by [TechRadar](https://www.techradar.com/pro/linkedin-is-finally-set-to-crack-down-on-ai-slop-and-my-sanity-might-be-saved?utm_source=chatgpt.com), LinkedIn's VP of Product Laura Lorenzetti outlined a platform-wide effort to demote low-effort, generic posts. The platform's engineers and editorial teams collaborated to identify AI-generated patterns\u2014such as the overused phrasing \u201cit\u2019s not X, it\u2019s Y\u201d\u2014and actively suppress them in user recommendations. \n\n### The difference between language refinement and synthetic engagement\n\nThe TechRadar report highlights a critical nuance: LinkedIn is not anti-AI. In fact, LinkedIn continues to promote its own AI-based writing features. What they are cracking down on is content lacking authentic voice or genuine insight. \n\nUsing AI to help you articulate your own perspectives, fix your grammar, or structure a complex thought is perfectly safe and even encouraged. Using AI to generate a fake perspective on an article you didn't read is what triggers the algorithm's demotion filters. Safe AI engagement means using the technology as a co-pilot, not a replacement for your actual brain.\n\n## Assistive AI vs. Autonomous Bots: The critical distinction\n\nThe most important concept in safe LinkedIn growth is understanding the difference between an assistive tool and an autonomous bot. \n\n![A spectrum diagram illustrating the safety zones of LinkedIn automation, highlighting assistive AI as the safe middle ground.](https://assets.bevisible.app/inline-images/j57aka4w773wa7atrqt4fss78s89cgqh/inline-1-1782569890406-wmdcff.png)\n### Autonomous Bots (The High-Risk Path)\nAutonomous bots operate without your supervision. You feed them a list of target URLs or a search query, press \"Start,\" and walk away. The bot then takes over your session, navigating profiles, extracting data, and firing off messages or comments while you sleep. \n\nThese tools are inherently dangerous because:\n1. **They lack context:** A bot cannot tell if a user is posting about a promotion or a family tragedy, leading to disastrously inappropriate automated comments.\n2. **They trigger volume limits:** Bots move too fast, hitting LinkedIn's rate limits and immediately signaling non-human behavior.\n3. **They operate in the cloud:** Many run on remote servers, causing massive IP address inconsistencies.\n\n### Assistive AI (The Safe Path)\nAssistive AI requires a human in the loop. These tools act as a sophisticated exoskeleton for your engagement workflow. Instead of taking actions *for* you, they prepare the groundwork. \n\nWhen you use an assistive tool, you are still actively browsing LinkedIn. When you find a post you want to engage with, the AI helps you draft a contextually relevant, highly personalized comment based on your unique bio, goals, and tone. You then read the draft, tweak it, and manually click \"Post.\"\n\nBecause you are in control of the final action, the speed of engagement remains natural, the content remains authentic, and LinkedIn's automated action triggers are never tripped.\n\n## The technical mechanics: How LinkedIn detects unsafe automation\n\nTo safely use AI for LinkedIn engagement, you need to understand how the platform's security engineers catch bad actors. LinkedIn employs a multi-layered security apparatus designed to identify synthetic behavior.\n\n### Client-side telemetry and DOM inspection\nWhenever you use LinkedIn, the platform loads scripts into your browser that monitor your behavior. This is known as client-side telemetry. These scripts measure the speed of your mouse movements, the time it takes you to read a page before clicking, and the precise trajectory of your scrolling.\n\nAutonomous bots often fail telemetry checks. A bot might navigate to a profile and click the \"Connect\" button in 400 milliseconds\u2014a physically impossible feat for a human who just loaded the page. Furthermore, many cheap automation extensions inject hidden elements into the Document Object Model (DOM) of the webpage to scrape data. LinkedIn's security scripts actively scan the DOM for these foreign elements and flag accounts using them.\n\n### IP hopping and datacenter footprints\nIf you log into LinkedIn from your home Wi-Fi in Austin, Texas, and ten minutes later a cloud-based automation tool logs into your account from an Amazon Web Services data center in Frankfurt, Germany, LinkedIn immediately flags the geographic anomaly. Datacenter IP addresses are highly scrutinized because real humans browse from residential networks or mobile carriers.\n\n### API signature anomalies\nLinkedIn has strict rules on how mobile apps and web browsers communicate with its backend databases. Many aggressive automation tools reverse-engineer these internal APIs to speed up their scraping processes. However, when LinkedIn updates an API endpoint, legitimate browsers automatically update their request signatures. The bot, hardcoded to the old signature, keeps sending anomalous requests, instantly outing the user's account.\n\n![Technical diagram comparing the high ban risk of cloud-based server bots versus the safety of local AI execution.](https://assets.bevisible.app/inline-images/j57aka4w773wa7atrqt4fss78s89cgqh/inline-2-1782569896166-5dxug6.png)\n## Why cloud-based automation tools present the highest risk\n\nThe architecture of your AI tool determines your baseline risk. Cloud-based automation tools require you to hand over your LinkedIn session cookies. The tool then spins up a virtual browser on a remote server to execute actions on your behalf.\n\nAs highlighted by [connectsafely.ai's scraping guide](https://connectsafely.ai/articles/is-linkedin-automation-safe-tos-scraping-guide-2026?utm_source=chatgpt.com), running engagement tools through the cloud is a massive liability. You lose control over your digital footprint. Even if the tool uses proxy networks to mask the datacenter IP, residential proxies are notoriously unreliable, often dropping connections or rotating too quickly, which looks exactly like the bot behavior LinkedIn is hunting.\n\n## How local AI tools solve the safety problem\n\nThe safest way to use AI on LinkedIn is to bring the execution back to your local machine. This is where tools like Junior fundamentally change the safety equation.\n\nInstead of handing your session cookies to a remote server, a local AI tool runs directly on your computer, utilizing your active browser session. Because it operates locally, it inherits your exact IP address, your browser's unique fingerprint, and your actual geographical location. To LinkedIn's security infrastructure, there is zero difference between you typing a comment and a local assistive AI tool dropping a draft into the text box for your review.\n\nFurthermore, by avoiding background API scraping and relying entirely on front-end, human-paced interaction, local tools bypass the primary triggers that cause permanent account bans.\n\n## The pivot to commenting: The safest form of automated growth\n\nFor years, LinkedIn automation meant one thing: mass cold Direct Messages. But as inboxes became impenetrable fortresses of spam, the ROI on cold DMs plummeted. \n\nIn 2026, the smartest practitioners have shifted their focus to strategic commenting. Commenting is inherently safer and often more effective than DM automation for several reasons:\n\n1. **It avoids the \"Cold Outreach\" penalty:** LinkedIn heavily restricts the volume of unsolicited connections and DMs you can send. However, leaving thoughtful comments on industry peers' posts is viewed as high-value community building. There are far fewer restrictions on organic commenting.\n2. **It leverages borrowed audiences:** A great comment on a post with 100,000 views acts as a billboard for your profile. It turns public visibility into inbound connection requests, completely bypassing the need for outbound automation.\n3. **It requires contextual awareness:** Because generic comments are demoted as \"AI slop,\" leaving a highly specific, context-aware comment signals to the algorithm\u2014and to readers\u2014that you are a genuine authority.\n\n## Evaluating your LinkedIn AI stack for safety\n\nIf you are auditing your current tools or looking to adopt new ones, you need a strict set of criteria to ensure your account remains secure. You can dive deeper into this process with our comprehensive [AI Tools for Linkedin Commenting Evaluation Checklist](https://www.heyjunior.ai/blog/ai-tools-for-linkedin-commenting-evaluation-checklist), but the core questions you must ask are:\n\n| Evaluation Criteria | High Risk (Red Flag) | Safe (Green Light) | \n| :--- | :--- | :--- |\n| **Execution Environment** | Runs in the cloud, requires session cookies. | Runs locally on your machine alongside your browser. |\n| **Action Approval** | Auto-posts, auto-likes, and auto-sends in the background. | Drafts content for your manual review and approval. |\n| **Content Generation** | Uses generic prompts resulting in predictable, robotic text. | Uses your unique bio, goals, and tone for context-aware drafting. |\n| **Data Extraction** | Scrapes profiles and exports data via undocumented APIs. | Reads the visible page context to assist in drafting without mass scraping. |\n| **IP Integrity** | Uses datacenter IPs or cheap rotating proxies. | Uses your actual residential or office network IP. |\n\n## Building a safe AI engagement workflow\n\nKnowing the rules is only half the battle; the other half is implementation. A safe, high-ROI workflow uses AI to remove the friction of staring at a blank screen, while retaining the human element of strategic networking.\n\n![A four-step process map demonstrating a safe, human-in-the-loop AI engagement workflow on LinkedIn.](https://assets.bevisible.app/inline-images/j57aka4w773wa7atrqt4fss78s89cgqh/inline-3-1782569893984-287dt9.png)\n### Step 1: Curate a high-value feed\nThe first step to safe engagement is finding the right conversations. Stop relying on the default LinkedIn algorithm. Create a bookmarked list of high-value prospects, industry leaders, and potential partners. Dedicate 15 minutes a day to scanning their recent activity.\n\n### Step 2: Use AI for context-aware drafting\nWhen you spot a post that aligns with your expertise, use a local, assistive AI tool to draft a response. The AI should read the post's context and instantly generate a reply based on your specific background. For instance, if you are a SaaS founder and the post is about customer churn, the AI should frame the comment from the perspective of a founder solving retention problems, rather than providing a generic textbook definition of churn.\n\n### Step 3: The human-in-the-loop review\nThis is the non-negotiable safety step. Read the AI-generated draft. Tweak a word, add a specific anecdote, or adjust the tone. Ensure it does not sound like \"AI slop.\" If the AI generated the phrase \"In today's fast-paced digital landscape,\" delete it immediately. \n\n### Step 4: Post naturally\nBecause you are manually reviewing and clicking \"Post,\" the cadence of your engagement will naturally mimic human behavior. You might leave five comments over ten minutes, then pause to read an article, then leave two more. This erratic, human timing is exactly what LinkedIn's security systems want to see.\n\nFor a deeper look at the specific platforms that facilitate this workflow, review our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](https://www.heyjunior.ai/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n## Common myths about LinkedIn AI automation\n\nFear often breeds misinformation. Let's clear up the three most pervasive myths regarding AI on LinkedIn.\n\n### Myth 1: LinkedIn penalizes all AI-generated text.\n**False.** LinkedIn penalizes *low-quality, generic* text. The platform cannot definitively prove a human didn't write a specific sentence, but its algorithms easily recognize repetitive, low-effort structures (like the infamous \"it's not X, it's Y\" format). If your AI tool writes a highly specific, contrarian, and valuable insight based on your strict prompting, it will perform exceptionally well.\n\n### Myth 2: Browser extensions are inherently safe because they run locally.\n**False.** While local execution is safer than the cloud, many browser extensions are heavily penalized because they aggressively inject hidden scraping scripts into the DOM or auto-click buttons at superhuman speeds. A local tool is only safe if it respects human action limits and doesn't manipulate the page architecture maliciously.\n\n### Myth 3: Scraping public data is completely fine.\n**False.** There is a persistent myth that because a LinkedIn profile is public, scraping it with a bot is permitted. Platform terms explicitly forbid automated data extraction, regardless of whether the profile is public or private. Violating this rule is one of the fastest ways to receive a permanent ban.\n\n## Failure modes: How to spot when your AI engagement is going wrong\n\nEven if you are trying to act safely, you might occasionally cross the line. Here are the early warning signs that your engagement strategy is triggering LinkedIn's defensive systems:\n\n* **The endless CAPTCHA loop:** If you are suddenly being asked to verify you are a human every time you log in or view a profile, your interaction speed has triggered a telemetry warning.\n* **Shadow-limiting:** If your previously high-performing posts suddenly receive near-zero impressions, LinkedIn may have quietly restricted your reach due to suspected bot activity.\n* **Warning banners:** If LinkedIn displays a banner stating you are using an unauthorized third-party application, stop immediately. You have been caught, and the next step is a permanent ban.\n* **The \"Plastic\" network:** If you review your recent comments and realize they all sound slightly overly enthusiastic and lack any real substance, you are falling into the \"AI slop\" trap, and your reputation among your peers will suffer.\n\n## Maximizing authenticity: Training AI to sound like you\n\nThe ultimate goal of safe AI engagement isn't just surviving the ban-hammer; it's actually generating business outcomes. To turn public visibility into direct interviews, pipeline, and client conversations, your AI must sound unmistakably like you.\n\nThe difference between a tool that writes spam and a tool that starts authentic conversations is the context you provide it. When configuring an assistive AI tool, do not just tell it your job title. Feed it your specific contrarian opinions, your preferred industry jargon, the specific pain points you solve for clients, and the tone you prefer (e.g., \"direct and analytical, never overly excited\").\n\nWhen a tool like Junior is loaded with this unique biographical context, the resulting drafts cease to be generic AI outputs. They become rapid-prototyped versions of your own thoughts, ready for your final polish. \n\n## A sustainable approach to LinkedIn growth\n\nThe era of growth-hacking LinkedIn with aggressive, autonomous cloud bots is over. The platform's detection systems are too sophisticated, and the algorithm's disdain for generic \"AI slop\" is too strong. \n\nHowever, the need to scale your presence efficiently remains. By adopting a human-in-the-loop workflow, relying on local assistive tools rather than cloud-based scrapers, and prioritizing high-context commenting over cold DMs, you can safely leverage AI to bypass crowded inboxes and build a highly profitable network in 2026.", "created_at": "2026-06-27T14:49:22.433598+00:00", "updated_at": "2026-06-27T14:49:22.433604+00:00"};
    </script>

        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
