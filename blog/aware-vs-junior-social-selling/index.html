    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 52, "slug": "aware-vs-junior-social-selling", "title": "Aware Vs Junior for Social Selling Source Page for Job Seekers, Sales Teams, Lead Gen", "excerpt": "Discover how to blend \"aware\" thought leadership with \"junior\" execution in social selling. A complete guide for job seekers, sales, and lead gen to scale authentic LinkedIn engagement safely.", "featured_image_url": "https://assets.bevisible.app/featured-images/j570h8nra8e90g7mwb0yh6zwh98aj66h/aware-vs-junior-for-social-selling-source-page-for-1784902745252-fku7x1.png", "published_at": "2026-07-24T14:00:00+00:00", "content": "# Aware Vs Junior for Social Selling Source Page for Job Seekers, Sales Teams, Lead Gen\n\nWalk into any modern B2B revenue organization, and you will immediately spot a divide in how they approach LinkedIn. On one side, you have the \"Aware\" camp\u2014seasoned leaders and subject matter experts meticulously crafting thought leadership posts, prioritizing brand visibility, and playing the long game. On the other side, you have the \"Junior\" camp\u2014SDRs, newer reps, and lead gen specialists executing high-volume cadences, prioritizing outbound connections, and aggressively hunting for immediate pipeline.\n\nThis division between awareness-driven strategy and execution-focused tactics is breaking sales pipelines. \n\nWhen social selling is split into these two distinct silos, both fail. The pure \"aware\" approach often results in beautiful engagement metrics that take quarters to yield a single booked meeting. The pure \"junior\" approach devolves into relentless, automated pitch-slapping that damages account reputation and triggers LinkedIn spam filters.\n\nWhether you are a job seeker trying to bypass the ATS, a lead gen agency scaling outreach, or a founder looking for consulting clients, understanding the tension in the aware vs junior for social selling debate is critical. \n\nLet\u2019s dissect these two models, examine where they fail in isolation, and build a playbook for blending the contextual intelligence of the \"aware\" approach with the relentless execution of the \"junior\" playbook.\n\n## Decoding the Framework: Aware vs. Junior Social Selling\n\nTo build a cohesive strategy, we first have to understand the specific characteristics, incentives, and failure modes of these two distinct approaches.\n\n### The \"Aware\" Approach: Trust, Visibility, and Thought Leadership\nAwareness-based social selling is about positioning. It relies on the premise that buyers educate themselves long before they speak to sales. Professionals operating in this mode position themselves and their brand as knowledgeable, credible resources. \n\n*   **Typical Seniority:** Mid-level to senior (Founders, Account Executives, Consultants, Subject Matter Experts).\n*   **Core Mechanics:** Content strategy, social listening, complex engagement mechanics, and nurturing long-term relationships.\n*   **Primary Metrics:** Engagement quality, share of voice, content resonance, influence score, and pipeline influenced by top-of-funnel content.\n*   **Training Needs:** Advanced social selling frameworks, cross-functional collaboration with marketing, analytics interpretation, and thought leadership development.\n*   **The Trap:** \"Audience Capture.\" Practitioners become so obsessed with likes and viral reach that they start creating content for other creators rather than their actual buyers. They build an audience, but not a pipeline.\n\n### The \"Junior\" Approach: Cadences, Execution, and Prospecting\nEntry-level social selling is about momentum. It treats social platforms as an extension of the outbound email inbox, focusing heavily on execution, speed, and following defined playbooks. \n\n*   **Typical Seniority:** Entry to early-career professionals (SDRs, BDRs, Junior Recruiters).\n*   **Core Mechanics:** Prospecting list building, outbound direct messages, connection request cadences, and rapid playbook adoption.\n*   **Primary Metrics:** Outbound volume (connections sent), reply rates, meetings booked, and cadence completion rates.\n*   **Training Needs:** Tool mastery, cadence execution, objection handling in DMs, and structured mentorship.\n*   **The Trap:** \"The Spam Factory.\" Pressed for immediate meetings, junior sellers often rely on brute-force automation. They use unsafe cloud-based tools to blast generic connection requests, leading to crowded prospect inboxes, low conversion rates, and restricted LinkedIn accounts.\n\n![A whiteboard comparison matrix of Aware versus Junior social selling characteristics.](https://assets.bevisible.app/inline-images/j570h8nra8e90g7mwb0yh6zwh98aj66h/inline-1-1784902665646-504b7v.png)\n## The Danger of Choosing Just One Path\n\nIf your buyer journey is long and heavily relationship-driven, \"aware\" signals the necessary credibility and authority. If you are building pipeline with high-volume outreach, \"junior\" emphasizes the necessary hands-on execution. \n\nBut treating these as an either/or choice creates a fatal flaw in your go-to-market motion.\n\n### Why Pure \"Aware\" Starves the Pipeline\nA founder or senior consultant might spend three hours a week writing insightful industry breakdowns. They gather hundreds of likes. But because they view direct outreach as \"beneath\" their thought leadership strategy, they wait for prospects to DM them. \n\nHope is not a scalable pipeline strategy. Relying solely on inbound means you have zero control over who enters your funnel or when they decide to buy. You might attract peers, competitors, and junior employees, but completely miss the decision-makers who read your content but rarely interact with it publicly.\n\n### Why Pure \"Junior\" Destroys Brand Equity\nConversely, a lead gen agency or aggressive sales team might deploy a \"junior\" strategy by scraping 1,000 LinkedIn profiles and sending an automated sequence: *\"Hi [Name], I noticed we are both in the B2B space. Can I have 15 minutes to show you our synergy?\"*\n\nThis approach is effectively dead. Modern buyers are blind to generic DMs. Worse, relying on traditional cloud-based connection tools puts the user's account at massive risk. LinkedIn's algorithm aggressively targets these un-human interaction patterns, resulting in shadowbans or permanent account restrictions. If you want to understand how to move away from these risky tactics, our [Automate Linkedin Comments Safely Evaluation Checklist](/blog/automate-linkedin-comments-safely-evaluation-checklist) is a necessary resource.\n\n## The Bridge: Strategic Commenting as the Great Equalizer\n\nHow do you combine the credibility of the \"aware\" model with the scalable execution of the \"junior\" model? \n\nYou shift the battlefield. You move away from the crowded, spam-filled inbox, and you move away from the pressure of creating original viral content every day. Instead, you focus on **strategic post commenting**.\n\nCommenting is the perfect hybrid tactic. \n\n1.  **It is an execution activity (Junior):** You can build a targeted list of 50 prospects or industry influencers and systematically engage with their content every week.\n2.  **It builds visibility and trust (Aware):** When you leave a highly contextual, insightful comment on a prospect's post, you aren't just speaking to them. You are speaking to their entire audience. You demonstrate expertise without having to write a post from scratch.\n\n### The Shift from DMs to Public Conversations\nWhen a job seeker sends a cold DM to a hiring manager, they are one of fifty unread messages. When that same job seeker leaves a thoughtful, multi-sentence comment on the hiring manager's recent post about industry trends, they become a visible collaborator. \n\nThis public interaction creates natural reciprocity. When you eventually do send a connection request, it is no longer a cold \"junior\" action; it is a warm, context-aware extension of a conversation that has already started.\n\nTo see how this compares directly to traditional inbox-stuffing, read our breakdown on [Junior vs Dripify: finding consulting clients without automated messaging](/blog/junior-vs-dripify-finding-consulting-clients-without-automated-messaging).\n\n## Playbooks: Balancing Execution and Authority by Role\n\nThe way you blend aware and junior tactics depends entirely on your immediate objective. Here is how different groups can build a hybrid social selling machine.\n\n### Job Seekers: Networking Without Begging\nJob seekers often fall into a desperate version of the junior strategy: mass-applying and sending hundreds of generic \"I'd love to connect\" messages to recruiters. \n\n**The Hybrid Approach:**\n1.  **Identify Targets:** Build a list of 20 companies you want to work for. Identify the hiring managers, department heads, and senior individual contributors at those companies.\n2.  **Monitor (Junior Execution):** Check their LinkedIn activity daily.\n3.  **Engage (Aware Nuance):** When they post, leave comments that add value. If a VP of Marketing posts about a recent campaign, reply with an observation about how it aligns with a specific consumer trend. \n4.  **The Pivot:** After three meaningful interactions, send a connection request referencing the specific thread. You have transformed from a random applicant into a recognized industry peer.\n\n### Sales Teams & Lead Gen: Bypassing the Inbox\nSales teams need volume, but they can't sacrifice personalization. \n\n**The Hybrid Approach:**\n1.  **Curate the Feed:** Use tools to aggregate posts from your target account list. (If you're struggling to organize this, review the [Best Tools to Find Relevant Linkedin Posts to Comment On Tools Beyond Taplio](/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio)).\n2.  **Draft Contextual Replies:** Instead of sending a connection request, leave a comment that highlights your unique value proposition without pitching. If a prospect complains about a specific pain point, validate the pain point in the comments.\n3.  **Use Local AI:** Drafting dozens of highly contextual comments a day is exhausting. This is where AI excels, provided it sounds human. By using a local tool that drafts replies based on your unique bio and goals\u2014rather than generic ChatGPT slop\u2014you scale the \"junior\" execution while maintaining the \"aware\" quality.\n\n### Founders & Consultants: Scaling Authority\nFounders often have great insights but lack the time to execute consistent outbound.\n\n**The Hybrid Approach:**\n1.  **Borrow Audiences:** Identify 10-15 non-competing thought leaders in your industry who already have the audience you want.\n2.  **First-Mover Advantage:** Set alerts for when they post. \n3.  **The Value-Add:** Leave a \"mini-post\" in their comments within the first hour. Expand on their point, disagree respectfully, or provide a contrasting data point. You are effectively siphoning their visibility to build your own authority, bridging the gap between execution and awareness.\n\n![A workflow diagram mapping the transition from a public comment to an inbound meeting.](https://assets.bevisible.app/inline-images/j570h8nra8e90g7mwb0yh6zwh98aj66h/inline-2-1784902661765-0jh89u.png)\n## The Role of Automation: Doing It Safely\n\nThe biggest roadblock to blending these strategies is time. Context-aware engagement takes significantly more brainpower than clicking \"auto-connect\" on a list of 1,000 names. \n\nInevitably, teams look to automation to bridge the gap. But the *type* of automation you choose determines whether you succeed or get banned.\n\n### The Failure of Cloud-Based Connection Tools\nHistorically, \"junior\" execution relied on cloud-based tools that logged into your LinkedIn account from a remote server to send mass connection requests. LinkedIn's security systems easily detect this. The IP address doesn't match your location, the interaction patterns are mathematically perfect (and therefore robotic), and the velocity is unnaturally high. \n\nUsing these tools today is a fast track to getting your account permanently restricted. For a deeper dive into this, see our guide on [Phantombuster Alternatives for Automate Linkedin Comments Safely](/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely).\n\n### The Future: Local, AI-Assisted Engagement\nModern social selling requires automation that enhances your intelligence rather than just multiplying your clicks. \n\nThis is the core philosophy behind Junior. Unlike cloud-based connection spammers, Junior runs *locally* on your machine. It uses your actual browser, meaning the interaction patterns, IP address, and session data look entirely natural to LinkedIn. It protects your account safety while executing the heavy lifting.\n\nBut more importantly, it solves the content problem. Junior finds relevant discussions across your target network and drafts context-aware, human-sounding replies based entirely on *your* unique bio, tone, and specific goals. \n\nIt takes the high-volume execution requirement of the \"junior\" mindset and infuses it with the contextual relevance and thought leadership of the \"aware\" mindset. You review, edit if necessary, and post. You bypass the crowded inbox entirely, turning public visibility into direct interviews, pipeline, and client conversations. \n\n(For a direct comparison of this methodology against other popular tools, check out [Junior vs Taplio for LinkedIn growth](/blog/junior-vs-taplio-for-linkedin-growth)).\n\n![A diagram comparing the safety of local AI automation against risky cloud-based connection tools.](https://assets.bevisible.app/inline-images/j570h8nra8e90g7mwb0yh6zwh98aj66h/inline-3-1784902674585-f1tlut.png)\n## Measuring Success in a Blended Model\n\nIf you successfully merge aware and junior for social selling, your KPIs need to evolve. You can no longer just measure \"likes\" (an aware vanity metric) or \"connections sent\" (a junior execution metric). \n\nTrack these blended metrics to gauge the health of your social pipeline:\n\n### 1. Inbound Profile Views to Connection Rate\nWhen you leave high-quality comments on target posts, prospects will click your profile. Measure how many of those profile views turn into inbound connection requests. If views are high but connections are low, your profile is not optimized to capture the authority you are projecting in your comments.\n\n### 2. Comment-to-Conversation Ratio\nOut of every 10 strategic comments you leave, how many result in the author replying to you, or moving to a direct message? This measures the quality and relevance of your engagement. If this ratio is below 10%, your comments are likely too generic (e.g., \"Great post, agree!\") rather than value-additive.\n\n### 3. Pipeline Influenced by Engagement\nInstead of tracking \"meetings booked from cold DMs,\" track \"meetings booked within 14 days of a public interaction.\" Tag prospects in your CRM when you begin engaging with their content. When they eventually convert, attribute that success to the blended social selling motion.\n\n## Implementing Your Daily Social Routine\n\nTheory is useless without a daily operating rhythm. Here is a practical, 30-minute daily routine that perfectly balances aware and junior tactics, designed for professionals using local AI-assisted engagement tools.\n\n**Minutes 0-10: Target List Engagement (The Junior Execution)**\n*   Open your curated list of high-priority prospects, hiring managers, or target accounts.\n*   Scan for recent activity in the last 48 hours.\n*   Use your local AI assistant to draft 5-7 highly contextual, bio-aligned comments on their posts.\n*   Review, tweak to add a personal anecdote if applicable, and publish.\n\n**Minutes 10-20: Industry Influencer Engagement (The Aware Visibility)**\n*   Navigate to 3-5 massive creators or thought leaders in your space who post daily.\n*   Find their most recent post.\n*   Leave a substantive, multi-paragraph comment that adds a new perspective to their post. (This is designed to attract their audience to your profile).\n\n**Minutes 20-30: Inbox and Inbound Management (The Harvest)**\n*   Respond to any replies on your comments from the previous day.\n*   Send warm connection requests to individuals who engaged with your comments.\n*   Transition public conversations into private DMs to book meetings or informational interviews.\n\nBy following this rhythm, you ensure that you are consistently building a long-term brand (Aware) while ruthlessly progressing specific accounts toward a meeting (Junior).\n\n## FAQs on Modern Social Selling Strategies\n\n### Is cold outreach completely dead on LinkedIn?\nIt is not dead, but its efficiency has plummeted. Unsolicited, contextless pitches sent via automated cloud tools are ignored by buyers and penalized by the platform. Cold outreach only works today when it is highly personalized, well-researched, and ideally preceded by public engagement (like commenting) that warms up the prospect.\n\n### How long does it take for \"aware\" social selling to generate pipeline?\nPure thought leadership and content creation can take 3 to 6 months to start generating consistent inbound pipeline. This is why blending it with \"junior\" execution tactics\u2014like targeted commenting and proactive relationship building\u2014is essential for surviving the early months of a social selling program.\n\n### What is the safest way to automate LinkedIn growth in 2026?\nThe era of cloud-based mass connection tools is over. The safest way to scale your presence is by using local automation that mimics natural human behavior. By running locally on your machine and focusing on AI-drafted, user-reviewed comments rather than automated connection blasts, you protect your account while scaling your visibility. For a comprehensive look at the best options, read our guide on the [Best AI Tools for Linkedin Commenting Tools Beyond Supergrow](/blog/best-ai-tools-for-linkedin-commenting-tools-beyond-supergrow).\n\n### How do I train new reps to balance both approaches?\nStop giving new reps a script and a list of 1,000 names. Instead, provide them with a target list of 100 accounts and train them on how to read a prospect's post, identify the underlying business pain, and draft a comment that validates that pain. Teach them that a thoughtful comment is worth ten cold connection requests. Use our [Best LinkedIn engagement tools 2026](/blog/best-linkedin-engagement-tools-2026) guide to equip them with the right software stack to execute this strategy safely.\n\nBy dismantling the wall between aware and junior for social selling, you unlock a strategy that is both highly scalable and deeply human. You stop spamming inboxes, start contributing to meaningful industry conversations, and turn public visibility into a predictable revenue engine.\n```", "created_at": "2026-07-24T14:19:22.250077+00:00", "updated_at": "2026-07-24T14:19:22.250082+00:00"};

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

        function createShareButtons(url, title, position) {
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);
            
            const buttons = [
                {
                    name: 'LinkedIn',
                    url: `https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
                },
                {
                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
