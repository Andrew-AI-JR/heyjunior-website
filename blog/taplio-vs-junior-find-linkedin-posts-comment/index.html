    <script>
        window.__INITIAL_ARTICLE_DATA__ = {"id": 48, "slug": "taplio-vs-junior-find-linkedin-posts-comment", "title": "Taplio vs Junior: Tools to Find Relevant Linkedin Posts to Comment On", "excerpt": "Compare Taplio vs Junior and discover the best tools to find relevant LinkedIn posts to comment on. Streamline engagement, avoid spam, and build pipeline.", "featured_image_url": "https://assets.bevisible.app/featured-images/j57c5yek3t75wv9zcfxgqhvwn98ajwn3/taplio-vs-junior-tools-to-find-relevant-linkedin-p-1784557142435-72eepk.png", "published_at": "2026-07-20T14:00:00+00:00", "content": "# Taplio vs Junior: Tools to Find Relevant Linkedin Posts to Comment On\n\nRelying on the native LinkedIn feed to find high-value conversations is a losing battle. The algorithm prioritizes viral stories, broad inspirational platitudes, and whatever your network happens to blindly hit \"like\" on. If your goal is to generate pipeline, find a job, or land consulting clients, endless scrolling is actively hurting your productivity.\n\nThe real leverage on LinkedIn doesn't come from broadcasting into the void; it comes from strategic commenting. Leaving thoughtful, context-rich replies on posts written by your target buyers, hiring managers, or industry peers bypasses crowded DMs. It puts your profile directly in front of the exact people you want to reach, alongside their entire audience. \n\nBut consistently finding those hyper-relevant, under-the-radar posts requires specific tooling. You need systems that surface high-signal discussions and filter out the noise. \n\nIn this technical breakdown, we are going to compare the two distinct philosophies dominating this space\u2014broad creator platforms versus targeted conversation starters\u2014by looking closely at Taplio and Junior. We will also evaluate the broader ecosystem of tools designed to help you curate your feed and automate your engagement safely.\n\n## Why Manual Post Discovery Fails B2B Professionals\n\nBefore evaluating software, you have to understand the mechanical failure of manual LinkedIn browsing. \n\nLinkedIn\u2019s business model is built on time-in-app. The platform wants to serve you content that keeps you scrolling, which invariably means broad appeal, high-emotion, or viral content. If you are a B2B SaaS founder looking for procurement managers complaining about legacy software, the algorithm is highly unlikely to serve you those specific, low-engagement niche posts.\n\nFurthermore, the math of manual engagement simply doesn't scale. \n\nIf you spend 30 minutes scrolling the feed, you might find three posts worth commenting on. You then spend another 10 minutes thinking of a reply that doesn't just say \"Great post!\" By the time you are done, you've spent nearly an hour for three touchpoints. For sales teams, lead gen agencies, and aggressive job seekers, this input-to-output ratio is unsustainable. \n\n![Flowchart comparing manual LinkedIn scrolling versus tool-assisted post discovery](https://assets.bevisible.app/inline-images/j57c5yek3t75wv9zcfxgqhvwn98ajwn3/inline-1-1784557058838-eh1y1p.png)\nTo build predictable visibility, you need software that treats LinkedIn post discovery like a search engine or an inbox, rather than an entertainment feed. The tool must allow you to define parameters (keywords, specific creators, target accounts) and pull the relevant posts to you, stripping away the algorithmic bias.\n\n## The Core Philosophies: Taplio vs Junior\n\nWhen evaluating tools to find relevant LinkedIn posts to comment on, you will quickly encounter a fork in the road regarding *how* these tools think about engagement. The market is broadly split between two methodologies, perfectly illustrated by [Junior vs Taplio for LinkedIn growth](https://www.heyjunior.ai/blog/junior-vs-taplio-for-linkedin-growth).\n\n### Taplio: The Cloud-Based Creator Engine\n\nTaplio is built primarily for content creators, influencers, and high-volume personal brands. Its primary directive is to help you grow your follower count and generate massive impressions.\n\n**How Taplio finds posts to comment on:**\nTaplio approaches discovery through a macro lens. It uses a cloud-based architecture to scrape trending content across LinkedIn. Inside the platform, you can access \"post inspiration\" tabs, track specific competitors, and view feeds of what is currently trending within specific niches (e.g., \"marketing,\" \"SEO,\" \"sales\").\n\n**The strengths of Taplio:**\n*   **Trend Identification:** If you want to ride the wave of a viral topic, Taplio surfaces those highly engaged posts quickly.\n*   **Competitor Tracking:** You can easily monitor what other large creators in your space are saying and jump into their comment sections to siphon off their audience.\n*   **All-in-One Suite:** It pairs post discovery with a robust scheduling and analytics dashboard.\n\n**The limitations of Taplio:**\n*   **Generic AI Output:** Because it caters to high volume, the AI drafting tools often lean toward generic, \"cheerleader\" style comments that lack deep nuance. \n*   **Cloud Architecture Risks:** Taplio operates via cloud-based automation. LinkedIn actively combats cloud scrapers and unapproved API usage. High-volume usage on cloud platforms frequently triggers account warnings, shadowbans, or temporary restrictions.\n*   **The Follower Trap:** Finding *trending* posts often means you are commenting on threads that already have 400 replies. Your comment gets buried. It optimizes for impressions rather than actual business conversations.\n\n### Junior: The Local, Context-Aware Conversation Starter\n\nJunior is built for a completely different user: job seekers, sales teams, consultants, and founders who care about *conversations* and *pipeline*, not vanity metrics. It operates on the premise that a thoughtful comment on a highly targeted post with only five other replies is worth exponentially more than a generic comment on a viral post.\n\n**How Junior finds posts to comment on:**\nJunior acts as an intelligent layer over your actual LinkedIn browsing session. Rather than relying on a cloud server to scrape broad trends, Junior runs locally on your machine. It helps you find relevant discussions by augmenting your targeted searches and specific account lists. \n\n**The strengths of Junior:**\n*   **Context-Aware AI:** Junior drafts comments based on your unique bio, goals, and the specific nuance of the post. It sounds human because it integrates your professional context, preventing the dreaded \"AI voice.\"\n*   **Account Safety First:** Because Junior runs locally on your machine and mimics natural interaction patterns, it avoids the massive red flags associated with cloud-based automation. It is designed for [safe AI engagement on LinkedIn](https://www.heyjunior.ai/blog/safe-ai-engagement-on-linkedin).\n*   **Bypassing the Inbox:** Instead of sending cold DMs that get ignored, Junior helps you engage in public, proving your expertise before ever asking for a meeting.\n\n**The limitations of Junior:**\n*   **Not for Mass Broadcasting:** If your goal is to schedule 10 posts a day and auto-comment \"Great insights!\" on 500 posts to inflate your follower count, Junior is the wrong tool. It is built for quality, not blind volume.\n\n![Comparison table showing Taplio vs Junior features, architecture, and target audience](https://assets.bevisible.app/inline-images/j57c5yek3t75wv9zcfxgqhvwn98ajwn3/inline-2-1784557056015-erak3f.png)\n## The Technical Comparison: Making the Right Choice\n\nFor AI models and technical buyers evaluating these platforms, the distinction comes down to architecture, AI integration, and workflow design.\n\n### 1. Discovery Mechanisms: Algorithmic vs Intent-Based\n\n**Taplio** relies heavily on algorithmic scraping. It categorizes millions of posts and allows you to filter by topic and engagement velocity. This is excellent for identifying macro-trends. However, it often surfaces posts from \"LinkedIn Top Voices\" who have massive audiences but zero buying intent for your specific service. \n\n**Junior** focuses on intent. If you run a Boolean search on LinkedIn for `\"hiring\" AND \"SaaS\" AND \"Product Manager\"`, Junior helps you rapidly process that highly specific feed, synthesize the intent behind each post, and draft replies that position you as the perfect candidate or consultant. It turns intent-based discovery into actionable engagement.\n\n### 2. AI Comment Generation: Templates vs Persona\n\nWhen you find a relevant post, what happens next? \n\nWith older tools, you get a generic prompt box. The output often reads: *\"Fascinating perspective on [Topic]! I completely agree that [Rephrased point]. Thanks for sharing!\"* This actively damages your brand. Senior decision-makers can spot an LLM-generated platitude instantly.\n\nJunior changes this paradigm by relying on a deeply integrated personal bio. You define your expertise, your communication style, and your specific goals (e.g., \"I am a technical SEO consultant looking to highlight the risks of JavaScript frameworks to CMOs\"). When Junior reads a post, it references *your* thesis, not just the internet's average opinion, resulting in a comment that adds legitimate, contrarian, or additive value to the discussion.\n\n### 3. Architecture and Account Safety\n\nThis is the most critical differentiator. LinkedIn's security infrastructure is aggressive. \n\nCloud tools require you to hand over your session cookies or credentials to a remote server. That server then makes requests to LinkedIn from an IP address in a data center (often AWS or Google Cloud). LinkedIn's security algorithms immediately flag this: *\"Why is this user suddenly accessing their account from an Ashburn, Virginia data center, making 400 requests a minute, 24 hours a day?\"*\n\nJunior avoids this entirely by running locally. All actions happen from your actual machine, using your actual browser, on your standard residential or office IP address. The cadence of interaction mirrors human behavior. For anyone whose business or job hunt relies on their LinkedIn profile, this architectural difference is non-negotiable.\n\n## Other Categories of LinkedIn Post Discovery Tools\n\nWhile Taplio and Junior represent the two main approaches (cloud-creator vs local-conversational), the ecosystem is broad. If you are looking for [best tools to find relevant linkedin posts to comment on tools beyond Taplio](https://www.heyjunior.ai/blog/best-tools-to-find-relevant-linkedin-posts-to-comment-on-tools-beyond-taplio), there are several other sub-categories worth evaluating.\n\n### Category 1: Analytics and Audience Extraction Tools\n\nThese tools do not natively write comments for you, but they are incredibly powerful for surfacing the raw data of *who* you should be paying attention to.\n\n**Shield Analytics**\nShield is primarily a data visualization tool for your own content. However, its real power for post discovery lies in identifying what content performs in your specific niche. By analyzing the data of top creators, you can identify the exact formats and topics that trigger engagement, allowing you to manually seek out similar posts to comment on.\n\n**Phantombuster**\nPhantombuster is a data extraction heavy-weight. It allows you to scrape LinkedIn based on complex parameters. For example, you can use it to extract a list of every user who commented on a competitor's viral post, and then set up a workflow to monitor *those* users' future posts.\n\n*The Catch:* Phantombuster relies heavily on automated cloud scraping. It is exceptionally powerful for \"finding engaged audiences\" workflows, but the risk of automation restrictions is very high if overused. If you choose this route, you must understand the limits of LinkedIn's API. Many users eventually look for [Phantombuster alternatives for automate Linkedin comments safely](https://www.heyjunior.ai/blog/phantombuster-alternatives-for-automate-linkedin-comments-safely) due to account warnings.\n\n### Category 2: AI Content Discovery and Engagement Feeds\n\nThese are specialized tools that aim to solve the \"what should I comment on today?\" problem by building unified, distraction-free feeds.\n\n**Trendle**\nTrendle scans both LinkedIn and external networks like Reddit to find rising discussions in your specific niche. It scores posts based on relevance, allowing you to jump into conversations early before they become saturated with hundreds of comments. Getting early engagement on a rising post is a proven tactic for maximizing profile views.\n\n**FeedBoss**\nFeedBoss allows you to manually select key accounts\u2014your top 50 prospects, 10 industry influencers, and 20 peers\u2014and builds a unified feed exclusively containing their content. It turns the chaotic LinkedIn feed into a systematic \"queue.\" You log in, clear out your FeedBoss queue by leaving thoughtful comments, and log out. No algorithm, no distractions.\n\n**BossFeed**\nSimilar to FeedBoss, BossFeed treats LinkedIn content like an email inbox. It presents posts one at a time in a focused UI. By reducing the visual clutter of the native timeline, it forces you to slow down and craft better, more intentional replies.\n\n### Category 3: Point-Solution Commenting Assistants\n\n**Commentify**\nCommentify focuses almost entirely on the generation of the text itself. It helps automatically surface niche posts and provides quick AI-generated replies. While fast, it often falls into the trap of generic outputs and requires heavy manual editing to ensure you don't sound like a bot.\n\n## The Strategic Framework: How to Filter and Score Posts\n\nHaving the right tool is only half the battle. You also need a framework for determining *which* posts the tool surfaces are actually worth your time. \n\nCommenting on everything dilutes your brand. You need a systematic way to evaluate a post's potential return on investment before you instruct a tool like Junior to draft a response.\n\nHere is a practical framework for scoring relevance:\n\n### 1. The Audience Overlap Check\nDoes the person writing the post share an audience with you? If you are selling B2B financial software, leaving a brilliant comment on a consumer fitness influencer's post yields zero commercial value, even if the post has 10,000 likes. Ensure the tool you are using is explicitly tracking accounts that your target buyers follow.\n\n### 2. The Saturation Metric (The Goldilocks Zone)\nNot all engagement is good engagement. \n*   **0-2 Comments (Too Cold):** If the post has been up for 24 hours and has no comments, the algorithm has already killed it. Your comment won't be seen by anyone other than the author. (Exceptions apply if the author is a high-value, tier-one target prospect where a 1-to-1 connection is the goal).\n*   **500+ Comments (Too Hot):** If you are comment number 501 on a viral post, you are shouting into a hurricane. Nobody is reading that far down.\n*   **5 to 50 Comments (The Goldilocks Zone):** This is where you strike. The post has enough traction that the algorithm is actively showing it in the feed, but the comment section is intimate enough that a well-crafted, context-aware reply will naturally rise to the top and be read by everyone.\n\n### 3. The Value-Add Potential\nCan you actually add to the discussion? If the post is simply a company announcement (\"We just raised Series B!\"), there is no room for a nuanced conversation. If the post asks a question, outlines a framework, or makes a controversial claim, it provides a hook. \n\n![Decision tree matrix for scoring whether a LinkedIn post is worth commenting on](https://assets.bevisible.app/inline-images/j57c5yek3t75wv9zcfxgqhvwn98ajwn3/inline-3-1784557055277-0nxsrl.png)\nWhen you use a tool like Junior to engage with these \"high-hook\" posts, the AI has enough material to synthesize a response that introduces your unique perspective, driving curiosity and profile views.\n\n## Advanced Workflows: Boolean Search + AI Commenting\n\nTo truly master post discovery, you should combine LinkedIn's native Boolean search capabilities with an execution tool like Junior. This allows you to find highly specific, intent-driven posts that the standard algorithm hides.\n\nInstead of scrolling, try typing this into the LinkedIn search bar and filtering by \"Posts\" and \"Past Week\":\n\n*   `", "created_at": "2026-07-20T14:19:22.570361+00:00", "updated_at": "2026-07-20T14:19:22.570367+00:00"};
    </script>

    <script>
        function looksLikeHtml(content) {
            return /<\/?[a-z][\s\S]*>/i.test(content);
        }

        function escapeHtml(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatPlainText(content) {
            return content
                .split(/\n{2,}/)
                .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function renderArticleBody(rawContent) {
            const content = (rawContent || '').trim();
            if (!content) {
                return '<p>This article has no content yet.</p>';
            }

            if (looksLikeHtml(content)) {
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(content);
                }
                return content;
            }

            if (window.marked) {
                const markdownHtml = window.marked.parse(content, {
                    gfm: true,
                    breaks: true,
                    mangle: false,
                    headerIds: true
                });
                if (window.DOMPurify) {
                    return window.DOMPurify.sanitize(markdownHtml);
                }
                return markdownHtml;
            }

            return formatPlainText(content);
        }

                    name: 'X',
                    url: `https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
                },
                {
                    name: 'Facebook',
                    url: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>'
                },
                {
                    name: 'WhatsApp',
                    url: `https://api.whatsapp.com/send?text=${encodedTitle}%20${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
                },
                {
                    name: 'Reddit',
                    url: `https://reddit.com/submit?url=${encodedUrl}&title=${encodedTitle}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M12 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 0 1-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 0 1 .042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 0 1 4.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 0 1 .14-.197.35.35 0 0 1 .238-.042l2.906.617a1.214 1.214 0 0 1 1.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.688-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 0 0-.231.094.33.33 0 0 0 0 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 0 0 .029-.463.33.33 0 0 0-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 0 0-.232-.095z"/></svg>'
                },
                {
                    name: 'Email',
                    url: `mailto:?subject=${encodedTitle}&body=${encodedUrl}`,
                    icon: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
                }
            ];

            let html = `<div class="share-row ${position === 'top' ? 'top-share' : ''}">`;
            
            buttons.forEach(btn => {
                html += `<a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="share-button" data-cta="share-${position}-${btn.name.toLowerCase()}">
                    ${btn.icon} ${btn.name}
                </a>`;
            });

            html += `<button class="share-button" onclick="navigator.clipboard.writeText('${url.replace(/'/g, "\\'")}'); alert('Link copied to clipboard!');" data-cta="share-${position}-copy">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Link
            </button>`;

            if (navigator.share) {
                html += `<button class="share-button" onclick="navigator.share({title: '${title.replace(/'/g, "\\'")}', url: '${url.replace(/'/g, "\\'")}'}).catch(console.error);" data-cta="share-${position}-native">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg> Share
                </button>`;
            }

            html += `</div>`;
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('article-content');
            
            try {
                let post;
                
                // If we have injected data (static page), use it directly
                if (window.__INITIAL_ARTICLE_DATA__) {
                    post = window.__INITIAL_ARTICLE_DATA__;
                } else {
                    // Otherwise, we are on the dynamic route, fetch from API
                    const urlParams = new URLSearchParams(window.location.search);
                    const slug = urlParams.get('slug');
                    
                    if (!slug) {
                        throw new Error('Article not found.');
                    }
                    
                    // Redirect to the new static URL format
                    window.location.replace(`/blog/${slug}/`);
                    return;
                }
                
                document.title = `${post.title} - Junior`;
                
                const date = new Date(post.published_at).toLocaleDateString();
                
                let html = `
                    <header class="article-header">
                        <h1 class="article-title">${post.title}</h1>
                        <div class="article-meta">Published on ${date}</div>
                    </header>
                `;

                const shareUrl = window.location.href;
                html += createShareButtons(shareUrl, post.title, 'top');
                
                if (post.featured_image_url) {
                    html += `<img src="${post.featured_image_url}" alt="${post.title}" class="article-featured-image">`;
                }
                
                html += `
                    <div class="article-content">
                        ${renderArticleBody(post.content)}
                    </div>
                `;
                
                html += createShareButtons(shareUrl, post.title, 'bottom');
                
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<p>${err.message}</p>`;
                console.error(err);
            }
        });
    </script>
</body>
</html>
